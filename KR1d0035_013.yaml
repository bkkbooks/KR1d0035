body:
  text: 儀禮集說卷十三元敖繼公撰既夕禮第十三注曰士喪禮之下篇也繼公謂此禮承上篇為之乃别為篇者以其禮更端故也篇首云既夕哭故以既夕名篇既夕哭注曰謂先葬二日既夕哭出門哭止復外位時請啓期告于賔注曰將葬當遷柩于祖有司於是乃請啓肂之期於主人以告賔賔宜知其時也繼公謂嚮者既卜日即告于異爵者及衆賔則是賔固知其葬日矣知其葬日則啓之日不言可知而有司必請其期以告于賔者重慎之至也於夕哭而賔在焉則其朝夕哭之儀同矣此不載主人答辭者下文已明故略之右請啓期夙興設盥于祖庿門外注曰祖王父也繼公謂設盥為舉鼎及設奠者也一庿而祖禰皆在焉惟云祖者是禮主於祖也陳鼎皆如殯東方之饌亦如之皆如殯謂三鼎之面位與其實皆如嚮者門外所陳殯奠之鼎也東方之饌云如殯亦但據其盛者言之也其遷祖奠之脯醢當在甒北不别見之者略之也夷牀饌于階間此即嚮者承尸于堂之牀也階間祖庿堂下二燭俟于殯門外右陳設器饌丈夫髽散帶垂即位如初髽側瓜反散息但反注曰為將啓變也如初朝夕哭門外位繼公謂皆為之於次乃即位髽者去冠與纚而為露紒也將髺髮者必先髽故言此以明之亦與前經髺髮互見也此斬衰者耳其齊衰以下則皆免散帶垂解其三日所絞者也凡大功以上皆然髽與散帶垂未殯之服也是時棺柩復見故復此服焉此但言丈夫是婦人不與也婦人之帶所以不散垂者初已結本又質而少變故於此不可與丈夫同其所以不言髽者婦人不當髽者雖未殯亦不髽則此時可知矣其當髽者自小斂以來至此自若無所改變故不必言之婦人不哭主人拜賔入即位袒注曰此不蒙如初者以男子入門不哭也不哭者將有事止歡囂繼公謂婦人不哭說見于前商祝免袒執功布入升自西階盡階不升堂聲三啓三命哭免音問盡子忍反注曰執功布為有所拂㧍也聲三三有聲存神也啓三三言啓告神也舊說以為聲噫興也繼公謂商祝公有司也其為士但當弔服加麻此時有事於柩故復為之袒免燭入注曰照徹與啓肂者疏曰一燭於室中照徹奠一燭於堂照開殯肂也祝降與夏祝交于階下取銘置于重重直龍反後倣此祝降者周祝取銘而降也不言其升故以降見之與夏祝交事相接也惟云交者亦相右也凡交而非相右者經必言相左以别之夏祝與執事者升取宿奠也祝取銘置于重為啓肂遷之取銘在前置于重在後乃合而言之文順耳踊無算注曰主人也商祝拂柩用功布幠用夷衾幠火吳反注曰拂去塵也幠覆之為其形露疏曰夷衾於後無徹文當隨柩入壙矣繼公謂夷衾即小斂後覆尸者也以其事相類故復用之案注云形露猶露見也右啓遷于祖用軸注曰遷于祖朝祖庿也檀弓曰殷朝而殯于祖周朝而遂葬繼公謂必遷于祖者以其昭穆同後又當祔之於此故也檀弓曰喪之朝也順死者之孝心也其哀離其室也故至於祖考之庿而后行重先奠從燭從柩從燭從主人從主人從衆主人以下從婦人從女賔從男賔在後女賔以上其行皆以服之親疏為序服同乃以長幼也經但言主人從者以其餘皆從可知也葬而從柩之序亦然升自西階注曰柩也繼公謂升自西階神之也凡柩歸自外而入庿者既小斂則升自阼階未忍異於生也既大斂則升自西階此亦入庿耳故其禮與大斂而入者同奠俟于下東面北上注曰俟正柩也繼公謂北上則巾席在後也記曰巾席從而降主人從升婦人升東面衆人東即位注曰東方之位繼公謂婦人東面當負序以辟奠者之往來東即位者乃衆主人也脫一主字耳以記考之可見此時堂下之位亦如朝夕哭不皆在東方正柩于兩楹間用夷牀注曰是時柩北首繼公謂此正柩于堂正與小斂之後尸夷於堂者相類故仍用其牀兩楹間東西節也其於楹間為少北主人柩東西面置重如初注曰如殯宫時也繼公謂云柩東明近於柩席升設于柩西奠設如初巾之升降自西階注曰從奠設如初東面也巾之為禦當風塵疏曰此奠巾之者異於朝夕在室者也繼公謂席設于柩西亦差近於柩奠設于席前亦當柩少北柩北首西乃右也於此奠焉與奠于尸右之意同不統於柩奠宜統於席也不去席者先已用席則不變之且尸柩之奠亦宜異也主人踊無算降拜賔即位踊襲主婦及親者由足西面主人即柩東之位則踊既奠乃降也即位亦在阼階下襲亦在序東婦人由足出於柩南也西面于阼階上亦南上若有南面者則東上薦車直東榮北輈直音值輈竹虬反注曰進車者象生時將行陳駕今時謂之魂車車當東榮西上於中庭繼公謂此即遣車也北輈者以柩北首故爾乘車之前一木當中而曲縳衡以駕馬者謂之輈大車之前二木在旁而直縳軛以駕牛者謂之轅案注云西上於中庭鄭知其在東方之中庭者以雜記所言賵車之位定之也質明滅燭燭堂之上下者徹者升自阼階降自西階徹直列反下並同注曰徹者辟新奠繼公謂徹者無由足之嫌故得升自阼階從其正禮亦可以見此奠者自西階升之意矣徹奠不改設於序西南亦以無俎而非盛饌故也乃奠如初升降自西階注曰為遷祖奠也奠升不由阼階柩北首辟其足繼公謂此奠亦惟以脯醢醴酒主人要節而踊要於遙反下並同節謂徹者奠者之升降與奠者由重南東時也要節而踊丈夫婦人皆然如其在殯宫之儀也惟言主人亦文省薦馬纓三就入門北面交轡圉人夾牽之御者執策立于馬後注曰駕車之馬每車二匹纓今馬鞅也就成也諸侯之臣飾纓以三色而三成此三色者蓋絛絲也其著之如罽然天子之臣如其命數王之革路絛纓圉人養馬者在左右曰夾既奠乃薦馬者為其踐汚庿中也繼公謂三就采三匝也惟言入門則是但沒霤耳每馬兩轡交轡而夾牽之謂左人牽右轡右人牽左轡也馬有纓而無樊蓋臣禮也春秋傳仲叔于奚請繁纓以朝孔子非之案注云天子之臣如其命數亦未有以見其必然哭成踊右還出還音旋下並同哭成踊圉人與御者也雜記曰薦馬者哭踊右還者西上也賔出主人送于門外有司請祖期注曰亦因在外位請之當以告賔每事畢輒出繼公謂送亦拜之門庿門也案注每上更當有一賔字曰日側注曰側昳也謂過中之時繼公謂不用日中者辟殷人所尚也檀弓曰殷人尚白大事斂用日中有司既得祖期不言告賔者於請啓期已見之故略於此下經請葬期亦然右請祖期主人入袒乃載踊無算卒束襲注曰袒為載變也乃舉柩卻下而載之束束棺於柩車賔出遂匠納車於階間謂此車繼公謂主人入袒當在阼階下既載則在柩東柩東之位亦當柩少北降奠當前束注曰下遷祖之奠也當前束猶當尸腢也亦在柩車西束有前後繼公謂亦見其當柩少北耳商祝飾柩一池紐前赬後緇齊三采無貝赬丑蒸反注曰飾柩為設牆栁也巾奠乃牆謂此也牆有布帷柳有布荒池者象宫室之承霤以竹為之狀如小車笭衣以青布一池縣於柳前紐所以聨帷荒前赤後黑因以為飾左右面各有前後齊居柳之中央若今小車蓋上蕤矣以三采繒為之上朱中白下蒼著以絮設披披彼誼反注曰披絡柳棺上貫結於戴人居旁牽之以備傾虧喪大記曰士戴前纁後緇二披用纁屬引屬音燭下同注曰屬猶著也引所以引柩車古者人引柩繼公謂引柩車之索也屬之於車輅云引者以用名之凡引天子用六諸侯四大夫士二右載柩陳明器于乘車之西乘繩證反注曰明器藏器也檀弓曰其曰明器神明之也言神明者異於生器竹不成用瓦不成沫木不成斫琴瑟張而不平竽笙備而不和有鐘磬而無筍虡繼公謂陳於車西其在東堂之南與折橫覆之折之設反覆芳服反注曰折猶庪也窆事畢加之壙上以承抗席覆之見善面也繼公謂陳折云橫則是折之狀當與抗木之橫者相似但未必有縮者耳於此橫陳之蓋象其在壙也後言橫者縮者皆放此自抗木至茵亦後用者先陳此折之用在抗木之前乃首陳之者以其差重大於抗木故特異之與抗木橫三縮二注曰抗禦也所以禦止土者其橫與縮各足掩壙加抗席三注曰席所以禦塵繼公謂此席在茵與抗木縮者之間是亦縮也不言者亦文省耳每席之長亦與壙齊用三則廣足以掩之矣用時云覆是此陳時卻也加茵用疏布緇翦有幅亦縮二橫三注曰茵所以藉棺者翦淺也幅緣之亦者亦抗木也今文翦作淺繼公謂翦與有幅皆未詳或曰有幅謂繚縫之而不削幅也未知是否茵與抗木其陳之用之橫縮之次各不類蓋貴相變也器西南上綪綪側耕反注曰器目言之也陳明器以西行南端為上綪屈也不容則屈而反之繼公謂器自苞而下者也均其多寡分為數列以要方也其前列始於茵北之西以次而綪焉其後列不過於茵北之東可知矣器主於入壙故南上茵注曰茵在抗木上陳器次而北也繼公謂茵之下有抗席抗木惟言茵者指其可見者言也苞二所以裹遣奠羊豕之體筲三黍稷麥筲所交反注曰筲畚種類也其容蓋與簋同一觳也罋三醯醢屑幂用疏布幂眉狄反注曰罋其容亦蓋一觳屑薑桂之屑也內則曰屑桂與薑繼公謂疏布六升以上至四升者也甒二醴酒幂用功布皆木桁久之桁户耕反注曰桁所以庪苞筲罋甒也每器異桁繼公謂皆以桁久之也久說見上篇用器弓矢耒耜兩敦兩杅槃匜匜實于槃中南流敦音對杅音于注曰此皆常用之器也杅盛湯漿流匜口也繼公謂耒耜田器也耜以起土耒其柄也此有爵矣乃以耒耜為用器為其有圭田故也孟子曰卿以下必有圭田圭田者主人所親耕以共祭祀之齍盛者也無祭器注曰士器略也大夫以上兼用鬼器人器也繼公謂祭器尊惟尊者乃得用之案注云大夫以上兼用鬼器人器鄭氏以此士喪禮無祭器故意大夫則有之然亦未有以見其必然若天子諸侯則固宜有之矣有燕樂器可也注曰與賔客燕飲用樂之器也繼公謂如琴瑟之類是也檀弓曰琴瑟張而不平竽笙備而不和有鐘磬而無筍虡其此之謂與云可亦不必其用之也役器甲胄干笮笮側白反注曰此皆師役之器甲鎧胄兜鍪干楯笮矢箙繼公謂笮不屬用器乃屬役器豈以有師役方用之乎燕器杖笠翣翣所甲反注曰燕居安體之器也笠竹􅡓蓋也翣扇右陳器徹奠巾席俟于西方主人要節而踊注曰巾席俟于西方俎奠將用焉繼公謂徹者由東方當棧之南折而西至棧之西南折而北東面而徹奠既徹至西方折而南乃由重南東也要節者東方西鄉時丈夫踊西方南鄉時婦人踊由重南東時丈夫踊也此時徹奠辟還柩也不改設亦以無俎也袒注曰為將祖變商祝御柩注曰亦執功布居前為還柩車為節乃祖注曰還柩向外為行始踊襲少南當前束注曰主人也繼公謂不言主人者可知也此踊襲皆於故位既則少南也主人柩東之位皆當前束載時前束在北及還柩則在南故少南以當之然則柩車雖還亦不離其所也婦人降即位于階間注曰位東上繼公謂柩已還而首南鄉婦人乃得即位于其北位亦當西上婦人不位于車西恐妨賔客之行禮者也祖還車不還器注曰祖有行漸車亦宜鄉外也器之陳自若南上繼公謂不還器者以陳之之時西南上已見行意也必云不還器者嫌車與重皆還此亦宜如之也祖似衍又經無此例祝取銘置于茵銘之在重其面外鄉正與重之鄉背異故將還重則徹之亦以是時可以不用銘也置于茵者當與之同入壙二人還重左還注曰重與車馬還相反由便也繼公謂車馬西上宜右還重一而已宜左還皆由便也二人還之則凡舉之亦二人矣重之鄉背不必與柩同但因還柩之節而併還之也布席乃奠如初主人要節而踊記曰祝饌祖奠于主人之南當前輅北上巾之謂此時與如記所云則是布席于柩東少南東面而奠于其東也柩已南首故奠於此亦奠于尸東之意也布席于柩西則北上柩東則南上與初大斂時舉鼎以下之儀也是雖所奠異處而面位則同故以如初蒙之奠者之來由東方當前輅而西既奠則由柩北而西亦由重南而東反于其位矣要節而踊謂奠者於東方西鄉時丈夫踊西方南鄉時婦人踊由重南東丈夫踊也薦馬如初注曰柩動車還宜新之也賔出主人送有司請葬期注曰亦因在外位時入復位注曰主人也自死至於殯自啓至於葬主人及兄弟恆在內位繼公謂復柩東之位右請葬期公賵𤣥纁束馬兩賵芳奉反注曰公國君也賵所以助主人送葬也兩馬士制也春秋傳曰宋景曹卒魯季康子使冉求賵之以馬曰其可以稱旌繁乎繼公謂國君以馬幣禮於其臣者惟此耳君賵之乃用兩馬者如其駕遣車之數也然則賵以車馬之意亦可見矣擯者出請入告主人釋杖迎于庿門外不哭先入門右北面及衆主人袒注曰尊君命也衆主人自若西面繼公謂釋杖出迎及袒者尊君命也馬入設設於西方也雜記言諸侯相賵之禮云上介賵陳乘黃大路於中庭則此賵馬其亦中庭與設於此者變於吉也吉時參分庭一在南賔奉幣由馬西當前輅北面致命輅音路注曰賔使者幣𤣥纁也輅轅縳所以屬引柩車在階間少前參分庭之北輅有前後疏曰賔使者亦士也注云轅縳謂以木縳於柩車轅上也繼公謂賔奉幣入門左當階而北行當輅乃折而東行至其右北面致命君使乃不升堂致命者柩在下也賔進自西方而云由馬西則馬亦在西方明矣主人哭拜稽顙成踊賔奠幣于棧左服出棧士板反注曰棧謂柩車也棧車不革鞔而漆之服車箱今文棧作輚疏曰車南鄉以東為左尸在車上以東為右繼公謂下經云至于邦門公使宰夫贈𤣥纁束主人由左聽命賔由右致命然則此時主人雖不在位亦當進於庭之北稍近於賔而聽命矣賔既致命亦於是而拜之奠于左服與委物於尸東殯東者同意案注云象授人授其右者如授生人以物必於其右而授之欲其便於受也宰由主人之北舉幣以東主人之北謂主人當時所立處之北也蓋是時主人不拜于位又以下文主人受賻之儀例之則主人拜此君命亦西面矣士受馬以出此受馬者亦以舉幣為節主人送于外門外拜此外門亦庿之外門也將葬則開之以出柩吉時惟館賔於此則開之襲入復位杖此亦為君命袒故既送使者則襲於外右公賵賔賵者將命擯者請入告出告須賔卿大夫士之使者也馬入設賔奉幣擯者先入賔從致命如初注曰初公使者繼公謂擯者先入入門而若道之也賔從入門而左也主人拜于位不踊注曰柩車東位也繼公謂拜不稽顙亦以與君禮同節宜逺辟之下禮放此賔奠幣如初舉幣受馬如初舉幣亦蒙如初者是時主人之位與拜君命之處雖不同而宰之舉幣以主人之北為節則一也擯者出請言出請見賔已出在外也此時賔客為禮或不一而足故於其出也主人未送而必請之與襚時異若奠奠謂致可以為葬奠之物也入告出以賔入將命如初此將命猶致命也主人亦拜于位士受羊如受馬如其受之以出也羊者士葬奠之上牲故此奠者用之奠不用幣又請若賻賻音附注曰賻之言補也助也貨財曰賻入告主人出門左西面賔東面將命注曰主人出者賻主施於主人繼公謂此將命執物以將之也主人拜賔坐委之宰由主人之北東面舉之反位注曰反位反主人之後位繼公謂主人有喪則於賔客之餽遺者不宜親受故賔坐委之以見不敢授之意有器而不委之嫌若必以授主人若無器則捂受之捂五故反注曰謂對相授受不委地繼公謂亦宰捂受之舉之則同面受之則相對亦禮貴相變器所以盛賻物者也不委地者為其坌汙無器則無必授主人之嫌故可以不委之又請賔告事畢拜送入宰既反位主人未即入俟擯者既請事乃遂送之也如但賵若奠而已主人亦出送之贈者將命以柩將去而贈之與贈生人之意同擯者出請納賔如初注曰如其入告出告須賔奠幣如初注曰亦於棧左服繼公謂亦北面致命既則主人拜之乃奠幣也幣亦𤣥纁束若就器則坐奠于陳注曰就猶善也贈無常唯玩好所有陳明器之陳繼公謂就成也謂已成之器也奠于陳從其類也以陳明器之處為陳者因事名之如以脊肺為舉之類是也凡將禮必請而後拜送注曰雖知事畢猶請君子不必人意繼公謂此為不見者言之也將行也行禮謂賵若賻之屬上文惟於賻之後言拜送此則明不賻若不奠者亦當如之也兄弟賵奠可也注曰兄弟有服親者可且賵且奠許其厚也繼公謂可者許其得賵且奠然亦未必其並用之辭以上經考之其得賵奠者亦可賻若贈也而此經兄弟惟正言賵奠文已略矣乃復不必其並用者記曰有其禮無其財君子不行也聖人之意其或在是與所知則賵而不奠注曰所知通問相知也降於兄弟繼公謂賵以幣馬尊敬之意也故親疏皆得用之奠以羊若相飲食然親親之恩也故疏者不得用之以自别於兄弟所知謂知死知生者也朋友亦存焉知死者贈知生者賻注曰各主於所知繼公謂是又於所知之中以此二者别之也知死者且賵且贈知生者且賵且賻以是推之則生死兩知者三者皆得用也然此亦但許其禮之所得為者耳初不必其備禮也經於兄弟已見其意故於此略之書賵於方若九若七若五注曰書賵奠賻贈之人名與其物於板每板若九行若七行若五行疏曰以賔客所致有賵有賻有贈有奠直云書賵舉首而言所送有多少故行數不同繼公謂書者為將讀之行數多不過於九少不下於五言其疏數之節也書遣於䇿遣棄戰反下並同注曰遣猶送也謂所當藏物疏曰上書賵於方此言書遣於策不同者聘禮記云百名以上書於策不及百名書於方以賔客贈物名字少故書於方遣送死者之物名字多故書之於策繼公謂遣謂苞以下書賵於方書遣於策所以别內外又遣皆為主人之物不必别書之亦宜於策也策廣於方乃代哭如初注曰初謂既小斂時繼公謂此陳柩與小斂後夷尸相類故亦代哭明日而葬亦類於殯宵為燎于門內之右注曰為哭者為明繼公謂此於門右者宜逺尸柩也必逺之者亦謂鬼神或者尚幽暗右賔賵奠賻贈厥明陳鼎五于門外如初注曰鼎五羊豕魚臘鮮獸各一鼎也士禮特牲三鼎盛葬奠加一等用少牢也繼公謂少牢五鼎大夫之禮士奠乃用之者喪大事也而葬為尤重故於此奠特許而攝用之明非常禮如初如殯奠時其實羊左胖胖音判實鼎實也總為五鼎言之羊其一耳亦豚解之肩肫胉脊共四段也羊豕用左胖亦變於吉凡食生與吉祭皆尚右體髀不升髀步禮反此奠用大牲不合升故雖豚解亦去髀腸五胃五注曰亦盛之也疏曰少牢用腸三胃三繼公謂此雖盛之亦變於吉也離肺明無切肺也豕亦如之豚解無腸胃注曰如之如羊左胖髀不升離肺也豚解解之如解豚亦前肩後肫脊脅而已豕無腸胃者君子不食溷腴繼公謂豚解謂以解豚之法解之凡俎實用羊豕者其體數同此豕云豚解則羊如之明矣於羊不見之者不嫌其異也用少牢矣乃熟而豚解之亦奠禮之異於祭者與魚臘鮮獸皆如初鮮音仙注曰鮮新殺者繼公謂如初者如殯奠魚九臘左胖髀不升也鮮獸亦如臘凡魚臘皆貴槀而賤新此牲用少牢乃無膚而加鮮獸者凡牲用豚者例無膚此豕用豚解之法故亦放豚之不用膚而以鮮獸代之也東方之饌亦設棜于東堂下南順齊于坫饌于其上也其饌在下四豆脾析蜱醢葵菹螺醢蜱皮佳反螺音螺注曰脾析百葉也蜱蚌也繼公謂脾析亦未詳其為何物蜱周官作蠯四籩棗糗栗脯糗去九反注曰糗以豆糗粉餌繼公謂上四豆於周官為饋食之豆則此四籩亦當為饋食之籩然籩人職於此但有棗栗而無糗脯豈其所脫者乎醴酒醴酒亦北上而籩在醴北豆在籩北也其豆亦南上籩亦北上而皆綪之陳器注曰明器也夜斂藏之滅燎執燭俠輅北面俠音夾燭在輅東者照徹祖奠與設遣奠在輅西者照改設祖奠也賔入者拜之亦鄉而拜之徹者入丈夫踊設于西北婦人踊注曰亦既盥乃入繼公謂徹者入門右由東方進當前輅折而西至輅東徹奠如初位既則由柩車北而設于其西北不設于序西南柩在下故也丈夫踊蓋亦在徹者折而西之時徹者東注曰由柩車北東適葬奠之饌繼公謂東適東堂下之饌以待事至鼎入注曰舉入陳之也西面北上如初繼公謂亦陳于阼階前乃奠豆南上綪籩螺醢南北上綪注曰籩螺醢南辟醴酒也繼公謂南上綪螺醢在脾析東也北上綪脯在棗東也俎二以成南上不綪特鮮獸注曰成猶併也不綪者魚在羊東臘在豕東繼公謂二列各南上是不綪也獸特于其北此設豆籩俎乃云綪不綪者省文法也醴酒在籩西北上北上醴在棗西酒在糗西凡饌異位則所上相變明不相統也此設之次亦如殯奠繼公謂此亦不見主人答辭與請啓期者相類奠者出主人要節而踊注曰亦以往來為節繼公謂奠者亦從柩北而西乃出也節亦謂阼階前鄉西西階下鄉南及過重南時也上言徹者入此言奠者出則私臣於是日不復位于內矣右遣奠甸人抗重出自道道左倚之注曰抗舉也出自道出從門中央也今時有死者鑿木置食其中樹於道側由此繼公謂上篇言甸人置重於中庭於此又言甸人蓋始終之辭也所以見其間凡有事於重者皆此人為之道左廟大門外之道南薦馬馬出自道車各從其馬駕于門外西面而俟南上注曰南上便其行也行者乘車在前道槀序從繼公謂重與車馬皆出自道者象其平生之出必中道也門庿門也西面于門外之東方俟器出而從之也南上將行以近外者為先也右出重與車馬徹者入踊如初徹巾苞牲取下體注曰苞者象既饗而歸賔俎者也士苞三個前脛折取臂臑後脛折取骼雜記曰父母而賔客之所以為哀繼公謂苞謂以苞盛之也徹巾即苞牲是即於席前為之也取下體為其皮骨多差可以久也惟折取下體則是每牲之俎猶有四段也此不取俎釋三個之義與祭禮之歸尸俎者異也不以魚臘注曰非正牲也右苞牲行器器謂折抗席抗木行謂舉之以出茵苞器序從注曰如其陳之先後繼公謂此又以茵苞連言者見其相繼也此器指筲甕之屬序從者茵苞以下為序而從抗席也行器抗席在後車從注曰次器繼公謂從器而序於庿之外門外以俟柩也徹者出踊如初注曰於是庿中當行者唯柩車繼公謂徹者亦自柩北而設於西北乃出也右行器主人之史請讀賵執算從柩東當前束西面不命毋哭哭者相止也惟主人主婦哭燭在右南面注曰史北面請既而與執算西面於主人之前讀書釋算燭在右南面照書便也繼公謂賵即書于方者也賵禮賔為之也故主人之史讀之不命毋哭嫌若併止主人主婦然也哭者相止將讀書不可歡譁右史右也執燭者在右則執算者在左也讀書釋算則坐釋算則坐謂每釋算則坐既則興也必釋算者物有多寡宜知其數卒命哭滅燭書與算執之以逆出卒謂讀之畢也言逆出亦見執算者在史南公史自西方東面命毋哭主人主婦皆不哭讀遣卒命哭滅燭出注曰公史君之典禮書者繼公謂遣即書于䇿者也此主人之物故公史為讀之柩將行而讀賵與遣者若欲神一一知之然嚮者賵時雖致命於柩今亦宜與遣物皆讀之故不嫌於再告此讀遣執算執燭之位與上同惟東西左右則異耳此二燭即嚮之俠輅者少進而轉南面耳出亦逆出右讀賵讀遣商祝執功布以御柩注曰居柩車之前若道有低仰傾虧則以布為抑揚左右之節使引者執披者知之今文無以執披注曰士執披八人繼公謂此見執披之節也不言引者披後於引言執披則引可知矣主人袒乃行踊無算注曰袒為行變也乃行謂柩車行也出宫踊襲出宫而踊哀親之遂離其室也行路不宜袒故於此而襲右柩行至于邦門公使宰夫贈𤣥纁束邦門城北門也檀弓曰葬於北方北首天下之達禮也柩至此公乃贈亦異於臣也主人去杖不哭由左聽命賔由右致命主人哭拜稽顙去起吕反注曰柩車前輅之左右也當時止柩車疏曰在廟柩車南鄉左則在東此柩車北鄉左則在前輅之西也賔由右致命則在柩車之東矣繼公謂是時柩北首賔當南面致命主人東面聽命而拜之略與賵于庿者相類不成踊變於家也賔升實幣于蓋降主人拜送復位杖乃行注曰升柩車之前實其幣於棺蓋之柳中若親授之然復位反柩車後繼公謂不奠于左服别於在庿之禮也是時宰不舉之乃行亦謂柩車行右公贈至于壙陳器于道東西北上壙口廣反注曰統於壙繼公謂西北上以西行北端為上謂苞莦而下者也亦綪之茵以上當其北亦如在庿中之陳然茵先入注曰當藉柩也屬引注曰於是說載除飾更屬引於緘耳繼公謂此屬之為將窆也其用異矣猶以引名之者見其索不易也引柩下棺異索天子之禮也案注云緘耳見喪大記大夫士以咸注又此及記注皆云說載除飾用周官全文耳其實此禮當除飾乃說載主人袒衆主人西面北上婦人東面皆不哭注曰俠羡道為位繼公謂袒為窆變也婦人亦北上皆不哭亦為有事不可歡譁也喪大記曰士哭者相止也乃窆主人哭踊無算襲窆彼驗反注曰窆下棺也今文窆為封贈用制幣𤣥纁束拜稽顙踊如初此贈謂主人以幣贈死者於壙中也尸柩已在壙則有長不復反之意故此禮亦以贈名之朋友贈於家主人贈於壙親疏之宜卒袒拜賔主婦亦拜賔即位拾踊三襲拾其業反下並同注曰主婦拜賔拜女賔也即位反位拾更也繼公謂於此拜賔特為之袒重其禮也主婦所拜賔謂內賔與宗婦之屬古者婦人非有親者不送其葬即位主人主婦也拜賔必鄉之拾踊者主先賔後婦人居間三謂三者三也襲者主人也禮婦人不袒賔出則拜送注曰相問之賔也凡弔賔有五去皆拜之此舉中焉疏曰凡弔賔有五見雜記繼公謂拜送云則明賔有未出者也藏器於旁加見見賢遍反注曰見棺飾也先言藏器乃云加見者器在見內也檀弓曰有虞氏瓦棺夏后氏堲周殷人棺槨周人牆置翣繼公謂器用器至燕器也此旁先言之謂棺之左旁也加見者以見加於棺及藏器之上也牆柳之屬謂之見者以其見於棺器之外故因以名之此藏器者其冢人之屬與冢人職云大喪入藏凶器藏苞莦于旁注曰於旁者在見外也不言罋甒饌相次可知喪大記曰棺槨之間君容柷大夫容壺士容甒繼公謂苞莦先陳乃藏於用器以下之後亦先陳而後用也旁右旁也藏苞莦罋甒於右亦猶奠于尸柩之右之意也喪大記云棺槨之間士容甒則此四者蓋一一而居也若藏器多則相重纍可案注云見外謂見外槨內也加折卻之加抗席覆之加抗木折云加者謂在見與苞莦之上也抗木不言卻與覆是兩面同矣實土三主人拜鄉人注曰謝其勤勞疏曰案雜記云鄉人五十者從反哭四十者待盈坎於時鄉人並在故主人拜謝之謂在道助執紼在壙助下棺及實土也繼公謂下云襲是亦袒拜鄉人也不言袒蓋文脫耳即位踊襲如初如初亦拾踊三也右窆乃反哭入升自西階東面衆主人堂下東面北上注曰西階東面反諸其所作也反哭者於其祖庿繼公謂反哭於祖庿者為其棺柩從此而出也升自西階未變其嚮者升堂之路也升堂而不見故但止於西階之上焉此亦變於尸柩在堂之位也衆主人西方東面統於主人也婦人入丈夫踊升自阼階注曰辟主人也繼公謂以上經及此文考之則送葬之行婦人次於衆主人以下明矣主婦入于室踊出即位及丈夫拾踊三注曰入于室反諸其所養也出即位堂上西面也繼公謂惟主婦入于室則餘人先即位于阼矣必入于室者以其生時於此共祭祀也入室又不見矣故出而與主人相鄉而哭踊同其哀也賔弔者升自西階曰如之何主人拜稽顙注曰賔弔者衆賔之長也反而亡焉失之矣於是為甚故弔之弔者北面主人拜於位繼公謂此弔異於常故為之稽顙賔降出主人送于門外拜稽顙門外庿門外也送賔而稽顙者以其送葬且從反哭尤勤勞也故重謝之雜記曰相見也反哭而退朋友虞祔而退然朋友於此時亦出至虞祔則復來助祭也遂適殯宫皆如啓位拾踊三如啓位婦人即位于阼階上西面南上丈夫即位于堂下直東序西面也拾踊者丈夫先婦人後而已蓋此時無賔兄弟出主人拜送注曰兄弟小功以下也異門大功亦可以歸繼公謂賔出自庿兄弟出自殯宫親疏之殺衆主人出門哭止闔門主人揖衆主人乃就次注曰次倚廬也右反哭猶朝夕哭不奠既葬矣猶朝夕哭於殯宫以其神靈在此也不奠者為無尸柩也下云三虞則此朝夕哭乃指未虞以前之禮檀弓曰既葬反日中而虞葬日虞不忍一日離也而此經於葬虞之間其言乃若是則檀弓所記者其非舊典與三虞卒哭注曰虞喪祭名繼公謂卒哭謂卒殯宫之哭也禮於三虞既餞之後而遂卒哭以其明日祔于祖故不復朝夕哭於殯宫惟朝一哭夕一哭于其次而已虞說見士虞記明日以其班祔注曰班次也祔卒哭之明日祭名祔猶屬也祭昭穆之次而屬之喪服小記曰祔必以其昭穆亡則中一以上繼公謂明日三虞之次日也班昭穆之次也祔謂祔于祖父孫與祖其昭穆同既葬則祔之者尸柩已去神宜在廟也祔而祭之因名其祭為祔云右虞卒哭祔記此上下二篇之記也士處適寢寢東首于北墉下適音嫡注曰將有疾乃寢于適室繼公謂適寢正寢也此云適寢明經所謂適室者為適寢之室耳有疾疾者齊齊側皆反下同注曰適寢者不齊不居其室繼公謂齊之言齊也齊其不齊使其心意湛然純一也疾者齊一其心意所以養氣體養者皆齊養羊尚反養者齊欲専心於所養者也徹琴瑟徹直列反下並同記曰士無故不去琴瑟疾病外內皆掃掃悉報反疾甚曰病掃者為將有事也徹䙝衣加新衣此謂死衣也必易之者為不可使之服故衣以死也衣云䙝見其非上衣然則新者亦非上衣矣上衣者朝服𤣥端之類不加上衣者為其後有襲斂等事皆用上衣故於此略之御者四人皆坐持體注曰御者今時侍從之人繼公謂持體正其手足也男女改服屬纊以俟絶氣屬音燭下並同注曰為其氣微難節也纊易動搖置口鼻之上以為候繼公謂絶氣猶氣絶也男子不絶于婦人之手婦人不絶于男子之手注曰備䙝疏曰疾時使御者持體并死於其手婦人則內御者持體還死於其手乃行禱于五祀注曰盡孝子之情繼公謂此禱于平常所祭者也士之得祭五祀於此可見乃卒注曰卒終也主人啼兄弟哭注曰哀有甚有否設床笫當牖衽下莞上簟設枕笫側里反注曰病卒之間廢牀至是設之事相變疏曰喪大記曰疾病寢東首于北墉下廢牀是其始死亦因在地無牀復而不蘇乃設牀于墉下繼公謂設枕于南遷尸注曰徙於牖下也於是幠用夷衾復者朝服左執領右執要招而左朝音潮下同要於遙反簪裳于衣故左執領右執要此謂既登屋而易執之之時也招而左謂招時兩手自右而左也左尊故其執與招之儀如此朝服為求神敬其事也楔貌如軛上兩末軛於革反注曰事便也繼公謂柶而云楔因其楔齒而名之以别於他柶軛在大車轅端厭牛領者楔狀類之故以曉未知者焉楔齒時以兩末上鄉則末出於口旁矣綴足用燕几校在南御者坐持之綴之劣反校胡孝反校亦几左廉之名校在南則橫設也几之為制前後狹而左右差廣綴足宜寬故橫設之必校在南者生時設几左亷近人故放之也坐持之則御者亦在牀矣其於几之北與即牀而奠當腢用吉器若醴若酒無巾柶腢音偶注曰腢肩頭也用吉器器未變也繼公謂此吉器之異於凶者豆籩耳凶時毼豆籩無縢其觶則無吉凶之異皆用角也若醴若酒謂無酒則二觶皆醴無醴則皆酒無巾者非盛饌無柶者異於大斂以後之奠也赴曰君之臣某死赴母妻長子則曰君之臣某之某死長之丈反母妻長子死亦赴於君者哀樂之事君臣同室中惟主人主婦坐兄弟有命夫命婦在焉亦坐注曰别尊卑也繼公謂經云衆婦人戶外北面衆兄弟堂下北面記乃見兄弟之命夫命婦者亦坐于室中然則經所言者惟指其為士者及士妻耳尸在室有君命衆主人不出注曰不二主繼公謂凡居喪而為君命出者惟主人耳衆主人則否記乃特著尸在室之禮者異時衆主人與主人皆在庭嫌此時亦然故以明之襚者委衣于牀不坐牀髙可以不坐其襚于室户西北面致命注曰始死時也夏祝淅米差盛之差舊初佳七何藏何三反盛音成差字未詳御者四人抗衾而浴袒笫袒音袒舊之善反非注曰抗衾為其裸裎蔽之也袒袒也袒簀去席盝水便繼公謂古字袒袒通詩曰袒裼暴虎史記云左袒右袒是也四人抗衾而二人浴其母之喪則內御者浴鬠無笄注曰內御女御也無笄猶丈夫之不冠也繼公謂鬠笄雖短亦笄也故辟之其亦以生時不用此笄而然與設明衣婦人則設中帶注曰中帶若今之褌襂繼公謂明衣之制有衣有裳婦人生時衣不殊裳故此不用明衣也中帶未詳其制然與明衣對言則其連衣裳為之與卒洗貝反于笲實貝柱右齻左齻齻音顛齻牙也含而因柱其左右齻蓋恐其口復閉也夏祝徹餘飯飯扶晚反注曰徹去鬻之瑱塞耳注曰塞充窒掘坎南順廣尺輪二尺深三尺南其壤廣古曠反深式鴆反注曰南順統於堂繼公謂南順復南其壤明其掘之自北而南也垼用塊垼音役注曰塊堛也明衣裳用幕布𬒮屬幅長下膝長直亮反下同注曰幕布帷幕之布升數未聞也長下膝又有裳於蔽下體深也繼公謂必云袂屬幅者嫌明衣或異於生也然則吉服之袂屬幅也明矣屬幅說見喪服記有前後裳不辟長及觳辟音壁觳苦角反注曰觳足跗也凡他服短無見膚長無被土繼公謂裳前三幅後四幅不辟之則其要廣而前後相掩者深旁不開體不見矣長及觳為蔽足也明衣之長下膝其裳之制復如是皆為重形且異於生也縓綼緆綼緆舊音毗替綼緆未詳緇純純之允反純蓋兼指在衣裳者而言設握裹親膚繫鉤中指結于􅓲握手唯一而已與決同設於右手其繫則相關經文詳於設決略於設握故記見之設握之法以纁裹親膚其中央正當於掌右端掩四指之後左端在其上乃以其組繫環將指之本而與決之繫相結于􅓲而連之所謂設握乃連􅓲者也甸人築坅坎坅五錦反注曰築實土其中堅之穿坎之名一曰坅隸人涅厠涅奴結反厠側吏反注曰隸人罪人也今之徒役作者也涅塞也為人復往䙝之既襲宵為燎于中庭厥明滅燎陳衣注曰記節凡絞襟用布倫如朝服絞戶交反注曰凡凡小斂大斂也倫比也今文無襟繼公謂襟不必言凡與絞連文爾大斂有襟小斂無之設棜于東堂下南順齊于坫饌于其上兩甒醴酒酒在南篚在東南順實角觶四木柶二素勺二豆在甒北二以並籩亦如之棜於庶反注曰棜之制如今之大木輿也上有四周下無足豆籩二以併則是大斂饌也繼公謂此大斂饌也其次當在衆主人布帶之後角觶四木柶二為明日朝奠兼饌之也自是以後常更用之以位而言豆當在籩北乃云甒北者設豆之時未有籩也故但取節於甒凡籩豆實具設皆巾之注曰籩豆偶而為具具則巾之加飾也明小斂一豆一籩不巾繼公謂籩豆實謂菹栗之屬皆皆上下也籩豆有實而具則饌于東方及奠于席前皆巾之若一豆一籩則於奠時或有巾之者饌時亦不巾也經言小斂之饌云饌于東堂下脯醢醴酒幂用功布實于簞此則不皆巾者也觶俟時而酌柶覆加之面枋及錯建之錯七故反俟時而酌謂將設乃酌之面枋者便於建也建時亦覆手取之而枋在下小斂辟奠不出室辟音闢奠即始死之奠也後奠未即設而先辟此奠者辟斂也不出室明未徹去也是時尸在室未忍遂徹其奠而脯醢醴酒又無改設于西堂之禮故辟之於室中而已既設小斂奠乃去之舊說謂辟之設于室西南隅無踊節此承上文而言亦異於小斂以後之禮也踊節即所謂要節而踊者也凡丈夫婦人之踊或以徹奠者之往來為節嫌此辟奠之時亦然故以明之此與上文皆當在設棜于東堂下之上既馮尸主人袒髺髮絞帶衆主人布帶髺音括絞戶交反下同注曰衆主人齊衰以下繼公謂絞帶者繩帶也先言袒髺髮著其節也然則布帶者亦於既免乃加之大斂于阼大斂于阼乃殯于西階象其由主位而往也大夫升自西階階東北面東上視斂也云階東者明大夫雖多亦不可以當階恐妨斂者之往來也既馮尸大夫逆降復位卿大夫之位東方西面巾奠執燭者滅燭出降自阼階由主人之北東注曰巾奠而室事已繼公謂此見出時之節且不與執事者偕行也言由主人之北則主人之位近於階明矣既殯主人說髦說吐活反注曰既殯置銘于肂復位時也兒生三月鬋髮為鬌男角女羈否則男左女右長大猶為飾存之謂之髦所以順父母幼小之心至此尸柩不見喪無飾可以去之髦之形象未聞繼公謂子事父母必著拂髦親已死至殯乃說之者未殯之前孝子猶冀其復生既殯則絶望矣乃說之也詩云髧彼兩髦兩者為父母俱存之故若然則是時但當脫其一耳孔氏曰父死說左髦母死說右髦二親並沒並說之親沒不髦是也三日絞垂注曰成服日絞要絰之散垂者繼公謂記惟指主人也而男女大功以上亦存焉小斂之時婦人之帶雖結本亦未絞至此與丈夫同絞之將成服先絞其帶之垂者以其已在身故也其下冠衰屨亦皆以所加之次言之冠六升外縪纓條屬厭厭一涉反厭伏也冠厭亦變於吉也冠所以厭者其不用辟積乎縪喪服傳作畢疑此誤衰三升屨外納杖下本竹桐一也居倚廬寢苫枕塊不說絰帶哭晝夜無時非喪事不言衰初回反枕之鴆反說吐活反意不在他也啜粥朝一溢米夕一溢米不食菜果粥之育反注曰不在於飽與滋味實在木曰果在地曰蓏主人乘惡車注曰拜君命拜衆賔及有故行所乘也雜記端衰喪車皆無等然則此惡車王喪之木車也疏曰此惡車王喪之木車者案巾車云王之喪車五乘發首云木車蒲蔽是王始喪所乘木車無飾與此惡車同故引之見尊卑同也白狗幦幦眉狄反注曰未成豪狗幦覆笭也以狗皮為之取其臑也白於喪飾宜古文幦為幕疏曰案玉藻云士齊車鹿幦此喪車無飾故用白狗幦云未成豪狗爾雅釋畜文蒲蔽蔽即笰也在車兩邊以蒲席為之吉時或以簟詩云簟笰魚服是也御以蒲菆菆側留反注曰不在於驅馳蒲菆牡蒲莖繼公謂蒲菆亦變於吉也吉時蓋以竹為策蒲楊栁犬服注曰笭間兵服以犬皮為之取堅也亦白繼公謂不言色似以其革為之木錧錧音管注曰取少聲今文錧作轄繼公謂錧轂端沓也約綏約轡約繩也吉時二者皆以絲為之與木鑣鑣彼苖反注曰亦取少聲疏曰平常車錧馬鑣以金為之今用木是取少聲繼公謂鑣馬銜也馬不齊髦注曰齊翦也主人之惡車如王之木車則齊衰以下其乘素車繅車駹車漆車與疏曰齊衰以下其乘素車繅車駹車漆車與案巾車王之喪車五乘木車始死所乘素車卒哭所乘繅車既練所乘駹車大祥所乘漆車既禫所陳此士之喪車亦當五乘主人乘惡車齊衰乘素車與卒哭同大功乘繅車與既練同小功乘駹車與大祥同緦麻乘漆車與既禫同主人至卒哭以後哀殺故齊衰以下節級約與主人同故鄭為此義也若然士尋常乘棧車漆之今既禫亦與王以下同乘漆車者禮窮則同也繼公謂馬不齊髦所謂髦馬也主婦之車亦如之疏布裧裧尺占反婦人之車必有裧而喪車則以疏布為之明吉時不然也主婦乘車而出者拜夫人之命及女賔之弔者也二車白狗攝服注曰攝猶緣也狗皮緣服差飾繼公謂主人主婦皆有二車各得用二乘與其所乘者而三士昏禮謂從車二乘是其數也凡二車之數天子十二上公九侯伯七子男五孤卿大夫三士二乘也此二車亦惡車也攝服未詳姑從注說其他皆如乘車乘繩證反注曰如所乘惡車繼公謂乘車主人主婦所乘之車也其他謂凡器物在服之外者也朔月童子執帚卻之左手奉之奉芳勇反注曰童子隸子弟也執用右手卻之示未用從徹者而入注曰童子不専禮事比奠舉席掃室聚諸窔布席如初卒奠掃者執帚垂末內鬛從執燭者而東比必二反窔一弔反鬛獵葉二音注曰比猶先也室東南隅謂之窔繼公謂此掃室之節蓋於既徹則為之如初亦東面也執帚垂末明已用也是時垂末內鬛則嚮者卻之其皆反是與燕養饋羞湯沐之饌如他日養羊尚反注曰燕養平常所用供養也饋朝夕食也羞四時之珍異湯沐所以洗去汙垢內則曰三日具沐五日具浴孝子不忍一日廢其事親之禮於下室日設之如生存也進徹之時如其頃疏曰云燕養者謂在燕寢之中生平時所有共養之事則饋羞湯沐之饌是也繼公謂此饌蓋使人為之孝子不親視之也記曰在堊室之中非時見乎母也不入門說者謂居廬時絶不入門朔月若薦新則不饋於下室注曰下室如今之內堂繼公謂不饋於下室者以其殷奠且有敦實也筮宅冢人物土注曰物猶相也相其地可葬者乃營之卜日吉告從于主婦主婦哭婦人皆哭主婦升堂哭者皆止日人實反若不吉其禮亦然啓之昕外內不哭注曰將有事為其歡囂既啓命哭夷牀輁軸饌于西階東輁九勇反注曰明階間者位近西也夷牀饌于祖庿輁軸饌于殯宫其二庿則饌于禰庿如小斂奠乃啓此主於朝祖故於朝禰之奠降焉蓋不可與祖奠同也是日二庿皆饌記惟見其異者耳均之為士而庿數不同者蓋士之先世或為大夫而有三庿至後世為士則廢其一而但存二庿若先世無為大夫者則惟一庿而已朝于禰庿重止于門外之西東面柩入升自西階正柩于兩楹間奠止于西階之下東面北上主人升柩東西面衆主人東即位婦人從升東面奠升設于柩西升降自西階主人要節而踊朝音潮下同重直容反要於遙反注曰重不入者主於朝祖而行若過之矣門西東面待之便也疏曰主人要節而踊者奠升主人踊降時婦人踊也繼公謂重不入者亦以既奠則柩行不久留於此故也夷牀一而已惟當陳於祖庿此正柩其在軸與是時即要節而踊亦其異於祖庿者燭先入者升堂東楹之南西面後入者西階東北面在下注曰照正柩者先先柩者後後柩者繼公謂記於此者見下適祖時不用燭也主人降即位徹乃奠升降自西階主人踊如初主人降即位則婦人亦東即阼階上位矣不拜賔踊襲以成禮不在此且欲急於適祖也其他禮之不同者意亦如是奠即如小斂奠者也如初謂設奠及踊節也是時丈夫婦人皆踊惟言主人亦文省祝及執事舉奠巾席從而降柩從序從如初適祖柩從從巾席而降也序從柩從奠主人以下從柩而出也如初謂出殯宫時也此與主人踊之文相屬則是其事相接也柩過禰庿因而朝之初無他事既奠則禮畢矣故即適祖不見適祖之儀者蓋與本篇所言者不異故耳記載二庿者其禰廟在西祖庿在東以是言之則古者之庿尊者東而卑者西皆有常位固無昭居昭廟穆居穆庿之制也薦乘車鹿淺幦于笮革靾載旜載皮辨服纓轡貝勒縣於衡乘繩證反笮側白反靾音泄縣音𤣥注曰士乘棧車鹿淺鹿夏毛也玉藻曰士齊車鹿幦豹犆靾韁也旜孤卿之所建亦攝焉貝勒貝飾勒有干無兵有箙無弓矢明不用繼公謂勒馬頭絡銜也衡輈端橫木以駕馬者既夕禮曰薦馬纓三就入門北面交轡圉人夾牽之則是薦馬之時纓轡皆在馬之身矣此乃謂纓轡貝勒縣于衡其指薦馬前後之時而言與蓋事至則加之既則脫之而置於此也道車載朝服注曰道車朝夕及燕出入之車繼公謂案注云朝夕謂乘此以朝夕於君也槀車載蓑苙槀古老反蓑素何反注曰槀猶散也散車以田以鄙之車蓑苙備雨服今文槀為潦凡道車槀車之纓轡及勒亦縣于衡也繼公謂巾車職曰士乘棧車然則此三車者皆漆車也以制言之其乘車道車輪與輈之髙下又等但因事名之耳所異者槀車也考工記曰田車之輪六尺有三寸乘車之輪六尺有六寸又曰國馬之輈深四尺有七寸田馬之輈深四尺足以知其制矣薦車三乘士禮也此薦車即遣車禮天子遣車九諸侯七大夫五士三將載祝及執事舉奠户西南面東上卒束前而降奠席于柩西注曰將于柩西當前束設之繼公謂先舉奠者辟舉柩也東上統於柩也卒束前卒束之前也束未畢而先降奠席為卒束即奠故也此舉奠於堂上者退立于户西則奠近於柩而不當西階明矣巾奠乃牆注曰牆飾柩也抗木刋兩面皆刋也刋剝削之茵著用荼實綏澤焉著張吕反注曰荼茅秀也綏廉薑也澤澤蘭也皆取其香且御濕繼公謂茵以草為著故文從荼實綏澤謂加綏澤以實之也綏澤未聞葦苞長三尺一編注曰用便易也繼公謂編則於苞物宜菅筲三其實皆瀹筲所交反注曰米麥皆湛之湯未知神之所享不用食道所以為敬繼公謂此筲設于棺旁其實宜皆用穀亦如殯時之熬然祖還車不易位還音旋注曰為鄉外耳未行繼公謂還車謂還薦車也不易位西者亦當東榮執披者旁四人披彼義反注曰前後各二人凡贈幣無常注曰賔之贈也玩好曰贈在所有繼公謂此幣亦廣言之經言贈者奠幣如初又云若就器則坐奠于陳亦可見其無常矣凡糗不煎云凡則非特葬奠之糗如是也不煎之以膏則但熬之而已所以熬而不煎者凡食各有所宜必云不煎者糗之類有煎者矣嫌或當為之也唯君命止柩于堩其餘則否堩古鄧反注曰不敢留神也堩道也曾子問曰葬既引至于堩繼公謂言此者明餘人不當行禮於堩也車至道左北面立東上遣車北鄉而往則道左乃道西也其位於壙為西故東上而統於壙柩至于壙斂服載之注曰柩車至壙祝說載除飾乃斂乘車道車槀車之服載之不空之以歸送形而往迎精而反亦禮之宜繼公案注云說載除飾亦當作除飾說載說見本篇卒窆而歸不驅此亦指遣車也祝斂服而載於棧則遣車空而無所用之矣故於既窆即反云不驅者嫌其與去時異君視斂若不待奠加蓋而出不視斂則加蓋而至卒事注曰為有他故也繼公謂喪大記曰君於士既殯而往蓋常禮也此二者則加於常禮則以有故而不能終始其事耳既正柩賔出遂匠納車于階間注曰車載柩車其車之輿狀如牀有轅前後出設前後輅輿上有四周下則前後有軸以輇為輪許叔重云有輻曰輪無輻曰輇繼公謂既正柩與賔出不相屬蓋爛文也遂匠未詳或曰遂之匠也未知是否車謂棧也喪大記謂之國車又以其為公家之車故也賔出而納此車於階間為主人送賔而入則當載矣祝饌祖奠于主人之南當前輅北上巾之饌猶設此祖奠即如殯奠者也祝及執事者饌此惟言祝者祝尊也于主人之南明其在車東也主人之位當前束故奠少南當前輅也北上謂先設豆於北也是亦略言之以見其如初耳經於既袒但云布席乃奠如初不言其所故記明之弓矢之新沽功沽音古注曰設之宜新沽示不用繼公謂之新恐當作新之有弭飾焉亦張可也有柲設依撻焉有韣注曰弭以骨角為飾柲弓檠弛則縳之於弓裏備損傷以竹為之詩云竹柲緄縢依纒弦也撻弣側矢道皆以韋為之韣緇布為之今文撻作銛繼公謂此言弓也弭弓弰也亦張可也許其得張之依撻未詳翭矢一乘骨鏃短衛翭音候乘繩證反下同鏃子木反注曰翭猶候也候物而射之矢也四矢曰乘骨鏃短衛亦示不用也生時翭矢金鏃凡為矢五分笴長而羽其一繼公案注云五分笴長而羽其一者以見短衛者不及其笴五分之一耳志矢一乘軒輖中亦短衛輖音周注曰志猶擬也習射之矢書云若射之有志輖摯也無鏃短衛亦示不用生時志矢骨鏃凡為矢前重後輕也繼公案注知此矢無鏃者以記不見鏃且言軒輖中也凡矢之所以於前重後輕者皆在鏃此無鏃故前後之軒輖中詩云如輊如軒儀禮集說卷十三
