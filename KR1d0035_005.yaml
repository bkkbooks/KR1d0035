body:
  text: 儀禮集説卷五上元敖繼公撰鄉射禮第五注曰於五禮屬嘉禮繼公謂鄉射者士與其鄉之士大夫會聚于學宫飲酒而習射也此與上篇大同小異惟多射一節耳亦飲酒而但以射言者主於射也鄉射之禮主人戒賔賔出迎再拜主人答再拜乃請賔禮辭許主人再拜賔答再拜主人退賔送再拜請亦謂致戒辭而請之為賔也請下似脫一賔字迎者出見之之稱故雖不入門亦謂之迎無介無介者以介尊次於賔同於大夫射時難為耦也右戒賔乃席賔南靣東上不言户牖間者可知也記云出自東房有東房西房則中有室而席賔於室之户牖間也明矣凡席於此者皆東上經不悉見之也惟為神席則西上衆賔之席繼而西衆賔亦衆賔之長三人也繼繼賔席也云繼者明其以次而西衆賔之席亦皆不屬而東上席主人於阼階上西面阼階上東西節也南北當東序凡主位皆然尊于賔席之東兩壺斯禁左玄酒皆加勺篚在其南東肆注曰設尊者北面西曰左繼公謂賔席之東即房户之間也此亦與前篇互見其文設洗于阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆縣于洗東北西靣深式鴆反縣音玄注曰縣於東方辟射位也疏曰鄉飲無射事縣於階間繼公謂縣不近階者權移於此宜辟東縣之正位也大射東縣在阼階之東縣謂縣鐘磬與鑮於筍簴也鼓鼙之屬亦存焉周官小胥職曰凡縣鐘磬半為堵全為肆又曰天子宫縣諸侯軒縣卿大夫判縣士特縣然則凡為士者之樂皆得縣鐘與磬惟以特而别於其上耳大射儀言國君西方之縣先磬次鐘次鑮鼓鼙在其南下經云不鼓不釋鐘師職曰掌以鐘鼓奏九夏鎛師職曰掌金奏之鼓此與上篇皆賔出奏陔陔夏金奏之一也然則是禮亦有鐘鼓鑮明矣其設之磬在北鼓在南略放大射西方之縣云乃張侯下綱不及地武注曰侯謂所射布也綱持舌繩也武迹也中人之迹尺二寸疏曰周禮梓人云上綱與下綱出舌尋縜寸焉注云綱所以繫侯於植者也中人之迹尺二寸無正文漢禮云五武成步步六尺或據此而言也繼公謂射布而曰侯者王朝射之以威不寧侯遂以名之也諸侯以下則因其名而不改與下綱謂已繫者也綱不及地武則下個亦然不繫左下綱中掩束之繫古帝反注曰事未至也侯北面西方謂之左繼公謂侯以左為尊故事未至則未繫左下綱也中掩束之者中掩左下個而以綱束之也下個出於躬五尺中掩之是所掩者二尺五寸也乏參侯道居侯黨之一西五步注曰容謂之乏所以為獲者御矢也侯道五十步此乏去侯北十丈西三丈疏曰參謂三分之黨旁也云容謂之乏者射人職云王射三容是也繼公謂乏爾雅曰乏謂之防説者云如今牀頭小曲屏風也侯黨指侯之西邊而言此乏參分侯道而居其一也乃云侯黨者明雖取數於侯道實取節於侯黨也西五步亦謂侯黨之西也然則此乏其南十丈其東三丈乃與侯黨相當與大射儀曰乏各去其侯西十北十乏義未詳右設席器張侯羹定主人朝服乃速賔賔朝服出迎再拜主人答再拜退賔送再拜朝並直遙反禮戒速同服此速賔朝服則戒時亦朝服可知鄉射而朝服其義與鄉飲同賔及衆賔遂從之主人既退衆賔乃至於賔之門而與之皆行也云遂者雖相去有間而事則實相接也右速賔自此以後經文及記文有與鄉飲酒禮同者不重釋之及門主人一相出迎于門外再拜賔答再拜揖衆賔主人以賔揖先入賔厭衆賔衆賔皆入門左東面北上賔少進相息亮反厭乙涉反篇內同注曰以猶與也少進差在前繼公謂門學門也賔厭衆賔入門左此脫三字爾少進謂少東主人以賔三揖皆行及階三讓主人升一等賔升皆行言無先後也主人升一等賔乃升敵者之禮也右迎賔主人阼階上當楣北面再拜賔西階上當楣北靣答再拜右拜至主人坐取爵于上篚以降賔降主人阼階前西靣坐奠爵興辭降賔對主人坐取爵興適洗南靣坐奠爵于篚下盥洗賔進東北面辭洗主人坐奠爵于篚興對賔反位注曰反從降之位也鄉飲酒曰當西序東靣主人卒洗一揖一讓以賔升賔西階上北靣拜洗主人阼階上北靣奠爵遂答拜乃降賔降主人辭降賔對主人卒盥一揖一讓升賔升西階上疑立主人坐取爵實之賔席之前西北面獻賔疑舊魚乞反下同席之當作之席賔西階上北面拜主人少退賔進受爵于席前復位主人阼階上拜送爵賔少退薦脯醢賔升席自西方乃設折俎主人阼階東疑立賔坐左執爵右祭脯醢奠爵于薦西興取肺坐絶祭尚左手嚌之興加于俎坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人阼階上答拜賔西階上北面坐卒爵興坐奠爵遂拜執爵興主人阼階上答拜右獻賔賔以虛爵降主人降賔西階前東靣坐奠爵興辭降主人對賔坐取爵適洗北面坐奠爵于篚下興盥洗主人阼階之東南面辭洗賔坐奠爵于篚興對主人反位注曰反從降之位主人辭洗進賔卒洗揖讓如初升主人拜洗賔答拜興降盥如主人之禮賔升實爵鄉飲酒無升字主人之席前東南靣酢主人主人阼階上拜賔少退主人進受爵復位賔西階上拜送爵薦脯醢主人升席自北方乃設折俎祭如賔禮不告旨自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賔西階上北靣答拜主人坐奠爵于序端阼階上再拜崇酒賔西階上答再拜右賔酢主人主人坐取觶于篚以降賔降主人奠觶辭降賔對東靣立主人坐取觶洗賔不辭洗卒洗揖讓升賔西階上疑立主人實觶酬之阼階上北靣坐奠觶遂拜執觶興賔西階上北靣答拜主人坐祭遂飲卒觶興坐奠觶遂拜執觶興賔西階上北靣答拜主人降洗賔降辭如獻禮升不拜洗賔西階上立主人實觶賔之席前北面賔西階上拜主人坐奠觶于薦西賔辭坐取觶以興反位主人阼階上拜送賔北靣坐奠觶于薦東反位右酬賔主人揖降賔降東面立于西階西當西序注曰主人將與衆賔為禮賔不敢獨居堂主人西南面三拜衆賔衆賔皆答一拜主人揖升坐取爵于序端降洗升實爵西階上獻衆賔衆賔之長升拜受者三人主人拜送坐祭立飲不拜既爵授主人爵降復位長知丈反位亦堂下之位賔之南也衆賔皆不拜受爵坐祭立飲每一人獻則薦諸其席衆賔辨有脯醢主人以虛爵降奠于篚揖讓升賔厭衆賔升衆賔皆升就席辨音遍右獻衆賔一人洗舉觶于賔升實觶西階上坐奠觶拜執觶興賔席末答拜舉觶者坐祭遂飲卒觶興坐奠觶拜執觶興賔答拜降洗升實之西階上北面賔拜舉觶者進坐奠觶于薦西賔辭坐取以興注曰若親受然繼公謂前篇言受此言取互文也舉觶者西階上拜送賔反奠于其所舉觶者降鄉飲酒曰坐奠觶于其所右一人舉觶大夫若有遵者則入門左若有遵者謂若有與此會而為遵者也入門左則嚮者賔入之位也不俟於門外别於正賔主人降注曰迎大夫於門內賔及衆賔皆降復初位初位階西以南當序之位主人揖讓以大夫升拜至大夫答拜主人以爵降大夫降主人辭降大夫辭洗如賔禮此賔禮自三揖三讓以至于一揖一讓升之儀也席于尊東此言尊東鄉飲酒言賔東亦文互見也又此言設席之節與鄉飲酒不同未知當以何者為正升不拜洗主人實爵席前獻于大夫大夫西階上拜進受爵反位主人大夫之右拜送席前獻其西北面與主人既拜送則亦立於階東此與薦脯醢以下皆如鄉飲酒之介禮其不釋者以意求之大夫辭加席主人對不去加席去起吕反鄉飲酒禮曰大夫則如介禮有諸公則辭加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席此惟主言無諸公之大夫則是鄉射之禮諸公不與又説見鄉飲酒禮乃薦脯醢大夫升席設折爼祭如賔禮不嚌肺不啐酒不告旨西階上卒爵拜主人答拜注曰大夫升席由東方繼公謂主人答拜亦於大夫之右大夫降洗大夫若衆則主人辨獻之長乃洗主人復阼階降辭如初卒洗主人盥揖讓升大夫授主人爵于兩楹間復位授主人爵于兩楹間者大夫雖尊若與鄉飲鄉射之禮則屈於正賔其禮但比於介故此授受之節亦惟與介同主人實爵以酢于西階上坐奠爵拜大夫答拜坐祭卒爵拜大夫答拜主人坐奠爵于西楹南再拜崇酒大夫答拜主人復阼階揖降大夫降立于賔南必降者宜與賔序升也立于賔南下之也鄉射之禮大夫若與則下於賔鄉飲之禮公與大夫若與則皆下於介蓋其禮皆主於士故也主人揖讓以賔升大夫及衆賔皆升就席賔亦厭大夫大夫亦厭衆賔乃升也衆賔其長三人也右遵者之禮席工于西階上少東樂正先升北面立于其西少東據工之下席而言也樂正立于其西猶未至階也鄉飲酒禮曰樂正先升立于西階東工四人二瑟瑟先相者皆左何瑟面鼓執越內弦右手相入升自西階北面東上工坐相者坐授瑟乃降相並息亮反何户我反注曰面前也可鼓者在前變於君也言執者手入之淺也疏曰變於君者鄉射與大射相對大射君禮而後首此臣禮前首故云變繼公謂前越去廉差遠故不可挎但執之而已面鼓亦變於飲酒笙入立于縣中西靣縣音玄注曰堂下樂相從也繼公謂此與鄉飲立于磬南之意同縣中蓋縣中之西也乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋召音邵不歌不間不笙者為射事繁且久故略於樂也不略合樂者周南召南國風也國風為鄉樂大夫士之正樂也不可略其正也工不興告于樂正曰正歌備樂正告于賔乃降注曰不興者瞽矇禮略也繼公謂凡歌至於合鄉樂乃為備此合鄉樂矣故雖不歌小雅亦可謂之備主人取爵于上篚獻工大師則為之洗賔降主人辭降大音泰為於偽反大夫不降亦别於賔工不辭洗卒洗升實爵主人卒洗亦與賔揖讓乃升此以上著大師之禮異也餘則與非大師者同工不興左瑟一人拜受爵注曰一人無大師則工之長者主人阼階上拜送爵薦脯醢使人相祭工飲不拜既爵授主人爵衆工不拜受爵祭飲辨有脯醢不祭不洗遂獻笙于西階上相息亮反辨音遍下並同非大師則工之長亦不洗矣乃著笙不洗者正使笙師猶不洗也諸侯之笙師蓋以下士為之言遂者承工後也鄉飲酒禮笙入樂南陔白華華黍乃獻之此不笙亦獻之者主人自為射故而略於樂耳不可以其無事而廢禮也笙一人拜于下盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵衆笙不拜受爵坐祭立飲辨有脯醢不祭主人以爵降奠於篚反升就席盡子忍反右樂主人降席自南方側降注曰賔不從降作相為司正司正禮辭許諾主人再拜司正答拜主人升就席司正洗觶升自西階由楹內適阼階上北面受命于主人相息亮反注曰楹內楹北疏曰受命謂受主人請安賔之命繼公謂楹謂兩楹西階上北靣請安于賔注曰傳主人之命繼公謂賔為射事而來此時未射若無嫌於不安乃亦請安于賔者飲酒之節宜然也賔禮辭許司正告于主人遂立于楹間以相拜主人阼階上再拜賔西階上答再拜皆揖就席相息亮反賔辭者亦不敢必主人之終行射事也司正實觶降自西階中庭北靣坐奠觶興退少立此中庭其阼階前南北之中與蓋射時司正為司馬至誘射之後方易位於司射之南則此位必不在階間如鄉飲酒司正之位也進坐取觶興反坐不祭遂卒觶興坐奠觶拜執觶興洗北面坐奠于其所興少退北靣立于觶南右立司正未旅大射儀亦司正已定位即行射事然則射之正禮以此為節上下同也經於射事既畢始見旅酬之儀則是時未旅可知乃言之者亦經文過於詳耳三耦俟於堂西南靣東上記云三耦使弟子司射前戒之至是乃立於此以俟其比也司射適堂西袒決遂取弓於階西兼挾乘矢升自西階階上北靣告于賔曰弓矢既具有司請射挾音接乘繩證反下並同注曰袒左免衣也決猶闓也以象骨為之著右大擘指以鉤弦闓體也遂射韝也以朱韋為之著左臂亦謂之拾拾斂也所以蔽膚斂衣也方持弦矢曰挾乘矢四矢也大射曰挾乘矢於弓外見鏃於弣右巨指鉤弦繼公謂司射蓋學中之有司給射事者也設決謂之決設遂謂之遂遂義未詳或曰既設決乃遂設拾因以稱焉兼皆也未射則不搢三挾一異於耦也階上北靣位當少東言有司請射示已不敢擅其事也案注云袒左免衣也以射則左執弓故也賔對曰某不能為二三子許諾為于偽反注曰言某不能謙也二三子謂衆賔以下繼公謂不能謂不善射也為二三子許諾見所以不辭而即許之意嚮者賔為射而來故至是不敢辭但謙遜而已司射適阼階上東北靣告於主人曰請射於賔賔許不請射於主人惟告以賔許者緣主人尊賔之意也賔許之辭主人與聞之矣必告之者禮當然也阼階上告主人當北面東似衍文上言司正阼階上北面受命于主人足以見之矣北靣告變於君也大射儀司射東面請射于公右請射司射降自西階階前西面命弟子納射器注曰弟子賔黨之年少者也納猶入也射器弓矢決拾旌中籌楅豐也賔黨東靣主人之黨西面乃納射器皆在堂西初納之時總置於堂西未有所分别既則陳其弓矢如下文所云賔與大夫之弓倚于西序矢在弓下北括衆弓倚于堂西矢在其上注曰上堂西廉矢亦北括疏曰北括順射時矢南行繼公謂此以弓位之上下見尊卑也下文云東序東則此序下似脫一西字也序西堂西之弓其亦皆北上與主人之弓矢在東序東如賔弓矢可知右納射器司射不釋弓矢遂以比三耦於堂西三耦之南北靣命上射曰某御於子命下射曰子與某子射比毗二反下並同注曰御猶侍也古文曰某從于子繼公謂比猶合也謂合之而為耦也上下射相配謂之耦命上下射之辭異示尊卑也其命之惟以所立之序為先後故不復變位既命耦乃定所謂比也下比衆耦放此右比三耦司正為司馬以其始與射事故名為司馬此時之位其西靣於觶南與司正為司馬逺辟君禮也大射儀司馬二人司正如故司馬命張侯弟子説束遂繫左下綱説吐活反繫古帝反注曰事至也繼公謂命之繫左下綱耳乃云張侯者以張侯之事成於此故也司馬又命獲者倚旌于侯中注曰獲者亦弟子也謂之獲者以事名之獲者由西方坐取旌倚于侯中乃退云坐取旌見其偃於地也旌所獲者也侯中侯之中央也倚之於此若示射者以中地然退反於西方之位也倚旌而未負侯蓋當誘射之節則異於耦射也且行事亦宜有漸右繫綱倚旌樂正適西方命弟子贊工遷樂於下注曰當辟射也贊佐也遷徙也繼公謂適西方自西階東而往西階前也樂謂瑟也亦西面命之弟子相工如初入降自西階阼階下之東南堂前三笴西面北上坐相息亮反笴古老反注曰笴矢幹也長三尺繼公謂如初入謂何瑟之儀與後先之序也堂東堂也堂前三笴坐處之北也必空三笴者辟主人往來堂東之路也位於堂下而坐惟工耳亦無席樂正北靣立于其南北面者蓋變於堂上之位堂上則樂正與工同面右遷樂司射猶挾乘矢以命三耦各與其耦讓取弓矢拾拾其劫反猶者言其未變改也讓者下讓其上也拾更也取云拾者謂更迭而取之也司射以此二者命之三耦皆袒決遂有司左執弣右執弦而授弓注曰弣弓把繼公謂有司弟子主授受弓矢者如此授之是並授也遂授矢云遂則亦授弓者授之也上云衆弓倚於堂西矢在其上是既納射器則陳之矣弟子乃留於堂西主授受之事故此時復執以授之三耦皆執弓搢三而挾一個搢音晉注曰搢插也插於帶右個猶枚也司射先立于所設中之西南東靣下經云設楅於中庭南當洗又云設中南當楅西當西序然則此時司射之位少南於洗而西當榮與司射先立於此欲三耦知其位也司射俟三耦畢取弓矢乃適其位者以三耦皆弟子備或未習其禮也三耦皆進由司射之西立于其西南東面北上而俟進亦每耦並行上射在左如退適堂西之儀也立於其西南又以司射所立處為節也俟俟作射右三耦就射位司射東靣立于三耦之北搢三而挾一個復云東靣者以其違於舊處且明既還而後搢三挾一也三耦之北其正位之西也立於此者示三耦以揖進之節耳揖進當階北面揖及階揖升堂揖序則鉤楹內堂則由楹外當左物北靣揖注曰周以庠為鄉學鄉飲酒義曰主人迎賔於庠門外是也左物下物也繼公謂自揖進以下皆教三耦以射儀也誘射而就左物者亦以其為主黨也序州黨之學堂即庠也鄭氏以為鄉學是也黨屬於州州屬於鄉以此言之則三者之學其小大深淺可知矣序則鉤楹內謂繞楹之東而北以其物當棟也堂則由楹外謂循楹之南而東以其物當楣也蓋射者必履物而物之在堂有深有淺故爾夫此篇以鄉射為名而其禮乃及於州黨之學者其故何哉蓋君子之居於是鄉或有近於庠者或有近於序者故其射也各隨其居之所近而因便會聚於其中以行禮焉此其所以不容不異也及物揖左足履物不方足還視侯中俯正足還音旋注曰志在於射南面視侯之中乃俯視併正其足方猶併也疏曰案大射納射器之下即言工人士與梓人升自北階兩楹間畫物此文略亦當在納射器後也繼公謂及物揖揖履物也左足履物履從畫也大射儀曰司射由下物少退則履物者當履其從畫矣不方足未暇北面而立也他時凡欲還者必先立故言此以明之還謂右還而南面也右還者為下射冝向上射也既視侯中乃俯視而正足則視侯中之時右足其亦在從畫而少退與正足謂左右各履橫畫之兩端也亦左先而右次之不去旌去起吕反倚旌於侯而不去者以誘射不主於中且不獲也誘射誘引導也亦有教之之意將乘矢言此者明四矢盡發也大射儀誘射以四矢射三侯將行也執弓不挾右執弦執弓左執弣也不挾明事畢也挾弓者以右巨指鉤弦也此不挾則但執弦而已南面揖揖如升射降出於其位南適堂西改取一個挾之南靣揖揖退也揖如升射謂如其當物升堂之揖也云出於其位南見是時未有司馬西方之位也自賔與大夫之外凡南行而適堂西與堂西出而北行者皆由於此惟發於其位及反位者則否改更也挾一個之説見後遂適階西取撲搢之以反位撲普卜反注曰撲所以撻犯教者書云撲作教刑繼公謂搢撲者以三耦將射也右誘射司馬命獲者執旌以負侯使之執旌於侯中以示射者若謂中侯則舉此而言獲然獲者適侯執旌負侯而俟疏曰俟司馬命去侯司射還當上耦西面作上耦射還音旋注曰還左還也作使也繼公謂當上下射之間司射反位上耦揖進上射在左並行當階北靣揖及階揖上射先升三等下射從之中等中丁仲反注曰並併也中猶間也繼公謂上射在左以其當就上物也上射差尊故先升中等空一等也同階升者前後相當宜空一等以相逺為敬與異階升者之義不同其降亦然然則凡升階者必於其中央與上射升堂少左下射升上射揖並行少左者為下射升堂則當在右也皆當其物北靣揖及物揖皆左足履物還視侯中合足而俟還音旋疏曰俟司馬命去侯繼公謂不云不方足省文耳合足左右並立於橫畫即上所謂正足也司馬適堂西不決遂袒執弓惟云適堂西是猶未出於司射之南也云執弓是亦不挾也不決遂不挾弓變於大射也云袒執弓則固不決遂矣乃先言之者嫌執弓者袒必決遂也經文亦或言袒以包二者故以此明之出于司射之南升自西階鉤楹由上射之後西南靣立于物間右執簫南揚弓命去侯注曰簫弓末也揚猶舉也揚弓者執下末大射曰左執弣繼公謂鉤楹即鉤楹內也西南靣别於射者也物間前從畫之間也右執簫為欲揚弓也至是乃云執簫則初執弓之時左執弣右執弦矣南揚弓以弓之上端南鄉而舉之也必南之者為獲者在侯故也去離也命去侯者令辟射且當獲也獲者執旌許諾聲不絶以至于乏坐東靣偃旌興而俟注曰偃猶仆也繼公謂聲不絶不以宫商不絶而已變於大射也此去侯亦宜趨直西乃折北而就乏東面偃旌是旌亦東首矣俟俟中則獲也大射儀曰興共而俟司馬出于下射之南還其後降自西階反由司射之南適堂西釋弓襲反位立于司射之南還户貫反圍下射而降者往來相變以為儀也反謂復其故道也司射之南皆指其虛位言也是時司射不在此襲復衣也此襲對袒而言上衣雖裼猶為襲也玉藻曰尸襲執玉龜襲非是則皆裼矣立於司射之南北上也以司射主射事尊之言反位而著其在司射之南則前此猶在觶南之位也上耦升射司馬乃變其儀而定其位亦異於司射也方有此位而言反以嚮者由是而往故也是或一例與司射進與司馬交于階前相左由堂下西階之東北靣視上射命曰無射獲無獵獲上射揖司射退反位射獲之射食亦反注曰獵矢從旁繼公謂司射進與司馬交於階前著其進之節也相左著其行之方也司馬南行司射北行而相過故謂之交司馬在西司射在東故謂之相左蓋南行者以東為左北行者以西為左也下放此由堂下者自堂下而少東行也西階之東當上物之南也其於堂中為少西故取節於西階也惟命上射者以其先發而下射從之且下射共聞之矣故不復戒戒其射獲獵獲而不及其他者獲近於侯舉近以見其逺也揖以揖受其戒乃射上射既發挾弓矢而后下射射拾發以將乘矢拾其劫反弓字衍文挾矢則挾弓可知不必言也大射儀無弓字既發而挾矢是射時乃傅矢也此亦可以見其節矣云拾發者亦見下射既發挾矢而後上射射也古之射者其序整齊而不紊其儀從容而不迫大抵類此獲者坐而獲注曰射者中則坐言獲獲得也射講武師田之類是以中為獲也繼公謂獲者於射時則坐以俟其中也中乃獲之必坐而獲者旌在地須坐乃舉之以獲也且示有所變舉旌以宫偃旌以商注曰再言獲也疏曰以宫大言獲也以商小言獲也繼公謂此一中而兩言獲也獲而未釋獲注曰但言獲未釋其算繼公謂是時未立釋獲者則未釋獲可知經言此者亦過於詳耳卒射皆執弓不挾南靣揖揖如升射注曰不挾亦右執弦如司射繼公謂不挾者變於大射上射降三等下射少右從之中等中丁仲反堂上並行下射在左今降階必少右乃當上射之後也並行上射於左謂上射先降少左下射降乃並行而上射於左也上射必於左者進時上射在左退亦宜然堂上各發於其物不可得而變降時有先後故因既降而為之此將適堂西也上射乃不於右便其反位者以有釋弓等事而未即反故也與升射者相左交于階前相揖由司馬之南適堂西釋弓説決拾襲而俟于堂西南面東上三耦卒射亦如之説吐活反進退者交則相揖以其事同也司馬之南即嚮者所謂司射之南也此時已有司馬之位又在司射之南正當往來者之北故以之為節耳釋弓説決拾以已初射之事畢也説遂而言拾者别於用時也俟俟司射命也三當作二字之誤也二耦謂次耦下耦也下耦與此異者無與升射者相左相揖之事耳司射去撲倚于西階之西升堂北靣告于賔曰三耦卒射賔揖去起吕反注曰以揖然之繼公謂撲刑器也將告尊者必去之敬也士之射禮賔主之故司射獨以是告賔右初射司射降搢撲反位司馬適堂西袒執弓由其位南進與司射交于階前相左司射將反位司馬將升堂而交於階前則是其去撲與袒執弓之事亦相接為之升自西階鉤楹自右物之後立于物間西南靣揖弓命取矢注曰揖推之也繼公謂揖弓與揚弓相變為文則揖者其推而下之之謂與去侯取矢之事異故上下其弓以别之揖弓繼西南靣而言是弓亦西南鄉矣蓋以獲者與弟子皆在西南故也揖弓者蓋右執弦獲者執旌許諾聲不絶以旌負侯而俟注曰俟弟子取矢以旌指教之繼公謂獲者許諾者取矢之事已主之也獲者審於視矢雖不親取而主其事聲不絶以至於侯司馬出於左物之南還其後降自西階遂適堂前北靣立于所設楅之南命弟子設楅還户貫反楅音福注曰楅所以承矢者繼公謂司馬立於所設楅之南示弟子以設處也凡言所設某者皆謂器之未設者也嚮者射器納於堂西楅在其中今司馬北靣命設之則是時弟子已奉楅而出與弟子在西司馬北靣不必鄉而命之楅之名義未詳乃設楅于中庭南當洗東肆中庭東西節也南當洗不言北文省也後放此東肆龍首在西也必東肆者以上射在西也司馬不以弓為畢者辟大射禮也司馬由司射之南退釋弓于堂西襲反位司馬所由者亦其位南也是時司射在其位之北故以司射為節弟子取矢北面坐委于楅北括乃退司馬襲進當楅南北靣坐左右撫矢而乘之注曰撫拊之也就委矢左右手撫而四四數分之也繼公謂司馬是時不執弓無嫌於不襲此襲字蓋衍若矢不備則司馬又袒執弓如初升命曰取矢不索索悉各反索猶盡也此自適堂西以至揖弓皆如初也適堂西亦由其位南弟子自西方應曰諾乃復求矢加于楅應應對之應復扶又反此時獲者猶負侯而取矢之弟子已退在西方之位故獨應之弟子已應即往取矢司馬乃降由司射之南執弓反位如初弟子既加矢於楅司馬進撫之如初此經文略也右取矢加於楅司射倚撲于階西升請射于賔如初賔許諾此請射請三耦之外皆射也其辭蓋曰有司請射耳如初者升自西階階上北靣告也後放此此請射與下請釋獲亦示聽命於賔之意右再請射賔主人大夫若皆與射則遂告于賔適阼階上告于主人主人與賔為耦與射之與音預注曰言若者或射或否在時欲耳告賔曰主人御於子告主人曰子與賔射繼公謂言遂者謂承賔許諾之後也賔若不與射則雖許諾而司射亦不告然則上言請射於賔者非獨為請賔射明矣云若皆與射而後告是其或欲或不欲固已前告司射矣主人與賔為耦禮也假令或有一人不欲射則闕此一耦蓋不可與餘人為耦故爾告於主人亦北面遂告于大夫大夫雖衆皆與士為耦以耦告于大夫曰某御於子注曰大夫為下射而云御於子尊大夫也繼公謂士謂衆賔也大夫宜與衆賔長為耦若衆則以次而為之不足乃及於堂下者焉大夫不自為耦者變於君所之射也此賔主人皆士於衆耦之上下射不敢俱以大夫為之西階上北靣作衆賔射作衆賔射使之降而為射事也司射降搢撲由司馬之南適堂西立比衆耦立比衆耦謂立於此為比衆耦耳比之之事俟衆賔降而後為之衆賔將與射者皆降由司馬之南適堂西繼三耦而立東上大夫之耦為上與音預云將與則或有不與者矣記曰衆賔不與射者不降是也降者由司馬之南適堂西而堂下之衆賔皆從之不言者可知也此雖未執弓矢亦必由司馬之南者異於大夫也繼三耦而立居其西也衆賔之立以齒則大夫之耦為上可知乃著之者嫌其不與耦並立則或變於有耦者也若有東面者則北上謂衆賔若多堂西南面之位不足以盡之則當東靣於西壁而北上也言若有者見堂下之士多寡無定數也賔主人與大夫皆未降尊者事至乃降也司射乃比衆耦辨辨音遍乃者言其方有事也衆耦謂衆賔自為耦者也大夫之耦亦存焉是時衆賔皆已立於司射之北若西然後可比之不言命之之辭者如上耦可知也大夫之耦則先命之其辭曰子與某子射與他耦上射之辭異云辨者為下節也右比衆耦遂命三耦拾取矢司射反位拾其劫反注曰反位者俟其袒決遂來三耦拾取矢皆袒決遂執弓進立于司馬之西南朱子曰此拾取矢疑衍繼公謂惟云執弓是亦不挾也亦變於大射者與此所立者即其故位更以司馬為節近故爾嚮者司馬未在此故以司射為節司射作上耦取矢司射反位上耦揖進當楅北面揖及楅揖注曰當楅楅正南之東西繼公謂當楅北靣揖者當楅南則折而北行故北靣揖也及楅揖者為上下射將折而西東也上射東靣下射西面上射在西下射在東如其物之位也上射揖進坐橫弓卻手自弓下取一個兼諸弣順羽且興執弦而左還退反位東靣揖弣音府還音旋注曰卻手由弓下取矢者以左手在弓表右手從裏取之便也兼并也并矢於弣當順羽既又當執弦也順羽者手放而下備不整理也疏曰言順羽且興者謂順羽之時則興也繼公謂進坐不言北靣可知也下放此矢南鄉人於楅南北靣取之便也橫弓踣弓也此橫弓覆手也坐而橫弓亦便也覆手橫之以上端鄉下射敬之也弓下弦弣之下也兼諸弣明左手并執矢也凡執弓者左執弣兼矢於弣即順羽興則是橫弓者惟取矢之時則然也執弓者言不挾也左還者以左體向右而還也於楅前必左還者以楅東肆宜順之反位不言毋周是亦左還也此與順羽且興皆變於大射云下射進坐橫弓覆手自弓上取一個興其他如上射覆芳服反注曰覆手由弓上取矢者以左手在弓裏右手從表取之亦便繼公謂此橫弓郤手也郤手橫之亦以上端鄉上射也人北鄉弓東西鄉於人於弓皆為橫也弓上弦弣之上也凡覆手郤手而橫弓其弦皆鄉身與他謂兼諸弣而下也惟西面揖異爾既拾取乘矢揖皆左還南靣揖還音旋下並同不捆矢不兼挾皆左還亦變於大射皆少進當楅南皆左還北面搢三挾一個進謂東西行而相近也當楅南嚮及楅之位北面乃搢挾者禮貴變也揖皆左還上射于右上射固居右矣復言之者嫌或當如卒射而退轉居左也自此少南行至於嚮當楅之位亦揖不言者無以為節亦以其可知故也凡每耦既射若既取矢而退者其曲折皆與進時同與進者相左相揖退反位注曰相左者由進者之北繼公謂此惟云相左而不著所交之處者以其東西相過可知也然則上耦退於嚮當楅之位次耦乃揖進與相揖者亦以事同也三耦拾取矢亦如之後者遂取誘射之矢兼乘矢而取之以授有司於西方而后反位拾其劫反注曰取誘射之矢挾五個繼公謂三亦當作二大射云二耦是也下耦之下射於既拾取之後又兼取誘射之四矢皆兼諸弣至楅南乃北靣搢三挾五個至西方以四矢授有司而挾一個以反位此見其異者也又下耦亦無與進者相左相揖之事經不見之者可知也此西方即堂西也士喪禮以東堂下西堂下為東方西方亦其徵也有司即弟子之納射器者因留主授受於堂西故此下射出於其東靣位之後以乘矢就而授之也大射儀曰以授有司於次中皆襲反位亦謂就而授之右三耦取矢於楅衆賔未拾取矢皆袒決遂執弓搢三挾一個由堂西進繼三耦之南而立東靣北上大夫之耦為上拾其劫反未拾取矢謂於堂西取矢不拾也堂西取矢固不拾矣乃言之者以繼三耦拾取之後嫌當如之也其後取矢於楅乃拾故此云未也是時雖未拾取矢亦讓取弓矢拾如嚮者三耦之為進立射位以射事至也衆賔未有拾取矢於楅之禮故俟三耦取矢之事畢而後進右衆耦皆就射位司射作射如初一耦揖升如初司馬命去侯獲者許諾司馬降釋弓反位命去侯以下不蒙如初者可知也司射猶挾一個去撲與司馬交于階前升請釋獲于賔去起吕反司射於誘射之後改挾一個至此時猶然也必云猶者嫌既久則可以不挾也官以司射為名故執弓必挾矢以掌射事也先去撲乃進與司馬交于階前則去撲當於西方而不於階下矣不言相左不言升及堂上所立處亦文省賔許降搢撲西面立于所設中之東北面命釋獲者設中遂視之注曰視之當教之繼公謂西面立於所設中之東亦示以設之之處如前設楅之為也釋獲者在堂西故北面命之既則復西面視之中實算之器也名之曰中者取其中於侯而後釋算也此不以弓為畢亦辟大射禮釋獲者執鹿中一人執算以從之鹿中者以主人士也記曰士鹿中釋獲者自執中而不執算亦變於君禮釋獲者坐設中南當楅西當西序東靣興受算坐實八算於中橫委其餘于中西南末興共而俟共音拱興受算東靣並受也南末象矢之北括而南鏃也俟待其將射乃執算司射遂進由堂下北靣命曰不貫不釋上射揖司射退反位惟云堂下文省也後放此貫謂中而不脫言此者明雖中而不貫猶不釋算釋獲者坐取中之八算改實八算于中興執而俟注曰執所取算疏曰八算者人四矢一耦八矢雖不知中否要須一矢則一算改實八算擬後來者用之繼公謂右取算以豫左手乃改實之執二手共執之也俟謂俟射中乃釋算乃射若中則釋獲者坐而釋獲每一個釋一算上射於右下射於左若有餘算則反委之中丁仲反注曰委餘算禮尚異也委之合於中西繼公謂乃射謂堂下拾發矢也若中則獲者言獲此則釋之釋謂置算於地獲則用此算故因名此算曰獲坐而釋獲既釋則興云每一個釋一算覆言釋獲之法也一個謂一矢中也於右於左象其堂上南靣之位也下言數獲謂竒者縮之然則此每釋一算亦縮之與蓋中西之算橫則釋者縮亦宜也餘算釋之不盡者也於一耦卒射乃反委之既則興共而俟案注曰中西謂中西之算又取中之八算改實八算于中興執而俟此一節在於次耦升而將射之時也後皆如初禮可知三耦卒射言此者著繼射者之節也自上耦乃射至二耦卒射皆不言其儀亦不以如初蒙之者亦以其可知故省文也賔主人大夫揖皆由其階降揖主人堂東袒決遂執弓搢三挾一個賔于堂西亦如之司射不告賔主人射者辟君禮也皆由其階謂主人東階賔大夫西階也堂東東堂之下也堂西亦然賔主人之弓各倚於其序矢在其下而二人乃皆於堂下執弓挾矢蓋有司取以授之大夫亦降者别於不與射者也皆由其階階下揖升堂揖主人為下射皆當其物北靣揖及物揖乃射復言皆由其階者賔主射禮嫌主人從之而升降於西階也既揖乃升階此豫言之耳下文放此主人為下射者尊賔且不失其位也不言履物及射之儀者如三耦可知卒南靣揖皆由其階階上揖降階揖凡耦之升降皆上射先而下射後此賔為上射主人為下射乃分階而行又不别見其升降之序則是主人先而賔後如常禮亦與其他為耦者不同也賔序西主人序東皆釋弓説決拾襲反位升及階揖升堂揖皆就席説吐活反賔序西主人序東自釋弓於故處也反位升謂反位而後升也位者主人階東賔階西當序之位也反立於此相待而升也此升堂揖揖就席也凡自側階升降者經皆不見之大夫袒決遂執弓搢三挾一個由堂西出于司射之西就其耦大夫為下射大夫與賔同降止於堂西至是乃袒決遂執弓矢亦尊者事至而後為之也大夫執弓亦有司授之於堂西就其耦亦由其西而立於其南也故云大夫為下射大夫為下射者以貴下賤之義也大夫於士尊固尊矣若復為上射則太不敵故與士為耦則必為之下射揖進耦少退揖如三耦及階耦先升卒射揖如升射耦先降降階耦少退皆釋弓于堂西襲耦遂止于堂西大夫升就席耦於庭少退宜尊大夫且變於大射也揖如三耦謂當階及階二揖也及階耦先升升三等而大夫從之上射之禮也揖如升射謂堂上三揖也言如升射明升時亦有堂上三揖矣耦先降其儀與先升同降階耦少退者耦既降少左俟大夫先行乃行也於此不言揖如三耦蓋亦與上文互見之也皆釋弓於堂西亦過司馬之南而後為之大夫亦由司馬之南者為與耦俱行故爾釋弓亦先説決拾也大夫釋弓亦於堂西者統於上射不敢異之也既則有司為倚之於序西此經言士與大夫為耦之儀其異於三耦者惟於庭少退耳則其他皆同可知衆賔繼射不言如三耦可知也釋獲皆如初皆皆賔主人以下也司射所作惟上耦嫌作射亦在如初中故以明之亦經文過於詳耳卒射釋獲者遂以所執餘獲升自西階盡階不升堂告於賔曰左右卒射降反位坐委餘獲於中西興共而俟盡子忍反共音拱注曰司射不告卒射者釋獲者於是有事宜終之也餘獲餘算也無餘算則空手耳繼公謂後射者既由司馬之南而適堂西釋獲者乃告卒射也執獲以告已所有事者也不升堂降於司射也左右猶言上下射也此亦據其所立之物而言之下文放此俟謂俟司射視算乃數之右再射司馬袒決執弓升命取矢如初獲者許諾以旌負侯如初司馬降釋弓反位弟子委矢如初大夫之矢則兼束之以茅上握焉司馬乘矢如初注曰握謂中央也繼公謂禮無決而不遂者此決字當為衍文上經云司馬適堂西不決遂袒執弓此宜如之也司馬降亦由司射之南釋弓於堂西襲乃反位兼束大夫矢異之也上握謂上於手握之處也矢以鏃為上括為下下經云靣鏃是也周官鄉師職曰黨共射器州共賔器鄉共吉凶禮樂之器然則古之射於學宫者其射器亦皆公家共之與此大夫之矢未必大夫所自有也但於衆矢之中取乘矢而兼束之即為大夫矢矣主人之矢不束則其為士又益可知乘矢惟言如初則是不進束矣亦異於大射禮也右再取矢司射遂適西階西釋弓去撲襲進由中東立于中南北靣視算去起吕反注曰算獲算也繼公謂云遂者由釋獲者之西而北行也釋弓并矢去之去撲而視算為算中有尊者之獲不敢佩刑器以視之敬也必釋弓矢者射事已矣因去撲之時可以并去之也不執弓則不宜袒故襲不言説決拾文省云由中東明於階西直進也釋獲者東靣于中西坐先數右獲數所主反注曰固東面矣復言之者為其少南就右獲繼公謂先數右獲尊上射也二算為純注曰純猶全也一純以取實于左手取謂以右手數即取之十純則縮而委之注曰縮從也於數者東西為從繼公謂委之當在所釋右獲之南每委異之注曰易校數繼公謂異之者又在其南有餘純則橫于下注曰又異之也自近為下繼公謂有餘純不成十者也下謂委之西橫之者冝變於上純自二以上則亦每純異之以次而西此橫者亦南末也其縮者東末與一算為竒竒則又縮諸純下竒居宜反下並同注曰竒猶虧也興自前適左東靣注曰更端故起由中東就左獲少北於故東靣鄉之坐兼斂算實于左手一純以委十則異之注曰變於右其餘如右獲注曰謂所縮所橫者繼公謂如其所縮所橫及每委異之也異之則次而北與司射復位視算事畢乃不執弓搢撲者以命設豐之事與此相接故也復位以俟釋獲者之反釋獲者遂進取賢獲執以升自西階盡階不升堂告于賔盡子忍反賢獲勝黨所餘之算也言賢者因下文也既數左獲少退當中之正西校其算之多寡卒進取其所餘者二手共執之以升若右勝則曰右賢於左若左勝則曰左賢於右以純數告若有竒者亦曰竒注曰賢猶勝也告曰某賢於某若干純若干竒繼公謂以純數告若有竒者亦曰竒説者謂若十算則曰五純九算則曰九竒也若左右鈞則左右皆執一算以告曰左右鈞注曰鈞猶等也等則左右手各執一算以告降復位坐兼斂算實八算于中委其餘于中西興共而俟共音拱疏曰此將為第三番射故豫設之或實或委一如前法繼公謂兼斂算者兼斂左右之算及橫於中西者而執之也右告獲司射適堂西命弟子設豐注曰豐形蓋似豆而卑繼公謂命設豐乃不搢撲者以尊者亦當飲此豐上之觶故也弟子奉豐升設于西楹之西乃降奉芳勇反降反於堂西勝者之弟子洗觶升酌南靣坐奠于豐上降袒執弓反位注曰勝者之弟子其少者也繼公謂弟子不待司射命之而洗觶升酌者設豐實觶其事相因可知也此不命之而弟子知其為勝黨者蓋於釋獲者升告之時已與聞之矣勝者之黨實觶者主於飲不勝者也然亦惟發端以見其意耳故後有執爵者為之酌者不授爵辟飲尊者之禮也反位反堂西之位此時袒執弓於禮無所當三字疑衍大射儀無之司射遂袒執弓挾一個搢撲北靣于三耦之南命三耦及衆賔勝者皆袒決遂執張弓注曰執張弓右手執弦如卒射繼公謂司射袒亦決遂經文省耳執張弓射時執弓之常法也不勝者皆襲説決拾郤左手右加弛弓于其上遂以執弣説吐活反此亦司射以是命之也不勝者固襲説決拾矣復言之者承命勝者之後冝明言之不然則嫌亦袒決遂與之同也弛弓而又橫執之皆變於常且示辱也左手郤執弣則右手其覆執簫與司射先反位三耦及衆射者皆與其耦進立于射位北上三耦以下皆如司射所命而後進也大夫之耦亦當進立於三耦之南司射作升飲者如作射一耦進揖如升射及階勝者先升升堂少右注曰少右辟飲者也繼公謂先升道之勝者升三等而不勝者從之也上下射在庭如初儀至階乃以勝負分先後蓋屈伸之節然爾先者少右辟飲者變於射時也耦不酌不授乃同升而並立者示相飲之意也不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖注曰右手執觶左手執弓繼公謂進固北靣矣乃言之者嫌南靣奠觶則亦當南面取觶也少退者欲與勝者並乃飲也耦不酌不授故飲者惟立卒觶而已皆罰爵異也豐下豐下之南不勝者先降後升者先降亦變於射時也此禮以勝者為主故勝者先升不勝者先降勝者從降亦中等不勝者若下射也則既降而少右上射則少左庭中之行如射時與升飲者相左交于階前相揖出于司馬之南遂適堂西釋弓襲而俟不勝者釋弓而已勝者又説決拾而襲也經文省爾俟謂南靣東上以俟司射之後命有執爵者注曰贊者代弟子酌也於既升飲而升自西階立于序端繼公謂執爵者之升似當在上耦未升飲之時立于序端以俟之也執爵者坐取觶實之反奠于豐上注曰每者輒酌以至於遍繼公謂取觶北靣奠之亦南靣案注意蓋謂每人既飲則執爵者輒為酌之以至於遍也升飲者如初三耦卒飲賔主人大夫不勝則不執弓執爵者取觶降洗升實之以授于席前注曰優尊者也繼公謂上射勝則酌主人大夫下射勝則酌賔授于席前賔主人則於其右大夫則於其左皆邪鄉之受觶以適西階上北靣立飲西階上亦楹西少南此飲罰爵者之正位也以是禮主於罰爵故雖尊亦當就此而飲卒觶授執爵者反就席必授之者宜反於其所受者也大夫飲則耦不升注曰以賔主人飲耦在上嫌其升繼公謂不升立于射位也大夫既飲則徑適堂西而釋弓與若大夫之耦不勝則亦執弛弓特升飲言特升飲明大夫在席自若也大夫飲而耦不升則耦飲而大夫不與亦宜爾執弛弓而升飲衆賔之不勝者其禮然故不得以所與為耦者之異而變也衆賔繼飲射爵者辨乃徹豐與觶辨音遍徹直列反注曰徹猶除也設豐者反豐於堂西執爵者反觶於篚繼公謂衆賔繼飲皆如三耦也自命設豐以下皆言勝者飲不勝者之禮若左右鈞則無此而即獻獲者與右飲不勝者司馬洗爵升實之以降獻獲者于侯獲者受命於司馬故司馬主獻之是時獲者負侯未退就而獻之辟君禮也獻時蓋西南面大射之禮獻獲者于侯西北三步薦脯醢設折俎俎與薦皆三祭先設薦俎乃受爵亦變於君禮也其設之亦當侯中在獲者之前皆三祭為其將祭於侯之三處也薦有三祭謂脯之半膱者三也俎祭謂刌肺也薦俎皆北面設之俎在薦南獲者負侯北靣拜受爵司馬西面拜送爵固負侯北面矣復言之者明其還而倚旌乃拜且嫌受獻或異面也此拜送爵不同面者明其異於常禮也獲者執爵使人執其薦與俎從之適右個設薦俎個如字舊讀作幹非注曰人謂主人贊者上設薦俎者也繼公謂獲者因射侯而得獻故就侯而祭其薦俎與酒焉示不忘本也下言獲者南靣坐祭薦乃祭俎則是俎在侯北薦在俎北而獲者又在薦北如常禮矣其設薦之位亦脯西而醢東蓋上右也薦俎不統於侯者此獻主於獲者非為侯故耳個之名義未詳獲者南靣坐左執爵祭脯醢執爵興取肺坐祭遂祭酒必云執爵興者見其所取者非離肺也取離肺者必奠爵乃興興適左個中亦如之謂適左個又適侯中皆如適右個而祭之儀也先右次左後中禮之序然爾士喪禮曰主人扱米實于右三實一貝左中亦如之其序正與此同左個之西北三步東靣設薦俎獲者薦右東面立飲不拜既爵左個之西北三步獲者受獻之正位也嚮以有為而受于侯今執爵宜居正位故執爵先立于此而東靣執薦俎者又從之而西面設於其東也薦右脯南也飲於薦右亦變於大射禮也以違其位而南故復言東面司馬受爵奠于篚復位司馬於此方言復位則是既獻獲者於侯之後即北靣立於侯之西北以俟獲者之來與獲者執其薦使人執俎從之辟設于乏南辟音闢注曰設於南右之也凡他薦俎皆當其位之前繼公謂獲者於此自執其薦者已授爵則不敢徒手而勞人也辟如辟奠之辟謂離於故處也此改設於乏南故云辟設必就乏者宜近其位也不當其位辟旌獲者負侯而俟事未畢而受獻故反而卒之俟俟命去侯右獻獲者司射適西階西釋弓矢去撲説決拾襲適洗洗爵升實之以降獻釋獲者于其位少南薦脯醢折俎有祭注曰不當其位辟中繼公謂釋弓矢説決拾為將洗酌而行禮也不執弓矢則當襲矣去撲者獻則不可佩刑器也説決拾襲當於堂西不言者文省也釋獲者聽命於司射故司射主獻之獻時蓋西北靣既授乃北靣也折上當有設字蓋文脫也有祭脯與切肺也獲者與釋獲者皆賔之弟子以有勤勞之事於此乃得獻則其他弟子於獻衆賔之時亦不與明矣釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵祭脯醢興取肺坐祭遂祭酒就其薦謂於薦西也興司射之西北面立飲不拜既爵司射受爵奠於篚司射之西則又少南於薦右之位矣蓋與司射俱北靣則宜並立也拜受立飲不同靣者異於堂上之獻也獲者亦然釋獲者少西辟薦反位辟音闢注曰辟薦少西之者為復射妨司射視算也亦辟俎繼公謂辟與上經辟設之意同惟云辟薦據釋獲者所執而言也辟俎則有司為之司射適堂西袒決遂取弓于階西挾一個搢撲以反位為獻事畢也至此乃言反位則嚮者於既奠爵於篚乃遂適堂西俟右獻釋獲者儀禮集説卷五上欽定四庫全書儀禮集説卷五下元敖繼公撰鄉射禮第五司射去撲倚于階西升請射于賔如初賔許去起吕反搢撲而即去反位而即往皆禮節當然也不於未搢撲而遂請者有事於尊者不宜與獻賤者之禮相因也右三請射司射降搢撲由司馬之南適堂西命三耦及衆賔皆袒決遂執弓就位於階西搢撲乃由司馬之南適堂西者示不敢由便也司射先反位三耦及衆賔皆袒決遂執弓各以其耦進反于射位以其耦進謂上射先而下射從之也進亦並行若大夫之耦則亦以序而獨進下文云大夫就其耦是也司射作拾取矢三耦拾取矢如初反位拾並其劫反司射亦惟作上耦也位亦射位賔主人大夫降揖如初云揖如初則是亦兼堂上者言也主人堂東賔堂西皆袒決遂執弓皆進階前揖進至階前相俟乃南靣而揖行也及楅揖拾取矢如三耦拾其劫反注曰及楅當楅東西也繼公謂及楅揖亦南靣揖也既揖主人乃西靣賔乃東靣拾取矢階前揖而南及楅揖而止所止之處即拾取矢之位也是其位猶未離乎階前矣然則衆耦於楅東西之位亦宜如是也卒北面搢三挾一個卒即北靣而為此是猶未離其位也此儀異於三耦者蓋退於北與退於南者不同也揖退一揖而退又略於初也賔堂西主人堂東皆釋弓矢襲及階揖升堂揖就席賔主人釋弓矢不於序之西東者變於卒射時也不言説決拾者可知也然則經文之類此者皆可得而見矣大夫袒決遂執弓就其耦注曰袒決遂於堂西就其耦於射位繼公謂袒決遂蓋於賔既出堂西而為之揖皆進如三耦如三耦則耦不少退也以其行事於庭無堂上堂下之異故不得如升射之儀也耦東靣大夫西靣大夫進坐説矢束興反位而後耦揖進説吐活反大夫即位乃進説矢束以其為下射也凡大夫之取矢於楅者必説其矢束以當拾取也其自為耦者並行至楅南即為之其與士為耦者即位而後為之此其異者也説矢束不言北面亦文省大夫進及反位皆不揖以非與耦行禮之事也坐兼取乘矢順羽而興反位揖大夫進坐亦兼取乘矢如其耦耦兼取乘矢不敢拾取者以其非敵也凡敵者共取矢於楅則拾以為儀言順羽是亦兼諸弣矣此與三耦異者惟不拾取矢耳餘則同北面搢三挾一個注曰亦於三耦為之位揖退惟云揖退亦以其如三耦可知也耦反位大夫遂適序西釋弓矢襲升即席注曰大夫不序於下尊也繼公謂適序西者以其獨往故得釋弓矢於故處亦為變於卒射之時也衆賔繼拾取矢皆如三耦以反位拾其劫反右射者皆取矢於楅司射猶挾一個以進作上射如初一耦揖升如初注曰進前也今文或言作升射繼公謂進由司馬之東而進也此以適南為進者凡進退之文無常大抵以有事於彼為進卒事而反為退也上字似衍否則其下當有耦字今文或言作升射蓋後人亦疑其誤而易之矣或曰進字亦衍司馬升命去侯獲者許諾司馬降釋弓反位亦皆如初可知司射與司馬交于階前去撲襲升請以樂樂于賔賔許諾去起吕反樂於之樂音洛下同司射惟去撲耳其決遂執弓挾矢自若也似不宜襲此言襲蓋衍文以樂樂者用樂為歡樂也以此請之於賔故曰請以樂樂於賔大射儀曰請以樂司射降搢撲東靣命樂正曰請以樂樂于賔賔許注曰東靣於西階之前也樂正亦許諾繼公謂必搢撲而後命樂正者辟併敬也司射遂適階間堂下北面命曰不鼓不釋上射揖司射退反位注曰不與鼓節相應不釋算也射用應節為難鼓亦樂之節學記曰鼓無當於五聲五聲不得不和凡射之鼓節投壺其存者也周禮射節天子九諸侯七卿大夫以下五繼公謂不鼓不釋言不與鼓節相應雖貫猶不釋算也不言貫者可知也每歌之終乃奏鼓鄉射之歌五終而鼓五節其三節先以聽而二節之間拾發乘矢焉射人職所謂五節二正是也王之大射九節五正諸侯七節三正卿大夫與士同樂正東面命大師曰奏騶虞間若一大師不興許諾樂正退反位大並音泰注曰東面者進還鄉大師也騶虞國風召南之詩篇也間若一者調其聲之疏數重節疏曰間若一謂五節之間長短希數皆如一則是重樂節也繼公謂言命大師者見所命者必其長也此惟據有大師者言之周官射人職曰王以騶虞諸侯以貍首卿大夫以采蘋士以采蘩此士射之樂乃得奏騶虞亦其異者乃奏騶虞以射三耦卒射賔主人大夫衆賔繼射釋獲如初卒射降降指衆耦之最後者而言以見釋獲者升告之節也大射儀曰降反位釋獲者執餘獲升告左右卒射如初右三射司馬升命取矢獲者許諾司馬降釋弓反位弟子委矢司馬乘之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初降復位言如初又言降復位為司射命設豐之節也亦以見其所如者止於此無復實算於中之事矣蓋以其不復射故也右取矢告獲如初司射命設豐設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初大射儀此下云卒退豐與觶如初此脫一句也右飲不勝者如初司射猶袒決遂左執弓右執一個兼諸弦靣鏃適堂西以命拾取矢如初拾其劫反注曰側持弦矢曰執面猶上也并矢於弦尚其鏃將止變於射也繼公謂右手先執矢乃又執弦則兼矢於弦矣兼矢於弦靣鏃以命拾取矢者蓋示之以此節執一矢之法而不必挾也兼矢於弓者皆靣鏃蓋矢以鏃為上凡射者於矢將用之則挾不用之則執司射反位三耦及賔主人大夫衆賔皆袒決遂拾取矢如初矢不挾兼諸弦弣以退不反位遂授有司於堂西拾其劫反疏曰兼諸弦弣者一矢兼弦三矢兼弣繼公謂拾取時猶皆兼諸弣至楅南北面則不挾矢但取一矢兼諸弦餘三矢則兼諸弣自若亦象搢三挾一之儀且如司射之戒也賔與主人則亦於楅東西之位為之位射位也不反位但由司馬之南而過也授有司授之以弓矢也必授之者射事止則宜反於所受者也此文主於三耦及衆賔也大夫與其耦亦存焉若賔則自階下以授有司於堂西主人則以授有司於堂東也辨拾取矢揖皆升就席辨音遍拾其劫反揖皆升就席謂衆賔三人也衆賔三人必俟拾取矢者辨而後升若主人賔大夫則既授弓矢即升如初禮固不俟其辨也三人既升則餘人以次立於西方如未射之時矣右射者復皆取矢於楅司射乃適堂西釋弓去撲説決拾襲反位去起吕反説吐活反下同反位其猶在中西南與不言釋矢可知也司馬命弟子説侯之左下綱而釋之注曰説解也繼公謂云釋則是不束也説而釋之變於射與未射之時命獲者以旌退命弟子退楅司射命釋獲者退中與算而俟注曰備復射也獲者釋獲者亦退其薦俎繼公謂旌退於西方楅與中算退於堂西以俟其人則皆復於西方之位也案注云獲者釋獲者亦退其薦俎此據大射儀而言也退薦俎各當其位之前與司馬反為司正退復觶南而立射事已而復其故職也云復觶南見射時觶不徹是時司射亦當復東方之位樂正命弟子贊工即位弟子相工如其降也升自西階反坐相息亮反注曰降時如初入樂正反於西階東北面繼公謂命弟子亦適西方命之也如其降亦謂後先及相之之儀也反坐謂反其故位而坐也工既坐弟子亦降立於西方右射事止賔北靣坐取俎西之觶興阼階上北面酬主人主人降席立于賔東賔坐奠觶拜執觶興主人答拜賔不祭卒觶不拜不洗實之進東南靣主人阼階上北靣拜賔少退主人進受觶賔主人之西北靣拜送賔揖就席主人以觶適西階上酬大夫大夫降席立于主人之西如賔酬主人之禮注曰其既實觶進西南面立鄉所酬主人揖就席若無大夫則長受酬亦如之長知丈反長謂衆賔之長也此惟據主人所酬者而言大夫若衆則相酬辨乃及長司正升自西階相旅作受酬者曰某酬某子相息亮反注曰某者字也某子者氏也春秋傳曰字不若子繼公謂此謂大夫酬長若長相酬之時也司正稱酬者之字稱受酬者曰某子彼此之辭也此主為酬者命受酬者緣酬者意欲尊敬之故於此言字於彼言子所以不同受酬者降席司正退立于西序端東靣衆受酬者拜興飲皆如賔酬主人之禮辨遂酬在下者皆升受酬于西階上辨音遍注曰在下謂賔黨也鄉飲酒記曰主人之贊者西靣北上不與無算爵然後與此異於賔繼公謂在下者迭升受酬亦如上禮可知卒受者以觶降奠于篚司正降復位右旅酬使二人舉觶于賔與大夫至是乃并舉觶於大夫者異之也舉觶者皆洗觶升實之西階上北靣皆坐奠觶拜執觶興賔與大夫皆席末答拜舉觶者皆坐祭遂飲卒觶興坐奠觶拜執觶興賔與大夫皆答拜大夫席末席東端也舉觶者逆降洗升實觶皆立于西階上北靣東上賔與大夫拜舉觶者皆進坐奠于薦右賔與大夫辭坐受觶以興東上主賔者在右也至是乃言之者以其將奠觶也舉觶者退反位皆拜送乃降賔與大夫坐反奠于其所興此奠於其所亦皆少違其故處而在其俎之西也於此云興見其無事則不坐也若無大夫則唯賔言此者明不舉觶於賔長此二人舉觶雖曰正禮然若無大夫則闕一人以其禮唯當行於尊者耳右二人舉觶司正升自西階阼階上受命于主人適西階上北靣請坐于賔司正適阼階上北靣而受命賔辭以俎反命于主人主人曰請徹俎賔許徹直列反下同注曰上言請坐於賔此言主人曰互相備耳司正降自西階階前命弟子俟徹俎司正升立于序端賔降席北靣主人降席自南方阼階上北靣大夫降席席東南靣賔取俎還授司正司正以降自西階賔從之降遂立于階西東靣司正以俎出授從者主人取俎還授弟子弟子受俎降自西階以東主人降自阼階西靣立還並音旋下同從者才用反主人取俎未必在司正出門之後上文蓋終言之耳西靣立階東當序位也大夫取俎還授弟子弟子以降自西階遂出授從者大夫從之降立于賔南衆賔皆降立于大夫之南少退北上從者才用反説見前篇記右徹俎主人以賔揖讓説屨乃升大夫及衆賔皆説屨升坐説並吐活反亦當説屨乃揖讓如飲酒之禮特立文異耳右説屨升坐乃羞無算爵使二人舉觶賔與大夫不興取奠觶飲卒觶不拜注曰二人謂嚮者二人也使之升立於西階上當執觶也卒觶者固不拜矣著之者嫌坐卒爵者拜既爵此坐於席禮既殺不復崇繼公謂使之亦司正也此舉觶謂取而酌之即下文所云執觶者受觶遂實之之事也其位蓋在西序端北上若無大夫則惟一人執觶者受觶遂實之賔觶以之主人大夫之觶長受而錯皆不拜長知丈反下同錯七洛反注曰皆不拜受禮又殺也繼公謂錯謂以次更迭而受也大夫若惟一人則衆賔長先受其觶以次錯行之大夫若有二人以上則皆及於大夫乃及衆賔蓋先尊而後卑也云大夫之觶長受而錯則賔觶但至主人而止與所以然者以二觶並行難為旅也若無大夫乃行主人之觶為其無二觶故爾先者不拜而飲故受者皆不拜禮蓋相因也辨卒受者興以旅在下者于西階上辨音遍注曰執觶者酌在上辨降復位繼公謂辨謂堂上皆已受爵也卒受者衆賔長之末者也其受於席末飲興以旅在下者乃飲如下文所云是已云卒受者興見惟行一觶也長受酬酬者不拜乃飲卒觶以實之注曰言酬者不拜者嫌酬堂下異位當拜也乃猶而也繼公謂長謂堂下賔黨之長也言酬者不拜者嫌親酬當拜也實之謂自實之受酬者不拜受嚮者旅酬有拜而飲者拜而受者故於此一一明之辨旅皆不拜辨音遍注曰主人之贊者於此始旅嫌有拜執觶者皆與旅與音預注曰亦自以齒與於旅也繼公謂於此言執觶者皆與旅則嚮者旅酬之時主人之贊者不與信矣卒受者以處觶降奠于篚此以降者一觶也然則主人所飲之觶執觶者其先以奠於篚與執觶者洗升實觶反奠于賔與大夫二觶元在賔與大夫之前故云反奠餘則皆如上文賔與大夫不興取奠觶飲以下之儀不言者可知也此後酒行終而復始儀亦如之至醉而止所謂無算爵也無算樂此無算樂亦宜與鄉飲者同右無算爵賔興樂正命奏陔賔降及階陔作賔出衆賔皆出主人送于門外再拜降謂降堂及階至階上也右賔出明日賔朝服以拜賜于門外主人不見如賔服遂從之拜辱于門外乃退朝直遙反見賢遍反拜賜之禮賔至於門外擯者出請入告主人辭不見賔乃拜主人拜辱亦如之右賔拜賜主人拜辱主人釋服乃息司正無介注曰此已下皆記禮之異者繼公謂昨日正禮已無介則此可知矣乃言之者嫌不射而飲或用介也不殺使人速亦當使人戒乃速經文略也迎于門外不拜入升不拜至不拜洗薦脯醢無俎賔酢主人主人不崇酒言不殺復言無俎者嫌不殺者亦或有俎也士冠士虞以乾肉折俎主人不崇酒則賔亦不告旨矣其他不見者可以意求之不拜衆賔此謂不拜之於庭指將獻之時也若獻則衆賔亦拜受爵而主人答之既獻衆賔一人舉觶遂無算爵注曰言遂者明其間闕也賔坐奠觶於其所擯者遂受命於主人請坐於賔賔降説屨升坐矣不言遂請坐者請坐主於無算爵繼公謂此一人舉觶在獻衆賔之後雖與正禮之舉觶為旅酬始者同實為無算爵始也言遂無算爵明其説屨升坐即取此觶飲也案注云明其間闕謂舉觶之後無算爵之前其間工入升歌等禮皆闕也無司正注曰使擯者而已不立之繼公謂此禮略無所用之故不立賔不與與音預昨日正賔不可褻也徵唯所欲以告於鄉先生君子可也羞唯所有鄉樂唯欲此與前篇息司正之禮亦同但文有詳略爾右息司正記大夫與則公士為賔與音預記言此者恐其或用處士也所以不可用處士者以處士去大夫之尊逺故也鄉飲酒之禮大夫若與其賔介亦當以公士為之大夫不與則公士若處士皆可舊説謂鄉飲酒鄉射大夫自來觀禮非也大夫於一人既舉觶於賔乃入主人必無臨時易賔之理然則大夫之與此會者乃亦主人請之明矣使能不宿戒其牲狗也用狗者因大射之牲也其義與鄉飲酒同此下有不釋者見前篇記亨于堂東北尊綌冪賔至徹之蒲筵緇布純西序之席北上亨音烹徹直列反純之允反經言衆賔長升就席者三人耳又曰衆賔之席繼而西是未必有西序之席北上者此記未詳獻用爵其他用觶以爵拜者不徒作薦脯用籩五膱祭半膱橫于上醢以豆出自東房膱長尺二寸膱音職長直亮反注曰脯用籩籩宜乾物也醢以豆豆宜濡物也膱或謂之挺為記者異耳膱挺皆取直貌焉祭橫於上殊之也於人為縮膱廣狹未聞繼公謂曲禮曰以脯修置者左朐右末是膱長尺二寸而中屈之也士虞記有乾肉折俎亦曰朐在南此可以見其制矣祭半膱則不屈之俎由東壁自西階升賔俎脊脅肩肺主人俎脊脅臂肺肺皆離皆右體也進腠腠七奏反注曰賔俎用肩主人用臂尊賔也若有遵者則俎其餘體也繼公謂不言大夫俎者有無不定也凡舉爵三作而不徒爵凡奠者于左將舉者于右衆賔之長一人辭洗如賔禮若有諸公則如賔禮大夫如介禮無諸公則大夫如賔禮長知丈反賔禮介禮亦謂其受獻時之儀耳云有諸公則如賔禮大夫如介禮其言略與鄉飲酒之經合似也云無諸公則大夫如賔禮其言大與此經違則非矣此經所言遵者大夫之儀正指無諸公者也而其儀亦無以異於介烏在其為如賔禮乎蓋大夫之禮宜降於賔固不以諸公之有無而為隆殺又經惟屢見大夫禮而略不及公則無諸公明矣記乃著有諸公之禮皆似失之樂作大夫不入樂正與立者齒但云與立者齒則獻薦與旅皆在其中矣惟位則異三笙一和而成聲和胡卧反三人吹笙而一人歌其所吹之詩以和之而後笙之辭顯且成聲也此其在無算樂之時乎笙之入也以將射之故不奏之獻工與笙取爵于上篚既獻奠于下篚其笙則獻諸西階上立者東靣北上注曰賔黨也繼公謂門內堂下之位同司正既舉觶而薦諸其位三耦者使弟子司射前戒之注曰弟子賔黨之少者也前戒謂先射請戒之繼公謂三耦射則在先立則居前乃以弟子為之者為司射當誘射故也誘射有教之之意故以少者為三耦而誘之不使長者嫌其待之淺也惟前戒故不待命而先俟於堂西司射之弓矢與撲倚于西階之西經於司射取弓挾矢取撲皆著其在階西則此文意已在其中矣似不必言也經又著司射適堂西挾一個則是司射之矢亦不盡倚於階西也然則記之文意又似失之不備矣司射既袒決遂而升司馬階前命張侯遂命倚旌注曰著並行也古文曰遂命獲者倚旌繼公謂經言司馬命張侯及倚旌乃在司射比三耦之後記言此以明其在司射升請射於賔之時非若經文之次也然經文所以如彼者欲終上事乃言下事故爾階前即觶南之處也此云階前下云命負侯者由其位文互見也案注云著並行者謂此時司射司馬同時行事非相繼為之經不明言故記著之也凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質麋音迷畫胡卦反此謂獸侯也其於大夫士則為鄉射天子諸侯則為燕射也燕禮曰若射則如鄉射之禮梓人職曰張獸侯則王以息燕是天子諸侯雖無鄉射其燕射則皆用鄉射之禮而張此侯故記之於此云熊侯麋侯者皆以其獸皮之全者二夾置於其質之旁也凡皮侯之制亦然惟不質而鵠為異爾大夫士之鄉射於布侯之上但畫此四獸為飾不以皮也此云布見熊麋二侯其體亦布也此云畫見熊麋二侯之非畫也質亦的名荀子曰質的具而弓矢至是也圉人職曰射則共椹質考工記曰利射革與質則質者以木為之而其方如鵠與白赤丹者質上所塗之色各因其所宜以為飾且相别異也凡畫者丹質謂畫虎豹鹿豕之侯皆以丹質言其質同也大射之禮王則虎侯熊侯豹侯諸侯則熊侯豹侯犴侯卿大夫則麋侯士則犴侯此天子用其三侯之次諸侯又用卿大夫之侯大夫士又但畫而已皆辟其大射也一侯而畫獸二者亦宜夾其質也不畫一獸者變於用皮者也不以熊與麋為畫者雖不用皮猶不與君燕射之侯同物所以遠下之也下記云禮射不主皮此皮謂革也周官及考工記言射者皆以質與革並言是其堅類也禮射不主皮為力不同科此射亦禮射也乃用質者以其近故與侯近則質雖堅而易貫故與主皮之義異射自楹間物長如笴其間容弓距隨長武長直亮反下同笴古可反注曰楹間中央東西之節也物謂射時所立處也長如笴者謂從畫之長短也長三尺與距相應射者進退之節也距隨者物橫畫也武尺二寸繼公謂其間容弓為從畫言也橫畫之距隨長武則上下射之相去不及五尺矣射者南靣還視侯中之後先以左足履物之東端乃以右足履其西端而合之故名東端為距西端為隨取其左足至則右足從之也距至也隨猶從也物之名義未詳序則物當棟堂則物當楣注曰是制五架之屋也正中曰棟次曰楣前曰屐繼公謂當棟當楣其以庭之深淺而異與堂之庭深於序故進退其物以合侯道之數此侯道五十弓命負侯者由其位疏曰司馬自在已位遙命之繼公謂位觶南也此與前二命皆不離其位者以射事未至略之由便也凡適堂西皆出入于司馬之南唯賔與大夫降階遂西取弓矢凡凡司射司馬三耦衆耦也必出入於此者近於其位也此於司射司馬之位為南於耦之射位為北故以之為節云賔無射位大夫不立於射位故取弓矢於堂西不由之大夫卒射而退乃由此者統於上射非正禮也旌各以其物注曰旌總名也雜帛為物大夫士之所建也繼公謂記據士之為主人者言也士之物云各則是三等之士其物亦有不同者矣士喪禮曰為銘各以其物亦此意也無物則以白羽與朱羽糅杠長三仞以鴻脰韜上二尋糅女又反杠音江長直亮反仞音刃脰音豆韜吐刀反注曰此翿旌也糅雜也杠橦也鴻鳥之長脰者也八尺曰尋繼公謂無物謂士之未仕者也周官云大夫士建物蓋指見居官者而言以白羽朱羽相雜而綴於杠之首亦象析羽為旌之意也仞與尋皆八尺並言之者異其文耳仞尋之度見考工記匠人職凡挾矢于二指之間橫之兼左右手言也云凡者謂挾矢或多或寡其法皆然寡則挾以食指將指多則以餘指分挾之凡挾矢有挾一矢者有挾四矢五矢者司射在司馬之北司馬無事不執弓司馬將升堂而有事乃執弓非是則亦有有事而不執弓之時記蓋大略言之耳始射獲而未釋獲復釋獲復用樂行之復並扶又反始射謂第一畨三耦射時復又射也前言復謂第二畨射時後言復謂第三畨射時三耦始射志在於中中則當言獲未釋獲者此如習射然未宜較勝負且三耦之外皆未射難以相飲亦不可以徒釋之也至次射則賔主而下皆繼射乃可以釋獲及第三射則其事已熟乃可以樂為節也此皆行事有漸且示先質後文之意上射于右注曰於右物射楅長如笴博三寸厚寸有半龍首其中蛇交韋當長直亮反長如笴兩端相去之度也龍首者刻其上端作龍首之狀為識且以飾也上端為首則下端為尾明矣經云東肆是其證也蛇交者以兩木屈曲為之狀如蛇交然必屈曲為之者象弓也當者其以當矢而名之與楅身蛇交廣狹相間必通設韋當於其上乃可以承矢楅髤橫而奉之南靣坐而奠之南北當洗髤音休奉芳勇反注曰髤赤黑漆也繼公謂言奉之明執其兩端也射者有過則撻之撻吐達反注曰過謂矢揚中人凡射時矢中人當刑之今此射者中人本意在侯其傷害之心遠是以輕之以撲撻於中庭而已書曰撲作教刑繼公謂射者有過謂或不能盡循司射之教而犯其所命者也射時司射搢撲以涖事然則撻之者其司射與又考司射之行事其有關於尊者必去撲乃為之則是尊者之射雖有過固不在此科也衆賔不與射者不降與音預衆賔在三人之中者也射時賔主人大夫皆降而此衆賔或不降者以是時堂下無衆賔不射者之位故也又考經言賔主人大夫若皆與射之禮則是賔主人大夫或有時不與矣此記又言衆賔不與射者不降皆以堂上者言也以是觀之則堂上者可以不與而在下之衆賔無有不與者乎取誘射之矢者既拾取矢而后兼誘射之乘矢而取之拾其劫反經云後者遂取誘射之矢此則見其於既拾取已矢乃為之賔主人射則司射擯升降卒射即席而反位卒事注曰擯賔主人升降者皆尊之也不使司馬擯其升降主於射繼公謂擯謂以辭贊之射時擯升降則取矢亦當然也將擯而去撲搢之乃反位鹿中髤前足跪鑿背容八算釋獲者奉之先首奉芳勇反注曰前足跪者象教擾之獸受負也疏曰屈前足以受負若今駝受負則四足俱屈之類也大夫降立于堂西以俟射以大夫不可與士並立于射位也大夫與士射袒薰襦注曰不肉袒殊於耦繼公謂薰讀為纁古字通用也袒纁襦尊者不見體也襦先著於衣內袒時則出之大夫非射於君所固不肉袒矣乃以與士射為言者嫌為下射或當統於上射而不宜異之也耦少退于物經言耦於大夫射時之禮在下則屈在上則伸然則似未必有此少退於物之儀也且侍射於君乃退於物尊君也大夫之耦此禮亦不宜與君之耦同記似過矣司射釋弓矢視算與獻釋獲者釋弓矢司射於射事未畢而唯此二事釋弓矢故記者併言之也視算而去弓矢者為射事已因去撲之節而并去之也獻釋獲者而釋弓矢者為有洗酌答拜等事故也二者之意義不同禮射不主皮主皮之射者勝者又射不勝者降注曰禮射大射賔射燕射是矣言不勝者降則不復升射也主皮者無侯張獸皮而射之天子大射張皮侯賔射張五采之侯燕射張獸侯繼公謂禮射謂此篇所載與大射燕射之類是也禮射則張皮侯若采侯與獸侯而加正鵠主皮之射則不用正鵠但欲射中其皮耳此皮與所謂皮侯者之皮不同蓋以中甲之革為之周官云射甲革樂記云貫革之射皆指此而言也中甲之革犀兕若牛之皮也其為物堅厚惟強有力者乃能貫之故禮射則不主皮為力不同科故也勝者言又射不勝者言降文互見也主皮之射以又射與不射示榮辱亦異於禮射者也其相飲之禮有無則未聞主人亦飲于西階上經文已明獲者之俎折脊脅肺注曰折以大夫之餘體繼公謂折謂折分其牲體不用全體也無大夫則臑折有大夫則折其餘體此俎先言折則其載之次又異於堂上之俎矣肺離肺也下同東方謂之右個注曰侯以鄉堂為靣也繼公謂於此釋右個者順經文也或曰下俎言皆有祭承獲者之俎而言也則此文原不在是後人移之耳未知是否釋獲者之俎折脊脅肺皆有祭注曰皆皆獲者也祭祭肺也繼公謂此折與獲者共一體與皆皆二俎也經於二俎已見其有祭記復言之者以此云肺嫌為祭肺也是以明之二俎有離肺復有祭肺者為獲者祭於三處而加之釋獲者俎遂因之亦加祭肺一也大夫説矢束坐説之説並吐活反經文亦已明歌騶虞若采蘋皆五終注曰每一耦射歌五終也繼公謂若采蘋亦與周官異者也射無算射者多寡隨宜無定數也古者于旅也語言古者以見周禮之不然古謂殷以上也於旅而語以敬殺也然則周之禮其燕坐乃語與凡旅不洗不洗者不祭既旅士不入大夫後出主人送于門外再拜大夫後出與其後入之意同亦欲使主人各得盡其待賔與大夫之禮而賔與大夫亦各得伸其尊也主人送賔入門大夫乃出大夫雖多亦惟拜送其長而已鄉飲酒尊者之禮亦當如此鄉侯上個五尋個如字注曰上個謂最上幅也上幅用布四丈中十尺注曰方者也用布五丈今官布幅廣長二尺二寸旁削一寸考工記曰梓人為侯廣與崇方謂中也繼公案注云今官布幅廣二尺二寸蓋謂周布之廣當如漢布也然亦未有以見其必然又鄭氏於他注或謂幅廣二尺與此不同則是鄭氏之説亦未定也姑闕之侯道五十弓弓二寸以為侯中注曰言侯中取數也正二寸骹中之博也疏曰周禮弓人云骹中有變焉謂弓弣把側骨之處博二寸故於此處取數焉繼公謂言以五十弓之長為侯道五十弓之博為侯中也倍中以為躬注曰躬身也謂中之上下幅也用布各二丈疏曰躬謂中上中下各橫接一幅布者倍躬以為左右舌注曰謂上個也左右出謂之舌疏曰此兩個躬外兩相各出一丈下舌半上舌注曰半者半其出於躬者用布三丈凡鄉侯用布十六丈數起侯道五十弓以計道七十弓之侯用布二十五丈二尺道九十弓之侯用布三十六丈疏曰上舌兩相各一丈今下舌兩相各五尺通躬二丈故云用布三丈也云凡鄉侯用布十六丈數起侯道五十弓以計者中五幅幅一丈用布五丈上下躬揔用布四丈上個四丈下個三丈是通用布十六丈也云道七十弓之侯用布二十五丈二尺者中七幅幅丈四尺用布九丈八尺上下躬揔用布五丈六尺上個五丈六尺下個四丈二尺通用布二十五丈二尺也云道九十弓之侯用布三十六丈者中九幅幅丈八尺用布十六丈二尺上下躬揔用布七丈二尺上個亦七丈二尺下個五丈四尺通用布三十六丈也繼公謂下舌所以半上舌者慮其植之妨於往來者也下舌之長若如上舌則兩植相去五丈六尺有餘矣故須半之也考工記曰上綱與下綱出舌尋縜寸焉箭籌八十注曰箭篠也籌算也繼公謂上記云射無算而箭籌惟止於八十則是此射者雖多亦不過十耦也釋獲者之執算各視射者之矢數長尺有握握素長直亮反下同注曰握本所持處也素謂刋之也刋本一膚疏曰公羊傳何休云側手為膚又投壺云室中五扶注云鋪四指曰扶一指案寸皆謂布四指繼公謂尺有握猶言尺有四寸也必云握者亦見其為所握處也楚撲長如笴刋本尺注曰刋其可持處君射則為下射上射退於物一笴既發則答君而俟注曰退於物一笴不敢與君併也答對也此以下雜記也繼公謂君為下射者降尊以就卑則不宜與卑者序而從尊卑為耦之常法也且下射之物在東亦不失其主位也上射賔也答君謂東靣立而對之射時進左手微背於君故既射則還對之俟待君發也君樂作而後就物君袒朱襦以射襦音儒注曰君尊也繼公謂君樂作乃就物亦以樂節多故也樂謂奏貍首也此記先言樂乃後見君之射儀則是君之燕射於再射即用樂行之亦變於大射也投壺之禮因飲酒而為之於其再投即用樂此意其類之乎鄉射三射乃用樂行之小臣以巾執矢以授注曰君尊不搢矢不挾矢授之稍屬繼公謂以巾執矢敬君物不敢褻也大射儀曰小臣師以巾內拂矢而授矢於公稍屬蓋以巾拂之而又藉手以執之也若飲君如燕則夾爵飲於鴆反注曰謂君在不勝之黨也賔飲君如燕賔騰觶於公之禮則夾爵夾爵者君既卒爵復自酌繼公謂夾爵謂夾君爵而自飲也以大射儀考之飲君之禮其所以異於燕賔之勝觶者於獨夾爵而已記但以此言之亦大略之説也君國中射則皮樹中以翿旌獲白羽與朱羽糅翿徒刀反注曰國中城中也皮樹獸名繼公謂燕禮大射儀皆射於公宫即此國中射也必云國中者對郊竟而言也于郊則閭中以旌獲注曰閭獸名如驢一角或曰如驢歧蹄周書曰北唐以閭析羽為旌于竟則虎中龍旜注曰畫龍於旜尚文章也通帛為旜繼公謂虎中龍旜逺則彌文也記言君之中與所獲者有國中郊竟之異而不言為某射於某所則是其所以異者惟繫於地之遠近不繫於射之大小也若然則固有大射而用皮樹中翿旌者亦有燕射而用虎中龍旜者矣大夫兕中各以其物獲兕徐履反注曰兕獸名似牛一角繼公謂其指大夫而言大夫有上中下之異故物亦有差司常職曰大夫士建物士鹿中翿旌以獲翿旌即白羽與朱羽糅者也上記言士禮云旌各以其物無物則以白羽與朱羽糅此直見翿旌而已蓋記者雜也惟君有射于國中其餘否其餘否謂人臣不為射主於國中也君有射於國中者以其於公宫為之也若人臣之家其庭淺隘器用又未必備故射則必於鄉州之學行事焉是雖居於國而欲射於其中亦不可得也此不惟見尊君之意亦其勢然爾君在大夫射則肉袒不袒纁襦遠下君儀禮集説卷五下正誤序則鉤楹外鄭本序作豫注曰今文豫作序繼公謂序之文意明白於豫且記亦以序與堂對言宜從今文獲者之俎折脊脅肺今本肺下有臑字繼公謂臑在肺下非其次且與折文不合蓋傳寫者因注首言臑而衍也大射注引此無臑字又古文云釋獲者之俎折脊脅肺則此俎不當言臑亦明矣今據大射注刪之
