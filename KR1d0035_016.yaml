body:
  text: 儀禮集說卷十六元敖繼公撰少牢饋食禮第十六注曰於五禮屬吉禮繼公謂此篇言大夫祭其祖之禮少牢饋食之禮少詩照反食音嗣注曰禮將祭祀必先擇牲繫于牢而芻之羊豕曰少牢日用丁己己音紀注曰內事用柔日必丁己者取其令名自丁寧自改變皆為謹敬繼公謂此指筮日之日也所謂諏日者也先諏是日至其日乃筮筮旬有一日以丁若己之日而筮旬有一日則所筮之日亦丁若己可知矣以丁己之日而筮丁巳乃云旬有一日則是并筮日之日而數之也古者數日之法於此可見筮於庿門之外主人朝服西面于門東史朝服左執筮右抽上韇兼與筮執之東面受命于主人朝並直遙反下朝服並同朝服大夫士以筮之正服也史亦公有司也周官筮人職中士二人史二人士冠特牲之筮者言筮人此言史蓋互文也大夫筮亦朝服者降於卜也雜記言大夫卜宅與葬日云占者皮辨又云如筮則占者朝服是其服異也主人曰孝孫某來日丁亥用薦歲事于皇祖伯某以某妃配某氏尚饗注曰丁未必亥也直舉一日以言之耳禘於太庿禮曰日用丁亥伯某且字也其仲叔季亦曰仲某叔某季某某妃某妻也合食曰配某氏若言姜氏子氏也繼公謂此惟云丁亥特見其一耳必言丁亥者以其為六丁之末者故設言之也末者且用則其上者可知矣已日亦宜如之稱其祖字則是指士之為祖者而言亦假設之辭耳大夫祭士之為祖者如此亦所以明其從生者之爵也其祖禰若為大夫則稱曰某子聘禮記曰皇考某子是也大夫三庿其常祀自曽祖而下此辭惟言皇祖者亦見其一耳三庿說見聘禮史曰諾西面于門西抽下韇左執筮右兼執韇以擊筮擊筮者為將述命故也不述命則無此儀遂述命曰假爾大筮有常孝孫某來日丁亥用薦歲事于皇祖伯某以某妃配某氏尚饗大音泰注曰重以主人辭告筮也假借也繼公謂大者尊之之辭假爾大筮謂假借爾大筮之靈以問於神也有常謂其常常如此也言每有疑事則必問之而不敢專決所以見其敬信之意孝孫某以下之辭則所謂述命也乃釋韇立筮立筮而又在門西皆大夫之禮異者也卦者在左坐卦以木卒筮乃書卦于木示主人乃退占注曰卦者史之屬也卦以木者每一爻畫地以識之六爻備書於板史受以示主人退占東面旅占之繼公謂此卦者坐亦與筮者相變也上木畫地者也下木板也退退于其位也不言其位亦西方東面可知此占者亦當三人也大夫庿門外之位其有司之西方東面者惟此耳蓋筮者有事於神故不為大夫而變位也吉則史韇筮史兼執筮與卦以告于主人占曰從既筮又釋筮于所筮之處至是乃就而韇之也韇筮而兼與卦執之以告此亦與士禮異者也乃官戒宗人命滌宰命為酒乃退注曰滌溉濯祭器掃除宗庿繼公謂官戒謂某官戒某人以某事也宰宗人乃官之尊者故見其所命者以明之有司羣執事之位當在門東東上大夫之宗人亦私人為之自此以下諸官司馬之屬皆放此若不吉則及逺日又筮日如初注曰逺日後丁若後已繼公謂此逺日對筮之日而言即所筮不吉之日也至此日又筮旬有一日也此文當承占曰從之下欲終言上事故至是乃見之右筮日宿宿謂宿賔以下也是亦官宿之大夫於助祭之賔為踰等故不親宿此宿當在宿尸之後言於此者為下文節也前宿一日宿戒尸宿戒尸者凡可為尸者皆宿戒之為將筮也此宿戒蓋亦使人為之尸未筮則未成其尊宿前一日又宿戒尸亦尊者之禮異也明日朝筮尸如筮日之禮命曰孝孫某來日丁亥用薦歲事于皇祖伯某以某妃配某氏以某之某為尸尚饗筮卦占如初朝如字不前期三日而筮尸未詳此筮日筮尸之辭皆不言筮之亦與士異吉則乃遂宿尸祝擯祝為擯與上篇祝致命之意同主人再拜稽首不待其許諾而即再拜稽首亦異於士已上之儀當略與特牲同以其有成禮故略之而不言祝告曰孝孫某來日丁亥用薦歲事于皇祖伯某以某妃配某氏敢宿注曰告尸以主人為此事來宿尸拜許諾主人又再拜稽首主人退尸送揖不拜主人拜而后致辭故尸答拜而后許諾尸所以答拜者亦以其未許諾故也主人又拜者所以見其不必答已尊之又此主人退尸雖不拜送猶揖之凡尸與主人為禮於其家者皆變於賔主之儀若不吉則遂改筮尸所改筮者嗣户也此所筮者若又不吉則直以其次者為尸不復筮與筮日之意同右筮尸宿尸既宿尸反為期于庿門之外注曰期祭期也言既宿尸反為期明大夫尊宿尸而已其為賔及執事者使人宿之繼公謂既宿尸反而為期是其事相繼而不必至夕也然則嚮所宿者皆不在可知大夫宿與為期同日此時又未有賔皆大夫禮異者也主人門東南面主人門東南面有司羣執事之位北面大夫宜鄉之亦大夫禮異也宗人朝服北面曰請祭期主人曰比於子比略志反注曰比次早晏在於子也宗人曰旦明行事主人曰諾注曰旦明旦日質明乃退惟云乃退是主人不送也下篇云衆賔出主人拜送于庿門外此退而不送則衆賔不在可知既退有司乃宿賔右為期明日主人朝服即位于庿門之外東方南面宰宗人西面北上牲北首東上司馬刲羊司士擊豕宗人告備乃退刲苦圭反注曰刲擊皆謂殺之此實既告備乃殺之文互者省也繼公謂東方視殺之位亦宜當孰少南此異宰宗人之位亦與特牲異宗祝之位者同意牲亦當在東方少南有司牽羊豕則束之而東足也乃退謂主人右視殺雍人溉鼎匕俎于雍爨雍爨在門東南北上注曰雍爨羊豕魚臘竈也繼公謂溉猶拭也既筮日而宗人命滌則有司於祭器皆已濯之矣故至此但溉之為去塵也鼎匕俎皆牲器故雍人溉之於雍爨之上以其類也下文溉甑甗匕敦于廪爨其義亦然雍人見公食禮廪人溉甑甗匕與敦于廩爨廪爨在雍爨之北甑于孕反甗魚展反敦音對下並同注曰匕所以匕黍稷者也疏曰冬官陶人職云甗實二釜厚半寸脣寸甑實二釜厚半寸脣寸七穿繼公謂廪人與雍人對言則是掌為饎之事者也甗如甑蓋有底而無孔所以盛米也與甑則炊之匕則出之此四器與鼎匕俎皆陳于外故雍人廪人分溉之廪爨亦北上司宫溉豆籩勺爵觚觶几洗篚于東堂下勺爵觚觶實于篚卒溉饌豆籩與篚于房中放于西方設洗于阼階東南當東榮放方往反司宫主陳設此器故俱溉之勺爵觚觶溉之則隨實于篚不待其卒溉也勺亦實于篚者為將洗之饌之蓋於北堂放于西方以次而西也下篚亦饌于房以俟事至而設之不言陳几之處未詳其所特牲禮几席陳于西堂右溉器羹定雍人陳鼎五三鼎在羊鑊之西二鼎在豕鑊之西三鼎羊魚臘二鼎豕與膚膚鼎亦在豕鑊西者以膚在豕鑊故也魚臘自有鑊未升之時其鼎乃從羊者以膚鼎從豕之故而為之也蓋此鑊四而鼎五若鼎各從其鑊則豕鑊西之鼎二羊鑊西之鼎一嫌其輕重失次故以魚臘之鼎從羊見其尊也不云爨而云鑊據鼎實之所從出者而言是篇獨著鑊西之鼎位以其異也士禮三鼎無嫌故不見之司馬升羊右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並腸三胃三舉肺一祭肺三實于一鼎膊音純與肫同脡他頂反注曰肩臂臑肱骨也膊骼股骨也脊從前為正脅旁中為正祭肺三為尸主人主婦繼公謂升謂升於鼎也牲體盡在鑊惟神之俎實升於鼎其餘則皆自鑊升於俎也正脊之屬用二骨乃皆云一者則是但以其名相别耳不繫其骨之多寡也脊先前脅先後亦禮貴相變也腸三胃三者少牢之俎五而已腸胃不得别俎故但附於其牲也附於其牲則其數貶焉而止於三亦如特牲豕俎膚三之意也大夫或用大牢而俎若九若七則腸胃别俎得充其數此制於公食大夫禮見之司士升豕右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並舉肺一祭肺三實于一鼎此與上經升羊者皆出自鑊而入于鼎其文之序則始於肩終於肺與下經之出於鼎而載於俎者同以其出入先後之節考之似正相反然則此所云者但據其已在鼎者上下之次而言非謂入鼎之序亦然也蓋與下經之文雖同而意則異矣雍人倫膚九實于一鼎注曰倫擇也膚脅革肉擇之取美者繼公謂膚九者與其牲異鼎不視腸胃故得充其數焉司士不倫膚以其卑也先魚臘實之者與牲體同鑊宜因便也既實則遷之於臘爨之西南司士又升魚臘魚十有五而鼎臘一純而鼎臘用麋云又升則司士即嚮之升豕者也然則此時亦先升魚後升臘與鼎謂實于一鼎也牲一胖而臘一純亦大夫禮異也不言髀不升可知也每於將升之時則舉鼎以就其鑊西他篇言臘者皆不言其物而此云用麋者經特於此見之乎卒脀皆設扄冪乃舉陳鼎于庿門之外東方北面北上陳於東方亦當孰少南嚮不陳於此亦異於士司宫尊兩甒于房户之間同棜皆有冪甒有𤣥酒棜即所謂棜禁也惟言棜文省耳設尊即加冪者甒其無蓋與司宫設罍水于洗東有枓設篚于洗西南肆枓音主注曰枓㪺水器也繼公謂枓者沃盥與洗用之加于罍上經言罍水者惟此與大射燕禮耳然則士之水器其異於此乎凡沃洗及盥于洗者皆用枓經特於此見之改饌豆籩于房中南面如饋之設實豆籩之實注曰改更也如饋之設如其陳之左右也饋設東面繼公謂改饌乃就而實之大夫禮異也此亦司宫主為之案注云饋設東面以見其異者此耳小祝設槃匜與簞巾于西階東其設如士虞禮惟異處耳主人朝服即位于阼階東西面更言朝服者嫌祭服或異於前也阼階東亦直東序後放此主人既視殺而退至是乃出立于其位也司宫筵于奧祝設几于筵上右之司宫不設几以祝接神宜使其為尊者公食大夫禮司宫設几右實鼎陳設器饌即位主人出迎鼎除冪士盥舉鼎主人先入注曰道之也主人不盥不舉繼公謂主人未入室而先迎鼎且不舉亦大夫禮異也除鼎示有事也士盥於外司宫取二勺于篚洗之兼執以升乃啓二尊之蓋冪奠于棜上加二勺于二尊覆之南枋覆方服反二尊兩甒也蓋冪蓋尊之冪也此時即徹冪而加勺亦變於士鼎序入雍正執一匕以從雍府執四匕以從司士合執二俎以從司士贊者二人皆合執二俎以相從入相如字雍正雍人之長府其佐也匕先俎後變於君禮也贊者二人故云相從嫌並行也陳鼎于東方當序南于洗西皆西面北上膚為下匕皆加于鼎東枋注曰南于洗西陳于洗西南繼公謂膚為下陳鼎于外之時則然矣見於此者蓋要終言之必言膚為下者以其出於豕且與之同鑊嫌宜在魚臘上也加匕東枋便匕者之執也既錯鼎加匕則右人及執匕者退惟左人待載俎皆設于鼎西西肆肵俎在羊俎之北亦西肆注曰肵俎在北將先載也異其設文不當鼎繼公謂後言肵俎亦以設在後也執俎者既設俎乃退宗人遣賔就主人皆盥于洗長匕長知丈反注曰主人不匕言就主人者明親臨之繼公謂此所遣者二佐食三司士也云賔者省文耳此佐食賔也司士私人也就主人謂立于主人之南西面也既乃序盥復位乃序進匕也云長匕則匕者亦有先後矣此禮舉者匕者異人亦大夫禮異佐食上利升牢心舌載于肵俎心皆安下切上午割勿沒其載于肵俎末在上舌皆切本末亦午割勿沒其載于肵橫之皆如初為之于爨也注曰牢羊豕也安平也平割其下於載便也午割使可絶也勿沒為其分散也今文切皆為刌疏曰皆者皆羊豕羊豕皆有心舌也案特牲記云肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎即是未入鼎時則制此心舌然也既未入鼎先制之是為之于爨也繼公謂此羊豕之心舌蓋俱在羊鼎故惟上利升之勿沒者不絶其中央也必切上下本末者欲其整也特牲記云舌縮俎此云橫之蓋於俎為縮於載者為橫然則肵俎亦有執之以載者明矣皆如初為之於爨者言此切割之制與為之於爨之時無以異也心舌載於俎皆二以並羊左而豕右與此載者蓋南面以羊俎在其南也佐食遷肵俎于阼階西西縮乃反肵俎既載則執俎者以錯于故處而佐食遷之也西縮猶西肆佐食二人上利升羊載右胖髀不升肩臂臑膊骼正脊一脡脊一橫脊一短脅一正脅一代脅一皆二骨以並腸三胃三長皆及俎拒舉肺一長終肺祭肺三皆切肩臂臑膊骼在兩端脊脅肺肩在上疏曰云肩臂臑膊骼在兩端脊脅肺肩在上者此是在俎之次俎有上下猶牲體之有前後故肩臂臑在上端膊骼在下端脊脅肺在中其載之次序肩臂臑正脊脡脊橫脊代脅長脅短脅肺腸胃膊骼也繼公謂此先言其出於鼎之序後言其載於俎之次也出於鼎者其序如此則其在鼎上下之次亦可見矣拒未詳脊脅肺不言腸胃可知也或曰肺上當有腸胃二字文脫耳凡吉禮之大牲其俎實體骨之名與其出鼎及載之次見於此下利升豕其載如羊無腸胃體其載于俎皆進下注曰進下變於食生也鄉飲酒禮進腠羊次其體豕言進下互相見繼公謂進下謂以每體之下鄉神位也載時則但為鄉俎之右耳司士三人升魚臘膚升之每俎異人亦變於初也魚用鮒十有五而俎縮載右首進腴注曰右首進腴亦變於食生也繼公謂縮載謂載而縮俎也右首據載者視之而言也魚之進腴猶牲之進下也魚以腴為下鬐為上右首而進腴則亦寢右矣士喪奠用食生之禮其魚則左首進鬐與此異又喪奠魚九而為三列此其列亦三而每列用五與臘一純而俎亦進下肩在上注曰如羊豕繼公謂臘一純而俎則肩臂臑膊骼各二而脊脅之數亦倍於牲其載之次左右股肱皆二體以並而右為上凡臘之體骨及載亦見於此膚九而俎亦橫載革順注曰列載於俎令其皮相順亦者亦其骨體繼公謂上俎云進下即橫載也故此亦之橫載者載而橫於俎也右陳鼎匕載俎卒脀祝盥于洗升自西階主人盥升自阼階祝先入南面主人從户內西面祝先升亦大夫禮異也祝南面負墉主婦被緆衣侈袂薦自東房韭菹醓醢坐奠于筵前主婦贊者一人亦被緆衣侈袂執葵菹螺醢以授主婦主婦不興遂受陪設于東韭菹在南葵菹在北主婦興入于房緆並音彖螺音螺被如被袗衣之被謂衣之也緆皆當作緣字之誤也緣褖通內司服曰緣衣素沙是也內子祭服緣衣而又侈其袂焉所以甚别於士妻之祭服也卿大夫之妻展衣為上褖衣次之此自祭於家故服其次者辟助祭於公也不言首飾其亦纚笄與贊者亦被褖衣侈袂婦人助祭者其服宜與主婦同亦如賔客之皆朝服也然則雖非內子其衣亦得侈袂矣古者男女吉凶之衣其袂二尺二寸袪一尺二寸此制之正也侈袂之度則未詳主婦贊者云一人見其數止於此耳以授主婦坐授之也故主婦不興上不言主婦之位此不言盥如特牲可知大夫尊亦得用朝事之豆籩乃於此禮惟用其二豆者逺下君禮也國君之豆籩惟所用之而皆自其上者始佐食上利執羊俎下利執豕俎司士三人執魚臘膚俎序升自西階相從入此執俎皆匕者也不使載者設之亦大夫祭禮異也設俎羊在豆東豕亞其北魚在羊東臘在豕東特膚當俎北端當豕俎北端乃云特者明不與之為列也主婦自東房執一金敦黍有蓋坐設于羊俎之南婦贊者執敦稷以授主婦主婦興受坐設于魚俎南又興受贊者敦黍坐設于稷南又興受贊者敦稷坐設于黍南敦皆南首主婦興入于房金敦以金飾之也四敦皆然特見其一耳婦贊者即主婦贊者一人也不言主省文也後放此以授主婦立授之也故主婦興受敦與受豆籩不同禮貴相變也其後二敦則婦人贊者執以立于户外婦贊者一一反之以授于主婦蓋婦贊者惟一人而已敦南首是北足也士喪禮曰敦啓㑹面足敦從設之首足異鄉蓋有所象也但其制則不可得而考矣執敦者面足而此設之南首則是設敦者亦鄉席為之如設豆之面位矣祝酌奠遂命佐食啓㑹佐食啓㑹蓋二以重設于敦南重直容反注曰特牲饋食禮曰祝洗酌奠重纍之繼公謂已酌奠即奠之於韭菹之南而東當所設㑹之西此文省也設于敦南郤而設于其南兩敦之南也云㑹復云蓋以明㑹之為蓋也主人西面祝在左主人再拜稽首祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗主人又再拜稽首祝祝下之又反淖女孝反主人固西面矣復見之者嫌此時或異面也羊曰柔毛右設饌祝神祝出迎尸于廟門之外主人降立于阼階東西面祝先入門右尸入門左注曰特牲饋食禮曰尸入主人及賔皆辟位出亦如之祝入門右者辟尸盥也既則後尸宗人奉槃東面于庭南一宗人奉匜水西面于槃東一宗人奉簞巾南面于槃北乃沃尸盥于槃上卒盥坐奠簞取巾興振之三以授尸坐取簞興以受尸巾奉並芳勇反注曰庭南沒霤繼公謂庭南於入門左之位為少北於此俟之亦異於士祝延尸尸升自西階入祝從特牲饋食禮曰尸至于階祝延尸祝從從其升而入也祝入亦南面主人升自阼階祝先入主人從上云尸入祝從則祝固已入矣此復云祝先入者明其先於主人右尸入尸升筵祝主人西面立于户內祝在左注曰祝從尸尸即席乃卻居主人左繼公謂在左者當為主人釋妥尸之辭也在左之義見聘禮祝主人皆拜妥尸尸不言答拜遂坐注曰尸自此答拜而卒食其間有不啐奠不嘗鉶不告㫖大夫之禮尸彌尊也繼公謂云尸不言則妥有辭矣尸於既拜乃坐亦變於士所以升筵而未即坐者以主人尊故也祝反南面注曰未有事也墮祭爾敦官各肅其職不命繼公謂妥尸事畢也南面云反以見從尸入時位在此不饗亦大夫禮異案注云墮祭亦誤墮宜作授尸取韭菹辨㨎于三豆祭于豆間上佐食取黍稷于四敦下佐食取牢一切肺于俎以授上佐食上佐食兼與黍以授尸尸受同祭于豆祭辨音遍下並同㨎如悅反牢一切肺羊豕各一也言兼與黍而不言稷見其尊者耳或曰黍下脫一稷字同猶兼也豆祭豆實所祭之處上佐食舉尸牢肺正脊以授尸上佐食爾上敦黍于筵上右之注曰右之便尸食也重言上佐食明更起不相因繼公謂此於所舉者皆繫以尸明其為尸物也肺脊先食舉之亦明不與他舉同重言上佐食者授舉之後尸有事也不言振祭嚌之文省耳右之蓋當尸前之南案注云右之便尸食謂黍在尸右則尸以右手取之便也主人羞肵俎升自阼階置于膚北羞進也云升自阼階者嫌進俎者必升自西階故以明之置亦橫設之也上佐食羞兩鉶取一羊鉶于房中坐設于韭菹之南下佐食又取一豕鉶于房中以從上佐食受坐設于羊鉶之南皆芼皆有柶尸扱以柶祭羊鉶遂以祭豕鉶嘗羊鉶注曰芼羊用苦豕用薇皆有滑繼公謂上佐食受興受之也故下云坐設芼以菜和物之名祭鉶亦於豆祭也下篇曰以羊鉶之柶扱羊鉶遂以扱豕鉶祭于豆祭若公食大夫禮用太牢則祭鉶于上鉶之間與此異食舉特牲饋食禮曰乃食食舉謂一飯則食舉以安之也士昏禮亦然則此亦當先飯而後食舉也不言乃食者文有脫漏也三飯上佐食舉尸牢幹尸受振祭嚌之佐食受加于肵上佐食羞胾兩瓦豆有醢亦用瓦豆設于薦豆之北飯扶晚反下並同注曰設于薦豆之北以其加也四豆亦䋫羊胾在南豕胾在北繼公謂薦豆兼二列而言也無臐膮其逺别於太牢之禮與禮用太牢庶羞乃有膷臐膮案注云羊胾在南豕胾在北者謂羊在西列之南豕在東列之北也尸又食食胾上佐食舉尸一魚尸受振祭嚌之佐食受加于肵橫之注曰魚橫之者異於肉繼公謂尸食胾亦異於士橫之象其在魚俎也此亦於俎為縮於人為橫然則佐食於加物于肵俎之時其亦西面與賔尸益送之俎皆於羊俎南載之與此禮同又食上佐食舉尸臘肩尸受振祭嚌之上佐食受加于肵注曰臘魚皆一舉者少牢二牲略之臘必舉肩以肩為終也繼公謂肩右肩也骨體惟肩為尊臘但一舉故即用其尊體也别舉魚臘大夫禮異也此言上佐食受則前後所謂佐食受者皆其上者也又食上佐食舉尸牢酪如初注曰如舉幹也又食尸告飽祝西面于主人之南獨侑不拜侑曰皇尸未實侑注曰實猶飽也祝既侑復反南面繼公謂侑尸之禮祝固不拜矣乃言之者嫌主人不拜祝獨侑則或當拜也祝獨侑亦與士禮異尸又食上佐食舉尸牢肩尸受振祭嚌之佐食受加于肵三舉骨體始於幹終於肩亦自卑而尊也此禮或三飯而舉或一飯二飯而舉又别其魚臘各自為舉數皆與士異也尸不飯告飽祝西面于主人之南注曰祝當贊主人辭繼公謂不飯而告飽又變於上主人不言拜侑祝為之辭故不言也尸又三飯注曰為祝一飯為主人三飯尊卑之差凡十一飯士九飯繼公謂於舉肩之後又三飯為主人加也上佐食受尸牢肺正脊加于肵言受明尸未嘗奠之也特牲禮既舉幹魚尸實舉于菹豆故食畢佐食自舉加于肵與此禮異佐食亦反上敦黍于其所經文略也右尸食主人降洗爵升北面酌酒乃酳尸尸拜受主人拜送云北面酌酒見凡酌於此者之面位也尊東西設勺南枋而北面酌之則非酌於此者其面位亦可得而推矣尸祭酒啐酒賔長羞牢肝用俎縮執俎肝亦縮進末鹽在右長知丈反下並同注曰鹽在肝便尸㨎之繼公謂此縮執俎者執其左右廉也肝進末即體進下之意鹽在肝右則羊肝在豕肝之左與祭禮進末則昏禮之肝從當進本也尸左執爵右兼取肝㨎于俎鹽振祭嚌之加于菹豆卒爵主人拜祝受尸爵尸答拜兼兼羊豕也於尸未受爵而主人拜故祝亦不相爵皆大夫禮異也下凡與特牲異者皆放此不悉見之右主人酳尸祝酌授尸尸醋主人主人拜受爵尸答拜主人西面奠爵又拜醋才各反與酢同下不見之初拜固西面矣此言之者著受爵而反位也主人受酢而俠拜亦大夫禮異也上佐食取四敦黍稷下佐食取牢一切肺以授上佐食上佐食以綏祭綏當亦作授注曰右受佐食右手受祭於佐食也繼公謂言坐祭之者凡奠爵拜者執爵興故至此云坐也祝與二佐食皆出盥于洗入三人皆為將執所嘏之物而盥敬其事也二佐食各取黍于一敦上佐食兼受摶之以授尸尸執以命祝注曰命祝以嘏辭繼公謂各取黍上者取于上敦下者取于下敦黍之上敦在西下敦在東卒命祝祝受以東北面于户西以嘏于主人曰皇尸命工祝承致多福無疆于女孝孫來女孝孫使女受祿于天宜稼于田眉夀萬年勿替引之女並音汝來如字注曰工官也承猶傳也耕種曰稼勿猶無也替廢也引長也言無廢止時長如是也繼公謂受受黍也東北面鄉主人于户西者為尸致嘏宜近尸也來如來禹之來來之者欲其進而受黍也主人坐奠爵興再拜稽首興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興坐卒爵執爵以興坐奠爵拜尸答拜執爵以興出宰夫以籩受嗇黍主人嘗之納諸內挂音卦注曰出出户也納猶入也繼公謂云坐奠爵是立聼嘏也興少進受黍復位乃坐祭嚌之也宰夫受黍主人左執爵乃取而嘗之而納之內謂籩中既嚌之復嘗之亦大夫禮異也此嘏禮詳於特牲者大夫尊尚多儀也右尸酢主人主人獻祝設席南面祝拜于席上坐受亦先設席乃酌獻之主人西面答拜答拜即拜送也薦兩豆菹醢薦者亦宰夫也下篇云主婦獻祝宰夫薦棗糗此宜如之菹醢謂韭菹醓醢也蓋祝籩以尸之上籩則其豆亦當以尸之上豆也不賔尸禮主人主婦之薦皆以韭菹醓醢則此可知矣其設之亦菹在西醢在東佐食設俎牢髀橫脊一短脅一腸一胃一膚三魚一橫之臘兩髀屬于尻屬音燭尻苦刀反髀右髀也橫脊短脅不二骨者俎實已多故此略之魚橫之亦據人而言也其義與加于肵者同牢皆用右髀臘兩髀不殊皆取尸俎之不用者耳臘亦髀者與牲並用故體亦放之祝俎一而已乃雜用五俎之物者見其尊也不賔尸之禮主人主婦俎亦然祝取菹㨎于醢祭于豆間祝祭俎注曰大夫祝俎無肺祭用膚逺下尸繼公謂祭俎取膚以祭也亦振祭嚌之既則反之於俎士虞餞尸以乾肉半尹為祭其祭之也振祭嚌之反之此膚乃俎實異於豆祭不可以置于地其儀當與乾肉之祭同不言振祭嚌之亦文省耳祭酒啐酒肝牢從祝取肝㨎于鹽振祭嚌之不興加于俎肝牢當作牢肝俎牲俎也卒爵興注曰亦如佐食授爵乃興主人酌獻上佐食上佐食户內牖東北面拜坐受爵主人西面答拜取節於牖見其少西於其他之北面拜者也凡室中北面拜者皆在户牖間其言户西者則近於户言牖東者則近於牖佐食祭酒卒爵拜坐授爵興拜蓋衍文祝與佐食皆不拜既爵者逺下尸亦大夫禮異也佐食興則出立于户外士虞記曰佐食無事則出户負依南面俎設于兩階之間其俎折一膚下篇獻衆賔以至於私人皆有薦脀佐食在衆賔之中又有上事不宜貶於私人但有脀而無薦此不云薦亦似文略也又不賔尸之禮云其獻祝與二佐食其位其薦脀皆如儐然則此佐食有薦明矣折說見前篇記主人又獻下佐食亦如之其脀亦設于階間西上亦折一膚卒獻則主人受爵以實于下篚而升復位特牲饋食禮曰佐食卒角主人受角降反于篚右主人獻祝及佐食有司贊者取爵于篚以升授主婦贊者于房户篚下篚也主婦亞獻用下篚之爵豈此時內篚未有爵與婦人不可以取爵于庭故有司為取之户字誤若授受於户當言內外西東不宜單言也下篇曰司宫取爵于篚以授婦贊者于房東此户亦當為東與婦贊者受以授主婦主婦洗于房中出酌入户西面拜獻尸注曰入户西面拜由便也尸拜受主婦主人之北西面拜送爵注曰此拜於北則上拜於南矣尸祭酒卒爵主婦拜祝受尸爵尸答拜易爵洗酌授尸尸不啐而卒爵為無從也易爵易于下篚也醋而易爵亦內子禮異也下篚在洗西故因易爵而洗之也凡尸酢不洗賔尸乃或有之主婦拜受爵尸答拜主婦受酢不夾爵拜亦變於不賔尸之禮上佐食綏祭主婦西面于主人之北受祭祭之其綏祭如主人之禮不嘏卒爵拜尸答拜注曰不嘏夫婦一體繼公謂綏亦當作授其授祭謂所取及相授者也士妻撫祭內子受祭又有于房于室之異皆相變也主婦既祭又祭酒乃卒爵下篇曰主婦立卒爵執爵拜主婦以爵出贊者受易爵于篚以授主婦于房中注曰贊者有司贊者也繼公謂贊者與主婦親授受亦變於初此易爵于下篚則內篚初無爵明矣易爵于下篚乃不洗者辟祝為尸易爵之禮也右主婦獻尸尸酢主婦洗酌獻祝祝拜坐受爵主婦答拜于主人之北卒爵不興坐授主婦主婦必洗者為贊者終其事也獻祝可以不洗主婦受酌獻上佐食于户內佐食北面拜坐受爵主婦西面答拜祭酒卒爵坐授主婦主婦獻下佐食亦如之主婦受爵以入于房注曰不言拜于主人之北可知也爵奠于內篚繼公謂上云主人之北此云西面上云不興此云祭酒皆互見也右主婦獻祝佐食賔長洗爵獻于尸尸拜受爵賔户西北面拜送爵尸祭酒卒爵賔拜祝受尸爵尸答拜祝酌授尸賔拜受爵尸拜送爵賔坐奠爵遂拜執爵以興坐祭遂飲卒爵執爵以興坐奠爵拜尸答拜賔受酢而俠拜與夫奠爵拜執爵興之類皆放主人事尸之禮為之右賔獻尸尸酢賔酌獻祝祝拜坐受爵賔北面答拜祝祭酒啐酒奠爵于其筵前不卒爵故啐而奠之筵前席南也蓋北面奠之奠於此者明其與他奠爵之禮異祝不卒爵又不及佐食蓋放不賔尸末獻之儀也右賔獻祝主人出立于阼階上西面祝出立于西階上東面祝告曰利成階上亦皆序內也祝入尸謖主人降立于阼階東西面祝先尸從遂出于庿門祝先先尸而行也其出户降階及門之時亦皆鄉尸而還略如士虞記所云也尸出庿門祝宜告以主人將有事則尸於門外次中俟之士冠禮曰請醴賔賔就次祝反復位于室中主人亦入于室復位祝命佐食徹肵俎降設于堂下阼階南徹直列反徹肵俎不出門示將賔尸之意也不賔尸之禮尸出則佐食出尸俎于庿門外有司受歸之肵俎而以賔尸者賔尸之俎宜俱用尊體肵俎有肩骼之屬在焉不得不於是乎取之也終以歸尸故無嫌佐食亦上佐食也阼階南近於嚮者所升之處也右尸出祭禮畢司宫設對席乃四人𧃊上佐食盥升下佐食對之賔長二人備注曰備四人餕也三餕亦盥升繼公謂賔長二人謂長賔及衆賔長也此佐食皆異姓也故可使賔長對之案注知三餕亦盥升者以特牲禮舉奠及長兄弟盥而推之也司士進一敦黍于上佐食又進一敦黍于下佐食皆右之于席上注曰右之者東面在南西面在北資黍于羊俎兩端兩下是餕注曰資猶減也減置于羊俎兩端則一賔長在上佐食之北一賔長在下佐食之南繼公謂資字未詳兩端當肩骼之處也羊俎兩端其於兩下亦皆為右兩下是餕謂二賔長以此黍餕也餕主於二佐食故以二賔長為兩下司士乃辨舉𧃊者皆祭黍祭舉辨舉舉膚以授四人膚即在特俎者主人西面三拜𧃊者𧃊者奠舉于俎皆答拜皆反取舉注曰三拜旅之也繼公謂西面於其位也言此者明其不為二人西面而易位拜之也奠舉于俎亦各於其所近者與皆答拜答一拜也𧃊者答拜無異文則是西面者亦西面拜矣反取舉復取舉于俎也言反者為其嚮者亦在手也司士進一鉶于上𧃊又進一鉶于次𧃊又進二豆湇於兩下乃皆食食舉兩下資黍於俎又有湇無鉶皆下立𧃊者也此二佐食衆賔也兩下賔長也𧃊則佐食反尊於賔長者以其勞於室事故報禮特重焉祝不𧃊者接神職尊不敢使之𧃊也二鉶上𧃊羊下𧃊豕然則二豆湇亦羊豕各一與卒食主人洗一爵升酌以授上𧃊贊者洗三爵酌主人授于户內以授次𧃊若是以辨皆不拜受爵主人西面三拜𧃊者𧃊者奠爵皆答拜皆祭酒卒爵奠爵皆拜主人答一拜贊者蓋亦宰夫也每於將酌乃洗爵云洗三爵總言之耳若是謂酌受授也辨及于兩下也皆不拜受爵者人多重勞主人一一答之也𧃊者奠爵拜亦與士異答一拜卒爵禮輕可以略特牲二人𧃊其禮亦然凡大夫士之禮其答卒爵拜者皆一拜也乃見之者嫌人多或旅之也𧃊者三人興出注曰出降反其賔位繼公謂不執爵以出統於上𧃊也上𧃊止主人受上𧃊爵酌以醋于户內西面坐奠爵拜上𧃊答拜注曰主人自醋者上𧃊獨止當尸位尊不酌也坐祭酒啐酒主人啐酒者為聼嘏凡既祭酒而未得即卒爵者必啐酒上𧃊親嘏曰主人受祭之福胡夀保建家室上𧃊親嘏且不用黍惟以辭别於尸也胡如胡福之胡主人興坐奠爵拜執爵以興坐卒爵拜重嘏故其禮盛至是乃云主人興是坐而聼嘏也亦殺於尸上𧃊答拜上𧃊興出主人送乃退云上𧃊興出則是不受主人爵也主人奠爵上𧃊不受示禮有終且為有司將徹之也出亦謂出户送謂送之於户外退者上𧃊退立于賔位也賔以出為退主人以入為退右𧃊儀禮集說卷十六正誤長匕鄭本匕作朼今亦從古文作匕緆衣鄭本緆作錫注曰今文錫為緆繼公謂錫緆二字皆誤而緆於緣為差近故但取其近者
