body:
  text: 儀禮集説巻十二元敖繼公撰士喪禮第十二注曰喪於五禮屬凶繼公謂此與下篇言士之子為父喪自始死以至既葬之禮士喪禮死于適室幠用斂衾適丁厯反幠火呉反斂力艶反下皆同注曰適室正寢之室也疾者齊故於正寢焉疾時處北庸下死而遷之當牖下有牀衽幠覆也斂衾大斂所并用之衾衾被也小斂之衾當陳喪大記曰始死遷尸于牀幠用斂衾去死衣繼公謂遂卒矣乃遷尸于牀而幠用斂衾故喪禮以此為始右始死復者一人以爵弁服簪裳于衣左何之扱領于帶簪側林反何胡我反扱初洽反注曰復者有司招魂復魄也天子則夏采祭僕之屬諸侯則小臣為之爵弁服純衣纁裳也禮以冠名服簪連也疏曰簪裳于衣取其便繼公謂爵弁士之上服也故復用之左手何之而空右手為登梯備顛蹶也升自前東榮中屋北面招以衣曰臯某復三降衣于前注曰北靣招求諸幽之義也臯長聲也某死者之名也復反也降衣下之也䘮大記曰凡復男子稱名婦人稱字繼公謂前東榮者東方之南榮也屋有二楣故每旁各有南榮北榮中屋屋脊之中也受用篚升自阼階以衣尸衣於既反下衣尸同注曰受者受之於庭也復者其一人招則受衣亦一人也人君則司服受之衣尸者覆之若得魂反之繼公謂升自阼階象其反也既則降自西階案注以衣尸為覆之者蓋以下文襚者入衣尸之禮推之也復者降自後西榮後西榮西方北榮也降於此者與升時相變也下文設奠之類升降異階者其義皆然右復楔齒用角柶綴足用燕几楔悉結反綴知劣反注曰自是行死事楔齒為將含恐其口閉急也綴猶拘也繼公謂楔柱也綴足用几欲拘其足使之正也燕几平生燕居時所馮者右楔齒綴足奠脯醢醴酒升自阼階奠于尸東奠脯醢醴酒者謂奠用此四物也此奠之而已無他禮儀故曰奠也死而奠之如事生也此時尸南首東乃其右也奠於其右若便其飲食然記曰即牀而奠當腢其升之序亦醴先而酒脯醢從與既奠則降自西階右始死之奠帷堂此帷堂為尸未設飾也帷之節其南北蓋近堂廉而東西則近兩階與右帷堂乃赴于君主人西階東南靣命赴者拜送注曰赴走告也繼公謂經惟言赴于君之儀如此則是古者士大夫赴告之禮惟止於其君而已有賔則拜之注曰其位猶朝夕哭位矣繼公謂賔士來弔者也此因事見之乃拜之也既拜則入不即位右命赴者入坐于牀東衆主人在其後西靣婦人俠牀東靣俠音夾注曰婦人謂妻妾子姓也亦適妻在前繼公謂至是方云坐則先時主人亦立也衆主人在其後尊主人亦為室中淺隘衆主人齊衰大功之親也若有斬衰者亦存焉下經云衆主人免記云衆主人布帶則是衆主人乃主言齊衰大功者親者在室注曰謂大功以上者繼公謂此親者繼婦人而言則是亦專指婦人矣下篇曰主婦及親者由足西靣是也言在室則不必皆東靣始死之牀當牖下少近於西墉衆婦人户外北靣衆兄弟堂下北靣注曰衆婦人衆兄弟小功以下右哭位君使人弔徹帷主人迎于寢門外見賔不哭先入門右北靣注曰使人士也使者至使人入將命乃出迎之寢門内門也繼公謂喪不迎賔惟於君及君使則迎之此不出外門者别於君之自來也先入門右道之徹帷為君命變也事畢復設之弔者入升自西階東靣主人進中庭弔者致命注曰主人不升賤也致命曰君聞子之喪使某如何不淑繼公謂此西方中庭也主人雖在下弔者猶東靣禮之也小斂以前主人位在西方主人哭拜稽顙成踊注曰成踊三者三繼公謂謝君命也既拜稽顙而成踊惟於君及君命則然其餘則否拜稽顙者一拜而遂稽顙也不再拜稽首者喪禮宜變於吉也稽顙與稽首之儀略同惟右手在上而以顙加之為異耳男子吉拜尚左手喪拜尚右手婦人反是容經曰拜以磬折之容吉事尚左凶事尚右賔出主人拜送于外門外拜送一拜送之也此與下篇云拜送者皆然迎不拜而一拜送之皆喪禮異也凡拜喪賔不再拜君使人襚徹帷主人如初襚者左執領右執要入升致命主人拜如初襚音遂要一遥反下並同注曰襚之言遺也致命曰君使某襚繼公謂禮别更端則弔襚不同時也衣服曰襚此執衣如復則是衣裳具且簪裳於衣也襚者入衣尸出主人拜送如初衣尸亦覆於復衣之上與唯君命出升降自西階遂拜賔有大夫則特拜之即位于西階下東靣不踊大夫雖不辭入也惟君命出小斂以前則然若小斂之後雖不迎賔亦出送賔矣升降自西階自此至葬其禮然也於大夫云特拜見於士亦旅之也即位于西階下此非正位因事而出乃在是耳不踊者明本不為賔出也主人既即位大夫宜辭之謂不必以己故而留於外也既辭則主人乃入大夫若或不辭主人猶入矣右君使人弔襚親者襚不將命以即陳注曰大功以上有同財之義也繼公謂不將命不將命于主人也云不將命則是亦使人為之矣即陳者就於所陳之處謂房中也既夕禮曰若就器則坐奠于陳庶兄弟襚使人以將命于室主人拜于位委衣于尸東牀上注曰庶兄弟即衆兄弟也變衆言庶容同姓耳將命曰某使某襚位室中位也繼公謂云庶者蓋兼衆兄弟外兄弟言也既小斂拜襚者則稽顙此惟拜而已者以其與君襚同節宜遠辟之尸東床上奠之北也委於此者辟君襚且不必其用之也既將命而又不以即陳亦遠辟親者之禮朋友襚親以進主人拜委衣如初親以進亦自釋其辭主人拜亦不荅之與弔賔同也親者襚不將命庶兄弟將命不親致朋友則親致之蓋親則禮略䟽則禮隆聖人之意然爾退哭不踊注曰主人徒哭不踊别於君襚也繼公謂主人於庶兄弟之使者與朋友之退也則哭而不踊朋友退反賔位使者退則出矣徹衣者執衣如襚以適房注曰凡於襚者出有司徹衣右庶襚為銘各以其物亡則以緇長半幅䞓末長終幅廣三寸書銘于末曰某氏某之柩亡音無長並直亮反下不出者並同䞓丑貞反廣古曠反下並同注曰銘明旌也雜帛為物大夫士之所建也以死者為不可别故以其旗識之亡無也半幅一尺終幅二尺䞓赤也在棺為柩繼公謂銘書其名者以卒哭乃諱故也物説見鄉射記竹杠長三尺置于西階上注曰杠銘橦也繼公謂置卧而縮置之甸人掘坎于階間少西為垼于西牆下東鄉掘其月反垼音役鄉許亮反下並同注曰垼塊竈西牆庭中之西繼公謂少西者其四分階間一在西與右為銘掘坎為垼新盆槃瓶廢敦重鬲皆濯造于西階下敦音對重直龍反鬲音歷下並同造七報反注曰新此瓦器五種者槃承渜濯瓶以汲水也廢敦敦無足者重鬲鬲將縣於重者也濯滌溉也造至也猶饌也繼公謂此五種者蓋當階少西而北上也云造者明濯於他處五者不言其數略之盆敦鬲所用見後陳襲事于房中西領南上不綪綪側庚反注曰襲事謂衣服也綪讀為䋫屈也江沔之間謂縈收繩索為䋫繼公謂事猶物也言襲事而不言衣者衣少於他物也惟言西領主於衣也其他物亦上端卿西必西領者以尸在室也士冠禮曰陳服于房中西墉下東領此西領者其於東墉下乎不綪者一一自南而北若一列不足以盡之則復以其餘者始於明衣之東而陳之亦自南而北其次列之首與前列之末不相屬而更端别起不如物之綪屈者然也不綪者襲事少且變於斂也明衣裳用布注曰所以親身為圭潔也鬠笄用桑長四寸纋中鬠音膾纋音憂注曰桑之為言喪也用為笄取其名也纋笄之中央以安髪䟽曰以髻為鬠義取以髪會聚之意四寸者僅取安髻而已繼公謂會髪為紒曰鬠今南語猶然云鬠笄者明其不纚也生時櫛而纚乃加笄此於生時為冠内之笄但不用桑耳其或用長笄則去之不并用也長笄者冕弁之笄也婦人有長笄無短笄下云鬠用組此不言文略耳布巾環幅不鑿注曰環幅廣袤等也繼公謂布巾不鑿士之制然也此云不鑿則有當鑿者矣鑿者其君禮與掩練帛廣終幅長五尺析其末析悉歴反注曰掩裹首也析其末為將結於頥下又還結於項中繼公謂析其末者兩端皆析而為二也瑱用白纊瑱他殿反纊音曠注曰瑱充耳纊新綿䟽曰生時人君用玉臣用象今死者直用纊塞耳而已異於生也幎目用緇方尺二寸䞓裏著組繫幎於營反著張吕反下並同注曰幎目覆靣者也幎讀若葛藟縈之之縈著充之以絮也組繫為可結也䟽曰四角有繫於後結之繼公謂此雖覆靣之物然以幎目為名其義似主於目也握手用𤣥纁裏長尺二寸廣五寸牢中旁寸著組繫牢依注音樓注曰牢讀為樓樓謂削約握之中央以安手也䟽曰此衣在手故言握手廣五寸牢中旁寸則中央廣三寸也中央足容四指指一寸則四寸四寸之外更有八寸皆廣五寸也繼公謂牢字未詳姑從舊註此繫與決繫惟一而已決用正王棘若檡棘組繫纊極二檡音澤注曰正善也王棘與檡棘善理堅刅者皆可以為決極以沓指放弦令不挈指也繼公謂決與極皆用於右手象生時所有事者也決著右擘極韜食指將指生以象骨為決韋為極死以是二者為之明不用也士生時所用韋極之數無聞以此經推之則亦用二也是其降於君者與然則君之喪其用纊極亦三矣冒緇質長與手齊䞓殺掩足冒眉報反殺所界反注曰冒韜尸者制如直囊上曰質下曰殺質正也其用之先以殺韜足而上後以質韜首而下齊手喪大記曰君錦冒黼殺綴旁七大夫𤣥冒黻殺綴旁五士緇冒䞓殺綴旁三凡冒質長與手齊殺三尺繼公謂殺者殺長於質也爵弁服純衣皮弁服純如字注曰純衣者纁裳古者以冠名服死者不冠褖衣褖他亂反此如𤣥端之衣裳而深衣制也緇帶韎韐竹笏笏音忽笏之用與其制玉藻詳矣夏葛屨冬白屨皆繶緇純組綦繫于踵純音準綦音其繫音計注曰冬皮屨變言白者明夏時用葛亦白也此皮弁之屨士冠禮曰素積白屨以魁柎之緇絇繶純純博寸綦屨係也所以拘止屨也綦讀如馬絆綦之綦繼公謂踵屨後也以其當足踵之處故因以名之以綦相繫于此欲其斂也及著之乃繫于跗韠用爵弁之韠屨用皮弁之屨以二服尊也庶襚繼陳不用注曰庶衆也不用不用襲也䟽曰庶襚即上經親者襚庶兄弟襚朋友襚皆是繼陳謂繼襲衣陳之繼公謂庶襚親朋所遺故不可以不陳襲事所用有限故此不必用小斂大斂之衣放此貝三實于笲注曰貝水物古者以為貨江水出焉稻米一豆實于筐注曰豆四升沐巾一浴巾二皆用綌于笲注曰浴巾二者上體下體異也繼公謂沐巾以晞髪浴巾以去垢於笲不言實文省下放此三巾共一笲櫛于簟浴衣于篋注曰浴衣已浴所衣之衣以布為之其制如今通裁䟽曰以其無殺故漢時名為通裁皆饌于西序下南上注曰皆者皆貝以下繼公謂必南上者便其取之先後也右陳沐浴襲飯含之具管人汲不説繘屈之説吐活反繘均必反注曰屈縈也䟽曰聘禮記曰管人為客三日具沐五日具浴此為死者故亦使之汲水也繼公謂繘瓶之綆也此下當有盡階不升堂授祝之事不著之者蓋文脱耳祝淅米于堂南靣用盆淅西歴反注曰祝夏祝也淅沃也管人盡階不升堂受潘煑于垼用重鬲盡子忍反下同潘音畨注曰盡階三等之上喪大記曰管人受沐乃煮之甸人取所徹庿西北厞薪用爨之繼公謂受之於祝也其以重鬲受之與祝盛米于敦奠于貝北盛音成注曰復於筐處也士有冰用夷槃可也注曰謂夏月而君加賜冰也夷槃承尸之槃喪大記曰君設大槃造冰焉大夫設夷槃造冰焉士併瓦槃無冰設床䄠笫有枕繼公謂言此於將沐浴之前蓋謂或得以此夷槃為沐浴之用也士若賜冰則有夷槃故因而用之於此既則以盛冰而寒尸也是句之上似當更有設槃之文此特其後語耳外御受沐入注曰外御侍從者沐管人所煑潘也䟽曰外御對内御為名繼公謂受沐亦於堂上管人亦盡階不升堂授之此當更有管人汲而授浴水之事亦文不具也喪大記曰管人汲不説繘屈之盡階不升堂授御者御者入浴受潘與水皆以盆主人皆出户外北靣注曰象平生沐浴裸裎子孫不在旁主人出而䄠笫䟽曰袒笫去席盝水便也繼公謂是時婦人亦皆出經不言略之出則立於房矣乃沐櫛挋用巾挋音振注曰挋拭也浴用巾挋用浴衣注曰喪大記曰御者二人浴浴水用盆沃水用抖渜濯棄于坎渜乃亂反濯直孝反注曰沐浴餘潘水巾櫛浴衣亦并棄之蚤揃如他日蚤音爪揃音翦注曰蚤讀為爪斷爪揃鬚也人君則小臣為之他日平生時鬠用組乃笄設明衣裳注曰用組束髪也主人入即位注曰已設明衣可以入也繼公謂主人入則衆主人及婦人亦皆入即位也右沐浴商祝襲祭服褖衣次注曰商祝祝習商禮者襲布衣牀上牀次含牀之東衽如初也喪大記曰含一牀襲一牀遷尸於堂又一牀繼公謂襲謂布衣而將襲之也爵弁助祭於君之服也皮弁為君祭蜡之服也士祭於已用𤣥端此褖衣雖以當𤣥端然非其本制故不在祭服之中先布祭服美者在外也襲斂之屬使商祝其義未聞主人出南靣左袒扱諸靣之右盥于盆上洗貝執以入宰洗柶建于米執以從注曰俱入户西鄉也䟽曰扱諸靣之右謂扱左抽於右掖之下帶之上也靣前也繼公謂左袒為當用左手也盥于盆上以盆承盥水也洗貝洗柶亦如之執執笲執敦也建亦謂以葉鄉上案注云俱入户西郷者謂俟商祝既有事乃受貝米也商祝執巾從入當牖北靣徹枕設巾徹楔受貝奠于尸西注曰當牖北靣值尸南也如商祝之事位則尸南首明矣繼公謂商祝北靣當尸首者有事於尸故也凡非有事於尸者則不敢當其首此所徹設皆為飯事至也設巾者慮孝子見其親之形變而哀或不能飯含也楔楔齒之角柶也因其用而别名之以别於扱米之柶也既設巾乃徹楔是巾之所覆不逮於口矣奠貝于尸西蓋在主人所坐處之南主人由足西牀上坐東靣由足西自牀北而西也凡過尸柩而西東者必由其足敬也不坐于尸東辟奠位祝又受米奠于貝北宰從立于牀西在右注曰祝受貝米奠之口實不由足也米在貝北便扱者也繼公謂奠米于貝北亦南上也宰從立者俟事畢而有所徹也記曰夏祝徹餘飯則宰其徹貝笲與主人左扱米實于右三實一貝左中亦如之又實米唯盈注曰右尸口之右惟盈取滿而已繼公謂左手不便於用乃用之者由下飯含之順也主人東靣坐若用右手則必反用其柶且加手於其親之靣皆非孝敬之道故不為也先實米為貝藉也又實米唯盈象食之飽也先右次左次中禮之序然也實米所謂飯也實貝所謂含也主人襲反位注曰襲復衣也位在尸東右飯含商祝掩瑱設幎目乃屨綦結于跗連絇跗音孚注曰跗足上也以餘組連絇止足坼也繼公謂既去巾乃為之也掩瑱皆謂設其物也設掩者既結頤下即還結項中急欲覆其形也掩其前後而兩旁猶開故可以瑱幎目當靣設之加於掩之上交結於後既設此則掩旁亦固矣乃襲三稱稱尺證反下並同注曰遷尸於襲上而衣之凡衣死者左衽不紐繼公謂襲亦取復衣之義浴時去衣故於此加衣焉曰襲三稱者爵弁服一也皮弁服二也褖衣三也衣裳具謂之稱襲不言設牀不言布衣又不言遷尸經文略也襲牀當在户牖之間明衣不在筭筭數也不言裳者文省耳此乃死者親身之衣䙝故不在數中言之者嫌其衣裳具亦當成稱也設韐帶搢笏注曰韐帶韎韐緇帶不言韎緇者省文搢笏於帶之右旁設決麗于􅓲自飯持之設握乃連􅓲􅓲烏亂反注曰飯大擘指本也決以韋為之藉有彄彄内端為紐外端有橫帶設之以紐擐大擘本也因沓其彄以橫帶貫紐結之繼公謂􅓲字未詳以此文意求之或是巨擘之别名麗附也飯字亦未詳且從舊註持謂繞而固之也蓋設決于大擘指而以其繫自指本貫紐繞而固之及設握乃以握之繫與􅓲之決繫相結則􅓲與握相連而不開矣既設決乃設極而後設握不言設極亦文省也此惟右手設握而左手則否其特重平日之便於用者乎或曰飯當作後謂指後也未知是否設握説見記設冒櫜之幠用衾注曰櫜韜盛物者取事名焉衾者始死時斂衾巾柶鬊蚤埋于坎鬊音舜注曰坎至此築之也繼公謂巾飯時覆靣之巾也柶楔齒及扱米者也鬊櫛餘之髪及所揃鬚也蚤所斷手足爪也埋者亦為人䙝之將浴辟奠既襲則反之右襲重木刋鑿之甸人置重于中庭參分庭一在南注曰刋斵治鑿之為縣簪孔也士重木長三尺繼公謂木刋鑿之者謂以木為之而加刋鑿也鑿謂鑿其前為二孔而以簪貫之為縣鬲之用也案注云縣簪者謂縣鬲之簪也夏祝鬻餘飯用二鬲于西牆下鬻音燭注曰夏祝祝習夏禮者也鬻餘飯以飯尸餘米為鬻也重主道也士二鬲則大夫四諸侯六天子八繼公謂鬻者為粥之名此用夏祝其義亦未聞幂用䟽布久之繫用靲縣于重幂用葦席北靣左衽帶用靲賀之結于後久如字舊音灸非靲音今縣音𤣥幂用疏布以布覆鬲也既夕禮曰木桁久之然則久者乃以物承他器之稱此久不言其物則是因以所幂者為之與既以布幂其上又承其下乃以靲繫之而縣於重前之簪也靲字從革似當為革之屬幂用葦席以席蔽重之前後也北靣謂席之兩端皆在北也左衽者右端在上而西鄉象死者之左衽也帶用靲者以靲中束其席如人之帶然因以名之後謂重之南也重主道也故言靣言衽與帶以見其義云注云賀加也祝取銘置于重注曰祝習周禮者也繼公謂未用之權置于此置之蓋杠在其後銘在其前右重厥明陳衣于房南領西上綪絞橫三縮一廣終幅析其末絞户交反下皆同注曰絞所以收束衣服為堅急者也以布為之橫者三幅從者一幅析其末者令可結也䟽曰喪大記云凡陳衣者實之篋取衣者亦以篋升降自西階繼公謂此雖有他物而衣居多故惟以陳衣言之南領變於襲亦以既小斂則尸在堂也衣南領則絞與衾亦皆北陳矣綪者前列自西而東次列自東而西其下皆然如物之綪屈也絞橫三縮一順其用之時而陳之也析其末者析其兩端為二如掩之制然絞言廣不言長取節於人其度不定也緇衾赬裏無紞赬丑貞反與䞓通紞都敢反注曰紞被識也斂衣或倒被無别於前後可也凡衾制同皆五幅也繼公謂衾無紞似亦以此别於生此云無紞則有有紞者矣祭服次祭服蓋指𤣥端以上而言也士𤣥端而祭於已助祭則朝服焉襲用爵弁服皮弁服褖衣各一稱故惟以二弁服為祭服此斂衣多矣宜用朝服𤣥端也散衣次散息但反下皆同注曰褖衣以下袍繭之屬凡十有九稱注曰祭服與散衣陳衣繼之謂主人之衣及庶襚也不必盡用注曰取稱而已不務多繼公謂此惟指繼陳者也嫌陳之則必用之故云然右陳小斂衣饌于東堂下脯醢醴酒幂奠用功布實于簞在饌東注曰凡在東西堂下者南齊坫繼公謂功布大功小功布之通稱未審其以何者用之也下於大斂之奠乃云東方之饌兩瓦甒其實醴酒然則此醴酒惟在觶與設盆盥于饌東有巾注曰為奠者設盥也繼公謂盥盛盥水之器也盆盛棄水苴絰大搹下本在左要絰小焉散帶埀長三尺牡麻絰右本在上亦散帶埀皆饌于東方苴七如反注曰苴絰斬衰之絰也苴麻者其貌苴以為絰服重者尚麤惡要絰小焉五分去一牡麻絰者齊衰以下之絰也牡麻者其貌易服輕者宜差好也散帶之埀者男子之道文多變也繼公謂左本右本纓皆在左也麻所重者本絰所重者纓苴麻絰以本為纓明其最重也牡麻絰有本而不以為纓明其差輕也纓皆在左者左尊右卑重者宜居尊處也散謂不絞之也此埀謂帶下也云帶埀又云長三尺見其帶下之長與大帶同也大帶説見首篇東方謂序東下云絰于序東是也其餘絰帶亦饌于此以絰無本不纓而帶不散埀故不言之婦人之帶牡麻結本在房注曰婦人亦有首絰但言帶者記其異繼公謂此謂婦人凡帶之有本者皆然斬衰之帶亦在其中矣是時帶亦未絞但結其本以别於男子耳其首絰亦皆與男子同婦人斬衰之帶所以不與其首絰皆用苴麻者以其卒哭無變至祥乃除故聖人權其前後輕重之宜即於始死之時用牡麻為之而但以首絰見斬衰之義也此所饌者其在西房與牀笫夷衾饌于西坫南笫壯里反注曰笫簀也夷衾覆尸之衾喪大記曰自小斂以往用夷衾夷衾質殺之裁猶冒也繼公謂尸夷于堂乃設此衾故以夷衾名之不以斂故别饌之西方盥如東方注曰為舉者設盥也如東方者亦用盆布巾饌於西堂下陳一鼎于寢門外當東塾少南西靣當東塾亦在其南也少南者明其稍遠之不北靣喪奠禮異也其實特豚四鬄去蹄兩胉脊肺設扄鼏鼏西末素俎在鼎西西順覆匕東枋鬄託歷反去起吕反胉音博注曰胉脅也素俎喪尚質既饌將小斂則辟襲奠今文鬄作剔繼公謂此鼎實所謂合升者也四鬄兩肩兩髀也四者惟去其蹄甲明其餘不去也胉似是諸脅之總名惟言脊是不分之矣體骨合為七段乃豚解者之正法也又以下禮攷之此設鼏乃設扄而云設扄鼏者文順耳鼏西末俎西順匕東枋皆統於鼎而順之俎在鼎西如其載時之位右陳絰帶器饌士盥二人以並東靣立于西階下注曰立俟舉尸也布席于户内下莞上簟莞音官注曰有司布斂席也繼公謂此席布于地也喪大記曰含一牀襲一牀遷尸于堂又一牀用牀者止於是耳商祝布絞衾散衣祭服祭服不倒美者在中注曰斂者趨方或傎倒衣裳祭服尊不倒之也繼公謂美者猶尊者也祭服以尊者為美云在中者據斂時而言也若於此時則但為上下之次耳爵弁服最尊在上餘亦以尊卑為次士舉遷尸反位注曰遷尸於服上繼公謂反位待後事也位猶在西階下設牀笫于兩楹之閒衽如初有枕注曰衽卧席也亦下莞上簟繼公謂楹間東西節也宜於楹為少北卒斂徹帷注曰尸已飾繼公謂斂之言藏也既襲而又加衣衾之類焉所以深藏其體也故曰斂下放此主人西靣馮尸踊無筭主婦東靣馮亦如之馮音慿下皆同馮謂以身親而扶持之哀甚而踊則無筭主人髺髪袒衆主人免于房髺音括免音問注曰喪服小記曰斬衰髺髪以麻免而以布以用麻布為之繼公謂檀弓曰始死羔裘𤣥冠者易之而已易者謂易之以素冠深衣也然則始死之服主人以下皆同而未暇有所别異今既小斂主人乃去冠與纚而以麻為髺髪衆主人以下乃去冠與纚而以布為免二者皆所以代冠也其制雖不可攷然以意求之疑其度但足以繞紒而已以其無纚故謂之髺髪言括結其髪也以其無冠故謂之免言因免冠而為之也小斂之日喪事方始乃以二者别親踈而復以絰帶之差繼之曲禮曰生與來日其此之謂乎于房兼髺髪者言也必于房者宜與髽者異處也免不言袒可知婦人髽于室曾子問言婦為舅姑始死之服布深衣縞緫則吉笄而纚自若矣是乃將齊衰者也以始死男子之服準之則此時婦人將斬衰而下者之服皆當如此齊衰者之為也髽者去笄緫與纚而露紒也至是而當髽者乃髽其不當髽者但去笄緫耳當髽者妻也妾也女子子與婦也非是雖三年者猶不髽此時當髽者皆在室故於焉為之由便也婦人之髽與否喪服絰記見之矣士舉男女奉尸侇于堂幠用夷衾男女如室位踊無筭注曰侇之言尸也夷衾覆尸柩之衾也堂謂楹間牀笫上也繼公謂士舉舉尸首足也男奉其右女奉其左也喪大記夷作侇是侇夷同也幠用夷衾者禮貴相變且斂衾當以陳也夷衾不陳此衾云夷者以其用之於尸而不以斂也室位馮尸之位主人出于足降自西階衆主人東即位婦人阼階上西靣主人拜賔大夫特拜士旅之即位踊襲絰于序東復位注曰拜賔郷賔位拜之也即位踊東方位序東東夾前䟽曰衆主人雖無降階之文當從主人降自西階主人就拜賔之時衆主人遂東即位於阼階下主人位南西靣也云復位者復阼階下西靣位繼公謂阼階上非婦人之正位於主人之降乃居之者辟賔客之行禮者也後遂以之為節主人拜賔鄉其位特拜者每人各一拜之也旅之者其人雖衆惟三拜之而已絰著絰帶也右小斂乃奠乃修奠事也其事在下舉者盥右執匕郤之左執俎橫攝之入阼階前西靣錯錯俎北靣錯七故反下並同注曰舉者出門舉鼎者右人以右手執匕左人以左手執俎因其便也攝持也錯俎北靣俎宜西順之䟽曰各以内手舉鼎外手執匕故云便繼公謂舉者盥即執匕俎是亦盥於門外矣經不見設此盥者略之俎錯於鼎西右人左執匕抽扄予左手兼執之取鼏委于鼎北加扄不坐注曰抽扄取鼏加扄於鼏上皆右手乃匕載載兩髀于兩端兩肩亞兩胉亞脊肺在于中皆覆進柢執而俟注曰匕右人也載左人也亞次也皆覆為塵柢本也進本者未異於生也骨有本末繼公謂此時匕者西靣于鼎東載者北靣于鼎西南兩端俎之前後也兩肩亞各次於髀也兩胉亞各次於肩也脊肺在於兩胉之中脊東而肺西也俟者俟同升上言四鬄去蹄則前體乃肩臂臑後體乃髀肫胳也此惟以肩髀為稱者其體不分故以上包下也皆覆亦以别於生也夏祝及執事盥執醴先酒脯醢俎從升自阼階丈夫踊甸人徹鼎巾待于阼階下注曰執事者諸執奠事也巾功布也執者不升已不設祝既錯醴將受之䟽曰公食大夫禮云甸人舉鼎順出奠于其所繼公謂執醴者祝也俎亦升自阼階喪奠禮異也升而丈夫踊節也凡奠時丈夫婦人之踊皆以奠者之往來為節奠于尸東先言其所奠之處下乃奠之執醴酒北靣西上注曰執醴酒者先升尊也立而俟後錯要成也豆錯俎錯于豆東立于俎北西上豆兼籩言也爾雅曰竹豆謂之籩其錯之籩脯先設而在南也俎北之位執脯者在西醴酒錯于豆南醴在北也記曰兩甒醴酒酒在南此位亦當如之既夕禮曰醴酒在籩西北上祝受巾巾之由足降自西階婦人踊奠者由重南東丈夫踊注曰巾之為塵也東反其位繼公謂祝既受巾巾之即由足而降明不立于俎北之位祝降而執事者從之由重南而東也賔出主人拜送于門外注曰廟門外也繼公謂凡喪賔皆於既奠乃出乃代哭不以官注曰代更也孝子始有親喪悲哀憔悴禮防其以死傷生故至此使之更哭不絶聲而已繼公謂不以官者下大夫也不以官之尊卑為序則但以親踈為之喪大記曰大夫官代哭不縣壺士代哭不以官右小斂奠有襚者則將命擯者出請入告主人待于位注曰喪禮略於威儀既小斂擯者乃用辭出請之辭曰孤某使某請事繼公謂此襚者惟謂使人襚者也擯者出告須以賔入注曰須亦待也出告之辭曰孤某須矣繼公謂以賔入帥之也賔入中庭北靣致命主人拜稽顙賔升自西階出于足西靣委衣如于室禮降出主人出拜送亦西方中庭也致命之禮施於主人也乃北靣者凡喪禮唯致命於堂乃東靣其他則否亦異於吉禮也襚者親友殷勤之意故為之稽顙以重謝之此非君襚之節故無嫌於室禮謂委衣于尸東牀上也主人出拜送亦於廟門外小斂以後主人於喪賔則出送之惟不迎賔耳朋友親襚如初儀西階東北靣哭踊三降主人不踊初儀拜送以上之禮也尸在楹間故於西階東北靣鄉之哭踊此則異於使人襚者也主人不踊惟哭而已襚者以褶則必有裳執衣如初徹衣亦如之升降自西階以東褶音牒注曰帛為褶無絮雖複與禪同有裳乃成稱不用表也以東藏以待事也繼公謂褶褶衣也裏衣之袷者也云則必有裳者嫌其非類可以不必用之也此但取衣裳具乃成稱之義故須有之褶有裳亦簪之徹衣者以東變於小斂以前之禮右襚宵為燎于中庭注曰燎大燋在地曰燎執之曰燭厥明滅燎陳衣于房南領西上綪絞紟衾二君襚祭服散衣庶襚凡三十稱紟不在筭不必盡用注曰衿單被也衾二者始死斂衾今又復制也小斂衣數自天子達大斂則異矣繼公謂祭服散衣皆主人之衣也後言庶襚則是庶襚之中雖有上服猶在主人散衣之後也云紟不在筭則衾在筭矣不言絞者狹小於紟不在筭可知不必盡用亦謂庶襚繼陳或出於三十稱者也喪大記曰大斂布絞縮者三橫者五又曰絞一幅為三不辟紟五幅為紞東方之饌兩瓦甒其實醴酒角觶木柶毼豆兩其實葵菹芋蠃醢兩籩無縢布巾其實栗不擇脯四脡毼苦割反蠃音縢音滕脡大頂反注曰此饌但言東方則亦在東堂下也毼白也齊人或名全菹為芋縢緣也詩云竹柲緄縢布巾籩巾也籩豆具而有巾盛之也特牲饋食禮有籩巾繼公謂記言設棜於東堂下南順齊于坫饌于其上者正指東方之饌也始死之奠用吉器小斂用素俎至是乃用毼豆而籩無縢皆以漸變之芋未詳記曰凡籩豆實具設皆巾之亦指此時也乃獨於籩見之者嫌乾物或可不必巾也菹云芋栗不擇脯四脡亦皆變於吉也奠席在饌北斂席在其東奠席葦席也周官司几筵曰凡喪事設葦席斂席亦莞與簟也其謂奠席也此二席皆不在棜大斂之奠在室遠於尸柩故始用席以存神也右陳大斂衣席及殯奠掘肂見衽肂以二反見賢遍反注曰肂埋棺之坎也掘之於西階上衽小要也喪大記曰君殯用輴櫕至于上畢塗屋大夫殯以幬櫕置于西序塗不暨于棺士殯見衽塗上帷之又曰君蓋用漆三衽三束大夫蓋用漆二衽二束士蓋不用漆二衽二束繼公謂言其肂之深淺以見衽為度也此肂亦在西序下其南蓋近於序端棺入主人不哭升棺用軸蓋在下軸直六反注曰軸輁軸也軸狀如轉轔刻兩頭為軹輁狀如長牀穿桯前後著金而關軹焉輓而行繼公謂蓋在下者郤於棺之下也棺既升則入于肂中而蓋則置於序端與案注云軸狀如轉轔者轔猶輪也以木關其轔之中央而引之則轔由此而轉故以轉轔名之蓋漢時語也謂軸狀如之以今物曉時人也軹謂軸之兩末關輪之處也竊詳注説蓋謂此軹之旁共有四輪前後各二又各有一軸以橫貫其桯與輪也鄭氏此説未必有據亦但以意言之熬黍稷各二筐有魚腊饌于西坫南熬音敖有魚腊謂每筐皆有之也此四物者擬用於肂中故饌於此孝子以尸柩既殯不得復奠于其側雖有奠在室而不知神之所在故置此於棺旁以盡愛敬之心也然不以食而用熬榖不以牲而用魚腊亦所以異於奠也與右為殯具陳三鼎于門外北上豚合升魚鱄鮒九腊左胖髀不升其他皆如初鱄市轉市專二反胖音判腊用左胖别於吉也此腊惟豚解其髀不升亦前肩後肫胉脊而已凡腊必去髀不以豚解體解合升胖升而異其他皆如初謂豚體骨及鼎之靣位與匕俎之陳如小斂時燭俟于饌東注曰饌東方之饌有燭者堂雖明室猶闇右陳鼎祝徹盥于門外入升自阼階丈夫踊祝徹者題下事也此徹者多矣惟言祝見其尊者耳是時無東堂下之盆盥故盥于門外祝徹巾授執事者以待設小斂奠之時執巾者待于阼階下祝就而受之然則祝於此時亦惟以巾授之於阼階下蓋授受之節宜同也祝既授巾乃還徹醴以待者謂執事以巾置于饌所以待奠事之至也徹饌先取醴酒北靣饌當作奠注曰北靣立相待俱降繼公謂醴酒尊先取之後設先取禮相變也饌字誤當作奠案注云相待俱降謂待取俎豆者也其餘取先設者出于足降自西階婦人踊設于序西南當西榮如設于堂注曰堂謂尸東也繼公謂其餘謂取籩豆俎者也先設者先取之後設者後取之經惟言取先設者見其初者耳既取則南靣西上俟執醴酒者行而從之降矣設于序西南改設之也凡徹尊者之盛饌必改設之而後去之序西南南北節也當西榮東西節也不設於東異於生也特牲饋食禮曰祝命徹阼俎豆籩設于東序下此生者之禮也此新奠設於既殯之後而舊奠乃徹於未斂之前者為辟斂故爾凡改設者賔出則徹之醴酒位如初執事豆北南靣東上注曰如初者如其北靣西上也繼公謂醴酒亦後設故其位如初執豆俎者既設而東上俟設醴酒者畢而從之降亦由便也此奠于西堂其俟降之位東上是由饌東而南乃降自側階也然則側階南於序端矣凡升降自側階者此經皆不見之乃適饌注曰東方之新饌繼公謂適東方之饌處以待事至也後放此適饌亦由主人之北右徹小斂奠帷堂又將設飾也婦人尸西東靣主人及親者升自西階出于足西靣袒注曰袒為大斂變也不言髽免髺髪小斂以來自若矣繼公謂婦人尸西東靣以男子將升故也取節於尸明近於牀此親者謂衆主人也男子但言西靣袒是遠於尸矣然則此時主人堂上之位其在阼階上所布席之東與士盥位如初注曰亦既盥並立西階下繼公謂此時不設東堂下之盥而徹者乃盥于門外似亦未必有西方之盥若然則此士亦盥于門外與喪大記言君大斂之禮云士盥于盤上北靣布席如初注曰亦下莞上簟繼公謂布席之處其於階上為少西於楹為少北蓋小斂之牀大斂之席與殯肂南北之節宜同也商祝布絞紟衾衣美者在外君襚不倒注曰至此乃用君襚主人先自盡繼公謂美者在外謂衣也君襚先祭服祭服先散衣而祭服之中又各有所先後皆所謂美者在外也在外亦指斂時言之若於此時則但為在下耳君襚不倒尊也以祭服視散衣則祭服為尊以君襚視祭服則君襚為尊惟君襚不倒則祭服亦有倒者矣至是乃用君襚者大斂之禮重故以服之尤尊者為之襲而美者在外小斂而美者在中大斂又反之禮貴相變也有大夫則告注曰後來者也繼公謂告謂告以主人方有事未及拜賔也非斂時則位在下來即拜之士舉遷尸復位主人踊無筭卒斂徹帷主人馮如初主婦亦如之復位反階下位以俟也於主人主婦既馮尸乃復升而舉尸以斂于棺也右大斂主人奉尸斂于棺踊如初乃蓋注曰棺在肂中斂尸焉所謂殯也檀弓曰殯於客位繼公謂納尸于棺則尸藏不見矣故亦以斂言之小斂云男女奉尸此惟云主人者其殯禮之異者與主人降拜大夫之後至者北靣視肂注曰北靣於西階東繼公謂後至者於主人既升堂而后來者也惟云降拜大夫之後至者則於士之後至者既襲乃拜之雜記曰當袒大夫至雖當踊絶踊而拜之反改成踊乃襲於士既事成踊襲而後拜之不改成踊正此意也衆主人復位婦人東復位注曰阼階上下之位繼公謂阼階上雖非婦人之正位以其曏者在此今又反之故亦云復位也此復位皆當在主人拜大夫之時無大夫後至者則在主人視肂之時設熬旁一筐乃塗踊無筭注曰以木覆棺上而塗之繼公謂喪大記注引此云旁各一筐則是此經脱一各字也各各黍稷也每旁二筐黍當在南塗者以木覆棺上而塗之象葬時加土之意也卒塗祝取銘置于肂注曰為銘設柎樹之肂東繼公謂置銘蓋於肂南也柩在肂中而復塗之孝子慮神疑於其柩故置銘於此若使之知其處然愛敬之心也檀弓曰以死者為不可别已故以其旗識之愛之斯錄之矣敬之斯盡其道焉耳主人復位踊襲位阼階下位也襲於序東右殯乃奠燭升自阼階祝執巾席從設于奥東靣注曰執燭南靣巾委於席右繼公謂周人斂用日出故既斂而室猶闇須用燭也祝執巾與席從執燭者升而設之於奥既委巾乃設席士虞禮曰祝巾席于室中東靣凡喪奠不啓牖祝反降及執事執饌注曰東方之饌繼公謂執饌以待俎而俱升也士盥舉鼎入西靣北上如初載魚左首進鬐三列腊進柢注曰如初如小斂舉鼎執匕俎扄鼏朼載之儀魚左首設而在南鬐脊也左首進鬐亦未異於生也繼公謂左首其首於載者為左也左首進鬐則寢右矣魚以鬐為上腴為下進鬐猶牲之進柢也魚九而三列則三三為列也凡俎實進上乃食生之禮喪之初奠而若此但取其未異於生耳其後遂因而不變又以别於吉祭云祝執醴如初酒豆籩俎從升自阼階丈夫踊甸人徹鼎注曰如初祝先升奠由楹内入于室醴酒北靣注曰亦如初繼公謂楹内東楹北也惟云醴酒北靣則其餘之未設者亦西靣矣此奠于室者尸柩既殯不可復奠於其側故宜在室也室事神之處也設豆右菹菹南栗栗東脯豚當豆魚次腊特于俎北醴酒在籩南巾如初注曰右菹菹在醢南也此左右異於魚者統於席也醴當栗南酒當脯南繼公謂設豆右菹豆南上也豆南上則席亦南上矣凡設豆而與其席之所上相變者於生人耳鬼神則否既錯者出立于户西西上祝後闔户先由楹西降自西階婦人踊奠者由重南東丈夫踊立于户西南靣待祝出而偕行也祝後闔户者祝錯醴最在後故後出而因闔户也惟云闔户是初時牖未嘗啓也明矣旣闔户祝西行而南執事者從之皆由楹西而降奠者由重南而東復其門東之位也祝位在門西賔出婦人踊主人拜送于門外入及兄弟北靣哭殯兄弟出主人拜送于門外注曰小功以下至此可以歸異門大功亦存焉繼公謂賔出而主人乃與兄弟哭殯順其親親之心也有親者宜異於朋友下云殯前北靣哭衆主人出門哭止皆西靣于東方闔門主人揖就次注曰次謂斬衰倚廬齊衰堊室也大功有帷帳小功緦麻有牀笫可也繼公謂東方之位亦北上右殯奠君若有賜焉則視斂既布衣君至注曰賜恩惠也斂大斂䟽曰喪大記云君於士既殯而往為之賜大斂焉繼公謂君欲視斂則使人告喪家故主人不敢升堂而先布絞紟衾衣以待其來喪大記曰弔者襲裘加帶絰則此時君之弔服亦朝服襲裘而加絰與帶矣若主人成服之後而往則弁絰疑衰主人出迎于外門外見馬首不哭還入門右北靣及衆主人袒還音旋下不見者同喪禮主人不迎賔若有所迎見之則不哭蓋禮然爾上經云見賔不哭是也此於君弔既迎之於外門外又見其馬首即不哭敬之至也言見馬首明未入巷門入門右廟門也巫止于廟門外祝代之小臣二人執戈先二人後注曰周禮男巫王弔則與祝前小臣君行則在前後君升則俠阼階北靣凡宫有鬼神曰廟繼公謂周官言喪祝男巫皆於王弔則前國君不得並用巫祝其在廟門外則巫前至廟門則祝前互用其一所以下天子也必用巫祝者以其與神交之故與巫至廟門外乃止則君下之處差遠於廟門矣小臣執戈前後以備非常君釋采入門主人辟采音菜辟音避下人辟哭辟不辟同注曰釋采者祝為君禮門神也必禮門神者明君無故不來也禮運曰諸侯非問疾弔喪而入諸臣之家是謂君臣為謔繼公謂采讀為菜蓋其物之可以為豆實者如葵韭之類是也釋菜蓋於闑西閾外釋謂奠之於地盛之之器則用笲云主人辟於是衆主人衆賔亦皆辟位君升自阼階西鄉祝負墉南靣主人中庭注曰祝南靣房中東鄉君主人中庭進益北䟽曰祝必南靣負墉鄉君者案喪大記曰君視祝而踊祝相君之禮故須鄉君繼公謂此東方中庭也君哭主人哭拜稽顙成踊出注曰出不敢必君之卒斂事繼公謂君已哭而主人出為君既有事矣自此以下六節每節之畢主人輙出皆為不敢久留君也喪大記曰出俟于門外君命反行事主人復位注曰大斂事繼公謂位入門右之位也此時惟將拜君乃進中庭不然則否君升主人主人西楹東北靣注曰命主人使之升繼公謂升之使視斂也西楹東明其在堂中西也主人與君同在堂宜遠之升公卿大夫繼主人東上乃斂升之使視斂以其尊也云繼主人東上則主人之位在楹東少南矣卒公卿大夫逆降復位主人降出注曰逆降者後升者先降位如朝夕哭弔之位君反主人主人中庭君坐撫當心主人拜稽顙成踊出注曰撫手案之凡馮尸興必踊繼公謂反謂命之反也君反之復初位衆主人辟于東壁南靣注曰以君將降也南靣則當坫之東繼公謂初位亦入門右位也嫌在中庭故以初明之衆主人南靣西上君降西鄉命主人馮尸主人升自西階由足西靣馮尸不當君所踊主婦東靣馮亦如之注曰君必降者欲孝子盡其情不當君所不敢與尊者所馮同處奉尸斂于棺乃蓋主人降出君反之入門左視塗君反主人而主人即入視塗者蓋君反之之時必以是命之也下云君命反奠亦見其一耳但言入門左則是未必在西階下也所以然者欲其出之便也君升即位衆主人復位卒塗主人出君命之反奠入門右入門右即初位也先言位次言初位此復著其所者以明其非有事於中庭則東方之位皆在是也乃奠升自西階注曰以君在阼君要節而踊主人從踊要猶候也節當踊之節也此節謂執奠者始升階時卒奠主人出哭者止卒奠謂奠者出户時也主人於此即出矣哭者止為君將出節也君出門廟中哭主人不哭辟君式之注曰古者立乘式謂小俛以禮主人也曲禮曰立視五嶲式視馬尾繼公謂式謂以手撫式也式者車前橫木也在車者若有所敬則撫之以為禮貳車畢乘主人哭拜送注曰貳車副車也其數各視其命之等君弔蓋乘象路曲禮曰乘君之乘車不敢曠左左必式繼公謂凡有貳車者為毁折之備也此車惟有御右而已主人拜送不著其處則是但於廟門外耳蓋是時君已升車故也喪大記云拜稽顙襲入即位衆主人襲拜大夫之後至者成踊既送君即襲於外明其袒之久者為君在故也既即位乃拜大夫之後至者此已禮宜更始而為之不可於送君之餘由便拜之也此後至謂君既至而後來者賔出主人拜送注曰自賔出以下如君不在之儀繼公謂惟言主人拜送是婦人於此亦不踊矣亦異於君不在之儀也右君視大斂三日成服杖云成服者曏已絰帶矣今復以冠衰之屬足而成之也三日者以加絰帶之日數之也曲禮曰生與來日是也喪大記曰士之喪二日而殯三日之朝主人杖婦人皆杖然則此蓋於未朝哭為之也右成服拜君命及衆賔不拜棺中之賜言於此者明已成服然後可為之也君命及衆賔謂弔者也拜之者謝其弔己也棺中之賜謂襚也不拜襚者襚禮不為己也此謂不弔而襚者若弔襚並行則其拜亦惟主於弔凡往拜之節其於朝奠之後乎拜之皆於其外門外所拜者不見右謝弔者朝夕哭不辟子卯朝夕哭謂既殯之後丈夫婦人於每日之朝夕皆哭于殯宫其禮於下見之子卯之説未詳婦人即位于堂南上哭丈夫即位于門外西靣北上外兄弟在其南南上賔繼之北上門東北靣西上門西北靣東上西方東靣北上主人即位辟門辟音闢注曰外兄弟異姓有服者也辟開也繼公謂即位于堂阼階上也丈夫衆主人衆兄弟也同姓異姓之親及賔客雖以親䟽為序列於東方而所上相變明其不相統也門東北靣西上與西靣北上者相變也門西北靣東上與東靣北上者相變也以下文攷之則此東方之賔卿大夫也門東諸公也門西他國之異爵者也然則西方者其士與門東門西外門内之左右也列定而主人乃即位於東方之北婦人拊心不哭拊心不哭見其悲哀而未敢哭也所以然者以男子未哭故也主人拜賔旁三右還入門哭婦人踊旁三謂鄉賔所立之方而三拜之也於内位之拜别其尊卑故於此略之緫旅拜而已以序言之先南靣拜乃東靣拜西靣拜既則右還而入門也嫌其由便故言右還以明之婦人但言踊以踊見哭也哭有不踊踊無不哭者主人堂下直東序西靣兄弟皆即位如外位卿大夫在主人之南諸公門東少進他國之異爵者門西少進敵則先拜他國之賔凡異爵者拜諸其位注曰賔皆即此位乃哭盡哀止主人乃拜之如外位矣兄弟齊衰大功者主人哭則哭小功緦麻亦即位乃哭上言賔此言卿大夫明其亦賔耳少進前於列他國卿大夫亦前於列尊之拜諸其位就其位而拜繼公謂此位與外位同故上言其位是著其人以互見之上言賔繼外兄弟此言卿大夫在主人之南明外兄弟以上皆少退於主人亦互見之也門東又有私臣之位門西又有公有司之位故諸公與他國異爵者皆少進以别之特牲記曰公有司門西北靣東上私臣門東北靣西上此位亦當如之也敵則先拜他國之賔惟謂異爵者若士則否以其同國異國者皆同在西方之位又旅拜之亦不宜異也他國之異爵者謂來聘若從君來朝者也凡凡諸公卿大夫也右朝哭徹者盥于門外燭先入升自阼階丈夫踊徹者徹既殯之宿奠者言燭先入則徹者繼之可知然則此時燭亦俟於外矣檀弓曰朝奠日出故用燭祝取醴北靣取酒立于其東取豆籩俎南靣西上祝先出酒豆籩俎序從降自西階婦人踊祝已取醴北靣立已取酒者亦北靣立于其東西上也餘人已取豆籩俎南靣西上蓋立于神席之前不敢以由便而變位也設于序西南直西榮醴酒北靣西上豆西靣錯立于豆北南靣籩俎既錯立于執豆之西東上酒錯復位醴錯于西遂先由主人之北適饌注曰遂先者明祝不復位也繼公謂惟豆云西靣錯蓋其他不盡然也祝與執事者自西階下而徑東故出於主人之北是時東方之饌醴酒在甒既適饌乃酌之右徹殯奠乃奠醴酒脯醢升丈夫踊入如初設不巾如初設者醴酒錯于脯南也不巾别於殷奠也室中惟殷奠則巾其餘否錯者出立于户西西上滅燭出祝闔户先降自西階婦人踊奠者由重南東丈夫踊賔出婦人踊主人拜送滅燭出謂執燭者滅燭而出也亦先降自阼階由主人之北東衆主人出婦人踊出門哭止皆復位闔門主人卒拜送賔揖衆主人乃就次衆主人出而婦人踊乃朝夕哭之踊節多於殯日者也此拜送賔謂衆兄弟之屬言賔者省文耳自婦人即位至此惟主言朝哭之禮其夕哭之與此異者惟徹醴酒脯醢不設於序西南耳餘並同右朝奠朔月奠用特豚魚腊陳三鼎如初東方之饌亦如之注曰朔月月朔日也初謂大斂時繼公謂朔月則殷奠象生時之朔食也無籩有黍稷用瓦敦有蓋當籩位注曰黍稷併於甒北也於是始有黍稷繼公謂朔奠及薦新不用籩所以别於殯奠之類此云用瓦敦則吉時或不用瓦者矣主人拜賔如朝夕哭如其廟門内外之儀也卒徹注曰徹宿奠也繼公謂朝夕奠無俎非盛饌徹則去之不復改設于序西南惟言卒徹為下事節也舉鼎入升皆如初奠之儀升謂匕而升於俎也初奠小斂既殯之奠卒朼釋匕于鼎俎行朼者逆出甸人徹鼎其序醴酒菹醢黍稷俎注曰俎行者俎後執執俎者行鼎可以出其序升入之次繼公謂俎行而匕者出升階而丈夫踊甸人乃徹鼎經下言主人要節而踊故以此略之而以徹鼎繼匕者出而言非謂其節如是也此見六者之序則是凡奠皆每人執一器明矣俎不言豚魚腊特執無嫌朼皆當作匕其設于室豆錯俎錯腊特黍稷當籩位敦啓會郤諸其南醴酒位如初注曰當籩位俎南黍黍東稷繼公謂黍稷後設變於籩實也醴酒位如初亦醴在黍南酒在稷南其異者北各有會耳祝與執豆者巾乃出注曰共為之也繼公謂中分其奠祝巾在南者執豆者巾在北者各以近其位而為之然則巾殯奠亦當如之經於此乃見之耳主人要節而踊丈夫婦人皆要節而踊惟言主人文省耳皆如朝夕哭之儀為凡不見者言也月半不殷奠注曰殷盛也士月半不復如朔盛奠下尊者大夫以上月半有奠繼公案注以此言士禮謂大夫即有月半奠它無所據也然亦未有以決其是否姑存之有薦新如朔奠新謂榖之新熟者也薦新則敦實皆以新物為之與春秋傳曰不食新矣少儀曰未嘗不食新皆指五榖而言也徹朔奠先取醴酒其餘取先設者敦啓會靣足序出如入注曰啓會徹時不復蓋也繼公謂其餘取先設者則取敦亦後於俎矣執敦靣足是以首自鄉也其執而設之之時亦然少牢饋食禮曰敦皆南首蓋北靣設之故也敦有首足如物之縮者然皆在上耳其設于外如于室注曰外序西南右朔奠筮宅冢人營之注曰宅葬居也冢人有司掌墓地兆域者營猶度也詩云經之營之繼公謂士筮宅而不卜辟尊者之禮也掘四隅外其壤掘中南其壤注曰為葬將北首故也繼公謂壤土也謂所掘而起者也於將為壙之處掘其四隅與中央略以識之而已以神之從違未可必也外其壤謂置其壤於四隅之外南其壤謂置其壤於中央之南隅之外若東隅之東西隅之西是也既朝哭主人皆往兆南北靣免絰免如字下免絰同注曰兆域也所營之處繼公謂云皆往明衆主人亦行也免絰亦左擁之絰服之最重者於此免之以對越神明宜與人異服問曰凡見人無免絰雖朝於君無免絰命筮者在主人之右筮者東靣抽上韇兼執之南靣受命受命於命筮者命曰哀子某為其父某甫筮宅度兹幽宅兆基無有後艱為于偽反度待故反注曰某甫且字也若言山甫孔甫矣宅居也度謀也基始也言為其父筮葬居今謀此以為幽冥居兆域之始得無後將有艱難乎艱難謂有非常若崩壞也孝經曰卜其宅兆而安厝之古文無兆基作期繼公謂命曰命筮者命之也亦如吉時宰賛命之為幽宅幽冥之宅也兆基未詳無有後艱言其地若吉則後日無有艱難之事或曰當從古文無兆字而期亦宜作其屬下句筮人許諾不述命右還北靣指中封而筮卦者在左注曰不述命者士禮略中封中央壤也繼公謂指中封若示神以其處然不言坐是立筮也不席而立筮變於家述命之儀見少牢饋食禮卒筮執卦以示命筮者命筮者受視反之東靣旅占卒進告于命筮者與主人占之曰從卦者書卦于木既卒筮而筮者乃執以示命筮者必示命筮者以其出命故爾既占而先告命筮者乃告主人亦此意也若吉時則受命示卦皆於主人占之曰從所告之辭云爾從謂從其所筮之地也書曰龜從筮從主人絰哭不踊絰者筮事畢也若不從筮擇如初儀注曰更擇地而筮之繼公謂再筮若又不吉則更擇地而不復筮也歸殯前北靣哭不踊注曰易位而哭明非常繼公謂殯前西階下也右筮宅既井椁主人西靣拜工左還椁反位哭不踊婦人哭于堂還音患注曰匠人為椁刋治其材以井構於殯門外也反位拜位也既哭之則往施之竁中矣主人還椁亦以既朝哭矣繼公謂拜工謝其勞也主人西靣拜工則工東靣矣左還椁由椁之東南行而繞之也經於筮宅與卜日皆云既朝哭此及獻材之屬乃不言之則是此數事者朝哭之後夕哭之前皆得為之無定時也獻材于殯門外西靣北上綪主人徧視之如哭椁獻素獻成亦如之注曰材明器之材視之亦拜工形法定為素飾治畢為成繼公謂北上西北上也南北陳之而前列在西徧視之亦自其所上者始此又與還椁異矣亦先拜工乃視之云如哭椁者如其反位哭不踊也此著殯門外則井椁之處其在外門外乎右哭椁哭器卜日既朝哭皆復外位卜人先奠龜于西塾上南首有席楚焞置于燋在龜東焞存悶反燋子約反注曰楚荆也荆焞所以鑽灼龜者燋炬也所以然火者也周禮菙氏掌共燋契以待卜事凡卜以明火爇燋遂灼其焌契以授卜師遂以役之繼公謂席亦在龜後也龜南首燋在其左皆變於卜時也葬日卜而不筮亦變於吉族長涖卜及宗人吉服立于門西東靣南上占者三人在其南北上長之兩反注曰吉服服𤣥端也繼公謂族長族人之尊者也族長與主人有親乃位于門西以將涖卜變其位此占者亦吉服不言者文省也吉服者亦以對越神明故也占者有司掌占事者也必三人者欲攷其言異同之多寡而定是非也書曰三人占則從二人之言卜人及執燋席者在塾西闔東扉主婦立于其内注曰在塾西者南靣東上繼公謂卜人有司掌共卜事者也在塾西者便其升也東西塾之階蓋與東西堂側階之所鄉同闔東扉説見士昬記席于闑西閾外席亦西靣宗人告事具主人北靣免絰左擁之涖卜即位于門東西靣注曰涖卜族長也更西靣當代主人命卜繼公謂告告主人也既免絰復西靣卜人抱龜燋先奠龜西首燋在北注曰既奠燋又執龜以待之繼公謂燋先謂執燋者先於龜而行也奠龜西首象神位在西鄉之奠龜與燋皆東靣不言焞與燋同處可知宗人受卜人龜示高注曰以龜腹甲高起所當灼處示涖卜也近足者其部高繼公謂宗人就而北靣訝受之下文授受亦訝也涖卜受視反之宗人還少退受命注曰受涖卜命繼公謂必少退者受命宜遠於授受之處也命曰哀子某來日某卜葬其父某甫考降無有近悔注曰考登也降下也言卜此日葬魂神上下得無近於咎悔者乎繼公謂來日將來之日也某者柔日之名若乙丑丁酉之類是也考降未詳或曰考成也降下也謂成其下棺之事未知是否無有近悔謂其日若吉則不近於悔如葬而遇雨及他有不虞則非吉日矣許諾不述命還即席西靣坐命龜興授卜人龜負東扉注曰宗人不述命亦士禮略凡卜述命命龜異龜重威儀多也負東扉俟龜之兆也繼公謂言不述命則命龜之辭與涖卜所云者異矣卜人坐作龜興注曰作龜以火灼之以作其兆也周禮卜師凡卜事揚火以作龜致其墨繼公謂作猶起也宗人受龜示涖卜涖卜受視反之宗人退東靣乃旅占卒不釋龜告于涖卜與主人占曰某日從注曰不釋龜復執之也繼公謂如此文則是宗人亦占之也占謂占其兆之吉凶也兆有體色墨坼旅占卒復受龜遂執之以告涖卜不哭者吉服也主人不哭者未絰也授卜人龜告于主婦主婦哭注曰不執龜者下主人也告于異爵者使人告于衆賔衆賔謂士之在外位者也宗人不親告之下異爵者卜人徹龜宗人告事畢主人絰入哭如筮宅賔出拜送云徹龜則是曏者復奠于西塾上以待事畢也拜送賔蓋於外門外若不從卜擇如初儀若不從則亦以告于主婦而下其儀則同也至次日乃更擇日而卜之曲禮曰喪事先遠日云擇則其相去不必旬有一日矣蓋與吉禮筮日遠近之差異也古者士三月而葬日之先後當以此為節儀禮集説卷十二正誤苴絰大搹搹本作鬲釋文云鬲又作搹案喪服傳亦云大搹今定作搹乃匕載匕鄭本從今文作朼注曰古文朼作匕繼公謂用匕謂之匕猶設尊謂之尊設席謂之席之類是也或作朼者似後人誤改之以别於其為器名者而改之不盡故匕朼雜也當從古文作匕置于西階上鄭本于下有宇字繼公謂宇屋檐也不宜與西階上連文宇字蓋因于字而衍也周官小祝職鄭司農注引此無宇字今以為據刪之
