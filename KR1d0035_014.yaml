body:
  text: 儀禮集說卷十四元敖繼公撰士虞禮第十四注曰虞於五禮屬凶繼公謂此篇言士喪始虞之禮士虞禮特豕饋食食音嗣注曰祭祀自孰始曰饋食饋食者食道也繼公謂祭而用黍稷焉曰饋食猶言饋之以食也側亨于廟門外之右東面亨音烹注曰側亨亨一胖也繼公謂東面謂亨者也爨亦存焉此亨于門外之西變於吉祭且别於奠也廟亦謂殯宫魚臘爨亞之北上爨七亂反於特豕云亨云東面魚爨云爨云北上文互見也饎爨在東壁西面饎尺志反為食曰饎饎爨在東壁變於吉也其爨亦北上亨饎皆有爨於其所蓋祭禮也爨在堂下乃云在東壁者見其近於壁也壁爨之間當容人此南北之節亦當南齊坫特牲曰主婦視饎爨于西堂下設洗于西階西南水在洗西篚在東注曰亦當西榮南北以堂深繼公謂此設洗在西亦以主人位于西階上故也凡設洗水在外篚在內不别於東西也此篚亦南順而實爵焉尊于室中北墉下當户兩甒醴酒酒在東無禁冪用絺布加勺南枋注曰酒在東上醴也繼公謂祭而尊于室中且用一醴一酒皆異於吉也醴酒並用者醴以饗神酒以飲尸亦見其未甚變於奠也兩甒西上亦以神席在西也尊之所上吉凶同士吉祭冪用綌此喪祭乃用絺其義未聞素几葦席在西序下虞乃用几辟尊者之禮也周官司几筵職凡喪事設葦席右素几謂奠時也是天子之禮未虞以前已用几矣苴刌茅長五寸束之實于篚饌于西坫上苴子徐反刌七本反長直亮反注曰苴猶藉也所以藉祭也繼公謂云苴者亦以其用名之饌兩豆菹醢于西楹之東醢在西一鉶亞之醢在西東上也東上者變於堂下之敦位也鉶亞於醢又在其西鉶不言豕可知從獻豆兩亞之四籩亞之北上注曰豆從主人獻祝籩從主婦獻尸祝北上菹與棗繼公謂此豆籩云從獻者以其先獻而後薦也兩豆亞之菹在鉶西醢在菹南也四籩亞之於醢之南一一為列也北上者南陳不東上西陳者别於正饌黍稷二敦于階間西上藉用葦席敦音對下並同藉才夜反藉猶薦也藉敦未必有席席字蓋因上文而衍也特牲禮曰藉用萑匜水錯于槃中南流在西階之南簞巾在其東錯七故反下並同匜水匜中有水也所以沃盥自設洗至此其陳設之位與特牲饋食異者皆為變於吉陳三鼎于門外之右北面北上設扄冪扄古螢反冪眉狄反門外之右西方當孰少南也記曰皆設扄冪陳之此亦先設冪乃設扄云扄冪文順爾陳鼎於西與亨于西之意同下設鼎放此匕爼在西孰之西匕亦在俎上羞燔俎在內西孰上南順燔炙肉也言羞見其非正俎南順以羞之者當北面縮執之也少牢下篇言縮執匕湇俎之法乃當其下端然則縮執俎者其法同耳此俎在孰上執時則升取之如取物于堂然不言肝爼肝先進此時亦設之可知設肝俎當在燔西便其先取之也西孰之階在孰西右陳饌具主人及兄弟如葬服賔執事者如弔服皆即位于門外如朝夕臨位婦人及內兄弟服即位于堂亦如之臨力蔭反注曰賔執事者賔客來執事也繼公謂葬服主人髺髮衆主人及兄弟免而大功以上者皆散帶垂也弔服疑衰素冠麻絰帶也如朝夕臨位主人及兄弟在東方賓執事者在西方也婦人及內兄弟其服亦如葬服其位亦如臨位婦人葬服經無所見蓋與既殯之服同祝免澡葛絰帶布席于室中東面右几降出及宗人即位于門西東面南上免音問澡音早注曰祝亦執事免者祭祀之禮祝所親也澡治也治葛以為首絰及帶接神宜變也右几於席近南也繼公謂祝公有司之助喪祭者也其服但當弔服加麻以其接神也則宜少異故免而葛絰帶焉其免也若過於重其葛也若過於輕然輕重相準則與其本服亦不甚相逺也此服亦當事則然既事則已宗人亦公有司也南上明其與賓不相統葛絰帶云澡則有不澡者矣右几神席南上也右門外位宗人告有司具遂請拜賓如臨入門哭婦人哭注曰臨朝夕哭繼公謂告主人以有司已具遂請行祭事也拜賓如臨謂旁三拜也主人即位于堂衆主人及兄弟賓即位于西方如反哭位注曰既夕曰乃反哭入門升自西階東面衆主人堂下東面北上此則異於朝夕繼公謂反哭之位乃順孝子一時之心而為之本非正位自始虞至卒哭其位皆如之者蓋因此以别於既祔以後吉祭之位也此正與婦人於既小斂有阼階上之位者其意相類賔即位于西方朝夕反哭同也是時賓皆為執事而來無異爵者焉惟士而已祝入門左北面門內之西祝之位也特牲饋食記曰公有司門西北面東上是也宗人西階前北面注曰當詔主人及賓之事繼公謂宗人即立于此者以主人已在階上故也右門內位祝盥升取苴降洗之升入設于几東席上東縮降洗觶升止哭東縮上西也止哭為祭事至祝洗觶升則執之以入俟時而酌亦異於吉也主人倚杖入祝從在左西面注曰主人倚杖西序乃入喪服小記曰虞杖不入于室祔杖不入於堂然則練杖不入於門明矣繼公謂凡喪祭之始及無尸者之祭主人皆先祝而入室祝從故入即西面亦皆異於吉祝在左之義見聘禮贊薦菹醢醢在北醢在北豆南上也席南上而豆如之神饌之異者也主婦不設豆及敦未敢同於吉也佐食及執事盥出舉長在左長知文反注曰舉舉鼎也長在左西方位也凡事宗人詔之繼公謂此云長在左下云佐食及右人載是佐食非長也乃先言之者以其有常職故爾鼎在門外北面則舉時長者在西案注云長在左西方位謂鼎設于西方者之位如此明其與設于東方者相反也鼎入設于西階前東面北上匕俎從設左人抽扄冪匕佐食及右人載注曰佐食載則亦在右矣繼公謂設鼎南北節當南於洗東東面亦順主人之面位也此執匕爼者亦三人各兼執匕俎也從設從鼎入而各設于其鼎之東其設之法俎東順而匕西枋也左人亦抽扄豫左手取冪委于鼎北加扄乃執匕而匕惟言抽扄冪匕省文耳卒朼者逆退復位注曰復賓位也繼公謂朼當作匕字之誤也俎入設于豆東魚亞之臘特贊設二敦于俎南黍其東稷俎南豕魚二俎之南也設一鉶于豆南設一鉶貶於吉佐食出立于戶西既設俎則出而立于此矣後言之者亦終上事乃及之也贊者徹鼎徹直列反注曰反于門外繼公謂以公食禮士喪禮參考之則此徹鼎亦當與設俎相屬為之言於此者與上文之意同贊者賓執事者也祝酌醴命佐食啓㑹佐食許諾啓㑹卻于敦南復位㑹如字注曰復位出立于戶西繼公謂祝既酌醴南面命佐食遂於此俟之祝奠觶于鉶南復位主人再拜稽首注曰復位復主人之左繼公謂此酌醴用觶别於酳獻也先啓㑹乃奠亦異於吉主人此拜為食具也右設饌祝饗注曰饗告神饗也繼公謂饗辭即記所云哀子某圭為而哀薦之饗者也命佐食祭佐食許諾鉤袒取黍稷祭于苴三取膚祭祭如初祝取奠觶祭亦如之不盡益反奠之主人再拜稽首注曰鉤袒如今擐衣也繼公謂祭為神祭食也鉤袒蓋外卷其袂以出臂也為神祭當與尸祭異處故祭于席為其汚席故以苴藉之三者三祭之也每一祭畢則反取之祭膚祭如初亦于苴三也記曰膚祭三取諸左膉上神祭用膚亦别於尸也祝取奠觶祭于苴亦三注之不盡者三祭而不盡其醴也既祭更酌而益之乃反奠于故處主人拜為饗也既祭乃拜者以此饗禮成於祭也於此而饗且為之祭皆異於吉祝祝卒主人拜如初哭出復位下祝之又反後祝祝放此注曰祝祝者釋孝子祭辭繼公謂祝祝之辭則記所謂哀子某哀顯相夙興夜處不寧下至適爾皇祖某甫者也如初亦再拜稽首也祝饗與祝皆在其位右饗神祝迎尸一人衰絰奉篚哭從尸衰七回反奉芳勇反下同注曰尸主也孝子之祭不見親之形象心無所繫立尸而主意焉一人主人兄弟繼公謂云衰絰明其為主人兄弟且不易服也祝出迎尸而主人不降者亦變於吉尸入門丈夫踊婦人踊注曰踊不同文者有先後也繼公謂此婦人踊惟繼丈夫之後不以尸行為節淳尸盥宗人授巾淳音諄注曰淳沃也沃尸盥者賓執事者也繼公謂亦於入門左之位為之尸及階祝延尸注曰告之以升繼公謂覲禮云擯者延之曰升尸升宗人詔踊如初至是乃云宗人詔踊明尸入門而踊者非宗人詔之也如初如其丈夫先婦人後下文放此尸入户踊如初哭止哭止將有事也婦人入于房祭禮婦人當在房前此在堂者以其有尸入之哭也今哭止故入于房及尸謖又復位而哭也右尸入主人及祝拜妥尸尸拜遂坐妥他果反此皆變於其吉祭也士之吉祭尸既坐主人乃拜妥尸祝不拜妥謂安之從者錯篚于尸左席上立于其北從才用反下從者並同注曰北席北也繼公謂立俟其畢也尸取奠左執之取菹擩于醢祭于豆閒擩人恱反右手取奠豫左手執之為右手將有事也下祭之類此者皆于豆閒特於是見之耳祝命佐食綏祭綏當讀作授綏或是授字之誤以下文可見佐食取黍稷肺祭授尸尸祭之祭奠奠先執後祭皆尊之祝祝主人拜如初尸嘗醴奠之注曰如初亦祝祝卒乃再拜稽首繼公謂此拜為祝祝也故尸不答拜凡祝祝之辭皆告于神嘗醴奠之復於故處嘗與啐之異同未聞佐食舉肺脊授尸尸受振祭嚌之左手執之注曰右手將有事也繼公謂於此舉之明其不在舉數中也下篇意亦類此祝命佐食邇敦佐食舉黍錯于席上邇近也士之吉祭則並邇黍稷此亦其異者尸祭鉶嘗鉶注曰右手也少牢曰以柶祭羊鉶遂以祭豕鉶嘗羊鉶泰羹湇自門入設于鉶南泰當作大字之誤也音泰記同此大羹豕肉之汁也後篇同設湇於右亦因食生之禮又以别於吉祭也胾四豆設于左胾側吏反左醢北也庶羞惟用胾亦變於吉尸飯播餘于篚飯扶晚反下並同注曰不反餘也古者飯用手吉時播餘于㑹繼公謂於尸之初飯即言播餘是每飯皆然也惟飯而已不食舉未忍同於吉雖不食舉猶左執之三飯佐食舉幹尸受振祭嚌之實于篚尸既嚌而佐食受之實于篚舉幹不云授尸省文亦以尸受見之也又三飯舉胳祭如初不言佐食又不言尸受文又省初謂振祭嚌之下放此佐食舉魚臘實于篚魚臘一魚及臘胳也於前後二舉不舉魚臘此節舉之又不以授尸以其不在三舉之數故略之亦喪祭異也必於此節舉之者所以見前後宜舉而不舉之意也又三飯舉肩祭如初注曰後舉肩者貴要成也繼公謂此三舉牲之體骨始于脅終於肩先賤而後貴也於前後體惟以肩骼者後體則舉其下前體則舉其上亦宜爾舉魚臘俎俎釋三箇注曰釋猶遺也箇猶枚也今俗或名枚曰個音相近繼公謂佐食於魚亦舉其五臘又舉其三每俎各釋三箇臘體之在俎者亦臂臑肫也必釋之者俎未即徹則不宜空之此臘亦體五骨二如其牲尸卒食佐食受肺脊實于篚反黍如初設注曰九飯而已士禮也篚猶吉祭之有肵爼繼公謂尸九飯乃卒食雖與吉祭之數同然其閒無告飽拜侑之事亦喪質威儀少也云受肺脊則尸嚮者未嘗奠于豆明矣是亦變於其吉祭者也右尸食主人洗廢爵酌酒酳尸尸拜受爵主人北面答拜尸祭酒嘗之注曰爵無足曰廢爵繼公謂北面蓋於户西北面答拜變於吉凡異者皆變於吉賓長以肝從實于俎縮右鹽長知丈反注曰縮實肝灸於俎也喪祭進柢右鹽於俎近北便尸取之也縮執爼言右鹽則肝鹽併也繼公謂實於俎縮右鹽言肝鹽在俎之法爾非謂此時方實之也鹽於俎與執者皆為右尸左執爵右取肝擩鹽振祭嚌之加于俎賓降反俎于西孰復位疏曰加于俎異於吉時繼公謂擩鹽不言于文略耳餘放此加于俎特俎也尸卒爵祝受不相爵主人拜尸答拜相悉亮反注曰相爵者特牲曰送爵皇尸卒爵繼公謂不相爵變於吉祝相爵者命主人拜送爵也此雖不相爵而主人猶先拜蓋其節宜然也右主人酳尸祝酌授尸尸以醋主人主人拜受爵尸答拜主人坐祭卒爵拜尸答拜醋才各反尸無降席之禮故祝為酌之酢不洗爵尸禮也孝子於是時乃飲而卒爵者為尊者之賜也右尸酢主人筵祝南面筵祝蓋贊者也筵於北墉下尊之西也室中之席南面以西方為上既筵則祝升席與主人獻祝祝拜坐受爵主人答拜祝與佐食皆事尸者也故於酳尸獻尸之後因而獻焉承已飲之後乃不洗而獻祝者下尸也坐受爵者因尸禮也以明其由尸而得獻祝既受爵主人乃反西面位而答拜薦菹醢設俎亦贊薦而佐食設俎祝左執爵祭薦奠爵興取肺坐祭嚌之興加于俎祭酒嘗之肝從祝取肝擩鹽振祭嚌之加于俎卒爵拜主人答拜祝坐授主人祭薦亦右手以菹擩醢祭于豆閒也先奠爵乃取肺以祭離肺用二手也祭不言絶文省以肝從亦賔長也祝亦左執爵乃取肝不言之者同於尸可知授主人下宜脫一爵字主人酌獻佐食佐食北面拜坐受爵主人答拜佐食祭酒卒爵拜主人答拜受爵出實于篚升堂復位復堂上東面位右主人獻祝及佐食主婦洗足爵于房中酌亞獻尸如主人儀注曰爵有足輕者飾也繼公謂此不謂之酳而云獻者食尸之禮非關於主婦故此禮與彼不相蒙而惟以進酒者為稱也如主人儀則亦北面拜自反兩籩棗栗設于㑹南棗在西反或是取字之誤此兩籩自堂而設于室非可言反云自者明其不用贊也吉祭則宗婦贊之特牲禮曰宗婦執兩籩户外坐主婦受設于敦南是也尸祭籩祭棗栗於豆閒也亦祝取而授之特牲禮曰祝贊籩祭尸受祭之祭酒如初賓以燔從如初尸祭燔卒爵如初注曰初主人儀繼公謂賓謂次賓燔者蒙如初者如肝從之儀也右主婦亞獻酌獻祝籩燔從獻佐食皆如初以虛爵入于房皆皆獻祝以下四事也籩位則豆俎西右主婦獻祝佐食賓長洗繶爵三獻燔從如初儀繶於力反注曰繶爵口足之閒有文彌飾右賔長三獻婦人復位注曰復堂上西面位祝出户西面告利成主人哭注曰西面告告主人也利猶養也成畢也言養禮畢也繼公謂上云主人升堂復位而此云祝出户西面告利成則主人虞祭與反哭之位皆入堂深矣利成未詳皆哭注曰丈夫婦人於主人哭斯哭矣右祝告利成祝入尸謖謖音叔謖起也祭既畢矣尸必俟祝入乃起者禮之節當然也從者奉篚哭如初注曰初哭從尸祝前尸出户踊如初降堂踊如初出門亦如之注曰如初者出如入降如升三者之節悲哀同繼公謂祝前者道尸也踊如初者丈夫先婦人後也云降堂者明其方降於階上而即踊右尸出祝反入徹設于西北隅如其設也几在南厞用席厞扶未反下並同設于西北隅者亦以尊者之盛饌未可遽徹去之故改設於此也蓋微與徹喪奠而改設於序西南之類者同意几在南在饌之南也厞用席者以席之一端倚于几一端倚于俎則足以障蔽其饌矣如是者明其非為求神祝改設之亦變於吉右改設祝薦席徹入于房祝自執其俎出贊闔牖户徹薦席者贊也云徹入于房則祝薦席初自房來主人降賓出主人出門哭止皆復位注曰門外未入位繼公案注云門外未入位者謂殯宫門外未入時之位也宗人告事畢賓出主人送拜稽顙注曰送于大門外也繼公謂送此賓亦稽顙者為徒勞之故重拜其辱也吉祭之賔有俎主人則但拜送之而已蓋儀物相為隆殺也右事畢記虞浴不櫛注曰浴者將祭自潔清不櫛未在於飾也惟三年之喪不櫛期以下櫛可也陳牲于庿門外北首西上寢右注曰言牲臘在其中西上變於吉寢右者當升左胖也繼公謂陳之亦在西方而當陳鼎之南略如特牲禮也西上臘在東也臘與豕序則不在棜矣北首寢右謂牲也吉時臘東首則此時西首與日中而行事日中行事亦變於吉祭也三虞皆然至祔乃質明行事以其始用吉祭也殺于庿門西主人不視豚解注曰豚解解前後脛脊脅而已孰乃體解升於鼎也繼公謂庿門亦庿門外也主人不視亦變於吉主人不視殺則陳牲之時可知矣羮飪升左肩臂臑肫骼脊脅離肺膚祭三取諸左膉上肺祭一實于上鼎骼音格與胳同膉音益注曰脊脅正脊正脅也離肺舉肺也膉脰肉也繼公謂惟云脊脅則是各一骨耳無橫脊短脅而又但用一骨逺别於吉祭也離肺乃與脊同舉者也言離見其制與絶祭者同膚祭三以為神祭肺祭一以為尸祭升魚鱄鮒九實于中鼎魚九亦未可與其吉祭同凡士之喪奠用魚則九升臘左胖髀不升實于下鼎臘亦體五骨二所謂臘如牲骨也皆設扄冪陳之注曰嫌既陳乃設扄冪也載猶進柢魚進鬐注曰猶猶士喪既夕言未可以吉也繼公謂喪奠於牲則進柢魚則進鬐始者但以未忍異於生之故而為之其後遂因之以别於吉祭故三虞之時雖祭而不奠猶未變於初也祝俎髀脰脊脅離肺陳于階閒敦東脰音豆髀亦左髀也脊脅其亦脡脊代脅與離肺嚌肺也祝祭以離肺者是禮主於飲故不因尸之食禮也此俎實自鑊而徑載於俎不復升於鼎者不敢與神俎同也尸三俎用豕魚臘祝之俎實惟用豕者亦變於吉也階閒執事之俎所陳之常處也特牲饋食禮曰執事之俎陳于階閒二列北上則於階閒而陳是俎吉凶同也階閒先有黍稷敦故記又明著其所焉云敦東者言其相直也右記牲鼎俎實淳尸盥執槃西面執匜東面執巾在其北東面宗人授巾南面淳音諄注曰槃以盛棄水也執巾不授巾卑也繼公謂淳尸盥執匜者也此執盥器者之面位亦皆變於吉主人在室則宗人升戶外北面注曰當詔主人室事佐食無事則出户負依南面依於豈反依如負斧依之依亦謂如屏風然者也然則自天子至於士其户牖之閒皆設依惟天子則飾以斧文耳負依南面明與宗人不相統也佐食室中無正位故是時立於此特牲記曰佐食當事則户外南面無事則中庭北面此禮三獻而止佐食無中庭之位故但以事之有無為言雖當事猶云無也右記執事者面位鉶芼用苦若薇有滑夏用葵冬用荁有柶荁音丸注曰荁堇類也乾則滑夏秋用生葵冬春用乾荁繼公謂若苦若薇亦各隨其時之所有而用之有柶所以祭而嘗之也豆實葵菹菹以西螺醢螺音螺經惟言菹醢此則見其所用之物也言以西則指其饌時籩棗蒸栗擇惟言棗蒸栗擇則是籩豆之類皆未變也此時尸用葦席素几主人酳以廢爵則其他可知矣右記鉶豆籩尸入祝從尸入謂入門也言祝從尸者嫌其如迎尸之時猶先行也祝始出迎尸先行入門及尸入祝乃居後而從之少牢饋食禮曰祝先入門右尸入門左亦辟尸使先行也入門如是則入户亦從尸可知尸坐不說屨說吐活反下並同尸久坐於室中嫌或說屨也禮有敬事則不說屨而坐少儀曰凡祭於室中堂上無跣燕則有之尸謖祝前鄉尸還出户又鄉尸還過主人又鄉尸還降階又鄉尸降階還及門如出户鄉並音向還並音旋注曰祝道尸必先鄉之為之節繼公謂前者當尸之前而行也前行者所以道之鄉尸還謂先鄉尸而即還也主人位在堂深祝出户而西行當階而南行乃過主人也過主人則近階矣故不必見及階之節也上降階者祝也下降階者尸也祝先降而鄉尸及尸既降祝乃反面而行及門如出户謂出門又鄉尸凡道尸之儀在此尸出祝反入門左北面復位然後宗人詔降祝於尸出即反則不復前矣祝於門外迎尸而不送亦終始異也詔降詔主人降也主人於是乃取杖與此言主人降之節似與經異右記祝相尸之節尸服卒者之上服卒者士也其上服則爵辨服是亦異於吉祭者也吉祭之尸服元端元裳男男尸女女尸必使異姓不使賤者女尸以在孫倫者之妻為之據夫家而言之故曰異姓其或雖與卒者同姓亦可以為之也賤者孫倫之妾也右記尸服及為尸者無尸則禮及薦饌皆如初注曰無尸謂無孫列可為者也繼公謂禮謂主人哭出復位以前之儀及改設饌與賔出以後之事薦饌神席前俎豆之類皆是也如初謂與有尸者同既饗祭于苴祝祝卒下祝之又反雖無尸此儀則同也主人於每節亦皆再拜稽首記將見主人哭出之節故先言此不綏祭無泰羮湇胾從獻綏當音授綏亦當作授泰亦當作大授祭謂佐食授祭也無尸則固無所授矣嫌其當象有尸者之禮故言不以明之無大羮湇胾從獻意亦類此從獻謂籩及肝燔俎也此記終始也事尸之禮始於授祭終於從獻主人哭出復位注曰於祝祝卒祝闔牖户降復位于門西注曰門西北面位也男女拾踊三拾其劫反下並同是時婦人亦在堂也不入于房與有尸者異如食閒注曰隱之如尸九飯之頃也繼公謂闔牖户如食閒象神食之也此謂陰厭祝升止哭聲三啓户注曰聲者噫歆也將啓户警覺神也繼公謂注云警覺神者謂欲令知其將啓户也主人入祝從啓牖鄉如初鄉許亮反注曰牖先闔後啓扇在內也繼公謂鄉猶面也謂祝在主人之左皆西鄉主人哭出復位注曰堂上位也卒徹祝佐食降復位注曰祝復門西北面位佐食復西方位繼公謂卒徹者言其節也比徹亦改設于西北隅不言之者亦為其已蒙如初之文也卒徹祝闔牖户乃與佐食俱降佐食於此方云復位則陰厭之時其在中庭北面與士之佐食位在兄弟之列特牲記曰佐食於旅齒於兄弟是也宗人詔降如初此如初但言其與有尸者之節同也上記云尸出祝反入門左北面復位然後宗人詔降右記無尸始虞用柔日柔日乙丁己辛癸也柔日言用則固非葬日矣曰哀子某哀顯相夙興夜處不寧相息亮反注曰曰祝祝之辭也喪祭稱哀顯相助祭者也顯明也相助也詩云於穆清廟肅雍顯相不寧悲思不安繼公謂哀子主人也哀顯相衆主人以下也夙興夜處不寧言其以神未祔廟之故日夜為之悲思不安也此祝祝之辭也云夙興夜處則始虞與葬不同日明矣敢用潔牲剛鬛注曰豕曰剛鬛香合注曰黍也大夫士於黍稷之號合言普淖而已此言香合蓋記者誤耳辭次黍又不得在薦上嘉薦普淖淖女孝反注曰嘉薦菹醢也普淖黍稷也繼公謂普淖未詳明齊溲酒齊才計反溲所求反明齊蓋言醴也郊特牲曰縮酌用茅明酌也又曰明水涗齊貴新也蓋用明水涗醴齊故曰明齊也祝祝之時奠用醴而已不用酒也云溲酒似衍文哀薦祫事注曰始虞謂之祫事者主欲其祫先祖也適爾皇祖某甫注曰告之以適皇祖也皇君也某甫皇祖字也若言尼甫繼公謂云適爾皇祖某甫所以勸勉之尸柩已去則神宜在廟為神未欲遽離其室故於三虞皆告之以此饗以袝祭之辭例之當云尚饗蓋庶其饗此祭也再虞皆如初曰哀薦虞事注曰其祝辭異者一言耳繼公謂舊說謂再虞後於始虞二日理或然也皆如初謂日與祝辭也曰哀薦虞事見其與上文異者惟虞祫二字耳虞之言度也再告之則有使之度其去就之意故曰虞事焉虞祭之名蓋取諸此不以祫為稱者以其與大祫之名同且此時猶未果祫也三虞卒哭他用剛日亦如初曰哀薦成事注曰其祝辭異者亦一言耳繼公謂三虞卒哭謂既三虞遂卒朝夕哭也他者變易之辭猶今之言别矣不用柔日而别用剛日故曰他也他用剛日則三虞卒哭後於再虞三日矣所以用剛日者為祔祭宜用柔日故爾蓋三虞與祔日當相接經云明日以其班祔是也亦如初謂祝辭也成事謂見其一言之異者耳三虞云成事者謂神靈適祖之意已定也此三祭之辭皆告之以適其皇祖乃異其某事之云者所以見義也初言祫者象啓尊者以其事也次言虞者象尊者聞言則度其可否也末言成者象其思慮已審將行之也凡此皆所以順孝子事死如事生之心故其為辭先後有漸從容不迫蓋若此此先王之道所以為美與右記祭日與祝辭獻畢未徹乃餞注曰餞送行者之酒詩云出宿于泲飲餞于禰繼公謂此承上文謂三虞之祭既三獻也餞尸于外者象神將適其祖而送之也尊兩甒于庿門外之右少南水尊在酒西勺北枋是禮主於尸故惟用酒耳用酒而有水尊尊者之禮也水尊在酒西西上也下文言尸席設于尊之西北是尸席西於尊北也尸席西於尊北而尊西上以是觀之則設尊之法愈可得而見矣無冪變於祭洗在尊東南水在洗東篚在西洗取節於尊是猶未離於廟門外之西方也饌籩豆脯四脡脡大頂反饌籩豆主於飲也脯四脡猶變於吉也鄉飲酒禮曰薦脯五脡橫祭于其上此亦有祭記但見其異者耳有乾肉折俎二尹縮祭半尹在西孰乾音干尹正也二尹云縮則祭半尹橫矣乾肉在俎而縮亦變於牲三者蓋饌於外西孰上之南籩豆在俎北也尸出執几從席從注曰祝亦告利成入尸乃出几席素几葦席也以几席從執事也尸出門右南面他時尸出則歸此乃南面立者或祝告之以將有事也與席設于尊西北東面几在南此亦右几明其象神賓出復位注曰將入臨之位主人出即位于門東少南婦人出即位于主人之北皆西面哭不止主人位少南者宜稍鄉尸且為婦人當位于其北也衆主人以下亦在婦人之南如臨位而婦人之位則當南上婦人出者宜送神也云哭不止見其哭而出也尸即席坐唯主人不哭洗廢爵酌獻尸尸拜受主人拜送哭復位是時惟主人不哭為將行禮也然則亞獻三獻之時主婦賔長亦不哭特於此見之也主人拜送蓋亦北面如室中之儀薦脯醢設俎于薦東朐在南朐其俱反注曰朐脯及乾肉之屈也屈者在南變於吉尸左執爵取脯擩醢祭之亦祭于籩豆之閒佐食授嚌尸受振祭嚌反之注曰授嚌授乾肉之祭也反之反於佐食佐食反之於俎繼公謂乾肉之祭云嚌者亦因事名之祭酒卒爵奠于南方卒爵而主人不拜且奠之而不酢皆略也南方薦右也後奠者又以次而南主人及兄弟踊婦人亦如之亦如之者亦及內兄弟之屬皆踊也主婦洗足爵亞獻如主人儀無從踊如初賓長洗繶爵三獻如亞獻踊如初佐食取俎實于篚長知丈反如主人儀謂自薦脯醢至反之之外皆如之也從從獻者也如燔之類踊如初亦丈夫先婦人後也取俎謂取乾俎之實尸謖從者奉篚哭從之祝前哭者皆從及大門內踊如初注曰從尸不出大門者猶廟門外無事尸之禮也疏曰云從尸不出大門者猶廟門外無事尸之禮者在廟以廟為限在寢門外以大門為限正祭在廟廟門外無事尸之禮今餞尸在寢門外則大門外無事尸之禮故鄭舉正祭況之繼公謂哭者皆從尸者主於餞尸則宜送之亦男先女後不拜者凡主人於尸無拜送之禮惟大夫賔尸乃拜送之尸出門哭者止注曰以餞於外大門猶廟門賓出主人拜送稽顙注曰送於大門外繼公謂主人既復位宗人告事畢賓乃出也主婦亦拜賓注曰女賓也不言出不言送拜之於闈門之內闈門如今東西掖門繼公謂拜賓之位未詳丈夫說絰帶于庿門外注曰當變麻受之以葛也夕日則服葛者為祔期繼公謂三虞事畢即說絰帶者蓋其節當然也喪服之始絰帶先加故於將變之時亦先說之若受服及柱楣之類皆當為之於既徹之後此特見其始者耳案注云夕日則服葛者為袝期是亦以意言之耳入徹主人不與主人不與則是丈夫自齊衰以下婦人自主婦而下皆得為之矣婦人說首絰不說帶既徹乃說絰下丈夫也婦人指五服之親言也不說帶則不以葛易之閒𫝊曰男子重首婦人重帶婦人質故於其所重者有除無變其三年者至小祥而除之齊衰期以至小功則皆終喪而除之檀弓曰婦人不葛帶是也其緦麻者此時亦不說既退則除之與右記卒哭祭後餞尸無尸則不餞猶出几席設如初拾踊三注曰以餞尸者本為送神也丈夫婦人亦從几席而出繼公謂此節在既陰厭主人復位之後拾踊者謂丈夫婦人及賓也然則於餞尸之時賓亦踊矣上記不見之者文略也哭止告事畢賓出其賓出以下之儀與有尸者同右記無尸不餞之法死三日而殯三月而葬遂卒哭云遂卒哭以其與葬事相屬也記者於既三虞乃更端言此者明葬與卒哭之月數當視殯之日數也然則天子七日而殯諸侯五日大夫三日其葬卒哭之月皆可得而定之矣將旦而祔則薦此薦在三虞之夕也將以來日旦明祔神靈於廟則是時復薦于寢而告之薦謂薦脯醢而奠酒也惟主告神以祔期耳故其禮略曩者既餞尸送神於外也今復薦於寢者以神不可測雖已送之猶不敢必其往也卒辭曰哀子某來日某隮祔爾于爾皇祖某甫尚饗隮升也尚庶幾也卒謂已薦也已薦則祝告以此辭女子曰皇祖妣某氏注曰女孫祔于祖母婦曰孫婦于皇祖姑某氏謂隮祔爾孫婦于皇祖姑某氏也云孫婦者對祖姑之稱其他辭一也注曰來日某隮祔尚饗饗辭曰哀子某圭為而哀薦之饗注曰圭潔也詩曰吉圭為饎凡吉祭饗尸曰孝子繼公謂饗謂饗神也祝既釋告祔之辭主人及祝皆再拜主人出立于牖西祝立于户東如食閒主人及祝又入祝乃釋此饗辭主人及祝又再拜主人出祝乃徹之也此雖主為告祔之饗言之然凡喪祭之饗辭亦皆然爾注云圭潔也案大戴禮云孝嗣侯某潔為而明薦之享注豈據此而訓圭為潔與明日以其班祔注曰卒哭之明日也喪服小記曰祔必以其昭穆亡則中一以上吕與叔曰禮之祔祭各以昭穆之班祔于祖廟有祭即而祭之既除喪而後遷于新廟故此謂之祔沐浴櫛搔翦搔音爪注曰彌自飾也搔當為爪搔翦或為蚤揃揃或為鬋用専膚為折俎取諸脰膉注曰専猶厚也折俎以脰膉變於純吉繼公謂惟云取諸脰膉是不分左右皆用之矣此折俎謂尸祝之外凡執事者之俎也阼俎亦存焉有此俎則有致爵獻賓之禮矣曽子問曰小祥者主人練祭而不旅奠酬於賔賔弗舉禮也然則祔祭其無奠酬之事與以専膚為俎且取諸脰膉明不用體骨也所以然者祔未純吉猶以左胖為神俎其右胖之體骨則不敢以為執事者之俎實蓋辟吉祭神俎之所用者也其他如饋食食音嗣注曰如特牲饋食之事繼公謂其他謂陳設之位與事神事尸之儀及執事者也用嗣尸嗣尸主人子行之次於為虞尸者也以次相繼而用之故曰嗣虞祔異尸者若曰吉凶不可相因然曰孝子某孝顯相夙興夜處小心畏忌不惰其身不寧相息亮反注曰稱孝者吉祭繼公謂此祭兩告之而辭乃惟以孝子為稱者蓋主於祔者也自此以下亦皆祝祝之辭用尹祭注曰尹祭脯也大夫士祭無云脯者今不言牲號而云尹祭亦記者誤矣嘉薦普淖普薦溲酒注曰普薦鉶羮不稱牲記其異者繼公謂普薦亦未詳適爾皇祖某甫以隮祔爾孫某甫尚饗注曰欲其祔合兩告之繼公謂此兩告之是兩祭之也兩祭之而用一尸且不别設几席薦饌蓋祭禮或當然也聘禮記曰賜饔惟羮飪筮一尸若昭若穆祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子此禮差近之右記祔朞而小祥注曰小祥祭名祥吉也繼公謂三年之喪至朞而凶服或有所除故謂之祥再朞而祭祝辭乃曰祥事則此未得正謂之祥也故以小言之自此以下之祭皆於祖廟特祭新死者不復及其皇祖與祔異曰薦此常事注曰祝辭之異者繼公謂此見其與祔辭之異者耳當云敢用某物薦此常事于皇祖某甫也一朞天氣變易重服至是當有變除有變除則當祭故曰常事又朞而大祥曰薦此祥事凶事至是盡除故曰大祥而其辭曰祥事言大者對小之稱中月而禫禫大感反注曰禫祭名也禫之言淡淡然平安意也繼公謂中如中夜之中謂半之也中月者祥之後半月其相去蓋十五日也如以乙丑日祥則或以已卯禫矣記曰三年之喪二十五月而畢其此之謂與是月也吉祭猶未配注曰是月是禫月也配以某妃配某氏也少牢饋食禮祝祝曰孝孫某敢用柔毛剛鬛嘉薦普淖用薦歲事于皇祖伯某以某妃配某氏尚饗繼公謂禫之月即安祭所以安神大戴記言諸侯遷廟事畢乃擇日而祭焉正此意也至是方云吉祭則於祔云其他如饋食者亦大約言之耳猶未配謂孝子之母雖先其父而卒者此時猶未以之配祭也蓋此祭主於安其父之神靈故不及其母與所謂薦其歲事者不同也記以此繼禫而言蓋指一廟者耳若二廟則遷于禰廟而後吉祭也士有二廟則祖在東禰在西右記祥禫儀禮集說卷十四正誤祝命佐食綏祭鄭本綏作墮注曰今文墮為餒繼公謂以文意求之當云授祭墮綏皆誤而餒於授字為差近故但取其近者浴不櫛本云沐浴而鄭注乃云今文曰沐浴則是鄭氏但從古文元無沐字也今本記與注首皆云沐浴蓋𫝊寫者誤衍之宜刪
