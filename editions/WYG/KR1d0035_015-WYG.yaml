body:
  text: 儀禮集説卷十五元敖繼公撰特牲饋食禮第十五注曰於五禮屬吉禮繼公謂此篇言士祭其祖之禮特牲饋食之禮食音嗣特牲謂豕也士祭用三鼎乃以特牲名之者主於牲也少牢放此不諏日諏子須反諏謀也諏日謂諏其所筮之日也大夫將祭而筮有諏日之禮此云不諏日則是祭禮之序先尊後卑亦可見矣不諏日則所筮之日亦在旬之内矣所以下於大夫少牢禮諏日用丁已筮旬有一日及筮日主人冠端𤣥即位于門外西面注曰冠端𤣥𤣥冠𤣥端門謂廟門繼公謂筮日筮之日也士筮當朝服今乃𤣥端者不可踰其祭服也筮與祭皆與神交故主人之服不宜有異子姓兄弟如主人之服立于主人之南西面北上注曰小宗祭而兄弟皆來與焉宗子祭則族人皆侍繼公謂子姓主人之子也言子復言姓未詳其意先子姓而後兄弟葢以主人之服親䟽為序也若行禮之次則自長者始是時子姓而下之服亦𤣥端統於主人也有司羣執事如兄弟服東面北上有司羣執事者公臣私臣之共筮事者也此時未有賔故有司羣執事皆如賔位西方東面北上席于門中闑西閾外筮人取筮于西塾執之東面受命于主人云取筮于西塾見其所饌者與士冠禮同也亦抽上韇兼執之筮人説見首篇宰自主人之左賛命命曰孝孫某筮來日某諏此某事適其皇祖某子尚饗左當作右儀禮他篇凡於賛命者皆言自右與少儀所謂詔辭自右者合惟此經言自左似無他義蓋字誤耳左當作右來日某亦謂丁若己也某事即歳事也此適其皇祖某子謂主人適其廟而祭之也某子者祖諡也稱其諡則是指大夫之為祖者言也亦假設之辭耳士祭大夫之為祖者其禮如此所以明其從生者之爵也尚饗謂其日若吉則庶幾其神饗之也下筮尸放此不言以某妃配變於大夫之筮辭也若其祝辭則亦當言之筮者許諾還即席西面坐卦者在左卒筮冩卦筮者執以示主人還音旋下並同還亦右還也冩卦卦者也主人受視反之筮者還東面長占卒告于主人占曰吉長知丈反下除長脅餘並同長占長者以次占之此與旅占互見也若不吉則筮逺日如初儀張子曰祭之筮日若再不吉則止據儀禮唯有筮逺日之文不云三筮筮日之禮止是二筮先筮近日後筮逺日不從則直用下旬逺日蓋亦足以致聼於鬼神之意而祀則不可廢繼公謂即於其日改筮之亦見其異於大夫也逺日見首篇宗人告事畢亦徹筮席乃告右筮日前期三日之朝筮尸如求日之儀命筮曰孝孫某諏此某事適其皇祖某子筮某之某為尸尚饗注曰某之某者字尸父而名尸也字尸父尊鬼神也大夫士以孫之倫為尸䟽曰曲禮云為人子者祭祀不為尸然則尸卜筮無父者祭祖則用孫列皆取於同姓之適孫也繼公謂如求日之儀兼若不吉而改筮者言也命筮之辭異故特見之明其餘皆同也某之某謂某之子某也春秋傳曰潘尫之黨申鮮虞之摯皆謂其子也前期三日説見士冠禮案注云大夫士以孫之倫為尸不及天子諸侯者天子諸侯所祭者逺為尸者不必皆其孫之倫或但以昭穆耳右筮尸乃宿尸亦目下事也主人立于尸外門外子姓兄弟立于主人之後北面東上注曰不東面者來不為賔客子姓立于主人之後上當其後繼公謂上言筮尸如求日之儀則是筮時兄弟咸在所筮者亦存焉筮之而吉不即告之乃於其既歸也然後親宿之於其門者尊之而不敢苟也北面者亦尊尸若不敢必其西面見已然尸如主人服出門左西面出門左西面見賔客之正位也主人北面尸不南面見之者辟尊者之禮也主人辟皆東面北上辟音避注曰順尸繼公謂辟者起敬也蓋在尸出門時皆皆子姓兄弟也是時子姓兄弟亦立于主人之後而上當其後也主人再拜尸答拜答拜亦再拜尸不先拜者以將為尸故變於賔主禮宗人擯辭如初卒曰筮子為某尸占曰吉敢宿注曰宗人擯者釋主人之辭如初者如宰賛命筮尸之辭卒曰者著其辭所易也祝許諾致命注曰受宗人辭許之𫝊命始宗人祝北面至於𫝊命皆西面受命東面釋之繼公謂祝事尸者也故於此即使之致命以見其意云尸許諾主人再拜稽首注曰其許亦宗人受於祝而告主人繼公謂拜稽首亦尊尸也尸既許諾則成為尸故於此不答拜尸入主人退尸既許諾則有祖道故不俟主人之退而先入見其尊亦變於大夫尸也先入而不揖辟君禮也聘禮公與羣臣夕幣乃揖而先入少牢云主人退尸送揖不拜右宿尸宿賔賔如主人服出門左西面再拜主人東面答再拜宗人擯曰某薦歳事吾子將涖之敢宿注曰歳事歳時之祭事繼公謂此云吾子將涖之是曏者賔既許之矣然則筮日之後亦當有戒賔之儀如士冠禮所記者經不見之文略耳筮尸宿尸宿賔皆同日為之故下文别云厥明以别之賔曰某敢不敬從主人再拜賔答拜主人退賔拜送主人宿辭擯者釋之是賔之對辭亦擯者𫝊之矣然則凡主人親戒宿其儀皆然經不盡見之也右宿賔厥明夕陳鼎于門外北面北上有鼏門外不言東方可知也北面北上亦放祭時陳鼎之位也鼎而鼏亦為不宜塵棜在其南南順實獸于其上東首獸腊也獸言東首而不及足者以其足左右出故也士腊用兎牲在其西北首東足注曰其西棜西也東足尚右也牲不用棜以其生䟽曰豕縳其足陳之東足寢其左繼公謂此士之吉祭牲宜東上今腊在棜而豕反居西又異其所鄉是無所上也以其未即殺故生死不可以相統與設洗于阼階東南壺禁在東序豆籩鉶在東房南上几席兩敦在西堂敦音對下並同豆籩鉶蓋在東房之東墉下南上者豆二以並在南二籩次之此未實之故南上之文惟主於器士家亦有左右房於此見之矣主人及子姓兄弟即位于門東如初注曰初筮位也賔及衆賔即位于門西東面北上此時方修祭事助祭之賔宜來視之以其不在曏者有司羣執事之中故此雖東面北上而不蒙如初之文賔既位於此則公臣私臣不敢與之齒而位於他所矣下文云宗人祝立于賔西北東面南上又記曰公有司門西北面東上私臣門東北面西上足以明祭時有司之屬不在賔位也審矣宗人祝立于賔西北東面南上祭事將至宗祝之位宜異於有司故外位在此南上宜變於賔主人再拜賔答再拜三拜衆賔衆賔答再拜衆賔答一拜言再者字誤也主人揖入兄弟從賔及衆賔從即位于堂下如外位如外位則子姓宗人祝皆在其中矣不言者省文也子姓之入亦先於兄弟宗祝之入宜後於衆賔宗人升自西階視壺濯及豆籩反降東北面告濯具宗人亦既立於賔西北之位乃升於壺言濯以見其餘不言敦鉶几席省文也東北面鄉主人濯具謂所濯者已具也此亦有不必濯者乃云濯具者緫言之耳賔出主人出皆復外位惟言賔主人出文又省矣宗人視牲告充雍正作豕注曰充猶肥也北面以䇿動作豕視聲氣繼公謂雍正亦公有司給事者也云雍正者以事名之宗人舉獸尾告備舉鼎鼏告潔備具也此所告之儀亦皆東北面請期曰羹飪注曰期祭早晏之期也繼公謂言以羹飪為節則質明可知請期而主人自告之亦異於大夫請期蓋東面既得期西北面告賔東北面告兄弟告事畢賔出主人拜送送于外門外右視濯視牲為期夙興主人服如初立于門外東方南面視側殺注曰側殺殺一牲繼公謂服如初冠端𤣥也東方蓋當東塾少南鼎之西也主婦視饎爨于西堂下注曰饎宗婦為之爨近西壁南齊于坫古文饎作糦周禮作􅐪繼公謂視之當東面爨亦東面亨于門外東方西面北上亨音烹此亦以亨者見爨之面位也東方於陳鼎之豦則又東矣北上豕爨在北魚腊亞之羹飪實鼎陳于門外如初初視濯時也士昬禮既實鼎陳于門外東方北面北上謂此時也是言如初則上文所謂門外亦其東方明矣尊于户東𤣥酒在西注曰户室户實豆籩鉶陳于房中如初注曰如初者取而實之既則反之繼公謂如初亦如其南上之位也記曰賔與長兄弟之薦自東房其餘在東堂然則祝主人主婦賔長長兄弟之豆籩亦皆二以並相繼公而陳之於鉶之北矣執事之俎陳于階間二列北上注曰二列者因其位在東西不升鼎者異於神繼公謂執事謂凡執祭事者也主人及祝以下之通稱其俎二列北上東列則阼俎為上西列則祝俎為上其内兄弟之俎則當次於兄弟也此執事之文所包者廣與前後所云者不同盛兩敦陳于西堂藉用萑几席陳于西堂如初注曰盛黍稷者宗婦也盛音成下同藉在夜反萑音桓繼公謂盛乃藉之重黍稷也此云如初則上經在西堂之下其有脱文與尸盥匜水實于槃中簞巾在門内之右亦匜在槃中南流簞巾在其右盥以槃匜説見公食大夫禮祝筵几于室中東面几亦右之右亨饎陳設主婦纚笄宵衣立于房中南面大夫妻祭服褖衣侈袂則此宵衣乃次於褖衣者耳纚笄士妻首飾之常言之者見其無異飾也凡婦人助祭者與主婦同服主人及賔兄弟羣執事即位于門外如初此於賔兄弟之下言羣執事則是指公有司私臣而言也宗人祝亦在賔西北其他則在門西若門東與其在内位同上經不見門東門西之位而亦云如初者其文主於兄弟以上而略於羣執事也宗人告有司具告主人也告之亦宜東北面既告則反于賔西北主人拜賔如初揖入即位如初初視濯時也佐食北面立于中庭佐食主人兄弟之佐尸食者記曰佐食於旅齒於兄弟是也曏於門外猶在兄弟之位至此乃立于中庭以事將至宜異其位也此中庭謂東西之中其南北則參分庭一在北與右即位主人及祝升祝先入主人從西面于户内注曰祝先入接神宜在前也少牢饋食禮曰祝盥于洗升自西階主人盥升自阼階祝先入南面繼公謂云及祝則是主人先升也先升後入蓋俟於堂案注引少牢云祝先入南面蓋疑此經有闕文也恐或然主婦盥于房中薦兩豆葵菹蝸醢醢在北蝸音螺注曰盥盥于内洗宗人遣佐食及執事盥出此執事謂左人及取俎俎者賤於右人故先出不遣賔長者賔長與主人皆在右宜同出也主人降及賔盥出主人在右及佐食舉牲鼎賔長在右及執事舉魚腊鼎除鼏主人降亦宗人詔之也賔長在右謂長賔在魚鼎之右衆賔長在腊鼎之右也然則魚腊之左者亦衆賔與凡吉事除鼏于外凶事除鼏于内除鼏亦右人宗人執畢先入當阼階南面注曰畢狀如义雜記曰枇用桑長三尺畢用桑三尺刋其本與末枇畢同材明矣今此朼用棘心則畢亦用棘心少牢饋食及虞無义者乃主人不親舉耳少牢大夫祭不親舉虞䘮祭也主人未執事袝練祥執事用桑义繼公謂宗人執畢所以指教其錯鼎之處也故宜先入當阼階南面者示其當錯於此為之節也其南北之節亦南於洗西與鼎入設當阼階士禮也大夫則當東序國君則在碑南此用畢者以主人親舉重其事也鼎既錯則反之於外而復位與大射儀曰小臣師設楅司馬正東面以弓為畢則畢但主於指教設器者明矣鼎西面錯右人抽扄委于鼎北錯七故反下同注曰右人謂主人及二賔繼公謂鼎錯於東方西面順主人之面位也上者亦南于洗西右人既委扄皆西面俟于鼎東賛者錯俎加匕注曰賛者執俎及匕從鼎入者其錯俎西縮加匕東柄既則退而左人北面也繼公謂賛者取匕俎于東塾東執以上而錯俎於鼎西加匕於鼎上而肵俎亦在豕俎之北也此賛者蓋三人其二人各合執二俎一人兼執三匕與知取匕俎于東塾東者士虞禮匕俎在西塾之西此士吉祭當反之也乃朼注曰右人也左人載之繼公謂朼亦當作匕佐食升肵俎鼏之設于阼階西肵音祈注曰肵俎謂心舌之俎也郊特牲曰肵之為言敬也言主人之所以敬尸繼公謂以少牢饋食禮例之則此亦右人先升心舌而佐食載惟言佐食升之其文省與設之蓋亦西縮鼏當作冪卒載加匕于鼎主人升入復位賔匕者於是亦復位俎入設于豆東魚次腊特于俎北注曰入設俎載者繼公謂少牢禮曰序升自西階相從入主婦設兩敦黍稷于俎南西上及兩鉶芼設于豆南南陳鉶不言北上者其實同也亦先設北者宗婦不賛敦鉶者辟内子禮也凡敦鉶皆特執於少牢禮備見之祝洗酌奠奠于鉶南遂命佐食啓㑹佐食啓㑹郤于敦南出立于户西南面注曰後酌者酒尊要成也少牢饋食禮啓㑹乃奠之繼公謂酌奠酌其所奠之酒也不云酒而云奠因事名之主人再拜稽首祝在左注曰祝在左當為主人釋辭於神也祝祝曰孝孫某敢用剛鬛嘉薦普淖用薦某事于皇祖某子尚饗繼公謂主人拜為食具也於此乃云祝在左則曏者南面信矣祝在左説見聘禮卒祝主人再拜稽首祝之又反此拜為已祝也右設饌祝神祝迎尸于門外注曰尸自外來代主人接之就其次而請周禮掌次凡祭祀張尸次繼公謂迎尸不拜者禮不主於己代主人迎之耳其或有拜妥尸之類乃從於主人為之也門廟門主人降立于阼階東注曰主人不迎尸成尸尊尸所祭者之孫也祖之尸則主人乃宗子禰之尸則主人乃父道事神之禮廟中而已出迎則為厭繼公謂阼階東亦直序西面主人位於此則子姓兄弟在主人之南者其亦南於洗西與案注之厭字蓋用䘮服傳文也似失其義欲改作屈尸入門左北面盥宗人授巾注曰侍盥者執其器就之執簞者不授巾賤也少牢饋食禮曰祝先入門右尸入門左尸至于階祝延尸尸升入祝先主人從注曰少牢饋食禮曰尸升自西階入祝從主人升自阼階祝先入主人從右尸入尸即席坐主人拜妥尸尸答拜執奠祝饗主人拜如初注曰饗辭取於士虞記則宜云孝孫某圭為孝薦之饗舊説云明薦之繼公謂饗饗神也凡饗祝之辭雖或言於尸之前實主為神也如初再拜稽首也案注引舊説蓋據戴禮而言也祝命挼祭尸左執觶右取菹㨎于醢祭于豆間挼當讀作授㨎如悦反挼祭即授祭也挼字蓋誤祝命佐食授尸祭尸於是祭薦欲及其授祭之節也佐食取黍稷肺祭授尸尸祭之祭酒啐酒告㫖主人拜尸奠觶答拜祭鉶嘗之告㫖主人拜尸答拜注曰酒與鉶齊敬共之惟恐不美告之美逹其心明神享之繼公謂尸告㫖而主人先拜者尸尊也祝命爾敦佐食爾黍稷于席上他篇言爾敦者爾黍而已此併及稷未詳設大羹湇于醢北大音泰注曰士虞禮曰大羹湇自門入繼公謂此湇為尸設乃在左者以其居神位故變於常禮也虞禮湇在右者䘮祭也凡祭而設湇尸皆不以之舉肺脊以授尸尸受振祭嚌之左執之乃食食舉乃食乃以右手食食也既食食則食舉所以安之主人羞肵俎于腊北肵俎一而已故主人可以親設之神俎多宜使賔也不言降與升文省少牢禮曰主人羞肵俎升自阼階尸三飯告飽祝侑主人拜飯音反下同注曰三飯告飽禮一成也侑勸也或曰又勸之使又食少牢饋食禮侑辭曰皇尸未實侑繼公謂此祭以饋食為名故當食而尸尤尊雖主人拜亦不答也佐食舉幹尸受振祭嚌之佐食受加于肵俎舉獸幹魚一亦如之注曰幹長脅也獸腊繼公謂此一舉也凡於尸每食必舉牲體若骨者明主人以此供尸食也是雖連舉三俎之實然同時相接為之故但主於牲而揔為一舉耳下文放此案注云幹長脅也今攷長脅即正脅耳尸俎有長脅短脅凡舉脊脅必以正者故知此幹為長脅也尸實舉于菹豆於既三飯而奠舉士吉祭之禮然爾士虞則不食舉卒食乃授之是其異也佐食羞庶羞四豆設于左南上有醢少牢饋食禮羞兩胾兩醢此亦當放之也左亦醢之北湆之南也南上者胾醢相閒兩胾各在醢之南也四豆乃不綪者統於正豆也正豆兩而為一列故此豆雖有四亦不宜綪以異之尸又三飯告飽祝侑之如初舉骼及獸魚如初注曰禮再成也獸魚如初者獸骼魚一也繼公謂此再舉也尸又三飯告飽祝侑之如初舉肩及獸魚如初注曰禮三成繼公謂此三舉也獸謂獸肩佐食盛肵俎俎釋三个注曰佐食取牲魚腊之餘盛於肵俎繼公謂俎釋三个不可遽空神俎也少牢饋食禮於每牲之俎惟釋脊脅皆俎實之下者也然則此牲俎之所釋者亦宜放之其正脊長脅短脅與腊俎三个蓋如牲俎也舉肺脊加于肵俎反黍稷于其所此蒙佐食之文皆謂佐食舉之反之也其所俎南也肺脊在菹豆右尸食主人洗角升酌酳尸注曰不用爵者下大夫也繼公謂不言降以升見之也尸拜受主人拜送尸祭酒啐酒賔長以肝從尸左執角右取肝㨎于鹽振祭嚌之加于菹豆置肝于菹豆尊者之吉禮然也卒角祝受尸角曰送爵皇尸卒爵主人拜尸答拜注曰曰送爵者節主人拜繼公謂云皇尸卒爵明主人當送之也後言之者見送爵之辭為指主人尸卒爵而不拜既乃俟主人先拜送者所以深見其尊尸也祝釋辭其東面於尸席前之東與祝酌授尸尸以醋主人醋音昨祝不洗而酌注見前篇主人拜受角尸拜送主人退佐食授挼祭注曰退者進受爵反位古文醋作酢繼公謂此挼字亦因與授字相類而衍也以神俎敦之黍稷肺祭授之者象尊者賜之食然主人坐左執角受祭祭之祭酒啐酒進聼嘏進聼嘏進於尸前而聼其嘏已之辭下文云親嘏主人是也又以少牢饋食禮之所言者參之則此嘏云者蓋致福於人之稱佐食摶黍授祝祝授尸尸受以菹豆執以親嘏主人注曰獨用黍者食之主繼公謂饋食之禮主於黍稷而黍又其尊者故特取之以通其意焉然則逺辟大夫禮也少牢饋食禮所載嘏辭乃祝傳尸嘏者也此尸親嘏其辭之首與彼異主人左執角再拜稽首受復位詩懐之實于左袂挂于季指卒角拜尸答拜挂音卦注曰實于左袂便右手也繼公謂左執角為右手將有事也詩字未詳或曰敬慎之意内則曰詩負之亦此意也拜不奠爵受黍不祭皆異於大夫也季指左手之小指也挂袪於指以黍在袂中故也古者袪挾於袂然猶挂之者慮拜時或遺落也主人拜受黍而尸不答拜者以其受神恵故也主人出冩嗇于房祝以籩受出亦執角以出也籩虗籩也此單言嗇少牢言嗇黍皆未詳右主人酳尸尸酢主人筵祝南面筵祝蓋於其立處之西亦有司為之下放此主人酌獻祝祝拜受角主人拜送設菹醢俎注曰菹醢皆主婦設之佐食設俎繼公謂士虞與少牢禮皆云祝與佐食坐受爵此不言坐如之可知菹醢葵菹蝸醢也祝左執角祭豆興取肺坐祭嚌之興加于俎坐祭酒啐酒此離肺也當奠角乃興取肺坐絶祭嚌之既執角乃祭酒不言奠角執角與絶者亦文略耳記曰祝俎離肺一以肝從祝左執角右取肝㨎于鹽振祭嚌之加于俎卒角拜主人答拜受角肝加于俎辟尊者禮也下文主人主婦之儀亦放此少牢饋食禮曰不興加于俎酌獻佐食佐食北面拜受角主人拜送佐食坐祭卒角拜主人答拜受角降反于筐升入復位上不言坐故於祭見之右主人獻祝佐食主婦洗爵于房酌亞獻尸亞獻更用爵以見主人之用角者有為為之耳獻以爵正禮也獻尸不夾拜辟内子之禮也尸拜受主婦北面拜送注曰北面拜者辟内子之禮也大夫之妻拜於主人北西面宗婦執兩籩户外坐主婦受設于敦南注曰兩籩棗栗棗在西繼公謂宗婦賛豆籩户外坐士祭禮然也少牢饋食禮主婦與賛者授受於室中亦異者也士虞禮籩設于㑹南此宜如之乃不云㑹者可知也祝賛籩祭尸受祭之祭酒啐酒注曰籩祭棗栗之祭也其祭之亦於豆祭繼公謂惟云尸受則是祝皆取二籩之祭以授之也亦左執爵乃受之兄弟長以燔從尸受振祭嚌之反之尸取燔於俎乃云受者羞燔者執俎以進之亦相授之義也故於尸以受立文此亦左執爵乃受燔羞燔者受加于肵出尸反其燔於俎羞燔者則以俎受之也既則執之以加于肵尸卒爵祝受爵命送如初注曰送者送卒爵繼公謂初亦主人儀也酢如主人儀注曰尸酢主婦如主人儀者自祝酌至尸拜送如酢主人也不易爵辟内子之禮主婦適房南面佐食挼祭主婦左執爵右撫祭祭酒啐酒入卒爵如主人儀房中南面主婦之正位也經因事見之挼亦當作授祭亦謂黍稷肺祭也佐食授祭主婦撫之而不取亦異於内子也既撫則佐食以祭置于地主婦入于室中北面而立飲如主人儀謂卒爵拜尸答拜也入室卒爵亦以曏者於此拜受故也右主婦獻尸尸酢主婦獻祝籩燔從如初儀主婦當更酌洗于房中乃酌獻祝略如内子之禮蓋男子不承婦人爵也初儀即主人獻祝之禮此惟無祭俎一節餘則如之也籩與豆燔與肝雖異其祭之之儀則同故亦蒙如初祝亦兩籩其設之􅀥在菹西栗在棗南及佐食如初卒以爵入于房注曰及佐食如初如其獻佐食則拜主人之北西面也繼公謂及謂獻及之也初者亦主人獻佐食之儀少牢禮主婦獻祝及佐食皆西面於主人之北答拜之右主婦獻祝佐食賔三獻如初燔從如初爵止注曰初亞獻也繼公謂不言洗爵升酌可知也如初謂尸拜受主婦拜送也尸於舉酌之末亦欲主人而下皆受舉爵之禮故止爵以見其意於是主人主婦交相致爵既而遂獻賔以至於私人而終尸意焉其爵止之節在羞燔者出之時也賔長亦出而復位右賔長獻尸酌止席于户内注曰席自房來繼公謂設席蓋於主人所立處之南席亦南上未受爵而設席變於大夫主婦洗爵酌致爵于主人主人拜受爵主婦拜送爵注曰主婦拜拜於北面也繼公謂是亦獻也乃不云獻者酒乃己物不可以獻為名故謂之致爵亦拜受于席宗婦賛豆如初主婦受設兩豆兩籩注曰初賛亞獻也繼公謂賛豆賛豆與籩也此豆兼籩言之省文耳如初户外坐也主婦受於户外而設於席前其豆則菹在北其籩則􅀥在菹北栗在􅀥西也設豆東面設籩南面與此宗婦賛者亦一人耳既授兩豆復取兩籩于房俎入設注曰佐食設之䟽曰有司不儐尸者主婦致爵於主人時佐食設俎繼公謂設于豆西主人左執爵祭薦宗人賛祭奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒啐酒此賛祭薦蓋以籩祭授之祭離肺之儀鄉飲酒禮備矣肝從左執爵取肝㨎于鹽坐振祭嚌之宗人受加于俎燔亦如之坐字衍宗人既受肝則主人復右執爵矣一進酒而兩進從俎者欲其與尸祝之兩獻者同見其尊也主婦禮亦如之興席末坐卒爵拜席末席上之北於此卒爵近於受爵之處也曏者受爵在所設席之北不降席者亦因尸禮也主婦答拜受爵酌醋左執爵拜主人答拜坐祭立飲卒爵拜主人答拜主婦出反于房酢不易爵者禮婦人承男子後多不易爵則其自酢又可知矣主婦自酢者主人辟尸不敢酢主婦主婦逹其意也下自酢之義皆類此反奠爵于篚也左字非誤則衍内則曰凡女拜尚右手右主婦致爵于主人自酢主人降洗酌致爵于主婦席于房中南面主婦拜受爵主人西面答拜宗婦薦豆俎從獻皆如主人不言升酌文省耳主人於主婦亦謂之致爵者夫妻一體也主婦席南面變於大夫不賔尸之禮也亦拜受于席豆亦兩豆兩籩俎牲俎也從獻肝燔也皆如主人謂其受爵以前之禮也所異者其不用賛與此席蓋於房中之北堂主人更爵酌醋卒爵降實爵于篚入復位更爵更取在内篚者也男子不承婦人爵雖自醋猶更之内篚在洗東乃不因而洗之者以其自醋也自醋而不洗亦因尸之醋禮也此醋亦在房中西面其他儀皆與主婦自醋者略同以有成禮故略而不見之卒爵則坐惟此與主婦異耳位室中位凡男子易爵于内篚惟醋于房中者得由便為之不然則否右主人致爵于主婦自酢三獻作止爵注曰賔也謂三獻者以事命之作起也舊説云賔入户北面曰皇尸請舉爵繼公謂致爵之禮成亦足以少塞尸之止爵意矣於此而作止爵亦宜也若俟畢獻乃為之則乆留尊者之爵非所以為敬尸卒爵酢酌獻祝及佐食洗爵酌致于主人主婦燔從皆如初更爵酢于主人卒復位注曰洗乃致爵為異事且以承佐食賤新之繼公謂賔獻祝亦北面拜於户西獻佐食亦西面拜於主人之南也賔既獻佐食則室中之事畢矣乃復致爵者因上禮也皆皆尸卒爵以下也自尸卒爵以至及佐食如主人酢獻之禮也致于主人者如主婦致爵之禮也致于主婦者如主人致爵之禮也燔從者如亞獻祝及致于主人主婦之禮也言此則是其從獻之物僅有此耳亦見其殺於初者也致于主人主婦乃惟酢于主人者為禮主於尊者也賔更爵自酢其義與主人之自酢者同更爵不言降與升酌又不言如初亦文省右賔作止爵尸酢賔賔獻祝佐食致于主人主婦自酢主人降阼階西面拜賔如初洗賔辭洗注曰拜賔為將獻之如初如視濯時繼公謂階下當有前字初謂三拜衆賔衆賔皆答一拜也將獻而旅拜賔賔一人辭洗則是助祭之賔其尊卑但與鄉飲酒之衆賔同耳少牢下篇曰主人洗爵長賔辭主人奠爵于篚興對卒洗揖讓升酌西階上獻賔獻賔蓋西南面也賔北面拜受爵主人在右答拜薦脯醢設折俎自賔以下其設薦俎者皆以私人為之與賔左執爵祭豆奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒卒爵拜主人答拜受爵酌酢奠爵拜賔答拜豆亦兼籩言也賔云卒爵拜主人云奠爵拜文互見耳主人坐祭卒爵拜賔答拜揖執祭以降西面奠于其位位如初薦俎從設注曰位如初復其位東面繼公謂執祭脯也云位如初嫌既獻則位或異也右主人獻賔長自酢衆賔升拜受爵坐祭立飲薦俎設于其位辯主人備答拜焉降實爵于篚辯音徧下並同注曰鄉飲酒記曰立卒爵者不拜既爵備猶盡也繼公謂立飲亦為不拜既爵也其説見鄉飲酒與其記辯謂皆有薦俎也其薦俎亦於毎獻一人則設之備答拜謂悉答之也其拜亦在每人受爵之後右主人獻衆賔尊兩壺于阼階東加勺南枋西方亦如之為賔及兄弟設之也西方之尊其在西階西與設尊於堂下者欲其便且别於大夫禮也兩壺皆酒者别於上尊也主人洗觶酌于西方之尊西階前北面酬賔賔在左於此酬賔終正禮也酬賔於西方故酌西方之尊必酬之者重其為賔也酬於下者宜近賔位便其奠之主人奠觶拜賔答拜主人坐祭卒觶拜賔答拜此賔主之拜亦皆北面主人洗觶賔辭主人對少牢下篇云主人奠爵于篚對卒洗酌西面賔北面拜注曰西面者鄉賔位立於西階之前賔所答拜之東北主人奠觶于薦北不授而奠酬之正禮薦北薦左也既奠則復位北面拜文不具耳此奠觶于庭皆將舉者也而或在薦左或在薦右蓋各從其便而不取奠者於左將舉於右之義也賔坐取觶還東面拜主人答拜賔奠觶于薦南揖復位注曰還東面就其位薦西繼公謂賔坐取觶而興象受之也賔取觶亦西面還而東面拜謝主人之奠觶也執奠觶而拜所以見其意東面而奠于薦南亦便也復位主人復阼階下西面位也奠而不辭既則以拜謝之皆變於飲酒之儀也右主人酬賔長主人洗爵獻長兄弟于阼階上如賔儀注曰酬賔乃獻長兄弟者獻之禮成於酬先成賔禮也繼公謂此獻于阼階上異内外也獻亦西南面賔賔長也如賔儀兼酢言也右主人獻長兄弟自酢洗獻衆兄弟如衆賔儀獻衆兄弟與獻長兄弟之禮相屬乃為之洗者以其承已自酢之後故須洗之也然則獻衆賔於自酢之後則亦宜為之洗矣上經不言者文略耳右主人獻衆兄弟洗獻内兄弟于房中如獻衆兄弟之儀注曰内兄弟内賔宗婦也如衆兄弟如其拜受坐祭立飲設薦俎於其位而辯内賔其位在房中之尊北有司徹曰主人洗爵内賔於房中南面拜受爵繼公謂獻之蓋西北面主人西面答拜更爵酢卒爵降實爵于篚入復位注曰内賔之長亦南面答拜繼公謂更爵亦在房中者也獻畢乃酢其長亦猶賔致爵于主人主婦而受爵酢于主人之義也不言酢儀者其禮可得而推故爾右主人獻内兄弟自酢長兄弟洗觚為加爵如初儀不及佐食洗致如初無從注曰大夫士三獻而禮成多之為加也不及佐食無從殺也致致於主人主婦繼公謂無從謂所獻所致者皆無燔從也無從則不啐酒而卒爵亦其異者右長兄弟為加爵衆賔長為加爵如初爵止曏者三獻用爵其爵止而主人主婦之致亦用爵蓋放尸器而用之也此爵止之後室中及庭中行禮者皆用觶以是推之則此加爵當用觶經不見之文略耳如初亦如亞獻也此亦無從尸祭酒啐酒而爵止矣尸於舉觶之節又欲觶之徧行也故止之以見其意蓋與三獻而止爵者相類也右衆賔長為加爵嗣舉奠注曰嗣主人將為後者大夫之嗣子不舉奠辟諸侯繼公謂舉奠謂舉奠觶而飲之重適故特為此禮是惟主於有適者言之無適則已盥入北面再拜稽首盥盥于洗也再拜稽首重尊者之賜也北面亦於户西尸執奠進受復位祭酒啐酒尸舉肝舉奠左執觶再拜稽首進受肝復位坐食肝卒觶拜尸備答拜焉注曰備答拜毎拜答之繼公謂奠鉶南之觶也肝即曏之加于菹豆者也位室中之位也坐卒觶亦異其室中之禮凡子姓受主人之獻亦立卒爵不拜既爵舉奠洗酌入尸拜受舉奠答拜尸祭酒啐酒奠之舉奠出復位注曰奠之者復神之奠觶繼公謂舉奠酌以進尸反尸之奠觶耳尸祭啐奠之如初禮新之右嗣舉奠兄弟弟子洗酌于東方之尊阼階前北面舉觶于長兄弟如主人酬賔儀注曰弟子後生也繼公謂如主人酬賔儀者是亦在長兄弟之右也此有代主人酬長兄弟之意故位與主人同主人酬賔奠觶于薦北此則當奠于薦南而長兄弟則取觶還西面奠于薦北也右兄弟之弟子舉觶于其長宗人告祭脀注曰脀俎也所告者衆賔衆兄弟内賔也獻時設薦俎于其位至此告之祭使成禮也其祭皆離肺不言祭豆可知繼公謂所告者衆賔衆兄弟内兄弟也公有司私臣亦存焉將羞乃告祭脀蓋與燕禮大夫祭薦之意同也記言衆賔以至私臣皆肴脀膚一離肺一又曰公有司獻次衆賔私臣獻次兄弟乃羞羞庶羞也此但以羞為文則是自尸而下以至於私臣皆然也大夫祭禮羞于尸祝主人主婦與羞于賔兄弟内賔及私臣不同時又加以内羞此則一之亦士禮異也右祭脀乃羞賔坐取觶阼階前北面酬長兄弟長兄弟在右注曰薦南奠觶繼公謂長兄弟在右賔在左各象其位也賔奠觶拜長兄弟答拜賔立卒觶酌于其尊東面立長兄弟拜受觶賔北面答拜揖復位注曰其尊長兄弟尊也此受酬者拜亦北面繼公謂阼階東之尊為長兄弟而下設之故曰其尊若彼自有之然西方之尊亦如之東面立變於鄉飲酒酬者之儀也鄉飲酒禮賔東南面酬主人主人西南面酬介此東面酬長兄弟亦惟北面受之下放此長兄弟西階前北面衆賔長自左受旅如初注曰初賔酬長兄弟繼公謂初謂奠觶拜受旅者答拜也長兄弟卒觶酌于其尊西面立受旅者拜受長兄弟北面答拜揖復位衆賔及衆兄弟交錯以辯皆如初儀錯如字交錯謂二黨互相酬也初儀即上文所言相酬之禮右賔與兄弟旅酬為加爵者作止爵如長兄弟之儀奠觶既舉其禮一終於此可以作止爵矣不俟再旅者其意與三獻作止爵於獻賔之前者同右衆賔長作止爵長兄弟酬賔如賔酬兄弟之儀以辯卒受者實觶于篚如謂儀略同耳其異者則以意定之右兄弟與賔旅酬賔弟子及兄弟弟子洗各酌于其尊中庭北面西上舉觶於其長奠觶拜長皆答拜舉觶者祭卒觶拜長皆答拜此中庭東西之中也其南北之節則皆少南於其長之前與西上者尊賔之弟子也是時長皆在東西面之位而拜之卒觶坐卒觶也此觶乃代主人舉之故其儀與鄉飲舉觶者略同舉觶者洗各酌于其尊復初位長皆拜舉觶者皆奠觶于薦右薦右賔之薦南兄弟之薦北也奠於此者因其所改奠之處也縁長者意不欲勞其復遷之此觶為無筭爵始長皆執以興舉觶者皆復位答拜長皆奠觶于其所皆揖其弟子弟子皆復其位注曰復其位者東西面位弟子舉觶於其長所以序長㓜教孝弟拜亦皆北面繼公謂執以興亦象受之其所薦右也揖揖之使復其位爵皆無筭此亦賔先舉奠觶酬兄弟長交錯以辯卒飲者洗酌反奠於故處長兄弟又舉奠觶酬賔長亦交錯以辯卒飲者洗酌亦反奠於故處賔及兄弟又迭舉奠觶皆如初禮終而復始故云爵皆無筭若其儀之與旅酬異者惟不拜耳右賔弟子兄弟弟子各舉觶于其長遂無筭爵利洗散獻于尸酢及祝如初儀降實散于篚散息但反下及記並同注曰利佐食也更言獻者以利侍尸禮將終宜一進酒嫌於加酒亦當三也不致爵禮又殺也繼公謂佐食云利未詳或曰以其善佐尸食而宜於尸故曰利利之言宜也未知是否右佐食獻尸祝主人出立于户外西面户外户東少南也不立于阼亦變於大夫祝東面告利成東面于户外之西尸謖祝前主人降注曰少牢饋食禮曰祝入尸謖主人降立于阼階東西面祝先尸從遂出于廟門其儀士虞禮備矣祝反及主人入復位命佐食徹尸俎俎出于廟門注曰少牢饋食禮曰有司受歸之繼公謂言及見其先入也闕尸俎胙俎也徹庶羞設于西序下徹者亦佐食也徹庶羞亦改設者尊尸食故未即去之西序下其東也此先徹庶羞亦與大夫禮相變右尸出筵對席佐食分簋鉶筵對席設對席于饌東也此於神席亦為少北其名義與昬禮之對席同下篇放此簋即敦之異名分簋鉶者以簋分簋實以鉶分鉶羹也為將餕分之或曰以尸之兩敦兩鉶分與二􅅪也其敦則上􅅪黍而下􅅪稷亦異於大夫之􅅪者惟用黍也未知孰是宗人遣舉奠及長兄弟盥立于西階下東面北上舉奠子姓也云及長兄弟則主人之子位在長兄弟之上明矣立于西階下俟命也其位蓋在賔之東北祝命嘗食􅅪者舉奠許諾升入東面長兄弟對之皆坐佐食授舉各一膚􅅪音俊命告也甞食二字或當在􅅪者之下舉奠東面升尸席也長兄弟對之升對席也使嗣子餕故不敢以賔長對之而使長兄弟也以膚為舉亦欲其每食則啗之士以二人􅅪降於大夫者兩也其􅅪惟以嗣子及長兄弟又與大夫禮相變云古文􅅪皆作餕主人西面再拜祝曰􅅪有以也兩􅅪奠舉于俎許諾皆答拜西面蓋于其位􅅪有以也其意未詳或曰言主人所以使女􅅪者蓋有相親敬之意不欲明説故惟言有以也下文有與之言亦類此俎者上􅅪豕而下􅅪腊與若是者三所以見主人殷勤之意也三者揔言之蓋禮成於三也然則主人拜祝釋辭􅅪答拜者又二也皆取舉祭食祭舉乃食祭鉶食舉祭舉亦振祭嚌之食食乃祭鉶變於尸卒食主人降洗爵宰賛一爵主人升酌酳上􅅪上􅅪拜受爵主人答拜酳下􅅪亦如之注曰少牢饋食禮曰賛者洗三爵酌主人受于户内以授次􅅪繼公謂酳下􅅪亦東面于其席前之北授之主人拜祝曰酳有與也如初儀有與猶有以也初儀主人再拜及兩􅅪許諾也兩􅅪執爵拜注曰答主人也繼公謂此著其拜之異於上者也凡男子執爵拜皆左執之内則曰凡男拜尚左手祭酒卒爵拜主人答拜兩􅅪皆降實爵于篚注曰下􅅪復兄弟位繼公謂上􅅪將酢乃亦實爵于篚者宜與下􅅪共終其事不可由便也上􅅪洗爵升酌酢主人酢主人東面鄉之於其位上􅅪得親酢者尸已出故也此亦變於大夫之禮大夫􅅪者不親酢主人拜受爵主人亦西面拜也主人父也上􅅪子也父乃先拜其子而不以為嫌者以事􅅪之禮當然故略於父子之分也此與事尸之意微相類上􅅪即位坐答拜主人坐祭卒爵拜上􅅪答拜受爵降實于篚主人出立于户外西面户外亦户東右􅅪祝命徹阼俎豆籩設于東序下注曰命命佐食阼俎主人之俎繼公謂改設之尊之也主人之俎謂之阼俎者以其設於主位而名之也户内之東祭時室中之主位也東序下堂上之主位也凡祭奠之禮其徹尊者之盛饌必改設之乃去之宗婦不徹之者以其改設于東序非婦人之事也其設之面位亦如在室既􅅪乃徹阼薦俎亦變於大夫禮祝執其俎以出東面于户西注曰俟告利成繼公謂不俟改設尸俎而先出者亦異於大夫此云户西則主人立于户東明矣宗婦徹祝豆籩入于房徹主婦薦俎此所徹者皆置于房故宗婦得為之不言席文省佐食徹尸薦俎敦設于西北隅几在南厞用筵納一尊佐食闔牖户降厞符味反既餕復改設而未即徹去者重其為神之餘食也一尊酒尊也納于室中之北墉下必納之者以酌神之酒於是乎取之故亦改設而未即徹於徹室中之饌乃并去之不納𤣥尊者以其初不用於神也佐食闔牖户因後出而為之右徹改設祝告利成降出主人降即位宗人告事畢賔出主人送于門外再拜門外廟門外也賔既出則婦人亦徹室中之饌與佐食徹阼俎堂下俎畢出注曰記俎出節繼公謂阼俎執事者俎之最尊者故其出也以之為節賔長以下各自執之出以授人既則復反其位右禮畢記特牲饋食其服皆朝服𤣥冠緇帶緇韠食音嗣朝音潮皆者皆賔與兄弟及公有司私臣也此指祭時之服也經云夙興主人服如初則固冠端𤣥矣助祭必朝服而不𤣥端服者與人之祭宜盛服也緇韠者其别於大夫助祭之賔與朝服用𤣥端之衣冠皮弁之裳故次於皮弁而尊於𤣥端唯尸祝佐食𤣥端𤣥裳黄裳雜裳可也皆爵韠注曰與主人同服繼公謂士尸服𤣥端亦以其為卒者之正服也然則尸服卒者之上服唯䘮祭耳祝佐食與主人亦𤣥端者以其事尸於室尤為近之故服宜與尸同言𤣥端𤣥裳又言黄裳雜裳可也者蓋以賤者或不能備服故制此禮以通之其朝服之裳惟許用素積者豈以素者易辦故與設洗南北以堂深東西當東榮水在洗東篚在洗西南順實二爵二觚四觶一角一散深式鴆反注曰舊説云爵一升觚二升觶三升角四升散五升李寳之曰賔獻尸之時爵止主人當致爵于主婦故爵云繼公謂二觚者長兄弟以觚為加爵因以致于主人主婦既則更之以酢于主人也四觶者其一奠于神席前其一乃主人以奠酬於賔其一乃衆賔長為加爵於尸其一乃爵止而未舉之時兄弟弟子舉觶於其長者也壺棜禁饌于東序南順覆兩壺焉蓋在南明日卒奠鼏用綌即位而徹之加勺覆芳服反注曰覆壺者盝瀝水且為其不宜塵楊志仁曰奠酌奠奠于鉶南時即位尸即席坐時繼公謂壺棜禁庪壺之棜禁也禁名曰棜其制則未聞鼏亦當作幂既奠乃幂之則未酌以前用蓋與籩巾以綌也纁裏􅀥烝栗擇注曰舊説云纁裏者皆𤣥被繼公謂籩用巾謂既實而陳之之時也及將設則去之獨籩用巾者以其未即設故為禦塵此巾云纁裏則是凡巾皆複為之矣鉶芼用苦若薇皆有滑夏葵冬荁此無羊鉶故豕鉶亦得用苦然則鉶芼之異者非為各有所宜也士虞禮記云有柶棘心匕刻注曰刻若今龍頭繼公謂䘮祭匕用桑吉祭匕用棘者䘮桑音同吉棘聲近故也牲爨在庿門外東南魚腊爨在其南皆西面士䘮禮曰為垼於西牆下又吉凶之饎爨皆近於壁以是例之則凡門外之爨亦當在牆下明矣饎爨在西壁士之饎爨在内者以宗婦主其事也大夫則以廪人為之故其爨亦在門外肵俎心舌皆去本末午割之實于牲鼎載心立舌縮俎去起吕反注曰午割從横割之亦勿没繼公謂既實牲體於鼎乃制此而實之於其上載謂載於肵俎心舌皆當牲體之中為内體之貴者故不他用而專以進於尸又見少牢饋食禮賔與長兄弟之薦自東房其餘在東堂經惟云豆籩鉶在東房蓋主於尸者也此又見賔與長兄弟之薦則祝主人主婦之薦亦在東房矣賔賔長也其餘次賔次兄弟而下與内兄弟及公有司私臣也公有司私臣有俎則有薦可知經記不見之耳少牢饋食禮私人有薦脀沃尸盥者一人奉槃者東面執匜者西面淳沃執中者在匜北奉芳勇反淳之純反注曰匜北執匜者之北亦西面繼公謂者一人三字疑衍又淳沃並言之亦未詳宗人東面取巾振之三南面授尸卒執巾者受振之三為去塵敬也宗人授巾尊尸也卒謂已挩手受巾亦以簞少牢饋食禮曰卒盥坐奠簞取巾興振之三以授尸坐取簞興以受尸巾尸入主人及賔皆辟位出亦如之辟音避入入門也出出户也言主人及賔則兄弟之屬在其中矣嗣舉奠佐食設豆鹽置鹽於豆而設於舉奠之前為其食肝也佐食當事則户外南面無事則中庭北面注曰當事將有事而未至凡祝呼佐食許諾注曰呼猶命也宗人獻與旅齒于衆賔注曰齒從其長㓜之次繼公謂記末云公有司獻次衆賔宗人亦公有司也乃齒於衆賔者所謂有上事者貴之也佐食于旅齒于兄弟佐食已獻於室中故獻兄弟時不與而但與其旅酬也云齒於兄弟則士之佐食亦其兄弟明矣尊兩壺于房中西墉下南上注曰為婦人旅也其尊之節亞西方繼公謂兩壺皆酒云南上者亦以其先酌在南者與内賔立于其北東面南上宗婦北堂東面北上注曰二者所謂内兄弟内賔姑姊妹也宗婦族人之婦其夫屬于所祭為子孫或南上或北上宗婦宜統於主婦主婦南面繼公謂云内賔立于尊北記者蓋取尊為節而見其位之所在耳其實内賔之位已定於未設尊之時也主婦及内賔宗婦亦旅西面注曰西面者異於獻也男子獻於堂上旅於堂下婦人獻於南面旅於西面内賔象衆賔宗婦象兄弟其節與其儀依男子也其拜及飲者皆西面于主婦之東南繼公謂此旅酬之儀雖與在庭者略同然亦不能無少異蓋主人既酢内兄弟主婦則酬内賔之長酌奠于薦左内賔之長坐取之奠于右及兄弟舉旅之時内賔之長亦取奠觶以酬主婦主婦以酬次内賔次内賔以酬宗婦之長亦交錯以辯内賔之少者宗婦之少者又各舉觶于其長以為無筭爵始内賔長之觶惟以旅主婦而已宗婦長之觶則以旅次内賔亦交錯以辯皆不拜略如鄉射無筭爵之儀也然則房中之篚其實一爵二觶與宗婦賛薦者執以坐于户外授主婦此儀已見於經而記復著之蓋備載其所聞耳尸卒食而祭饎爨雍爨注曰雍孰肉以尸享祭竈有功也舊説云宗婦祭饎爨亨者祭雍爨用黍肉而已無籩豆俎禮器曰夫爨者老婦之祭盛於盆尊於瓶繼公謂此以尸享祭而祭竈亦見其尊尸之意牲魚腊之爨皆謂之雍爨少牢禮曰雍爨在門東南北上賔從尸俎出廟門乃反位注曰賔從尸送尸也士之助祭終其事也俎尸俎也賔既從尸復入反位者宜與主人為禮乃去尸俎右肩臂臑肫胳正脊二骨横脊長脅二骨短脅注曰尸俎神俎也繼公謂長脅即正脅也士之祭其俎豆之屬既貶於大夫者二而其俎實之脊脅之骨又各貶其半皆降殺以兩之意也膚三特牲無膚俎故以膚附于牲俎焉三者亦貶於大夫之尸也凡膚與牲體同在尸俎者大夫五士三少牢下篇言尸之豕脀膚五是也大夫以上膚若别俎則若七若九以差而加之離肺一注曰舉肺也刌肺三刌七本反注曰為尸主人主婦祭今文刌為切繼公謂祭肺言刌或言切皆見其制也魚十有五注曰少牢饋食禮亦云十有五而俎尊卑同此所謂經而等也繼公謂此盛祭禮也腊如牲骨惟云骨而不言體者蓋骨可以該體而體不可以該骨也言骨則體在其中矣祝俎髀脡脊二骨脅二骨膚一離肺一髀謂右髀亦用尸俎之不升者也脅代脅也不見之者上言脡脊則此為代脅可知矣祝脊脅用二骨見其尊於執事者也此離肺嚌肺也祝祭以離肺其義與虞禮同餘放此阼俎臂正脊二骨横脊長脅二骨短脅膚一離肺一臂左臂阼俎尊乃不用左肩而用左臂者屈於尸也脊脅非體也故得與尸同以伸其尊亦以特牲之俎實少故爾少牢俎實多故主人主婦脊脅皆減於尸主婦俎觳折其餘如阼俎觳户角反又苦角反注曰觳後足餘謂脊脅膚肺繼公謂觳非正體折骼之下而取之故云觳折凡牲固皆折也然經文之例其先言體乃言折或單言折者必非正體若全體者也蓋與折俎之説不同主婦俎之脊脅其名數必不盡與阼俎同乃云如阼俎者亦大略之言也少牢饋食禮阼俎脊脅皆牢主婦俎之脊脅但用羊也則此可知矣佐食俎觳折脊脅膚一離肺一主婦俎與佐食俎同用觳而主婦尊於佐食則主婦右佐食左與或曰佐食宜用右觳猶祝俎用右髀之意未知孰是賔骼長兄弟及宗人折其餘如佐食俎骼左骼也凡骼與觳連乃為全體上記兩見觳折則此骼亦非全體矣不言骼折者以其可知不必言也長兄弟及宗人折亦謂折分其全體也不言其體者或以其所用者不定故與其餘謂脊脅膚肺衆賔及衆兄弟内賔宗婦若有公有司私臣皆殽脀膚一離肺一公有司公家所使給私家之事者也私臣私家之臣或已所自有或假於他家皆是也云若有者不定之辭祝宗人亦公有司也已見其俎於上若有之文主於殽脀者耳此俎無脊脅者以其或用脊若脅為殽脀故也公有司門西北面東上獻次衆賔私臣門東北面西上獻次兄弟升受降飲注曰亦皆與旅繼公謂門西者尚右門東者尚左亦各變於東面西面之位者也獻公有司於西階上私臣於阼階上其受爵則惟二者之長拜於下乃升受主人答拜乃降飲餘皆不拜儀禮集説卷十五
