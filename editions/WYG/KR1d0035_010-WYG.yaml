body:
  text: 儀禮集説卷十元敖繼公撰覲禮第十此篇主言同姓大國之君入覲于王之禮初無四時之别與周官所謂秋見曰覲之意異覲於五禮屬賔禮覲禮至于郊王使人皮弁用璧勞侯氏亦皮弁迎于帷門之外再拜勞力報反注曰郊謂近郊去王城五十里皮弁者天子之朝朝服也繼公謂勞而用璧以為信天子於諸侯之禮也璧無束帛别於享禮且為其當還之也凡以玉行禮而當還者例不用帛云侯氏者指來覲之一者而言耳若泛言之乃云諸帷門者以帷為門也掌舍職曰為帷宫設旌門彼天子之制也然則此但為壇與帷門而已其不為宫與蓋於壇之南横設兩帷於兩旁而空其中以當門也不受於舘舍而受於此蓋其禮冝然爾小行人職曰凡諸侯入王則逆勞于畿小行人下大夫也以是差之則天子之於諸侯有三勞者遠郊冝使中大夫近郊冝使卿然此經惟言一勞之禮亦似與周官異使者不荅拜遂執玉三揖至于階使者不讓先升使並色吏反下使者並同注曰不讓先升奉王命尊也升者升壇繼公謂侯氏既拜亦揖而先入門右使者乃執玉也言遂者明即於此執之也使者既入門左侯氏乃與之三揖也云使者不讓則侯氏不先讓可知侯氏不讓者以使者尊當先升而不敢讓之也使者不讓而先升者以其正奉至尊之命故略之也然則主人與客讓升者自敵以下之禮然若客尊而當先升者則冝先讓主人歟客讓則主人亦辭侯氏升聽命降再拜稽首遂升受玉注曰使者東面致命侯氏東階上西面聽之繼公謂降拜於階間北面升就使者北面訝受之使者左還而立侯氏還璧使者受侯氏降再拜稽首使者乃出左還音旋注曰立者見侯氏將有事於已侯之也繼公謂左還東面以侯之也侯氏就使者還璧使者於是復南面受之降拜為送玉也亦於階間北面還璧者明其以為信也侯氏乃止使者使者乃入侯氏與之讓升侯氏先升授几侯氏拜送几使者設几荅拜有司既布席侯氏乃出止使者止止其去也且迎而欲儐之使者亦禮辭許侯氏揖先入使者乃入也既入不言三揖者如上禮可知讓升侯氏與使者三讓而先升使事既畢則行賔主禮也儐而用几尊王使也授几設几之儀見於士昬聘禮及少牢下篇此經文略也侯氏用束帛乘馬儐使者使者再拜受侯氏再拜送幣乘繩證反下同注曰拜者各於其階繼公謂使者受儐不稽首者同為王臣故不因其受璧之禮也其授受之節蓋於壇中亦北面授使者降以左驂出侯氏送于門外再拜侯氏遂從之驂七南反使者亦左執幣乃北面右執左驂以出也四馬象在車前故西者曰左驂駕車之馬兩服居中兩驂在旁使者以左驂出侯氏之士以三馬從之既則其從者並受幣而皆訝受馬也從之者隨以入國右郊勞天子賜舍注曰賜舍猶致館也小行人為承擯䟽曰天子尊極故言賜舍不言致館注云小行人為承擯者案小行人云及郊勞眡館將幣為承而擯是也繼公謂侯氏至于國而即館天子則使上大夫賜舍也此舍謂公館曰伯父女順命于王所賜伯父舍女音汝注曰此使者致館辭䟽曰此及下經皆云伯父謂同姓大國也舉同姓大國則同姓小國及異姓之國禮不殊也繼公謂順命謂順王命而來朝也賜舍不用幣尊者之禮也侯氏再拜稽首注曰受館繼公謂不著其所是於舎門外也使者東面致命侯氏西面聽命既則北面拜儐之束帛乘馬注曰王使人以命致館無禮猶儐之者尊王使也繼公謂凡儐使者必於受命之處則此儐之亦當在舍門外也侯氏於使者亦有迎送之拜不言者文略耳下於大夫戒之禮亦然案註云禮謂禮物也右賜舍天子使大夫戒曰某日伯父帥乃初事注曰戒使順循其事也初猶故也䟽曰初事者以其四時朝覲自是尋常故事也繼公謂大夫者卿也此戒之亦於舍門外其面位與賜舍同侯氏再拜稽首注曰受覲日也右戒覲日諸侯前朝皆受舍于朝同姓西面北上異姓東面北上朝直遥反餘並同注曰言諸侯者明來朝者衆矣顧其入覲不得並耳諸侯上介先朝受舍分别同姓異姓受之將有先後也春秋傳曰寡人若朝於薛不敢與諸任齒則周禮先同姓李微之曰受舍于朝所謂外朝也繼公謂朝猶覲也前朝者先覲日也此舍如廬舍之舍謂覲時待事之處也若諸侯相朝則但授次而已聘禮記所云君之次者是也右受舍于朝侯氏禆冕釋幣于禰禆婢禮反注曰將覲質明時也禆冕者衣禆衣而冠冕也釋幣者告將覲也繼公謂禆冕者冕服之次者也侯氏若上公也則服鷩侯伯也則服毳子男也則服希是時天子受覲亦服其禆冕故覲者不得服其上服也天子以大裘而冕十二章者為上衮冕九章者次之禰謂考也釋幣者告將覲也其禮則筵几于其館堂户牖之間南面祝升自西階君升自阼階祝奠幣于几下君北鄉祝在左君及祝再拜興祝曰孝嗣侯某將覲天子敢用嘉幣告于皇考某侯又再拜君就東箱祝就西箱有間君反位祝乃取幣藏之君反于阼乃降而遂出也歸則埋幣于禰廟西階之東此朝以禆冕亦與周官異大行人職言朝服云上公冕服九章侯伯七章子男五章皆其上服也右釋幣乘墨車載龍旂弧韣乃朝以瑞玉有繅注曰墨車大夫制也乘之者入天子之國車服不可盡同也交龍為旂諸侯之所建弧所以張縿之弓也弓衣曰韣瑞玉謂公桓圭侯信圭伯躬圭子榖璧男蒲璧䟽曰云墨車大夫制者以周禮巾車職云大夫乘墨車故也云乘之者入天子之國車服不可盡同者巾車云同姓金路異姓象路四衛革路據在本國所乘並得與天子同此乘墨車以朝是東服不可盡同也云交龍為旂諸侯之所建者司常職文云弧所以張縿之弓者爾雅説旌旗正幅為縿故以此弧弓張縿之兩幅也繼公謂乘墨車屈也載龍旂不沒其實也晉韓宣子聘于周自稱曰士大國之卿自比天子之士則其君自比於大夫亦宜也上云前朝此云乃朝則以覲名篇之意可見矣天子設斧依於戸牖之間左右几依於豈反下同注曰依如今綈素屏風也有繡斧文所以示威也斧謂之黼几玉几也立而左右几優至尊也其席莞席紛純加繅席畫純加次席黼純䟽曰周禮司几筵云左右玉几故知此几玉几也云其席莞席以下亦司几筵文繼公謂右亦設几者至尊冝逸不取便其右之義也然則天子升席不由下矣生人左几自諸侯而下天子衮冕負斧依注曰衮衣九章其龍天子有升龍有降龍衣此衣而冠冕南鄉而立以俟諸侯見䟽曰負謂背之九章見司服注繼公謂衮冕天子之禆冕也負斧依以俟侯氏入所謂不下堂而見諸侯也而周官齊僕職乃言車送逆朝覲者之節大行人職亦先言公侯伯子男其朝位賔主之間相去之歩數乃云廟中將幣亦與是禮異者與嗇夫承命告于天子注曰嗇夫蓋司空之屬也春秋傳曰嗇夫馳繼公謂侯氏以天子將庿受之其禮太重故不敢當而辭焉嗇夫於是承其命以告于天子擯者不承命者是時在廟門内猶未出也或曰嗇夫微者也不可以與國君接而直告于至尊蓋嗇當作大字之誤也未知是否天子曰非他伯父實來予一人嘉之伯父其入予一人將受之言所以廟受之者非有他也以嘉其來朝之故耳伯父其入納賔之辭也入告者又以天子此辭出告侯氏侯氏入門右坐奠圭再拜稽首注曰入門而右不敢由賔客位也卑者見尊奠贄而不授擯者謁注曰謁猶告也上擯告以天子前辭欲親受之如賔客也其辭所易者曰伯父其升天子見公擯者五人見侯伯擯者四人見子男擯者三人皆宗伯為上擯侯氏坐取圭升致命王受之玉侯氏降階東北面再拜稽首擯者延之曰升升成拜乃出注曰擯者請之侯氏坐取圭則遂左降拜稽首送玉也從後詔禮曰延延進也繼公謂拜于西階東别於内臣也侯氏既成拜宰乃受玉以東是時王於侯氏氏之拜皆不荅所以見至尊之義也右覲四享皆束帛加璧庭實唯國所有四注讀作三注曰四讀作三古書作三四或皆積畫此篇又多四字字相似由此誤也大行人職曰諸侯廟中將幣皆三享其禮差又無取於四也初享或用馬或用虎豹之皮其次享龜也金也丹漆絲纊竹箭也其餘無常貨此地物非一國所能有唯所有分為三享皆以璧帛致之奉束帛匹馬卓上九馬隨之中庭西上奠幣再拜稽首注曰馬必十匹者不敢斥王之乘用成數敬也繼公謂匹馬卓上謂以一馬卓然居前而先行也言此者明其入不與九馬相屬也中庭西方南北之中也庭實用十馬且設於此皆至尊禮異也此奠幣蓋於入門左之位擯者曰予一人將受之受親受也此擯者曰乃言予一人則是擯者凡告於侯氏皆為述王言矣是亦異於國君以下擯者之禮與侯氏升致命王撫玉撫之者示受之王不執璧帛者貶於瑞玉亦至尊禮異也侯氏降自西階東面授宰幣西階前再拜稽首以馬出授人九馬隨之幣謂璧帛西階前拜送幣者非其正位以欲執馬由便也擯者不延之以升變於授圭時也馬左馬也侯氏親以左馬出敬之至也王臣不於内受馬者無以為節亦至尊之禮異也凡他禮之庭實其主人之士受之者皆以堂上授受為節事畢注曰三享訖繼公謂覲有三享經之所見初享之儀耳其次二享庭實唯國所有不可相蒙故空其文右三享乃右肉袒于廟門之東肉袒示恐懼也袒右變於禮事也為之於廟門之東亦變位鄭氏曰凡以禮事者左袒乃入門右北面立告聽事入而復右已事更端也告聽事者告擯者以已於此聽事也事謂己所以得罪于天子之事大戴記曰肉袒入門而右以聽事也擯者謁諸天子天子辭於侯氏曰伯父無事歸寧乃邦侯氏再拜稽首注曰謁告寧安也乃猶女也繼公謂天子辭於侯氏者天子以命擯者擯者以告侯氏也凡擯者於侯氏之行臣禮如奠圭之類皆以謁諸王其告於侯氏也則皆傳王命也上文不言謁諸天子天子辭於侯氏此不言擯者告於侯氏皆互見其文耳云伯父無事者辭其聽也云歸寧乃邦者安之之辭實未使之歸也右聽事出自屏南適門西遂入門左北面立王勞之再拜稽首擯者延之曰升升成拜降出勞力報反注曰天子外屏勞之其道勞也䟽曰云天子外屏者據此文出門乃云屏南也繼公謂出自屏南乃適門西則侯氏之出入天子之門亦必由闑東矣適門西為襲也西下似脱襲字袒於東襲於西冝相變也王勞之亦擯者傳王之辭案注云天子外屏用荀子文右王勞天子賜侯氏以車服迎于門外再拜注曰賜車者同姓以金路異姓以象路服則衮也鷩也毳也繼公謂上云賜舍則此門外乃舍門外也凡舍惟有一門路先設西上路下四亞之重賜無數在車南注曰路謂車也凡君所乘車曰路路下四謂乘馬也亞之次車而東也詩云君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼重猶善也所加賜善物多少由恩也春秋傳曰重錦三十兩繼公謂設路亦於西方中庭北輈路車一而已乃云西上者以其與馬同設也四馬設於車東異於駕也案注引重錦之文以證重之為善也諸公奉篋服加命書于其上升自西階東面大史是右大音泰下大史同注曰右讀如周公右王之右是右者始隨入於升東面乃居其右繼公謂奉篋服者一人耳乃云諸公者若師若傅若保不定也置服於篋故謂之篋服命書若文侯之命之類是也先設庭實乃奉其所以將命者亦至尊之禮異也此不言揖讓之禮如勞可知侯氏升西面立大史述命注曰讀王命書也侯氏降兩階之間北面再拜稽首是時侯氏升降自阼階故拜於兩階之間不於階東者拜至尊之命冝異於常禮也使者不辭之者以其同為王臣且尊之也春秋傳宰孔止齊侯毋下拜以王命辭之也升成拜亦於阼階上不辭之而升成拜尊者之禮也必成拜者放授玉之儀也受勞者未有所放故惟拜於下而已大史加書于服上侯氏受注曰受篋服繼公謂受亦北面諸公南面訝受之此受於堂乃不著其所是就而受之明矣使者出侯氏送再拜儐使者諸公賜服者束帛四馬儐大史亦如之注曰既云拜送乃言儐使者以勞有成禮略而遂言右賜車服同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓小邦則曰叔舅注曰此禮云伯父據同姓大邦而言饗禮乃歸注曰禮謂食燕也掌客職曰上公三饗三食三燕侯伯再饗再食再燕子男一饗一食一燕右言稱謂與其禮諸侯覲於天子為宫方三百歩四門壇十有二尋深四尺加方明于其上壇徒丹反深式鴆反注曰為宫者於國外八尺曰尋十有二尋則方九十六尺也深謂髙也從上曰深司儀職曰為壇三成成猶重也三重者自下差之為三等而上有堂焉堂上方二丈四尺上等中等下等每面十二尺方明者上下四方神明之象也王巡守至于方嶽之下諸侯㑹之亦為此宫以見之繼公謂為宫者築宫牆也王十二歲若不巡守則四方諸侯皆來朝於是為壇壝宫於國門外之南方而受之此所謂大朝覲也司儀職曰將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸侯正謂此也方明云者其制方而每面又各以色為其神明之象因以名之加此於壇為將祀之也掌舍職曰為壇壝宫設棘門方明者木也方四尺設六色東方青南方赤西方白北方黒上𤣥下黄設六玉上圭下璧南方璋西方琥北方璜東方圭琥音虎璜音黄注曰六色象其神六玉以禮之設玉者刻其木而著之繼公謂設六色以象天地四方之色也設六玉為祀時以此禮之上不以璧而以圭下不以琮而以璧亦與周官異也所以然者以四方之玉無所象故於天地之玉亦不必象之也用圭璧者圭璧尊也大宗伯職曰以玉作六器以禮天地四方以蒼璧禮天以黄琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方謂方明之玉也上介皆奉其君之旂置于宫上左公侯伯子男皆就其旂而立注曰置于宫者建之豫為其君見王之位也繼公謂旂上左而公侯伯子男皆就其旂而立則是五等之位自西而東皆北面與朝事義所言諸侯之位異也射人職言正朝之位云諸侯在朝則皆北面朝士職言外朝之位云右九棘公侯伯子男位焉然則五等諸侯同在朝唯為一列亦可見矣諸侯既入立于位王乃於壇上三揖之土揖庶姓時揖異姓天揖同姓四傳擯王既揖於是諸侯皆升奠瑞玉公於上等侯伯於中等子男於下等既則皆拜於下擯者緫延之曰升乃各升成拜於奠玉之處降出三享奠玉幣亦如之傳擯者傳其擯辭使之升拜也一朝三享凡四此於享亦升之異於特覲者以其衆也天子乘龍載大旂象日月升龍降龍出拜日於東門之外反祀方明注曰馬八尺以上為龍大旂大常也王建大常縿首畫日月其下及旒交畫升龍降龍繼公謂載大旂者以拜日及祀方明也巾車職曰玉路樊纓十有再就建大常十有二斿以祀此載大常則乘玉路矣東門即此宫之東門也拜日於東鄉其所出之處也於宫門外者由便爾祀方明者祀上下四方之神也上下四方之神唯壹祀之者因朝為之故其禮簡大宗伯職曰皆有牲幣各放其器之色謂祀方明之禮也此言已受諸侯之朝享乃帥而拜日其節亦與朝事義不同禮日於南門外禮月與四瀆於北門外禮山川丘陵於西門外門亦謂宫門禮謂祀之也不言祀者以異於正祭變其文耳禮日於南禮月與四瀆於北禮山川丘陵於西皆隨其地之隂陽而為之與拜日於東之義異也禮川不於北者四瀆尊冝辟之也此三禮者皆與上事相屬而舉之天子廵守有懷柔百神望秩山川之禮此諸侯以天子不巡守之故而來覲故天子於此亦略修祀事以放廵守之禮云祭天燔柴祭山丘陵升祭川沈祭地瘞瘞於例反謂以此四事用其祭物也祭物謂牲幣之屬燔柴者置之於積柴之上而燔之升謂縣之瘞埋也此皆順其性而為之蓋因上文遂并言正祭之法以明所謂禮者異於此也然此祭亦不盡與周官合未詳右大朝覲之禮記几俟于東箱經云設斧依于户牖之間左右几乃云天子衮冕負斧依則是天子登席於既設几之後也而此云几俟于東箱其指未設几之前而言與偏駕不入王門言此者明唯王車乃入王門也凡非王車皆謂之偏駕奠圭于繅上明奠時開繅而見玉也經云乃朝以瑞玉有繅儀禮集説卷十正誤迎于門外鄭本作外門外注云古文曰迎于門外繼公案聘禮則舍惟有一門而已此今文雖有外門外之文則是以為有二門也然以其行禮之節求之絶無可以為二門者之徵故且以古文為正上左鄭本上作尚注云古文尚作上案上左云者以左為上也且春秋傳亦有上左之文則上字之義優於尚也冝從古文
