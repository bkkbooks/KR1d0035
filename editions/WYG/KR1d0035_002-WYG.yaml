body:
  text: 儀禮集說卷二元敖繼公撰士昬禮第二注曰娶妻之禮以昬爲期因以名之日入三商爲昬於五禮屬嘉禮繼公謂此篇主言士之適子娶妻之禮娶必以昬者取其近夜也昬禮此不言士者辟下達之文也下達納采用鴈此謂自天子下達於庶人納采皆用鴈也經惟有士昬禮故因以下達之文見之也以此推之則餘禮之用鴈者皆當下達惟納徴之禮或異耳媒妁傳言女家已許乃敢納其采女之禮采者取也用鴈者先儒謂取其不再偶義恐或然春秋傳曰鄭徐吾犯之妹美公孫黒使強委禽焉是大夫納采亦用鴈也此其徴矣主人筵于户西西上右几注曰主人女父也筵爲神布席也有几筵者以其廟受冝依神也席有首尾䟽曰公食記言席卷自末是席有首尾繼公謂主人筵于户西謂主人之家布席于廟之室户西也筵之者有司也乃云主人者對使者立文也覲禮云天子設斧依于户牖之間其語意與此相類下文放此几漆几也右几席南面几在席西端也席西上右几變於生人也神位於室則居主位於堂則居客位凡受禮於廟而不於户牖之間行禮者必設神位於客位示有所尊且敬其事也士用漆几亦神人同是時主人立于阼階東而擯者亦𤣥端負東塾下禮放此使者𤣥端至使色吏反使者壻父之家臣奉壻父之命而爲使者也此士之家臣也乃服𤣥端以行禮則𤣥端亦不獨爲士之正服矣至謂至於門外擯者出請事入告此亦賔之將命者入告擯者告主人乃出請事也其辭蓋曰某也使某請事凡賔非主人之所戒速而來者則有請事之禮擯者請事賔執鴈納采擯者乃入告凡請事者西面入告者東面大夫士之禮也主人如賔服迎於門外再拜賔不荅拜門大門拜迎之禮主於使者乃不荅拜者使事未致不敢以私禮雜之也揖入與賔揖先入也揖入之後亦毎曲揖不著之者此與上篇皆士禮其同可知下文放此至于廟門揖入三揖至于階三讓主人以賔升西面賔升西階當阿東面致命主人阼階上北面再拜主人以賔升謂主人先升而賔從之也西階之下似有脫字致命謂致其主人之辭也阿未詳授于楹間南面授音受此文承主人之下則授冝作受受者南面則授者北面矣爲人使而授于堂乃不南面者辟君使於大夫之禮也授受于楹間敵也使者雖賤於主人然主人士也其爵卑未足以自别故使者無降等之嫌而得與主人於楹間相授用敵者禮也主人拜受而賔不拜送以其非已物也此與上文不荅拜之意異凡爲使之禮皆放此賔降出主人降授老鴈出出廟門老室老大夫士之貴臣授鴈於階下旣則進立於中庭右納采擯者出請請請事也下文放此賔執鴈請問名主人許賔入授如初禮注曰問名者將歸卜其吉凶繼公謂問名問女之名也擯者入告主人許乃出告賔而賔入也初禮三揖以下之儀也此雖俟於中庭亦有三揖與聘禮同右問名擯者出請賔告事畢入告出請醴賔醴與醴子之醴同凡自敵以下其使之行重禮者事畢則醴之所以見殷勤也擯者請醴賔亦以其降等也若敵者則主人自請之賔禮辭許主人徹几改筵東上側尊甒醴于房中徹直列反注曰徹几改筵者曏爲神今爲人側尊亦言無𤣥酒側尊於房中亦篚有籩豆如冠禮之設繼公謂改筵者易他筵而布之也主人迎賔于廟門外揖讓如初升主人北面再拜賔西階上北面荅拜䟽曰初納采時也主人再拜拜至也繼公謂復迎之禮更端也拜至者將與賓行禮先為比以發之也主人拜至賓荅拜禮為巳也凡為使者之禮類此者皆可以意推之主人拂几授校拜送賓以几辟北面設于坐左之西階上荅拜校下孝反辟音避注曰拂拭也拭几者尊賓新之辟逡巡疏曰拂几亦外拂几三也凡授几横受之及其設之皆旋几從執乃於坐南設之繼公謂几者所以安體賓雖不隱几主人猶進之祟優厚也拂几者新之且為恭也凡拂几以袂几校未詳以有司徹執几之法推之則校者其謂左廉與云以几辟者嫌辟時或釋几也凡自敵以下其於拜者皆辟經不盡見之也左之在席上之東也設几於左便其右也授几於筵前西面拜送亦於阼階上北面設几之法有司徹備之矣贊者酌醴加角柶面葉出于房注曰贊者亦洗酌加角柶覆之如冠禮矣出房南面待主人迎受主人受醴面枋筵前西北面賓拜受醴復位主人阼階上拜送西北面以賓在西階上不可背之也醴子醴婦皆北面者以其立於席西也賓拜亦於西階上復位俟既薦乃升席於賓之拜也主人少退主人拜送賓亦如之賛者薦脯醢賓即筵坐左執觶祭脯醢以柶祭醴三西階上北面坐啐醴建柶興坐奠觶遂拜主人荅拜祭不言右可知也後文類此者皆同賓即筵奠于薦左降筵北面坐取脯主人辭注曰取脯者尊主人之賜也繼公謂即筵奠觶者以取脯當北面禮貴相變也主人辭者蓋見賓珍已之物而取之則以不腆辭之賓降授人脯出主人送于門外再拜注曰人謂使者從者授於階下西面繼公謂門者外門也右醴賓納吉用鴈如納采禮注曰歸卜得吉兆復使使者往告昬姻之事於是定繼公謂如納采禮兼醴賓而言也下禮放此右納吉納徵𤣥纁束帛儷皮如納吉禮注曰徵成也執束帛以致命兩皮為庭實繼公謂納吉則成昬矣故於納吉之後復納其成昬之禮六禮惟此最重故特用皮帛而不用鴈也𤣥纁合而為兩束帛𤣥纁各五端也周官曰凡嫁子取妻入幣純帛無過五兩云純則𤣥而不纁也與此異用束帛儷皮則當至廟門主人揖先入賓乃執束帛而庭實先入設也如是則納吉禮不足以蒙之乃云如者以其異者可得而見也下言如納徵禮類此右納徵請期用鴈主人辭賓許告期如納徴禮注曰主人辭者陽倡陰和期日冝由夫家來也夫家卜之得吉日乃使使者往辭即告之繼公謂壻家既得吉日乃不敢直以告女家而必請之者示聽命於女家之意尊之也許告期即記所謂某敢不告期者也右請期期初昬陳三鼎于寢門外東方北面北上其實特豚合升去蹄舉肺脊二祭肺二魚十有四腊一純髀不升皆飪設扄鼏去起吕反髀步米反飪而甚反注曰期取妻之日寢壻之室也北面北上郷内相隨也去蹄蹄甲不用為不絜清也舉肺脊者食時所先舉也每皆二者夫婦各一耳凡魚之正十五而鼎減一為十四者欲其敵偶也純全也合升左右胖曰純髀不升者近竅賤也飪孰也今文扄作鉉疏曰命士以上父子異宫壻自别有寢也繼公謂初昬謂日方入之時東方直東塾少南也陳鼎東方大夫士之禮也北面北上使其入設亦臣禮之異者也其實鼎實也合升者用豚之法宜然也去蹄者指兩肩兩髀而言士喪禮曰四鬄去蹄是也舉肺脊者所舉之肺脊也此二者先飯則舉之每飯則啗之脊正脊也祭肺切肺也他肺亦祭此乃直以祭名之者以其惟主於祭而已無他用也故又謂之肺祭凡食而有牲俎者皆有祭肺不言四鬄兩胉者士喪禮有成文故此畧之士禮腊用一胖此一純乃用左右胖者亦異昬禮也特牲記曰腊如牲骨然則此腊之體骨亦畧放於豚惟去髀為異去髀則用肫也設扄鼏鼏在上也腊所用之物未詳少牢禮云用麋設洗於阼階東南設洗之節詳於前篇故此畧之􅄿于房中醯醬二豆菹醢四豆兼巾之黍稷四敦皆蓋􅄿士戀反醯呼西反敦音對下並同注曰醯醬者以醯和醬兼巾之者六豆共巾也為禦塵蓋為尚温周禮曰食齊視春時繼公謂此􅄿蓋順其設之先後也然則豆敦皆二以並而醯醬二豆其在南與菹醢葵菹蝸醢也蓋以㑹大羹湇在爨大音泰湇音泣爨七亂反注曰爨竈也周禮曰羮齊視夏時今文湆皆作汁繼公謂大羹上牲之肉汁也以其重於他牲故曰大云大羹復云湆者嫌羮當用肉也此上牲謂豚爨烹豚之竈也不言鑊者可知也尊于室中北墉下有禁𤣥酒在西綌幂加勺皆南枋幂眉狄反注曰綌麤葛幂覆尊巾繼公謂士虞禮曰尊于室中北墉下當户此東西之節冝如之尊不言其器如上篇可知以巾覆物謂之幂尊于房户之東無𤣥酒篚在南實四爵合卺卺音謹注曰合卺破匏也四爵兩卺凡六為夫婦各三酳繼公謂無𤣥酒則惟一尊而已無𤣥酒用一尊且不尊于房户之間又不幂皆逺下尊者也篚實爵􅈟主酳夫婦也乃設於此者非常禮因有尊而為之耳凡設此篚于堂者必在尊南郷飲酒禮曰設篚于禁南東肆􅈟云合者謂合而實之也右陳器􅄿主人爵弁纁裳緇袘從者畢𤣥端乗墨車從車二乘執燭前馬袘以豉反從並才用反二乘繩證反注曰主人壻也爵弁𤣥冕之次大夫以上親迎冕服袘謂縁也從者有司也乘貳車從行者也畢猶皆也士而乘墨車攝盛也燭燋也執燭前馬使徒役持炬火居前炤道燭用蒸繼公謂此禮據壻家而言故以壻為主人爵弁者以親迎當用上服也此言緇袘不言衣帶鞸與前篇互見也從者謂在車及執燭者也從者棧車也從車二乘與乘車而三士之車數於此可見墨車加黒色而漆之棧車不加黒色漆之而已案注云攝盛謂乘大夫車也巾車職曰大夫乘墨車婦車亦如之有裧裧昌占反注曰亦如之者車同等士妻之車夫家共之大夫以上嫁女則自以車送之繼公謂如之者如從者畢𤣥端而下之儀也有裧者婦人重自蔽且以别於男子之車也裧亦以布為之在上曰裧在下曰裳帷此惟有裧而已其形制則未聞喪時婦車裧用疏布至于門外注曰婦家大門之外主人筵于户西西上右几注曰主人女父也繼公謂此主於女家而言故復以女父為主人凡經文之類此者以意求之女次純衣纁袡立于房中南面純如字袡如占反注曰次首飾也周禮追師掌為副編次繼公謂次之形制亦未詳袡者裳連於衣而異其色之稱此緇衣而纁裳故曰纁袡也婦人衣裳異色者惟此時耳嫁時特服此衣者亦所以重之喪大記曰婦人復不以袡然則婦人之嫁者用袡亦不獨士妻也立于房中亦當户純衣說見前篇姆纚笄宵衣在其右姆音茂注曰纚亦廣充幅長六尺姆在女右當詔以禮繼公謂姆女師也此笄象笄也長尺二寸少牢饋食禮主婦被褖衣特牲饋食禮主婦纚笄宵衣以是差之則宵衣次於褖衣矣亦用布為之但其所以異於褖者則未之聞女從者畢袗𤣥纚笄被顈黼在其後從才用反被皮義反顈若逈反黼音甫注曰女從者謂娣姪也繼公謂𤣥者𤣥衣也其亦宵衣與顈絅同玉藻曰禪為絅蓋指衣而言考工記曰白與黒謂之黼顈黼者以黼為禪衣而被之於𤣥衣之上亦猶婦之加景然也昬禮尚飾故用顈黼不登車乃被之者逺别於婦也被顈黼則𤣥衣不見矣必言袗𤣥者以其正也在其後蓋東上主人𤣥端迎于門外西面再拜賓東面荅拜賓壻也亦擯者出請入告乃出迎之此時賓爵弁服而主人𤣥端不嫌於服異者主人不正與賓為禮特迎而道之入廟耳拜之者迎賓之禮也主人揖入賓執鴈從至于廟門揖入三揖至于階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送稽音啟注曰賓升奠鴈拜主人不荅明主為授女耳主人不降送禮不參繼公謂賓於外門外即執鴈别於幣也凡幣為禮者至廟門乃執之北面奠鴈以女在房也稽首頭下至手也拜時兩手至地左手在上若稽首則以頭加於左手之上再拜稽首者始拜則但拜而巳於其卒拜則因而遂稽首焉書曰拜手稽首是也此禮之重者而為之重昬禮之始也昬義曰再拜奠鴈蓋受之於父母是亦一義也降出謂出外門俟上經云至于門外是婦車亦在大門外也案注云授女者謂奠鴈以授女也云禮不參者據凡行禮者言也此壻迎女而女從之是壻女二人為禮矣故主人不參之壻御婦車授綏姆辭不受壻悉許反注曰壻御者親而下之綏所以引升車者僕人之禮必授人綏繼公謂曲禮曰凡僕人之禮必授人綏若僕者降等則受不然則否此壻為御故如僕人之禮而授綏然非降等者也故姆辭不受於姆之辭也壻乃至綏既則女自取之以升婦乘以几姆加景乃驅御者代乘繩證反注曰加景以為行道禦塵令衣鮮明也景亦明也驅行也行輪三周御者乃代壻疏曰乘以几者謂登車時也景蓋以禪縠為之繼公謂此乘升車之稱也乘以几尊之曲禮曰尸乘必以几亦此意也衣名以景者取其鮮明之意詩云衣錦褧衣裳錦褧裳然則此景之制亦連衣裳為之與其他上衣同矣姆為加之是姆亦與女同車也已登車乃加景則未下車其脫之與女從者脫顈黼蓋於下車之後壻乘其車先俟于門外注曰壻車在大門外乘之先者道之也門外壻家大門外繼公謂御者既代止車以俟壻乘其車先然後從之右親迎婦至主人揖婦以入及寢門揖入升自西階媵布席于奥夫入于室即席婦尊西南面媵御沃盥交媵以證反注曰升自西階道婦入也媵送也謂女從者也李微之曰御壻家之女侍也繼公謂奥室中面墉下少南也布席東面北上宜變於神席也夫婦既升而並俟于堂媵既布席乃入也即席立于席上也婦立于尊西則尊亦當户明矣交者御沃媵盥媵沃御盥也居室之始即行此禮相下相親之義也此盥蓋於北洗右夫婦入室贊者徹尊幂徹直列反下並同事巳至也舉者盥出降幂舉鼎入陳于阼階南西面北上盥北面盥於南洗也幂當作鼏除鼏者右人也除鼏而后舉鼎吉禮也陳鼎於内而當階士禮也既陳鼎則右人抽扄委于鼎北而西面于鼎東以俟少牢禮陳鼎南於洗西其與士禮異者當東序耳匕俎從設匕必履反匕所以出鼎實也俎所以載也執匕俎者從鼎入而設於其鼎之西也設謂設俎也既設俎則各加匕於其鼎東枋遂退此三匕三俎從設則是有司三人各兼執一匕一俎與北面載執而俟注曰執俎而立俟豆先設繼公謂北面載者左人也右人則西面匕此載以俎承物之稱士喪禮載豚云載兩髀于兩端兩肩亞兩胉亞脊肺在於中皆進柢載魚左首進鬐三列腊進柢此魚十有四則為二列也載腊如豚惟無肺耳俟俟時而升匕者逆退復位于門東北面西上匕者乃右人以匕出鼎實者也以匕出物而謂之匕亦因其所用者稱之逆退則匕下鼎者在先匕上鼎者在後也言復位見其初位在此門東北面西上私臣之位也此亦因文而見之耳特牲饋食記曰私臣門東北面西上逆退者由便也亦便其復位也凡逆退而復位者其義皆然贊者設醬于席前葅醢在其北俎入設于豆東魚次腊特于俎北注曰豆菹醢繼公謂菹醢在醬北南上也别見魚腊則此俎云者指豚俎也經蓋因文以見特俎之位也當豚俎北端而云特者明不與豚俎為列亦横設之凡俎數竒故於其下者特設之贊設黍于醬東稷在其東設湇于醬南黍在豚南稷在魚南湇不言其器在豆可知少牢禮曰進二豆湇設對醬于東注曰對醬婦醬也繼公謂下文云設黍于腊北而此醬冝在黍東則於特俎為東北也菹醢在其南北上二豆在醬南俱當特俎之東也設黍于腊北其西稷腊北即醬西也必云腊北者所以見對􅄿東西南北之節也稷在黍西則在腊之西北而遥當壻醢之北矣惟於設黍云腊北可見特俎亦横設之也設湇于醬北此豆敦之位其左右皆與壻􅄿同惟南北為異御布對席對席婦席也經於婦之菹醢云北上則此對席南上矣凡設豆於生人之席前者其所上率與席之所上相變此禮於少牢下篇見之未設而布壻席已設乃布婦席示尊卑之義也媵布夫席御布婦席見其事之之意也此於壻席為少北不正相郷特取其一東一西故云對耳對醬之類亦然贊啟㑹卻于敦南對敦于北㑹如字注曰啟發也㑹合也謂敦蓋也繼公謂卻仰也對敦于北謂啟婦敦之㑹則卻于敦北也其南北之㑹各當其湇之東西贊告具揖婦即對筵皆坐皆祭祭薦黍稷肺注曰贊者西面告􅄿具也繼公謂贊揖婦使即席者以主此禮故也祭薦黍稷肺釋上所謂祭者此也祭薦以菹擩于醢而祭也祭黍稷取於其敦而祭之肺祭肺也亦皆祭于豆祭贊爾黍授肺脊皆食以湇醬皆祭舉食舉也注曰爾近也近之置席上便其食也皆食食黍也以用也繼公謂古文邇爾通惟爾黍者夫婦各有二敦故但取其尊者而食之凡爾敦者皆右之於席上經特於少牢禮見之授肺脊兼舉而授之也皆受以右手惟飯時則左執之也贊授夫於􅄿南西面婦則於􅄿北東面皆訝受之皆食謂一飯也以湇醬皆謂􅖾之未食舉故用此安食耳舉謂肺脊以其先食舉之因名之曰舉祭謂振祭嚌之一飯乃祭舉異於饋食禮也食舉謂啗之再飯三飯則皆食舉不復以湇醬矣三飯卒食飯扶晚反三飯而卒食其逺下饋食之禮與士之饋食九飯而止飯猶食也或言食或言飯隨文便耳不言贊者受肺脊文省右食贊洗爵酌酳主人主人拜受贊户内北面荅拜酳婦亦如之皆祭酳以刃反注曰酳酌内尊繼公謂洗爵洗于庭也酳之言㣧也繼也其字從酉蓋既食之而復繼之以酒故因以為名取其酒食相續之意也其禮如是所以見殷勤也此拜受者皆在席户内户内之西也祭謂祭酒凡酳皆坐受爵贊以肝從皆振祭嚌肝皆實于菹豆注曰肝肝灸也繼公謂以肝從謂以肝俎從於酒而進之二肝蓋共俎而進本贊則縮執之振祭者執而振動之以為祭也此亦以肝擩于鹽乃振祭肝從之法少牢饋食禮備之矣卒爵皆拜贊荅拜受爵卒爵而拜拜其飲已之賜也贊荅拜亦一拜也受爵出奠于篚乃復洗他爵以升再酳如初無從初者初酳時洗爵以下之儀也無從見其異於初耳三酳用卺亦如之至是乃用卺者昬禮將終示以合體相親之意也亦如之者亦如初而無從也食從進酒至於再三猶云酳者同牢之禮贊主其事而此酒則皆贊進之故皆謂之酳少牢特牲饋食之禮進酒於尸者惟主人言酳主婦賓長則皆不曰酳而曰獻以食禮非二人主之故也由是觀之足以見其立言之意矣贊洗爵酌于户外尊入户西北面奠爵拜皆荅拜坐祭卒爵拜皆荅拜興注曰贊酌者自酢也繼公謂三酳乃自酢變於常禮也自酢之禮代人酢已耳洗爵者象其為巳洗也奠爵拜者象受也夫婦皆荅拜則象同酢之也故主人不必親酌凡此時夫婦室中之拜皆順其東西面興謂夫婦也上户字疑衍下云贊酌外尊則可見矣右酳主人出婦復位注曰復尊西南面之位繼公謂主人出為將說服于房也婦但當說服于室故不出惟變位而已乃徹于房中如設于室尊否注曰徹室中之􅄿設于房中為媵御餕之徹尊不設有外尊也繼公謂徹之者亦贊也如設于室謂其􅄿與席之位也亦皆東西相鄉主人說服于房媵受婦說服于室御受姆授巾說並吐活反下同注曰巾所以自絜清繼公謂說服皆謂去上服也于房于室男女冝異處亦重䙝也記云母施衿結帨是婦自有帨巾也今既說服御亦併受此物故姆還以他巾授之御衽于奥媵衽良席在東皆有枕北止衽而甚反注曰婦人稱夫曰良孟子曰將瞯良人之所之止足也古人止作趾繼公謂卧席謂之衽此衽云者謂設衽也亦猶布筵而謂之筵矣夫東婦西者變於坐席也主人入親說婦之纓注曰入者從房還入室也婦人許嫁笄而醴之因著纓明有繫也蓋以五采為之其制未聞疏曰纓有二曲禮云女子許嫁纓示有從人之端也即此說纓之纓也内則云男女未冠笄者􅄣角衿纓此幼時纓也皆與男子冠纓異故云其制未聞繼公謂主人親說之者明此纓為已而繫也亦示親之燭出注曰昬禮畢將臥息媵餕主人之餘御餕婦餘贊酌外尊酳之餕音俊食人之餘曰餕餘謂其所嘗食者也媵御各餕夫婦之餘者見其惠之及之也此餕之位媵當東面而長者在南御當西面而長者在北畧如少牢饋食􅅪者之位也不洗而酌畧賤也此酳之儀惟拜受拜送而已不拜既爵外尊房户東之尊媵侍于户外呼則聞注曰為尊者有所徵求今文侍作待繼公謂媵雖婦之從者然自婦至之後凡主人有事皆媵為之此侍于户外乃不使御而使媵者亦主於夫也呼則聞釋所以侍于户外之意也今文侍作待其義亦通若然則昬禮既畢其就内寢與右昬禮成夙興婦沐浴纚笄宵衣以俟見見賢遍反下同注曰夙昬明日之晨繼公謂士妻之纚笄宵衣猶士之𤣥冠𤣥端也内則言子事父母服𤣥端又云婦事舅姑如事父母則宵衣者亦士妻事舅姑之常服耳婦之始嫁即以此服見而不為之加者昬禮不主於舅姑也俟見者質明乃見此時俟於巳之寢質明贊見婦于舅姑席于阼舅即席席于房外南面姑即席注曰房外房户外之西繼公謂見者通言於舅姑使得見也舅姑夫之父母也阼席亦西面舅姑即席亦立于席也凡設席其在東者則西面其在西者則東面南北放此經或不見之者以其可知也婦執笲􅀥栗自門入升自西階進拜奠于席笲音煩注曰笲竹器其形蓋如今之筥􅠚籚矣奠之者舅尊不敢授也繼公謂笲棗栗二物同一器也聘禮曰卷幣實于笲然則笲之制蓋亦隋方如篋矣門舅姑寢門也必云自門入者嫌婦人出入當由闈門也進乃拜則拜處近於席不當階矣不言東面者可知也始執笲用二手及拜時則惟右手執之凡婦人之拜以左掌據地故右手執物而可以拜也内則曰凡女拜尚右手舅坐撫之興荅拜婦還又拜注曰還又拜者還於先拜處拜繼公謂撫之示受也興而後拜敬也婦還者婦於筵前少立俟舅卒拜而後還也又拜者俠拜也降階受笲腵脩升進北面拜奠于席姑坐舉以興拜授人腵丁亂反注曰腵脩𢷬肉之脯人有司姑執笲以起荅婦拜授有司徹之舅則宰徹之繼公謂婦於舅並用􅀥栗而執於門外於姑惟用腵脩而受於階下皆輕重之差也進北面拜者既入堂深東行當席乃北面而拜也奠于席亦不敢授也􅀥栗腵脩所以為贄也乃皆奠之而不敢授者凡相見之禮尊卑不敵則奠之亦示親授也此不撫之者不敢同於舅也舉以興乃拜既拜乃授人則拜時亦不釋笲矣右婦見舅姑贊醴婦贊為舅姑醴婦也舅姑必醴之者荅其行禮於巳也婦見醴乃成為婦舅不自醴之者於其始至冝示以尊卑之禮也是時舅姑皆立于席席于户牖間注曰室户西牖東南面位疏曰醴子醴婦醴賓客皆以此尊之故也側尊甒醴于房中亦有篚籩豆在其北惟云側尊文省婦疑立于席西疑舊魚乞反是時已東西立疑字未詳贊者酌醴加柶面枋出房席前北面婦東面拜受贊西階上北面拜送婦又拜疏曰東面拜者以舅姑在東冝鄉之拜也繼公謂婦於贊乃俠拜者重其為舅姑醴已也婦又拜蓋執觶拜也其下二拜亦然薦脯醢亦贊薦之婦升席左執觶右祭脯醢以柶祭醴三降席東面坐啐醴建柶興拜贊荅拜婦又拜奠于薦東北面坐取脯降出授人于門外注曰奠于薦東升席奠之人謂婦氏人繼公謂拜皆執觶拜也門寢門也授人於外變於男子之禮右醴婦舅姑入于室巳禮畢也婦盥饋於既授脯即反而行饋禮也以食食人謂之饋適婦之禮在養舅姑故即行饋禮以見其意特豚合升側載無魚腊無稷竝南上其他如取女禮取七注反注曰側載者右胖載之舅俎左胖載之姑俎異尊卑女謂婦也如取婦禮同牢時疏曰自側載以下南上以上與取女異周人吉禮尚右故知右胖載之舅俎左胖載之姑俎以異尊卑也繼公謂二俎載之乃云側者以無魚腊也南上之文主於菹醢蓋特舉此以見舅姑之皆東面且明席之北上也席北上則舅在北姑在南矣姑不别席於北方者辟婦之位也其他謂爾黍以至卒食也此特豚合升而載之二俎則是每俎皆有肩髀胉脊與其他豚解而載於一俎者畧異矣士喪禮言豚解之法兩肩兩髀兩胉與脊共有七叚也婦贊成祭此祭謂祭薦黍稷肺也凡贊祭必授祭而此云成者其為之祭而不授與卒食一酳無從卒食亦三飯而止也此禮每節皆殺於同牢之禮俎則無魚腊敦則無稷至是又惟一酳以其一酳故無肝從是皆其禮之當然也婦之酳也當洗於北堂而酌于室中北墉下之尊酳舅於席前之南姑於席前之北皆西面其拜亦在户西北面也舅姑亦皆荅拜于其席席于北墉下此席當在尊西而東上婦徹設席前如初西上此所設者皆如饋之設但易處則所上之面位不同之耳婦餕舅辭易醬注曰婦餕者即席將餕也繼公謂舅辭者見婦即席將餕已􅄿故辭之婦不言對不敢與尊者為禮也下經云婦餕姑之􅄿則是從舅命矣易醬易姑醬也蓋御為之婦餕姑之􅄿御贊祭豆黍肺舉肺脊豆祭亦贊之則是此三祭亦皆不授之而直為之祭矣祭肺亦祭切肺也舉肺脊其姑之所已舉者與亦御者舉以授之乃食卒食謂食黍也亦以湇醬祭舉食舉三飯而卒食也姑酳之婦拜受姑拜送坐祭卒爵姑受奠之注曰奠之奠于篚繼公謂婦拜于席南面姑亦拜于西墉下東面之位也卒爵而姑受亦不拜既爵矣餕禮輕婦徹于房中媵御餕注曰媵餕舅餘御餕姑餘也繼公謂此與上經徹下皆不云設未詳其設之當畧如同牢禮姑酳之雖無娣媵先注曰古者嫁女必姪娣從謂之媵姪兄之子娣女弟也娣尊姪卑若或無娣猶先媵客之也繼公謂此酳亦酌外尊於是與始飯之錯錯音措此句未詳尋其語脉文意似謂既酳則於是乎改設之如饋之錯也錯猶設也若然則與始飯三字皆誤與右婦饋舅姑舅姑共饗婦以一獻之禮舅洗于南洗姑洗于北洗奠酬注曰南洗在庭北洗在北堂疏曰舅獻姑酬共成一獻繼公謂飲人而用牲焉曰饗饗婦蓋荅其饋也舅洗洗爵以獻也姑洗洗觶以酬也婦酢舅亦洗于北洗皆不辭洗不拜洗其獻酢則各于其席前舅拜于阼階上北面婦拜于席西東面姑酬婦則于主人之席北而奠觶于婦之薦西奠酬者婦取姑之酬酒而奠之於薦東也必言此者明其禮止於是也不燕者尊卑之分嚴也昬義云厥明此不言者文不具耳舅姑先降自西階婦降自阼階明將授之室也舅姑先降自西階然後婦乃敢降自阼階蓋達尊者之意也歸婦俎于婦氏人注曰婦氏人丈夫送婦者使有司歸以婦俎當以反命於女之父母繼公謂此牲俎其亦用豚與右舅姑饗婦舅饗送者以一獻之禮酬以束帛注曰送者女家有司也繼公謂饗之而用帛亦重謝之也酬以束帛其節當與冠禮醴賓者同姑饗婦人送者酬以束帛注曰婦人送者𨽻子弟之妻妾疏曰左氏傳云士有𨽻子弟尊無送卑故知婦人送者是𨽻子弟之妻妾若異邦則贈丈夫送者以束帛注曰贈之就賓館繼公謂以物餽將行者曰贈酬之外又贈以此幣以其勞於道路故也古之士得取於異邦則大夫可知矣獨云贈丈夫則是古者婦人不越疆而送嫁也右禮送者若舅姑既没則婦入三月乃奠菜崔靈恩曰若舅姑偏有没者厥明盥饋於其存者三月又庿見於其亡者繼公謂乃奠菜亦題下事也必三月乃奠菜者三月一時天氣變故以之為節也席于庿奥東面右几席于北方南面注曰北方墉下疏曰生時見舅姑舅姑别席異面是今亦别席異面象生也繼公謂右几見席南上也凡設几例在席之上端舅席東面而南上姑席南面其西上與生人室中之席東面者北上南面者東上鬼神則變之生時見舅姑舅不用几此有之者異其神也姑席無几几主於尊者也是亦質明行事祝盥婦盥于門外婦執笲菜祝帥婦以入祝告稱婦之姓曰某氏來婦敢奠嘉菜于皇舅某子注曰帥道也入入室也來婦言來為婦嘉美也皇君也言君者尊之菜蓋用堇繼公謂執笲菜亦於門外庿見用笲菜異於生時之贄也云帥婦以入是婦亦升自西階也此時婦入室西面祝在左而為之告也某氏者髙國之女則曰姜氏季孟之女則曰姬氏皇者尊大之之稱某子者某諡也猶言文子武子矣此蓋指其為大夫者也假設言之以著其庿見之禮與為士者同耳婦拜扱地坐奠于几東席上還又拜如初扱初合反婦拜拜于其位也扱地未詳奠菜于几東席上則是几前猶有餘席亦可見設几之節矣還又拜亦反於故位復拜也此又拜者接神禮然也其例見於聘禮及特牲少牢饋食禮婦降堂取笲菜入祝曰某氏來婦敢告于皇姑某氏奠菜于席如初禮注曰降堂階上也於姑言敢告舅尊于姑繼公謂取猶受也降堂取笲菜以其行禮於室也在堂則降階在室則降堂逺近之差禮亦冝然入入而北面也祝亦在左告之如初禮拜而奠于席上之右還又拜也婦出祝闔牖户疏曰先牖後户者先闔牖後闔户也繼公謂婦出户則先釋辭請醴之而婦入于房矣老醴婦于房中南面如舅姑醴婦之禮婦既庿見而老醴之象舅姑生時使贊醴婦之禮蓋達神意也不于堂辟尊者在之處也上云贊醴婦此云如舅姑見上贊者為代舅姑醴之也房中行禮則老其西面拜與婦見醴乃成為婦若庿見舅姑之偏没者恐無此禮壻饗婦送者丈夫婦人如舅姑饗禮疏曰舅姑没故壻兼饗丈夫婦人繼公謂壻饗丈夫婦人亦當異日而皆酬之以束帛也此禮之節冝在始嫁之時因言庿見而及之故其文在此非謂行之於老醴婦之後也右舅姑已没之禮記士昬禮凡行事必用昬昕受諸禰庿昕音欣禰乃禮反注曰用昕使者用昬壻也疏曰用昕謂納采問名納吉納徵請期五者皆用昕即詩所謂旭日始旦也昬親迎時也繼公謂禰庿父庿也庿受重其事也經凡言士禮多主於一庿者一庿則祖禰皆在焉惟云禰主於禰也蓋祖尊而禰親受昬禮冝於親者辭無不腆無辱腆他典反腆善也言當善其辭又不可以辱命也贄不用死注曰贄鴈也繼公謂此文在皮帛之前則是指納采之類言也夫贄云者親奉其物以相見之稱也納吉之類禮雖用鴈然遣使為之固不可謂之贄以贄為言記者過也且不用死之云亦似長語古人非昬禮而用鴈豈有用死者乎似重失之皮帛必可制注曰儷皮束帛也繼公謂制制為衣裘也然則他禮之用皮帛者其有不可制者乎亦似長語矣腊必用鮮帷云腊必用鮮是魚用薧矣一腊而用鮮亦異昬禮也魚用鮒必殽全鮒音附注曰殽全者不餒敗不剥傷繼公謂他時魚或用鱄此則惟許用鮒云必殽全語亦似過他禮用魚豈有不殽全者乎女子許嫁笄而醴之稱字注曰許嫁已受納徵禮也笄女之禮猶冠男也女賓執其禮繼公謂此禮當於房中行之醴之亦謂以醴飲之也字若伯姬仲氏之類矣女子之笄有二節一則成人之笄一則許嫁之笄其醴之而婦人執其禮並同惟以稱字與否為異周易屯六二之辭曰女子貞不字十年乃字言許嫁乃字也然則未許嫁而笄者不字明矣古者女子成人乃許嫁祖庿未毁教于公宫三月若祖庿已毁則教于宗室注曰嫁女必就尊者教之教之者女師也祖庿女所出之祖也公君也敎以婦德婦言婦容婦功宗室大宗之家李微之曰此言公族之為士者也若祖庿已毁而教于宗室然則異姓者亦教于宗子之家與繼公謂此據士族之貴者言也祖女所自出之君也毁壞也傳曰壞庿之道易檐可也改塗可也禮國君五庿太祖之庿不毁其餘先君若過髙祖則毁其庿而遷之未毁者以其猶在今君四親庿之中也其與君共太祖者若太祖去今君五世庿雖不毁其禮亦與既毁者同祖庿未毁而教於公宫統於祖也祖庿既毁而教於宗室統於宗也凡别子之庿亦皆三世若四世而毁問名主人受鴈還西面對賓受命乃降問名之儀主人以賓升西面賓升自西階東面問名主人阼階上北面再拜進受鴈于楹間還於阼階上西面賓亦還於西階上東面主人對賓受命乃俱降也祭醴始扱壹祭又扱再祭疏曰始扱壹祭及又扱則分為兩祭是為祭醴三也繼公謂始扱一祭又扱則再祭示隆殺也一扱而可以再祭則柶葉如勺矣賓右取脯左奉之乃歸執以反命奉芳勇反疏曰右手取脯左手兼奉之以降授從者於西階下乃歸繼公謂以疏說攷之則記文似不備也右取脯左奉之不游手也執以反命謂至于壻父之門外乃受之以反命也此記在問名下納徵上則是但據納采問名之賓而言耳蓋經文惟見此醴賓之禮故也若納吉納徵請期之賓反其禮亦如之可知納徵執皮攝之内文兼執足左首隨入西上參分庭一在南攝之涉反下同注曰兼執足者左手執前兩足右手執後兩足隨入不並行也疏曰毛在内故云内文繼公謂先儒讀攝為摺則訓疊也今人屈物而疊之謂之摺古之遺言與執皮攝之者中屈其反疊而執之也内文兼執足攝之之法也文獸毛之文也内文者事未至也左首為西上也云隨入者以其並設嫌亦並行也西上統於賓也參分庭一在南者參分庭深而所立之處當其參分之一故二分在北一分在南也此設皮之位亦當在西方賓致命釋外足見文主人受幣士受皮者自東出于後自左受遂坐攝皮逆退適東壁見賢遍反注曰賓致命主人受幣庭實所用為節疏曰經云釋外足見文者人以足郷上執之足逺身為外釋之則文見也注意謂賓升堂致命則庭中執皮者釋外足主人堂上受幣則主人之士於堂下受皮是庭實所用為節繼公謂釋外足見文所謂張皮也見文者事已至也皮以文為美故當授受之節冝示之他時則否士謂主人之私臣非指有爵者也自東自門東而來也士之私臣其位在門東北面後與左皆據執皮者言也受者居客之左便其先執前乃執後也聘禮曰賓出當之坐攝之逆退在東者先退由便也此記與聘禮互見當參攷父醴女而俟迎者母南面于房外迎魚敬反注曰女既次純衣父醴之于房中南面蓋母薦焉重昬禮也女奠爵于薦東立于位而俟壻壻至父出母出南面于房外示親授壻疏曰舅姑共饗婦而姑薦故知父醴女亦母薦繼公謂特牲饋食禮主人致爵于主婦西面荅拜此父醴女于房中位冝如之其儀則畧與贊醴婦之禮同女出于母左父西面戒之必有正焉若衣若笄母戒諸西階上不降注曰必有正焉者以託戒使勿忘繼公謂是時父立于阼階上女出於母左而就之東面受戒父乃正其衣或正其笄而戒之且女之衣笄固自正矣今乃復正之者欲其以此為識耳女既就父則母東面于西階上俟女至而戒之以女當降自西階也母不降送尊也孟子曰女子之嫁也母命之往送之門戒之或此禮至後世而變與婦乘以几從者二人坐持几相對乘繩證反從才用反注曰持几者重慎之婦入寢門贊者徹尊幂酌𤣥酒三屬于尊棄餘水于堂下階間加勺屬音燭注曰屬注也𤣥酒貴新昬禮又貴新故事至乃取之繼公謂𤣥酒清水也𤣥水色與酒並設故亦以酒名之云酌則以勺也棄餘水者不欲人䙝用之也徹幂加勺兼指二尊而言笲緇被纁裏加于橋舅荅拜宰徹笲注曰被表也笲有衣者婦見舅姑以飾為敬橋所以庪笄其制未聞繼公謂緇被纁裏竹器之飾也此文主於棗栗腵脩者其實奠菜之笲亦如之舅既荅拜而興宰乃徹笲節也婦席薦􅄿于房注曰醴婦饗婦之席薦也繼公謂亦如冠禮席在南籩豆在北也饗婦姑薦焉注曰舅姑共饗婦舅獻爵姑薦脯醢婦洗在北堂直室東隅篚在東北面盥直音值注曰洗在北堂所謂北洗北堂房中半以北洗南北直室東隅東西直房户與隅閒疏曰房無北壁故得北堂之名房與室相連為之而無北壁是以得設洗直室東隅繼公謂室之東隅有二云在北堂故無嫌於南篚盛爵觶為婦酢姑酬也庭中設洗水在洗東篚在洗西此篚在洗東則水在洗西矣盥為將洗爵以酢舅也無嫌於不洗故惟以盥見之此洗内洗也亦曰北洗凡其設之與盥者之位皆如此記主為婦禮發之故惟云婦洗案注云東西直房户與隅閒言直二者之閒也亦意之之辭未必有據婦酢舅更爵自薦酢音昨凡卑者受尊者獻則不敢酢此婦乃酢舅者饗婦則婦如賓也更爵男子不承婦人爵也自薦者為姑親薦已故不敢使人薦舅行禮欲其稱也不敢辭洗舅降則辟于房不敢拜洗辟音避此謂舅將獻婦之時也舅降謂降洗也婦辟于房者既不從降又不敢安於堂上故冝辟也從降而辭洗升堂而拜洗丈夫於敵者之禮也若婦人之於丈夫則無之以是禮不可得而行故也記者於此乃有不敢辭洗拜洗之說則是謂婦人於舅可以辭洗而不敢辭可以拜洗而不敢拜與亦似異於禮意矣凡婦人相饗無降注曰姑饗婦人送者于房無降者以北洗篚在上繼公謂此謂姑饗婦人送者與舅没而姑特饗婦者也故以凡言之言婦人相饗無降明男女相饗則有降者如上記所謂舅降是也婦入三月然後祭行入入夫之室也祭行謂夫家之祭方行也婦入三月然後可以入庿故夫家必至是乃舉其常祭欲令婦得助祭而成婦之義也凡舅姑之存若没其禮皆然庶婦則使人醮之婦不饋注曰庶婦庶子之婦也使人醮之亦有脯醢不饋者共養統於適也繼公謂使人醮之則不必贊矣是時舅席于阼姑席于房外當於受適婦之見之禮則醮之之位其亦在户牖閒與此儀物亦皆與醴同惟以用酒為異故不取尚文之義而輕於醴也婦不饋則舅姑亦不饗之矣此以上專記事以下專記辭不欲其相亂也昬辭曰吾子有惠貺室某也注曰昬辭告擯者請事之辭吾子謂女父也貺賜也室猶妻也子謂公冶長可妻也某壻名疏曰壻家舊巳有辭女家見許故今得言貺室也繼公謂有惠有貺室某之惠也某有先人之禮使某也請納采注曰某壻父名也某也使者名也繼公謂云先人之禮言其前世行之已久對曰某之子憃愚又弗能教吾子命之某不敢辭憃失容反注曰對曰者擯者出納賓之辭某女父名也吾子謂使者繼公謂憃愚謂不敏也女之性既不敏巳又弗能教之言其不足采也命謂納采致命曰敢納采疏曰此使者升堂致命於主人之辭繼公謂此不言對則是主人惟拜而已問名曰某既受命將加諸卜敢請女為誰氏注曰某使者名也疏曰此賓升堂致命之辭也繼公謂命謂已受其納采之禮也加諸卜謂指女名以問卜也氏謂女之伯仲也戴媯為仲氏亦其一耳問名而云誰氏不敢䙝之敬也此亦使者告擯者請事之辭對曰吾子有命且以備數而擇之某不敢辭命謂問女名也備數而擇之若曰不專采已女然謙也此擯者傳主人許之辭也賓致命於堂冝亦曰敢請女為誰氏主人則以女名對之醴曰子為事故至於某之室某有先人之禮請醴從者為于偽反從才用反注曰言從者謙不敢斥也繼公謂醴請醴賓也對曰某既得將事矣敢辭此言巳之事畢不敢復溷主人也將行先人之禮敢固以請注曰主人辭繼公謂凡請與辭自再以後皆謂之固某辭不得命敢不從也注曰賓辭也不得命者不得許已之命繼公謂此皆擯者傳賓主之辭即經所謂請醴賓賓禮辭許者也納吉曰吾子有貺命某加諸卜占曰吉使某也敢告注曰貺命謂許以女名也某壻父也對曰某之子不教唯恐弗堪子有吉我與在某不敢辭與音預弗堪謂不能盡婦道也與如與聞之之與與在謂已亦在吉中也取婦嫁女之家吉凶共之此亦擯者傳賓主之辭也賓致命亦冝曰某敢納吉納徵曰吾子有嘉命貺室某也某有先人之禮儷皮束帛使某也請納徵致命曰某敢納徵疏曰吾子有嘉命以下至請納徵是門外鄉擯者辭也致命曰某敢納徵是升堂致命辭也繼公謂納采之屬使者皆不言行禮之物此乃言儷皮束帛者以其盛於他禮故顯之致命之辭冝在敢不承命之後蓋因而遂記之耳其次則見於納采對曰吾子順先典貺某重禮某不敢辭敢不承命先典即彼所謂先人之禮也納徵於六禮為盛故曰重禮此亦擯者傳主人辭也主人於堂亦惟拜命而已無辭請期曰吾子有賜命某既申受命矣惟是三族之不虞使某也請吉日注曰虞度也不億度謂卒有死喪繼公謂既申受命謂曏者重受女家之命今亦冝然言此者欲女家以日告之也族有親者之稱三族謂從父從祖從曾祖之親也從父之親齊衰大功也從祖之親小功也從曾祖之親緦麻也喪服不止於此但舉三者言之耳有凶服則廢嘉禮故欲及今之吉也或曰三族謂父母妻之族對曰某既前受命矣唯命是聽注曰前受命者申前事也繼公謂言前此皆受壻家之命今則亦惟命是聼也曰某命某聽命于吾子注曰曰某壻父名也對曰某固唯命是聽曰某使某受命吾子不許某敢不吿期曰某日曰某日堂上致命之辭也其上則皆擯者所傳者也經云請期用鴈主人辭賓許告期云許告期則是在門外之時但許吿之而未吿也對曰某敢不敬須此乃主人堂上受命時語也須待也凡使者歸反命曰某既得將事矣敢以禮吿禮即女家所受納采問名之類是也使者既釋此辭乃以禮告記不見之者以其辭各異故不備載之省文爾主人曰聞命矣命謂使者之言也父醮子注曰子壻也醮之禮如冠醮與其異者於寢爾繼公謂醮之者重昬禮也亦母薦焉不禮者變於遣女之禮命之曰往迎爾相承我宗事迎魚敬反相息亮反注曰相助也宗事宗庿之事繼公謂相謂内助宗事未詳勗帥以敬先妣之嗣若則有常勗許玉反注曰勗勉也若猶女也繼公謂此言夫婦之閒不可不敬然夫倡則婦從故汝當勉帥之以敬謂以身先之也彼能敬則盡婦道而可以嗣續我先妣之事矣既又戒之使常敬也父命之亦當在筵前北面之時子曰諾唯恐弗堪不敢忘命堪任也唯恐不任帥以敬之事蓋謙恭之辭子既對乃拜受觶賓至擯者請對曰吾子命某以兹初昬使某將請承命對曰某固敬具以須注曰賓壻也命某壻父名兹此也將行也使某行昬禮來迎繼公謂壻家告期而賓乃云吾子命之者不敢自專若受命於婦家然也然期日自壻家出而婦家許之雖以為婦家之命亦可也將未詳父送女命之曰戒之敬之夙夜毋違命此即正衣若笄時之語也夙夜舉一日之始終而言耳命謂舅姑與夫之命母施衿結帨曰勉之敬之夙夜無違宫事衿其鴆反帨舒銳反此即送于西階上時之語也施衿結帨亦欲其以此為識耳宫猶家也無違宫事者謂凡宫中之事不可違尊者之命也婦人無外事故惟以是戒之帨佩巾衿未詳庶母及門内施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視諸衿鞶鞶步干反注曰庶母父之妾也鞶鞶囊也男鞶革女鞶絲宗尊也愆過也諸之也繼公謂門内庿門内也庶母位在下故送之及門内施鞶與施衿意同申之以父母之命命之庶母賤不敢有所戒惟舉尊者之言以重告之使敬從之也曰敬恭聽宗爾父母之言指此時而言也夙夜無愆視諸衿鞶指異日而言也言若欲夙夜無愆但當視衿與鞶耳蓋視此則或能識已之語而父母之戒固自不能忘而可以無愆也欲其識已之語云鞶足矣乃及於衿者不敢專以已之所施者為言亦敬也壻授綏姆辭曰未教不足與為禮也言未教蓋謙辭宗子無父母命之親皆没已躬命之注曰命之命使者母命之在春秋紀裂繻來逆女是也躬猶親也親命之則宋公使公孫夀來納幣是也言宗子無父是有有父者禮七十老而傳八十齊喪之事不及若是者子代其父為宗子其取也父命之繼公謂宗子大宗子也親皆没已自命之雖有諸父諸兄不稱之者宗子尊不統於族人也此見無父而母命使者之禮則是父没而母存亦不可親迎矣支子則稱其宗支子謂宗子之族人也此指其無父母與親兄者而言宗亦大宗子也稱其宗子命使者宗子尊也言稱其宗則非宗子自命之矣下文弟稱其兄亦然此支子與喪服傳所云者不同弟稱其兄弟謂凡無父母而有親兄者也兄雖非宗子猶稱之也有兄則不稱宗子者尚親也若不親迎則婦入三月然後壻見曰某以得為外昬姻請覿迎魚敬反見賢遍反下並同覿音狄不親迎謂使人迎之此指無父者也記曰父醮子而命之迎昬義曰子承命以迎是親迎者必受父之命也若無父則子無所承命故其禮不可行壻見見於婦之父也親迎之時主人迎壻以入母立于房外壻奠鴈而降是亦見婦之父母矣若不親迎則壻須别見故於此時為之必俟三月者婦無舅姑者三月而庿見故此壻之行禮於婦家亦以之為節也下文云某之子未得濯摡於祭祀然則此在庿見之後祭行之前乎昬姻者壻婦兩家相於之通稱覿者卑見尊之辭主人對曰某以得為外昬姻之數言此者明已當往見也主人妻父也某之子未得濯摡於祭祀是以未敢見摡古代反言此者明已所以未往見也外舅不必先見壻此蓋謙辭濯洗也摡拭也濯摡於祭祀謂祭祀則濯摡祭器也此非主婦之事乃言某之子亦謙辭也其意蓋以為女未與祭則未成為婦故云然今吾子辱請吾子之就宫某將走見言此者不敢當壻之先見已也辱謂自屈辱而來宫猶家也對曰某以非他故不足以辱命請終賜見注曰命謂將走見之言繼公謂前已言云得為外昬姻故此但云非他故不欲重言之耳對曰某以得為外昬姻之故不敢固辭敢不從此所謂禮辭也得為昬姻則異於賓客所以不敢固辭也先辭其見而後不辭其贄亦異於賓客此賓主之辭皆擯者傳之得以冝從上文作以得又此云之故上云之數疑有一誤主人出門左西面壻入門東面奠贄再拜出注曰出門出内門入門入大門出内門不出大門者異於賓客也壻見於寢奠贄者壻有子道不敢授也贄雉也繼公謂主人出門左西面則近於門矣此異於見賓客之位蓋親之也壻入門亦入門在也設似脫一左字壻於主人長幼不敵如降等者然故奠贄而不授恐主人先拜故不敢入庭深也東面奠贄象其東面訝授也聘禮私覿私面必北面授幣其始也或北面奠之是其例乎此賓主服𤣥端擯者以贄出請受受謂主人欲親受之也壻既出擯者東面取贄以出西面于門東其辭蓋曰某也使某請受壻禮辭許受贄入壻東面辭既許則進訝受其贄入立于寢門外之右東面鄉主人也主人再拜受壻再拜送出主人拜于位進訝受于門中皆西面壻復位東面拜送見主婦主婦闔扉立于其内扉音非主婦主人之妻也扉門扇也雙言之則謂之門單言之則謂之扉門上似脫一東字闔東扉立于其内示内外之限也不言西面可知擯者出請入告主婦乃位于此然後壻入必出乃入者禮更端不敢由便也主婦此時亦纚笄宵衣壻立于門外東面主婦一拜壻荅拜主婦又拜壻出主婦與壻行禮乃俠拜者重始見也主人請醴及揖讓入醴以一獻之禮主婦薦奠酬無幣及音乃乃當作乃字之誤也於壻之出主人送于門外因請醴之壻亦禮辭許主人乃與之揖而入也入謂入大門與寢門也入寢門則三揖至于階三讓升記大畧言之耳醴之亦謝其辱也醴之而一獻親之也主婦薦示夫婦共此禮也奠酬壻奠主婦酬觶於薦東也必云無幣者嫌其如士冠醴賓一獻之為也士之飲賓不必用幣其或用幣有為為之耳此禮畧如舅姑饗婦之禮而無俎其他異者則以意求之壻出主人送再拜壻奠酬即出送謂送於外門外儀禮集說卷二正誤酬以束帛鄭本作束錦注曰古文錦皆為帛繼公案聘禮使介行禮用錦不用帛者辟主國君之幣也此無所辟不當用錦冝從古文皆作帛外昬姻之故鄭本無外字注曰古文曰外昬姻繼公案上云外昬姻此不冝異當從古文腊一純鄭本純作肫注曰肫或作純則是當時或本有作肫者也案少牢饋食禮云腊一純者二然則此亦當作純明矣今以或本為正改肫作純
