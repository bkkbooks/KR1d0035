body:
  text: 儀禮集説卷九元敖繼公撰公食大夫禮第九注曰於五禮屬嘉禮䟽曰此篇魚腸胃倫膚皆七篇末云上大夫魚腸胃倫膚若九若十有一下大夫則若七若九則此大夫謂子男之下大夫也繼公謂此篇主言食小國小聘之賔蓋與前篇互見其禮也公食大夫之禮使大夫戒各以其爵食音嗣下並同異者别見之云各以其爵則兼卿大夫言矣此蓋顧下經見上大夫之禮而立文也飲食之禮賔主敵則主人親戒速所以尊賔也此使戒賔而各以其爵亦其義耳上介出請入告三辭注曰為既先受賜不敢當䟽曰饗食皆當三辭繼公謂食必三辭者重於燕也燕則再辭而許賔出拜辱大夫不答拜將命賔再拜稽首注曰受命繼公謂賔不言朝服可知也既對乃北面而拜拜辱説見鄉飲酒大夫還注曰復於君賔不拜送遂從之云不拜送明有拜送者先拜送乃從之國君於王使之禮也右戒賔賔朝服即位于大門外如聘朝直遥反拜命之時賔固朝服矣於此乃著之者明其與聘服異亦因事而見之如聘謂賔入于次乃即位而主君之擯者亦三人也賔即位亦于西方東面介立于其東南北面西上右賔即位即位具賔即位而主人之有司乃具者節也具如具官饌之具謂具其所當陳設之物也羮定甸人陳鼎七當門南面西上設扃鼏鼏若束若編注曰凡鼎鼏蓋亦茅為之長則束本短則編其中繼公謂甸人掌以薪蒸役外内饔之事故此時為陳鼎也天子則外饔為之大牢而用七鼎以所食者乃下大夫也篇首雖言使大夫戒各以其爵而篇中則實主言下大夫耳陳鼎於庭少北而東西則當門陳鼎當門南面君禮也西上明為賔也設扃鼏在陳鼎之前於此乃言之者亦因而見之也若束若編亦謂七者皆科用其一耳此與若丹若墨之文意同設洗如饗注曰必如饗者先饗後食如其近者也饗禮亡燕禮則設洗於阼階東南小臣具槃匜在東堂下匜音移為公設盥也匜盛盥水槃盛盥棄水也凡行禮其以槃匜盥而不就洗者尊者一人而巳有敵者則否不言簞巾文略耳祭禮有槃匜必有簞巾宰夫設筵加席几注曰設筵於户西南面而左几公不賔至授几者親設湆醬可以略此無尊言此者嫌酒漿或用尊也飲酒漿飲俟于東房注曰其俟奠于豐上也繼公謂酒言飲者指其所用名之也漿云飲者明其為六飲之一者也漿在六飲而云漿飲亦猶醴在五齊而云醴齊之類也言俟者見其已在觶特俟時而設之耳凡宰夫之具饌于東房注曰凡非一也飲食之具宰夫所掌也酒漿不在凡中者雖無尊猶嫌在堂繼公謂此所饌者謂豆簠簋鉶也右陳設公如賔服迎賔于大門内大夫納賔賔入門左公再拜賔辟再拜稽首公揖入賔從辟音避此行禮於禰廟亦有每門每曲之揖不言者亦文省此説已在聘禮後不見者放此及廟門公揖入賔入注曰廟禰廟也三揖至于階三讓公升二等賔升此下大夫與公升階之儀乃與卿同然則升階尊卑之差不過一等此三揖與士冠禮者同與聘禮者異右迎賔大夫立于東夾南西面北上注曰東夾南東西節也繼公謂大夫亦兼上下者言也下大夫西面辟擯者及士位而在此耳東夾南即東堂南舍坫而取節於夾見其去堂遠也羣臣至是方即位於廟則是曏者公亦不在廟明矣此其異於臣禮與士冠士昬禮主人皆先待於廟乃出迎賔士立于門東北面西上注曰非其正位辟賔在此繼公謂立于門東冝東上而統於君乃西上者順其本位之列所以見此非正位也西方北上門東西上皆上左也聘時大夫士之位亦冝如是小臣東堂下南面西上小臣者小臣正小臣師與其從者也宰東夾北西面宰大宰也東夾北北堂下之東方也宰尊官於此乃見之者位定在後耳宰與羣臣同入以其位在内故後於在外者内官之士在宰東北西面南上注曰夫人之官内宰之屬也自卿大夫至此不先即位從君而入者明助君食賔自無事繼公謂内官之士内小臣之屬也在宰東北少退於宰也此惟取節於宰則宰獨立於此明矣介門西北面西上注曰西上自統於賔繼公謂介位序於内官之後見其不從賔而入變於聘時也上擯則隨公而入立于階下承擯紹擯亦隨入立于士東少進負東塾北面東上右羣臣及介即位公當楣北鄉至再拜賔降也公再拜鄉許亮反下並同䟽曰公方一拜賔即降賔降後公又一拜繼公謂至再拜言其拜至之數也賔降之上不言公壹拜者文脱耳於公壹拜而賔降者急於荅拜亦所以辟之至再拜説見士昬禮賔西階東北面荅拜擯者辭注曰辭拜於下拜也不從其命而拜公降一等辭曰寡君從子雖將拜興也曰者擯者辭也公降一等辭止其又拜也公辭而賔猶欲拜故擯者復釋辭以止之而賔終不從命也君於臣乃拜至其禮太崇故荅之亦與常禮異賔栗階升不拜注曰自以已拜也繼公謂升不拜者以其終拜於公辭之後也栗階説見燕記命之成拜階上北面再拜稽首注曰賔降拜主君辭之賔雖終拜於主君之意猶為不成繼公謂拜下者臣也拜于上者賔也既升而命之成拜所以賔之右拜至士舉鼎去鼏於外次入陳鼎于碑南面西上右人抽扃坐委于鼎西南順出自鼎西左人待載幂當作鼏去鼏亦右人也次序也次入鼎在西者先在東者後也碑下脱一南字西南之南衍文皆傳寫者誤也朝位君南面故陳鼎於内外皆順之鼎西每鼎之西也順出以次而出也順出正禮也其或逆出由便耳左人待載蓋各立于其鼎之東南面雍人以俎入陳于鼎南旅人南面加匕于鼎退注曰雍人掌割烹之事者雍人言入旅人言退文互相備也匕俎每器一人諸侯官多也繼公謂雍人西面于鼎南陳俎俎南順旅人南面于鼎北加匕匕北枋退蓋兼執匕俎者而言旅人其士旅食與大夫長盥長之兩反以長而序盥也亦目下事之辭洗東南西面北上當盥者七人皆違其位而立於此也國君設洗當東霤於東夾南為少東洗之東南則又東矣序進盥退者與進者交于前前者其立處之西也於洗南為少東交于前不言相右可知也此可見經文之例矣卒盥序進南面匕南面立于鼎後也匕出鼎實也載者西面注曰載者左人亦序自鼎東西面於其前大夫匕則載之䟽曰在鼎南稍東也繼公謂西面執俎以載也魚腊飪注曰食禮冝孰饗有腥者䟽曰上云羮定恐魚腊不在其中故此特著魚腊飪也又曰國語云王饗用體薦體薦則腥矣樂記云大饗俎腥魚是饗禮有腥也載體進奏奏七豆反注曰體謂牲與腊也繼公謂體者三牲則右體腊其一純與言體而不言骨見其尊者耳牲體之數五其脊脅各三而皆二骨以並腊則倍之也少牢饋食禮曰腊一純而俎進奏注見鄉飲酒記魚七縮俎寢右注曰寢右進鬐也繼公謂魚七者腸胃有俎故魚亦放其數也縮俎者首尾鄉俎之前後也所以變於牲寢右進鬐亦進奏之意魚鬐在上腴在下士喪禮曰載魚左首進鬐腸胃七同俎注曰以其同類也不異其牛羊腴賤也此俎實凡二十八䟽曰牛羊各有腸胃腸胃各七四七二十八也繼公謂腸胃七者大牢之下數也與牲異俎者大牢之禮也倫膚七倫膚者雍人所倫之膚也倫猶擇也膚乃七者亦效腸胃之數也少牢饋食禮曰雍人倫膚九腸胃膚皆横諸俎垂之注曰腸胃垂及俎拒繼公謂横諸俎者以其皆出於牲體故載於俎也與牲體同言垂之見其長也不言其垂之所及者腸胃與膚其長或異大夫既匕匕奠于鼎逆退復位匕奠于鼎謂加匕於鼎上也位東夾南右鼎入匕載公降盥賔降公辭注曰辭其從巳繼公謂公辭賔亦對而反位于階西於是小臣各執槃匜簞巾以就公盥卒盥公壹揖壹讓公升賔升壹讓者殺於初宰夫自東房授醯醬注曰授公也繼公謂此亦並授也下放此公設之示親饋賔辭北面坐遷而東遷所辭時蓋東面於公之西辭者辭公親設也東遷所東遷於其所也所者謂醬之正位也公設之處於其正位為少西必少西者為賔當遷之故也遷之者示其不敢當公親設之意且以為禮也下皆放此公立于序内西鄉賔立于階西疑立疑舊魚乙反事未至故離其拜位也序内西鄉主位也階西西階上之西也公與賔各俟於此與鄉飲酒之主人立于階東之意同公不立于阼階東者公尊也宰夫自東房薦豆六設于醬東西上韭菹以東醓醢昌本昌本南糜臡以西菁菹鹿臡臡音尼注曰昌本昌蒲本菹也醢有骨謂之臡菁蓂菁即蔓菁也䟽曰周禮醢人朝事之豆八此用其六繼公謂六豆為二列内列自西而東外列自東而西惟云西上者明外列統於内列也食禮用朝事之豆者君尊故其用之自上者始也若朝事饋食之禮兩有則其籩豆乃各有所屬云士設俎于豆南西上牛羊豕魚在牛南腊腸胃亞之膚以為特當豆南者牛俎也羊俎之半也亞次也設俎之法毎者必當兩豆欲其整也特在豕東旅人取匕甸人舉鼎順出奠于其所注曰其所謂當門繼公謂甸人加扃乃舉鼎其出也亦匕先而鼎後宰夫設黍稷六簋于俎西二以並東北上黍當牛俎其西稷錯以終南陳錯匕各反東北上惟指黍當牛俎者言也錯以終者稷南黍黍東稷稷南黍黍西稷也上列之黍當牛俎則次列之稷當魚俎而後列南於魚俎之西也一簋當一俎則其位之䟽數可知矣大羮湇不和實于鐙宰右執鐙左執蓋由門入升自阼階盡階不升堂授公以蓋降出入反位大音泰鐙音登盡子忍反注曰不和貴其質瓦豆謂之鐙宰謂大宰有蓋者饌自外入為風塵䟽曰宰以蓋出於門外乃更入門反於東夾北位也繼公謂此大羮謂牛汁不和者以無肉菜尚質也以五味調物謂之和周禮曰凡和春多酸夏多苦之類是也凡湇皆不和經特於此見之自門入者湇在爨也士昬禮曰大羮湇在爨記曰亨于門外東方足以明之矣入反位自東壁而適東夾北也公設之于醬西賔辭坐遷之注曰亦東遷所繼公謂設湇于醬西是醬湇東上也凡醬湇之位變於正豆宰夫設鉶四于豆西東上牛以西羊羊南豕豕以東牛東上變於豆飲酒實于觶加于豐具饌之時則然矣言於此者為下文發之宰夫右執觶左執豐進設于豆東注曰食有酒者優賔也繼公謂不授觶者以未用也設於豆東者不主於飲且後用之故不欲其妨宰夫東面坐啓簋㑹各郤于其西㑹如字注曰㑹簋蓋也亦一一合郤之各當其簋之西䟽曰少牢云佐食啓㑹蓋二以重設于敦南繼公謂此六簋為三列每列之二㑹則各相重而郤置於列之西故曰各郤于其西右設正饌賛者負東房南面告具于公賛者所謂上賛也負東房負其墉也士喪禮曰祝負墉南面然則此其上賛之正位與具謂正饌已具公再拜揖食食如字再拜者欲賔食禮之也拜亦當楣北面賔降拜公辭賔升再拜稽首賔升席坐取韭菹以辯擩于醢上豆之間祭辯音遍下並同擩人悦反擩猶染也此所擩者醓醢而下五豆惟云醢者省文耳少牢饋食用四豆尸取韭菹擩于三豆是其徵也上豆韭菹醓醢也祭於二豆之間少北此節見少牢下篇賛者東面坐取黍實于左手辯又取稷辯反于右手興以授賔賔祭之注曰賔亦興受坐祭之於豆祭䟽曰此所授者皆遠賔者也繼公謂辯謂辯取於三簋先黍後稷不欲其雜也每取黍稷皆以右手而實于左手既則反于右手也亦壹以授賔不言壹者其文已明也三牲之肺不離賛者辯取之壹以授賔賔興受坐祭注曰不離者刌之也亦祭於豆祭繼公謂云不離者見其為切肺且明無舉肺也食而舉肺脊者其肺則離之云壹者見其不再也必著之者嫌每肺當别授之也上言興授此言興受文互見耳挩手扱上鉶以柶辯擩之上鉶之間祭䟽曰此云上鉶之間祭者著其異於餘者餘祭於上豆之間繼公謂扱上鉶以柶謂以内列牛鉶之柶扱其鉶也辯擩之者遂以柶擩三鉶也此四鉶皆有柶其擩之則惟用其上者之柶與少牢饋食禮略同上鉶之間謂内列二鉶之間少北也祭鉶不於豆祭而於鉶間者其大牢之禮異與祭飲酒於上豆之間魚腊醬湇不祭注曰不祭者非食物之盛者繼公謂魚腊屬於牲醬屬於豆湆屬於鉶故此雖設之亦不祭蓋已祭其大則略其細也不言腸胃膚者在魚腊之下不祭可知右賔祭正饌宰夫授公飯􅆝公設之于湇西賔北面辭坐遷之注曰既告具矣而又設此加也繼公謂􅆝言飯者以賔主食之也北面辭蓋於公之左而少退上云北面坐遷與此文互見也遷之亦東遷所公與賔皆復初位注曰位序内階西宰夫膳稻于􅆝西膳當作設字之誤也膳設聲相近由是誤云士羞庶羞皆有大蓋執豆如宰注曰大以肥美者特為臠所以祭也魚或謂之膴膴大也唯醢醬無大如宰如其進大羮湇右執豆左執蓋繼公謂言執於蓋豆之間見其兩執也案注曰唯醢醬無大者以經文云皆故言此以明之醢醬四醢及芥醬也先者反之先者即執膷豆者也既設膷豆則以次受其餘於西階上而設之反者既徃而復來之辭此文似失其次而在是由門入升自西階由門入則三牲與魚亦於門外雍爨為之與先者一人升設于稻南簋西間容人間如字注曰簋西黍稷西也必稻南者明庶羞加不與正豆併也間容人者賔當從間徃來也繼公謂先者一人士之長設膷者也設膷于稻南言其東西節也簋西言其南北節也閒諸簋之西庶羞之東也案注云必稻南者明庶羞加不與正豆併謂稻乃加食其位不與正饌併而庶羞又設於稻南明庶羞亦為加不與正豆併也併謂同為一處唯云正豆者以其器同也旁四列西北上注曰不統於正饌者雖加自是一禮繼公謂云旁者見正饌之中席而此在旁也下文云賔坐席末取􅆝即稻而庶羞在稻南足以明之矣西北上謂膷豆在諸豆之西北也必西北上者放正豆之位亦變於席之所上也膷以東臐膮牛炙炙之夜反下並同餘見前篇炙炙肉炙南醢以西牛胾醢牛鮨胾側吏反鮨巨之反注曰先設醢䋫之以次也胾切肉也内則謂鮨為膾然則膾用鮨今文鮨作鰭繼公謂此二醢為牛之炙胾膾設也案注云先設醢䋫之以次也謂炙南之醢為炙而設故其次在胾之上鮨南羊炙以東羊胾醢豕炙此一醢為羊炙羊胾設也炙南醢以西豕胾芥醬魚膾注曰芥醬芥實醬也内則曰膾春用葱秋用芥繼公謂此一醢為豕炙豕胾設芥醬為魚膾設也牛三品二醢尊也羊二品一醢降於牛也豕亦二品一醢而醢次於炙又異於羊也魚一而已其芥醬復先於膾又異於豕也古人於食物之微亦以多寡先後示尊卑之義則其精微周宻之意亦可見矣衆人騰羞者盡階不升堂授以蓋降出盡子忍反注曰授授先者一人繼公謂進羞而言騰亦取其自下而上之意衆人不升設者降於俎也以羞授先者一人先者每為設之所謂先者反之也以蓋降出惟謂衆人其先者之蓋則次者既授豆而受之并以出矣賛者負東房告備于公注曰復告庶羞具者以其異饌繼公謂此言備者備周於具右設加饌賛升賔注曰命賔升席繼公謂公曏者已再拜揖食故於此惟賛者升賔禮不可褻也升賔之辭蓋曰吾子其升也賔坐席末取􅆝即稻祭于醬湇間坐席末者就加饌也取􅆝即稻言不反􅆝於左手也不祭于豆祭而于醬湇間者以其近也且别於正饌賛者北面坐辯取庶羞之大興一以授賔賔受兼壹祭之一壹同賛者壹以授賔賔兼壹祭之禮之節當然也賔於黍稷牲肺皆壹祭之特於此發之耳祭不言其所亦於醬湇間可知右賔祭加饌賔降拜拜者為將食故也公辭賔升再拜稽首公答再拜賔北面自間坐左擁簠粱右執湇以降注曰間兩饌之間也擁抱也必取粱者公所設也繼公謂擁之者示其重也必取湇者飯則先啜湇故特取之以降者為公立于堂已不敢坐食于席也必以降者臣也云簠􅆝見其器也凡􅆝稻皆以簠公辭賔西面坐奠于階西東面對注曰奠而後對成其意也繼公謂公辭止其食於下也階西賔所欲食之處也故於此奠之對者釋其所以降之意且從命也西面坐取之栗階升北面反奠于其所降辭公公不許其降食乃敢辭公為禮之節然也辭公之意與曏者欲食于下之意同降而辭者亦以其臣也公許賔升公揖退于箱擯者退負東塾而立注曰箱東夾之前賔坐遂卷加席公不辭卷九阮反下同注曰賛者以告公公聽之繼公謂卷加席者北面坐而卷自末也公不辭以其降等也若於朝君則辭而賔反之矣賔三飯以湇醬宰夫執觶漿飲與其豐以進飯扶晚反注曰縁賔意欲自潔清繼公謂漿觶亦先加於豐上如飲酒可知賔挩手興受注曰受觶宰夫設其豐于稻西注曰酒在東漿在西是所謂左酒右漿繼公案左酒右漿弟子職文庭實設注曰乘皮繼公謂此與下文行禮之節亦略與聘禮醴賔者同賔坐祭遂飲奠于豐上其祭亦於醬湇間右賔食公受宰夫束帛以侑西鄉立注曰侑猶勸也主國君以為食賔殷勤之意未至復發幣以勸之西鄉立序内位也受束帛于序端繼公謂是時公受束帛蓋于東箱醴時公在堂則受于序端侑者食賔而從之以貨財之之稱勸人食亦曰侑賔降筵北面注曰以君將有命也北面於西階上擯者進相幣賔降辭幣升聽命相息亮反辭幣者謂既受賜食不宜又辱賜幣也公於是降一等止其降且不許其辭賔即栗階升聽命也經似有脫文降拜公辭賔升再拜稽首受幣當東楹北面退西楹西東面立西楹西亦少北也公壹拜賔降也公再拜介逆出賔北面揖執庭實以出北面揖之者象親受之也凡庭實並受公降立注曰俟賔反繼公謂亦立于中庭上介受賔幣從者訝受皮右侑幣此一節經文有不釋者已見於前篇醴賔條故也賔入門左沒霤北面再拜稽首霤門内霤也沒霤庭南也拜者謝侑幣之賜也沒霤而拜以公立于中庭也公辭辭其拜於庭也揖讓如初升此三揖時公在中庭與賔三揖則是與聘禮者同矣云如初亦大略之言也既升則介入復位賔再拜稽首公荅再拜曏也賔拜賜于庭南公辭之故成拜於此右賔拜侑幣賔降辭公如初注曰將復食繼公謂初謂公許也賔升公揖退于箱賔卒食㑹飯三飲食飯皆如字注曰㑹飯謂黍稷也此食黍稷則初時食稻􅆝繼公謂減簋飯於㑹而食之故云㑹飯曏者三飯乃飲此凡三飲蓋九飯也九飯大夫禮也後禮更端故與前三飯不相蒙食加飯而飲漿則此所飲者其酒與不以醬湇亦變於初禮也先言醬者不用之故惟據所設之序而言挩手興北面坐取􅆝與醬以降西面坐奠于階西注曰示親徹也繼公謂再食不用􅆝與醬乃取以降者重公所設也公於正饌先設醬加饌先設􅆝故賔親徹此二者階西曏者所欲食之處也東面再拜稽首注曰卒食拜也繼公謂卒食而拜賜也亦拜於階西不於階東又不北面皆變於初明其將遂退矣公降再拜公拜亦西面于阼階下右卒食介逆出賔出公送于大門内再拜賔不顧於此復云賔不顧嫌其或與聘問之時異也有司卷三牲之俎歸于賔舘注曰卷猶收也無遺之辭也繼公謂云卷者明盡以其俎與其實歸之此牲體皆在俎則食時不舉之明矣少牢特牲饋食禮尸所舉者加于肵虞禮則實于篚司儀職言食禮舉數上公九侯伯七子男五以差言之則大夫當三也此乃不舉其亦與周官異者乎魚腊不與與音預言卷三牲之俎則魚腊不與可知乃言之者亦經文過於詳爾右賔出歸俎明日賔朝服拜賜于朝拜食與侑幣皆再拜稽首曏於既食既受侑幣皆已親拜謝公今復往拜賜者正禮不可廢也此拜公不見故無嫌於重複訝聽之注曰受其言入告出報也此下大夫有士訝右賔拜賜上大夫八豆八簋六鉶九俎魚腊皆二俎注曰記公食上大夫異於下大夫之數繼公謂豆加茆菹麋臡簋加黍稷各一鉶加羊豕俎加鮮魚鮮獸於膚之下如饔九鼎之次云九俎則四四為列而特鮮獸魚腸胃倫膚若九若十有一下大夫則若七若九注曰此以命數為差也九謂再命者也十一謂三命者也七謂一命者也九或上或下者皆再命者也謂小國之卿大國次國之大夫也卿則曰上大夫則曰下大國之孤視子男䟽曰云此以命數為差者案周禮典命公侯伯之卿三命大夫再命士一命子男之卿再命大夫一命士不命則諸侯之臣分為三等三命再命一命不命與一命同此經魚腸胃倫膚亦分為三等有十一有九有七則十一當三命九當再命七當一命若然惟有上下二文者以公侯伯之大夫與子男之卿同再命卿爵尊為上大夫爵卑為下則上言若九者子男之卿也下言若九者公侯伯之大夫也故鄭云卿則曰上大夫則曰下云大國之孤視子男者此經惟見三命以下故鄭併論及之案周禮典命大國之孤四命又大行人云大國之孤執皮帛以繼子男又云其他皆視小國之君若然孤與子男同十三侯伯十五上公十七差次可知繼公謂其俎數之同者又以此見尊卑也因言上大夫以及下大夫蓋以足前禮未備之意庶羞西東毋過四列注曰謂上下大夫也繼公謂欲閒容人也膷當稻南若過四列則近於簋矣西東西列東列也先言西者上也庶羞每列自北而南䋫之此乃言西東毋過四列者所以見庶羞雖多其南北列之豆不得過四也南北列之豆若過於四則西東列亦過於四矣上大夫庶羞二十加於下大夫以雉兎鶉鴽鶉音淳鴽音如注曰鴽無母䟽曰案爾雅云鴽鴾母郭氏曰䳺也青州人呼曰鴾母繼公謂上言東西毋過四列則此四者為一列於南也右食上大夫禮若不親食使大夫各以其爵朝服以侑幣致之説見前篇豆實實于罋陳于楹外二以並北陳簋實實于筐陳于楹内兩楹間二以並南陳豆實在罋簋實在筐又皆陳于楹閒皆變於食也南北異陳示不相統也罋數如豆北上韭菹其東醓醢屈筐數如簋南上黍其東稷錯也庶羞陳于碑内庶羞者醢四并魚膾與芥醬也不陳於上以牲在下冝從之庶羞主於牲肉也上大夫又加以雉兎鶉鴽此豆實也亦實於罋庭實陳于碑外此庭實不於西方參分庭一在南又不執之皆變於食也牛羊豕陳于門内西方東上生歸之亦變於食陳于門西餼位也賔朝服以受如受饔禮親食時朝服故此致者受者皆服之云如受饔禮則侑幣與食亦殊拜之無擯李寳之曰擯當作儐下同明日賔朝服以拜賜于朝訝聽命注曰賜亦謂食與侑幣右致食禮大夫相食親戒速注曰記異於君者也速召也先就告之歸具既具復自召之繼公謂親戒而又速之者以其敵也迎賔于門外拜至皆如饗拜注曰饗大夫相饗之禮也今亡繼公謂迎賔與拜至亦皆再拜大夫相饗蓋亦附於公饗大夫禮中而并亡之矣降盥賔亦從降主人辭降賔對主人乃盥于洗南面卒盥一揖一讓升經不言文省也禮賔主敵則不設槃匜惟盥于洗耳受醬湇侑幣束錦也皆自阼階降堂受授者升一等賔止也注曰皆者謂受醬受湇受幣也降堂謂止階上繼公謂降堂升一等中等相授也不受於堂辟君也中等相授異於士也大夫之階亦惟三等於此見之矣考工記言天子堂崇九尺以是差之則公侯伯七尺子男五尺大夫士皆三尺也賔止之義與上篇大夫止者同士冠禮賔受冠降階一等賔執􅆝與湇之西序端亦為主人立于堂故不敢食於席也其尊敵故但辟之於堂上而已􅆝不擁亦降於君主人辭賔反之云反之明不對也此下當有辭於主人降一等主人從十字蓋傳冩脱之卷加席主人辭賔反之卷加席亦謙也辭則反之敵也辭幣降一等辭而降一等為恭也亦略放於公食之禮而為之主人從從亦降一等也從者辭其降且不許其辭受侑幣再拜稽首主人送幣亦然著之者主人非君嫌不必稽首辭於主人降一等主人從從者亦辭其降且許之此謂再入而辭者也然則初辭亦有此文明矣又公食禮有賔再入之拜上經乃不見其異者則是大夫禮無此拜也卒食徹于西序端注曰亦示親徹繼公謂亦奠于曏者所欲食之處也東面再拜降出注曰拜亦拜卒食繼公謂拜不當階又不北面亦變於前主人亦於阼階上西面答再拜也其他皆如公食大夫之禮他謂在公食禮中而不見於上者也然上禮所不見者亦未可盡與公食禮相通經云皆如者大約言之耳又此不别見所饌者之異則是俎豆之屬亦皆如公食者矣蓋大夫此禮為公而舉故其饌放之而不嫌與之同也大夫祭其宗廟惟用少牢且於其始也不敢純用朝事之豆則此食禮之意可見矣右大夫相食若不親食則公作大夫朝服以侑幣致之不言其禮者與公致食之禮同可知賔受于堂無擯注曰與受君禮同繼公謂言此者嫌或與君禮異也賔受大夫餼不於堂故明之賔阼階上北面再拜稽首受幣于楹間則異於君禮不見者可知也右大夫致食記不宿戒宿戒者先期日而戒之也此禮當日乃戒故云然戒不速經文已明不授几無阼席經文亦已明亨于門外東方亨音烹門外廟門外也門外東方雍爨在焉司宫具几與蒲筵常緇布純加莞席尋𤣥帛純皆卷自末純並音準下並同莞音官注曰丈六尺曰常半常曰尋末經所終有以識之必長筵者以有左右饌也䟽曰云丈六尺曰常半常曰尋者據周禮考工記殳長尋有四尺崇于人四尺車㦸常崇于殳四尺之文而言也繼公謂蒲筵而加莞席美者在上也筵常而加席尋是加席之度必半於其筵於此見之矣莞小蒲也宰夫筵出自東房筵亦謂布之也賔之乘車在大門外西方北面立乗繩證反注曰賔車將至下行而後車還立于西方䟽曰少儀云僕於君子始乘則式君子下行然後還立是車還立于西方也繼公謂唯云賔之乘車在此則上介以下之車不然矣車北面立者俟賔之出冝郷之云立明其不説駕鉶芼牛藿羊苦豕薇皆有滑芼眉報反注曰芼菜也藿豆葉也苦苦荼也滑菫荁之屬繼公案内則曰菫荁枌榆免薧滫瀡以滑之故注以滑為菫荁之屬賛者盥從俎升注曰俎其所有事繼公謂賛者之所有事於賔者簋俎庶羞之祭也而俎先二者而設故從之以升簠有蓋幂注曰稻􅆝將食乃設去㑹於房蓋以幂繼公謂有蓋幂者變於簋也凡炙無醬灸之夜反注曰已有鹹和繼公謂凡凡三牲也此庶羞於三牲之炙皆為設醢唯魚膾乃用芥醬是凡炙無醬矣不言胾者如灸可知上大夫蒲筵加莞席其純皆如下大夫純卿擯由下擯無上事故不必升堂上賛下大夫也上賛即經所謂賛者也以其佐賔食於堂上故云上賛蓋對堂下之擯者而言也擯賛者事相近故以上下通之此以下大夫為之者欲其不尊於賔上大夫庶羞酒飲漿飲庶羞可也此記難強解拜食與侑幣皆再拜稽首記此於上大夫之後恐或是為彼言之若然亦長語矣此篇中見上大夫禮之異者俎豆簋鉶之加耳其他不見之則皆如下大夫禮可知固無不稽首之嫌也又何必贅言之哉儀禮集說卷九正誤宰東夾北西面鄭本此下有南上二字注曰古文無南上繼公案經文惟言宰而已是獨立於此也南上之文無所用之又以下文證之益可見矣蓋傳冩今文者因下文而衍此二字也鄭氏不察而從之非是冝從古文委于鼎西鄭本委作奠注曰今文奠為委繼公案後篇皆作委冝從今文記加莞席尋𤣥帛純又曰上大夫蒲筵加莞席鄭本莞皆作萑注曰今文萑皆作莞繼公案司几筵云諸侯祭祀席蒲筵繢純加莞席紛純是蒲筵之上冝加莞席也而萑乃葦屬其為物麤惡故司几筵惟於䘮事則用萑席焉似不可用之於此禮也冝從今文皆作莞
