body:
  text: 儀禮集説卷三元敖繼公􅁧士相見禮第三注曰相見於五禮屬賓禮繼公謂此篇主言士相見之禮其他禮則亦因而及之也士相見之禮贄冬用雉夏用腒左頭奉之腒其居反奉芳勇反注曰贄所執以至者君子見於所尊敬必執贄以將其厚意也夏用腒備腐臭也繼公謂贄者所依以相見者也故先言之士贄用雉其義未聞必用死者為其難生得也冬言雉夏言腒文互見耳乾禽謂之腒猶乾獸而謂之腊也此乾雉乃泛言腒者與雉互見不嫌其為他物也惟見冬夏而不言春秋蓋春則先從冬後從夏秋則反之亦若屨然與左頭奉之亦但言其執之之法如是其實此時賓未執也必左頭者頭冝鄉内也不言服者亦𤣥端可知曰某也願見無由達某子以命命某見見並賢遍反下不出者皆同注曰無由達言久無因縁以自達也以命者稱述主人之意繼公謂此荅擯者請事之辭也某子之某所因縁者之姓也以命以主人之命也言某子以主人之命命某見乃敢見也恭孫之辭主人對曰某子命某見吾子有辱請吾子之就家也某將走見言某子命某見者明已冝先往見也吾子有辱者不敢當其先見已也有辱謂有所屈辱也賓來見已是自屈辱走言其不敢緩賓對曰某不足以辱命請終賜見命謂請吾子就家之言主人對曰某不敢為儀固請吾子之就家也某將走見為儀徒為辭讓之儀也再請之故曰固賓對曰某不敢為儀固以請請請終賜見也主人對曰某也固辭不得命將走見聞吾子稱贄敢辭贄注曰不得命者不得見許之命也稱舉也繼公謂許其見復辭其贄賓客之禮尚辭讓也賓對曰某不以贄不敢見注曰見於所尊敬而無贄嫌太簡繼公謂賓言此者謂始相見不可無贄也故主人再辭但以不足以習禮言之主人對曰某不足以習禮敢固辭禮謂授受往來之禮蓋指用贄而言賓對曰某也不依於贄不敢見固以請注曰言依於贄謙自卑也繼公謂依於贄言託之以為重主人對曰某也固辭不得命敢不敬從以上賓主之辭皆擯者傳之不言者可知也後放此出迎于門外再拜賓荅再拜主人揖入門右賓奉贄入門左主人再拜受賓再拜送贄出主人入門而右賓入門而左是賓主之位在大門内之東西也其拜則相鄉其贄則東西訝授于門中此賓主相見而授贄於大門内大夫士之禮也士惟昬禮受鴈於堂大夫私面乃受幣于堂者因問及之非相見之正禮主人請見賓反見退主人送于門外再拜下見如字請見於賓荅賓之見於巳也賓反見之其於主人之堂與此禮未聞右士相見主人復見之以其贄曰曏者吾子辱使某見請還贄於將命者上見如字注曰復報也復見之者禮尚往來也以其贄謂曏時所執來者也曏曩也將猶傳也傳命者謂擯相者繼公謂使某見謂因其見已而使得於家見之也云請還贄於將命者不敢斥主人主人對曰某也既得見矣敢辭疏曰上言主人者據前為主人而言此云主人者據前賓今在已家而言繼公謂贄所依以見者也既得見則事畢矣故辭其還贄賓對曰某也非敢求見請還贄于將命者注曰言不敢求見嫌䙝主人主人對曰某也既得見矣敢固辭賓對曰某不敢以聞固以請於將命者謂不敢以還贄之辭聞於主人特固以請於將命者耳請謂請還之主人對曰某也固辭不得命敢不從賓奉贄入主人再拜受賓再拜送贄出主人送于門外再拜賓得主人見許之命則不俟主人之迎而即自入蓋急欲還贄且尊主人也是亦復見之禮異於始見者與授受不著其所如上可知右復見士見於大夫終辭其贄於其入也一拜其辱也賓退送再拜注曰終辭其贄以將不親荅也凡不荅而受其贄惟君於臣耳繼公謂終辭謂主人三辭則賓不復請也士於大夫降等者也受贄而不荅則疑於君荅之則疑於敵使人還之則又疑於待舊臣是以終辭之也一拜其辱亦於大門内之東為之大夫云一拜則士或荅再拜與大夫於士不出迎入一拜又不出送亦以其降等也入一拜而送乃再拜則是凡拜而送者之禮皆然固不可得而殺也送而一拜喪禮也右士見於大夫若嘗為臣者則禮辭其贄曰某也辭不得命不敢固辭注曰禮辭一辭其贄而許也将不荅而聽其以贄入有臣道也繼公謂嘗為臣者謂曏為其家臣今為公臣者也然則士大夫以贄相見亦不獨始相見者為然禮辭之者異於見為臣者也見為臣則不辭之賓入奠贄再拜主人荅壹拜注曰奠贄尊卑異不親授也繼公謂入亦入門左也奠贄再拜亦東面也荅一拜者主人尊也言主人荅拜是不拜其辱矣賓出使擯者還其贄于門外曰某也使某還贄注曰還其贄者辟正君也繼公謂賓退而主人不拜送亦異於不為臣者也以其不見為臣故當還贄某也大夫名賓對曰某也既得見矣敢辭亦辭其還贄擯者對曰某也命某某非敢為儀也敢以請命某謂命某還贄也非敢為儀言必欲還之請亦請還贄也還贄而擯者自為之辭亦以主人尊也賓對曰某也夫子之賤私不足以踐禮敢固辭私謂私屬春秋傳曰邾滕人之私也禮與上文習禮之禮同意亦指還贄而言踐行也擯者對曰某也使某不敢為儀也固以請使猶命也賓對曰某固辭不得命敢不從再拜受再拜者象受於主人也亦訝受之右士嘗為大夫臣者見於大夫下大夫相見以鴈飾之以布維之以索如執雉見如字下相見並同注曰飾之以布謂裁縫衣其身也維謂繫聨其足疏曰如執雉亦左頭奉之繼公謂下大夫贄用鴈其義未聞云飾之以布則非白布也曲禮曰飾羔鴈者以繢則此布其繢者與維之謂繫聨其足翼也上大夫相見以羔飾之以布四維之結于面左頭如麛執之麛音迷注曰上大夫卿也面前也繫聨四足交出背上於胷前結之也如麛執之者秋獻麛有成禮如之蓋謂左執前足右執後足繼公謂上大夫之贄以羔其義未聞如士相見之禮注曰大夫雖贄異其儀猶如士繼公謂此相見之禮蓋兼復見者言之也上下大夫亦當有互相見之禮經不言之者蒙士禮故惟見其敵者焉非謂其得相見者僅止於是也大夫相見朝服右大夫相見始見于君執贄至下容彌蹙蹙子六反注曰蹙猶促也促恭慤貌也其為恭士大夫一也繼公謂至下謂當帶也曲禮曰凡奉者當心提者當帶此執物髙下之節也執贄當帶見至尊者之禮也春秋傳曰邾子來朝執玉髙其容仰子貢觀之曰髙仰驕也然則執贄至下之為恭也明矣彌猶甚也彌蹙如踧踖屏氣之類庶人見於君不為容進退走不為容則又甚於彌蹙者矣進退走亦見其不為容也士大夫則奠贄再拜稽首君荅壹拜稽音啟下同臣以贄見於君北面奠贄於中門之内而拜是時君位亦在路門外之東南鄉也君於臣之再拜稽首而荅一拜者惟奠贄之禮則然蓋以此明君臣之義也此奠贄之儀主於大夫士則庶人之見於君者其不用贄與右大夫士庶人見於君若他邦之人則使擯者還其贄曰寡君使某還贄賓對曰君不有其外臣臣不敢辭再拜稽首受人蓋通大夫士而言還其贄者非已臣也此於已臣惟以還贄為異則是曏者亦奠贄矣主君於聘使與上介之私覿乃終不許其奠幣而必親受之者重其為使介且幣又隆於贄故也不有言外之也不敢辭尊君也再拜稽首受亦若受於君前然他邦之人以贄見國君者如去國而適他國若卿見朝君之類春秋傳公㑹晉師于瓦晉大夫執贄以見非舊禮也右他邦之人見於君凡燕見于君必辯君之南面若不得則正方不疑君疑音擬注曰君南面則臣見正北面君或時不然當正東面若正西面不得疑君所處邪鄉之此謂特見圖事非立賓主之燕也疑度之繼公謂辯猶視也下文放此君在堂升見無方階辯君所在注曰升見升堂見於君也君近東則升東階君近西則升西階繼公謂方猶常也此云君在堂則上之燕見未必專在堂右燕見于君凡言非對也妥而後傳言妥他果反注曰傳言猶出言也繼公謂凡言謂凡與人言也妥安也謂安和其志氣乃言不可怱遽也易大傳曰君子易其心而後語惟有所對荅則或可怱遽言之與君言言使臣與大人言言事君與老者言言使弟子與幼者言言孝弟于父兄與衆言言慈祥與居官者言言忠信孝弟音悌注曰博陳言語之儀也使臣者使臣之禮也大人卿大夫也事君者臣事君以忠也祥善也居官謂士以下繼公謂此陳與人言之義而言則各主於一端者亦但舉其切要者以為法與凡與大人言始視面中視抱卒視面毋改終皆若是注曰始視面謂觀其顔色可傳言未也中視抱容其思之且為敬也卒視面察其納已言否也繼公謂大人亦謂卿大夫也毋改謂不可變亂其三視先後之序也終皆若是謂與言之時自初至終皆當如上所云亦不可以久故而或改之也若父則遊目毋上於面毋下於帶上時掌反下户嫁反此謂與父言之時也其異於大人者遊目耳毋上於面視面時也毋下於帶視抱時也此與視大人者無以異乃著之者嫌遊目則或不然也遊目而不上於面孝且敬也若不言立則視足坐則視膝視足視膝異於言時且益恭也右言視之法凡侍坐於君子君子欠伸問日之蚤晏以食具告改居則請退可也蚤音早注曰君子謂卿大夫及國中賢者也志倦則欠體倦則伸問日蚤晏近於久也改居謂自變動也繼公謂以食具告謂以所食之具告從者蓋欲食也卑幼之於尊長請見不請退而此乃得請退者縁君子意也可者許之之辭明其異於常禮夜侍坐問夜膳葷請退可也葷香云反注曰問夜問其時數也膳謂食之葷辛物葱薤之屬食之以止臥疏曰注云時數者謂若鐘皷漏刻之數右侍坐於君子若君賜之食則君祭先飯徧嘗膳飲而俟君命之食然後食飯扶晚反注曰君祭先飯謂君祭食臣先飯示為君嘗食也此謂君與之禮食膳謂庶羞既嘗庶羞則飲俟君之徧嘗也疏曰凡君將食必有膳宰嘗君之食備火齊不得下文是也此膳宰不在則侍食者自嘗自已前食既不嘗君食則不正嘗食故注云示為君嘗食繼公謂賓主共食則賓當祭此君臣共食君祭而臣否所以别尊卑也臣既不祭又先飯而嘗膳所以明臣禮也君命之食然後食則臣食或先於君矣君若不命之則亦俟君之食乃食與若有將食者則俟君之食然後食注曰將食猶進食謂膳宰也膳宰進食則臣不嘗食周禮膳夫品嘗食王乃食繼公謂君食然後食臣侍君食之正禮以其不嘗膳故君不必命之若君賜之爵則下席再拜稽首受爵升席祭卒爵而俟君卒爵然後授虚爵下户嫁反賜之爵使人授之於其席也下降也降席者降而當席末也既拜興受爵君荅再拜乃升席坐祭酒既卒爵興授人爵也臣先卒爵亦先飯嘗膳之意君卒爵而授虚爵則是授爵亦先於君矣此受爵卒爵授爵之節皆異於燕之無算爵者禮貴相變也凡升席降席皆由下退坐取屨隱辟而後屨辟匹亦反注曰謂君若食之飲之而退也繼公謂是時屨在西階下曲禮曰就屨跪而舉之屏於側此坐取屨即跪而舉之也隱辟即屏於側之時也屨謂納屨君為之興則曰君無為興臣不敢辭君若降送之則不敢顧辭遂出為並于偽反云不敢辭者明已不敢與君為禮也送之亦當至門君於士尊卑懸絶乃降送之其禮太崇故益不敢當大夫則辭退下比及門三辭下户嫁反比必利反大夫起而退則君興下階則君降及門則君送於此三節皆辭之故曰三辭大夫位尊不嫌與君為禮故得辭也此著大夫則上之不敢辭者為士明矣右士大夫侍飲食於君若先生異爵者請見之則辭辭不得命則曰某無以見辭不得命將走見先見之見之並如字先見之先亦當作走注曰異爵謂卿大夫也繼公謂卿大夫之爵於士為踰等故曰異爵辭者謂其以尊就卑已不敢當也辭不得命謂三辭而不見許也無以見言其非敵不可以接見之走者行之速也先見之先亦當作走蓋既傳言即走而見之也此禮當在以贄見于先生異爵者之後又先生異爵者之見於士其禮同則士之以贄見於先生亦當如見於大夫之禮明矣右先生異爵者見於士非以君命使則不稱寡大夫士則曰寡君之老使所吏反注曰謂擯贊者辭也繼公謂此文不可强通或曰君之老與大夫士之文冝易處蓋傳冩者因寡字之同而誤也未審是否右自稱於他邦之辭凡執幣者不趨容彌蹙以為儀注曰不趨主慎也以進而益恭為威儀耳繼公謂執幣謂以幣相見及為使者也凡者通尊卑言之行而張足曰趨蓋以容彌蹙為儀故不趨也惟著凡執幣者之儀如是則執贄者或不然矣士大夫執贄于君前其儀乃與此同執玉者則唯舒武舉前曳踵注曰唯舒武者重玉器尤慎也武迹也舉前曳踵備􅠶跲也繼公謂執玉謂朝君與聘使執圭璧以行禮之時也唯舒武謂僅舒其武耳舉前曳踵見其舒武之法也踵足後也足之前起而後不離地則步之促狹可知此又不止於不趨而已右執幣玉之儀凡自稱於君士大夫則曰下臣宅者在邦則曰市井之臣在野則曰草茅之臣庶人則曰刺草之臣他國之人則曰外臣刺七亦反注曰刺猶剗除也繼公謂士大夫謂見為臣者也宅者未仕而家居者也他國之人亦謂士大夫右自稱於君儀禮集說卷三正誤終皆若是鄭本終作衆注曰今文衆作終繼公謂衆字無意義宜作終與衆言言慈祥今本云言忠信慈祥大戴記注引此無忠信字今有之者葢後人因下文有言忠信三字而誤衍之也今以彼注為據删之
