body:
  text: 儀禮集說卷七元敖繼公撰大射儀第七注曰於五禮屬嘉禮繼公謂諸侯與其羣臣飲酒而習射之禮也言大射者别於賔射燕射也大射之儀他篇於此言禮是乃言儀者以其儀多於他篇故特顯之禮者摠名儀則其節文也君有命戒射謂君發命而戒有司以將射也宰戒百官有事于射者注曰宰於天子冢宰治官卿也作大事則掌以君命戒百官繼公謂此宰指侯國之上卿而言也然春秋之世侯國之上卿有不盡名為宰者與經㣲不合也射人戒諸公卿大夫射司士戒士射與賛者注曰射人掌以射法治射儀司士掌國中之士治凡其戒命皆司馬之屬也賛者謂士佐執事不射者䟽曰宰揔戒射人司士别重戒之前射三日宰夫戒宰及司馬射人宿視滌滌音狄注曰宰夫冢宰之屬掌百官之徴令者司馬於天子政官之卿凡大射則合其六耦滌謂溉器埽除射宫繼公謂宰夫戒此三官以當宿視滌也宿謂前射一日為之右戒羣臣司馬命量人量侯道與所設乏以貍歩大侯九十參七十干五十設乏各去其侯西十北十量人之量音亮下同貍力之反參如字干五旦反下並同注曰量人司馬之屬掌量道巷塗數者鄉射記曰侯道五十弓考工記曰弓之下制六尺則此貍歩六尺明矣大侯熊侯干讀為豻干侯者豻鵠豻飾也繼公謂侯道侯去物之歩數也所畫物在兩楹間正當楣也此時未有物當以楣間為節也歩者蓋量器長六尺者之名如丈尺尋引之類刻畫貍形於其上以為識故曰貍歩云參如無徃參之參謂介於二者之間也大侯者以其大於二侯名之也參侯者以其參於二侯名之也此大侯熊侯也則參侯其豹侯與九十七十五十其歩數也君至尊而侯道反逺於卿大夫士者蓋位尊則所及者逺位卑則所及者近故侯道象之以見其義也設乏之處各去其侯之北十歩者以其當二侯相去之中故以為節也去其侯之西亦十歩者則因其北之成數而用之亦以公言之庭寛廣故耳周官掌皮職言諸侯大射共熊侯豹侯射人職言諸侯以四耦射二侯亦謂熊侯豹侯也其侯數少於此則侯道未必有九十歩者矣葢作經有先後故禮制有隆殺所以異也舊說謂周官言畿内之諸侯非也周官凡言諸侯皆謂畿外者耳畿内安得有諸侯之國哉遂命量人巾車張三侯大侯之崇見鵠于參參見鵠于干干不及地武不繫左下綱設乏西十北十凡乏用革見並賢遍反鵠古毒反繫古帝反注曰巾車於天子宗伯之屬掌装衣車者亦使張侯侯巾類崇髙也髙必見鵠鵠所射之主以皮為之各如其侯也考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉則大侯之鵠方六尺參侯之鵠方四尺六寸大半寸干侯之鵠方三尺三寸少半寸干不及地武以此計之參侯去地二丈五寸少半寸大侯去地二丈二尺五寸少半寸䟽曰侯之廣狹取度於侯道三分其侯而鵠居一焉大侯侯道九十弓則侯中丈八尺故鵠方六尺也參侯侯道七十弓則侯中丈四尺故鵠方四尺六寸大半寸干侯侯道五十弓則侯中一丈故鵠方二尺三寸少半寸也凡侯之上躬下躬及上舌下舌各二尺合八尺是干侯侯中及躬與舌丈八尺張法干侯下綱不及地尺二寸則上綱去地丈九尺二寸也參侯侯中併躬舌為二丈二尺張法參鵠下畔與干侯之上綱齊所謂見鵠於干其鵠下八尺六寸大半寸為干侯所掩是參下綱去地一丈五寸少半寸則上綱去地三丈二尺五寸少半寸也大侯侯中併躬與舌為二丈六尺張法大侯鵠下畔與參侯上綱齊所謂見鵠於參其鵠下一丈為參所掩是大侯下綱去地二丈二尺五寸少半寸則上綱去地四丈八尺五寸少半寸也凡言大半寸者三分寸之二少半寸者三分寸之一繼公謂張侯之序以大侯為先參次之干為後乃云某見鵠於某者蓋先以尺寸計而張之及旣張之後則遠侯之鵠自各見於近侯之上非謂先張近侯乃張遠侯也二侯之高俱見鵠而不盡見其鵠下之中是射者惟以貫鵠為中而其外則否於此見之矣此張侯之法大而遠者則高小而近者則下乃其勢之不得不然者而尊卑之義亦存焉禮意之妙大抵類此不繫左下綱亦以事未至也三侯皆以左為尊故未繫其左者也亦中掩束之於此復言西十北十者以見上文所云者但為量其處耳前射三日張侯設乏重其事也鵠之名義未詳右張侯樂人宿縣于阼階東笙磬西面其南笙鍾其南鑮皆南陳縣音𤣥鑮音博注曰鑮如鍾而大繼公謂宿縣謂前射一日縣之也明日當射故此日云宿笙磬笙鍾皆與笙相應者也周官曰凡縣鍾磬半為堵全為肆肆謂十六枚也此笙磬笙鍾其各一肆與磬外面為股内面為鼓西面者鼓在西而擊者東面也鍾鑮皆南陳亦以其北上也其面有二故不言西面而擊者亦與磬同也下放此宿縣者亦重其事也然則國君平常日用之樂皆於其日縣之明矣大司樂職曰大祭祀宿縣遂以聲展之建鼓在阼階西南鼓應鼙在其東南鼓應應對之應注曰建猶樹也以木貫而載之樹之跗也南鼓謂所伐面也應鼙應朔鼙也先擊朔鼙應鼙應之鼙小鼓也繼公謂此鼓鼙乃在東縣南者也以君當於阼階東南揖卿大夫且主人之位亦在洗北皆當鑮之南故移鼓鼙於此以辟之也鼓鼙若在東縣南則鼓在左鼙在右今設於此乃反之者明其變位也西階之西頌磬東面其南鍾其南鑮皆南陳一建鼓在其南東鼓朔鼙在其北頌如字注曰朔始也奏樂先擊西鼙鍾不言頌鼙不言東鼓義同省文也繼公謂頌之言誦也謂歌樂也此磬與歌樂相應故曰頌磬此鍾之用亦冝與磬同春秋傳曰歌鍾二肆其謂是鍾與鼓在南鼙在北明其不統於縣一建鼓在西階之東南面國君合有三面樂東方西方與階間也階間之縣東上其鼓則西上與在東方西方者之位相類也大射盛於燕冝備用樂乃以辟射之故去其階間之縣但設其鼓於故位而已上言南鼓東鼓惟此言南面蓋闕中縣則不擊此鼓故異其文以見之此鼓不擊乃設之者明有為而去其縣非禮殺也簜在建鼓之間簜大黨反注曰簜竹也倚於堂繼公謂簜即工之所管者故近工位設之鼗倚于頌磬西紘鼗音陶注曰鼗如鼓而小有柄紘編磬䋲也設鼗於磬西倚於紘也繼公謂西紘磬紘之西出者也右縣厥明司宫尊于東楹之西兩方壺膳尊兩甒在南有豐幂用錫若絺綴諸箭葢幂加勺又反之皆𤣥尊酒在北甒音武幂眉狄反注曰絺細葛也箭篠也為幂蓋卷辟綴於篠横之也又及之為覆勺也皆𤣥尊二者皆有𤣥酒之尊也䟽曰此陳設噐物與燕禮同但文有詳畧耳繼公謂幂横綴於箭而從蓋於甒勺亦從加於幂上西枋與箭而午乃以餘幂反蓋于勺亦為塵之著于勺也蓋以君飲此酒故謹重之如是燕禮云尊南上此云酒在北文互見爾説見前篇方壺不用庪之者逺下君尊士旅食于西鑮之南北面兩圜壺鑮南言東西節也鑮南有鼓此不以鼓為節者鼓高而鑮下圜壺在地取節於其下者冝也燕禮旅食與其尊皆在門西此旅食者在西方之南於燕位為少西則此尊之南北亦冝近之又尊于大侯之乏東北兩壺獻酒獻如字舊音莎非是此尊俟時而設經蓋因上禮而連言之耳獻酒獻三侯之獲者及巾車𨽻僕人之酒也於此獨云獻者嫌其為祭侯且見不他用也壺亦圜壺設洗于阼階東南罍水在東篚在洗西南陳設膳篚在其北西面又設洗于獲者之尊西北水在洗北篚在南東陳此云又設洗亦因上禮而連言之其實未設也獲者即服不之屬惟云水是不用罍也君禮而水不用罍以所獻者賤故爾小臣設公席于阼階上西鄉司宫設賔席于户西南面有加席卿席賔東東上小卿賔西東上大夫繼而東上若有東面者則北上席工于西階之東東上諸公阼階西北面東上鄉許亮反下同賔有加席亦蒲筵加莞席也公不言設加席如燕禮可知或亦蒙有加席之文也射禮重於燕故賔有加席此惟公席及賔席布之其餘猶在房俟時乃設言之於此者亦因設公席賔席而遂及之耳卿上大夫也小卿中大夫也大夫下大夫也小卿席於賔西而統於賔則此賔其以中大夫為之與繼而之下當有西字東面者在西序下少北言若有者國有大小則大夫亦有衆寡也諸公亦或有或無故後言之官饌注曰官各饌其所當共之物繼公謂官各饌之於其所也燕禮曰膳宰具官饌于寢東與此互見其先後之節耳此不著其所者上下薦羞其饌之或異處也右陳設自此以後其經文有與燕禮同者則不重釋之羹定射人告具于公公升即位于席西鄉小臣師納諸公卿大夫諸公卿大夫皆入門右北面東上士西方東面北上大史在干侯之東北北面東上士旅食者在士南北面東上小臣師從者在東堂下南面西上大音㤗從才用反大史在干侯東北為有事故深入東上小史在西也不著祝位者與史異處故略之其位自在門東士旅食者在士南者為辟射也門西之位其東西稍近於侯從者小臣師之屬也從上疑有脱文公降立于阼階之東南南鄉小臣師詔揖諸公卿大夫諸公卿大夫西面北上揖大夫大夫皆少進阼階東南葢於鑮南也燕禮言爾此言揖亦互文上言大夫次言大夫衍文也右即位大射正擯此大射正亦射人也乃異其稱者别於下文為司射者耳擯者謂賔公曰命某為賔擯者命賔賔少進禮辭反命又命之賔再拜稽首受命擯者反命賔出立于門外北面公揖卿大夫升就席小臣自阼階下北面請執幂者與羞膳者乃命執幂者執幂者升自西階立于尊南北面東上膳宰請羞于諸公卿者右命賔及執事者擯者納賔賔及庭公降一等揖賔賔辟公升即席辟音避凡受公禮者皆辟經不盡見之也奏肆夏此為賔奏之當作西方之縣也周官言九夏次曰肆夏春秋傳言肆夏之三曰肆夏繁遏渠然則每夏之中各有篇數如肆夏之類乃其首篇名耳穆叔聘於晉晉侯享之金奏肆夏之三穆叔曰三夏天子所以享元侯也使臣不敢與聞此惟奏肆夏而不及繁遏渠其辟天子之享禮與右賔入賔升自西階主人從之賔右北面至再拜賔荅再拜右拜至主人降洗洗南西北面賔降階西東面主人辭降賔對主人北面盥坐取觚洗賔少進辭洗主人坐奠觚于篚興對賔反位主人卒洗賔揖升主人升賔拜洗主人賔右奠觚荅拜降盥賔降主人辭降賔對卒盥賔揖升主人升坐取觚執幂者舉幂主人酌膳執幂者蓋幂酌者加勺又反之舉幂之儀當與蓋幂者相類蓋主人取觚而適尊所執幂者則進而發其幂之反者主人取勺執幂者乃舉幂也又反之亦執幂者也筵前獻賔賔西階上拜受爵于筵前反位主人賔右拜送爵宰胥薦脯醢宰胥宰之屬也薦賔者與公同亦盛之賔升筵庻子設折俎庻子亦見前篇賔坐左執觚右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于俎坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告㫖執爵興主人荅拜樂闋賔西階上北面坐卒爵興坐奠爵拜執爵興主人荅拜闋苦穴反奏肆夏及樂闋之節說見燕禮記右主人獻賔賔以虚爵降主人降賔洗南西北面坐奠觚少進辭降主人西階西東面少進對賔坐取觚奠于篚下盥洗西階西非主人堂下之正位以從降暫立於此耳主人既對不言反位亦文省主人辭洗賔坐奠觚于篚興對卒洗及階揖升主人升拜洗如賔禮賔降盥主人降賔辭降卒盥揖升酌膳執幂如初以酢主人于西階上主人北面拜受爵賔主人之左拜送爵主人坐祭不啐酒不拜酒遂卒爵興坐奠爵拜執爵興賔荅拜主人不崇酒以虚爵降奠于篚賔降立于西階西東面擯者以命升賔賔升立于西序東面注曰命公命也右賔酢主人主人盥洗象觚升酌膳東北面獻于公公拜受爵乃奏肆夏注曰言乃者其節異於賔繼公謂此奏肆夏當以東方之縣主人降自西階阼階下北面拜送爵宰胥薦脯醢由左房庻子設折俎升自西階凡堂上之薦皆由左房特於君見之耳公祭如賔禮庻子賛授肺不拜酒立卒爵坐奠爵拜執爵興主人荅拜樂闋升受爵降奠於篚篚膳篚也奏肆夏及樂闋之節説亦見燕禮記右主人獻公更爵洗升酌散以降酢於阼階下散思但反此亦當酌膳云散誤也北面坐奠爵再拜稽首公荅拜主人坐祭遂卒爵興坐奠爵再拜稽首公荅拜主人奠爵于篚燕禮曰公荅再拜此省文也下不言者皆如之右主人自酢主人盥洗升騰觚于賔酌㪚西階上坐奠爵拜賔西階上北面荅拜觚當之豉反此觚亦當作觶主人坐祭遂飲賔辭卒爵興坐奠爵拜執爵興賔荅拜主人降洗賔降主人辭降賔辭洗卒洗賔揖升不拜洗主人酌膳賔西階上拜受爵于筵前反位主人拜送爵賔升席坐祭酒遂奠于薦東主人降復位賔降筵西東南面立右主人酬賔小臣自阼階下請騰爵者公命長小臣作下大夫二人騰爵騰爵者阼階下皆北面再拜稽首公荅拜騰爵者立于洗南西面北上序進盥洗角觶升自西階序進酌㪚交於楹北降適阼階下皆奠觶再拜稽首執觶興公荅拜騰爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公荅再拜騰爵者執觶待於洗南小臣請致者若命皆致則序進奠觶於篚阼階下皆北面再拜稽首公荅拜騰爵者洗象觶升實之序進坐奠于薦南北上降適阼階下皆再拜稽首送觶公荅拜騰爵者皆退反位長知丈反散思但反下並同注曰反門右北面位右下大夫騰觶於公公坐取大夫所騰觶興以酬賔賔降西階下再拜稽首小臣正辭賔升成拜注曰正長也繼公謂小臣正辭亦公命之公坐奠觶荅拜執觶興公卒觶賔下拜小臣正辭賔升再拜稽首公坐奠觶荅拜執觶興賔進受虚觶降奠于篚易觶興洗下戸嫁反下同言興洗見洗則立也公有命則不易不洗反升酌膳下拜小臣正辭賔升再拜稽首公荅拜賔告于擯者請旅諸臣擯者告于公公許旅旅酬之也賔因君所賜請旅諸臣所以廣君賜也公許擯者又以告賔乃旅也賔以旅大夫于西階上擯者作大夫長升受旅賔大夫之右坐奠觶拜執觶興大夫荅拜賔坐祭立卒觶不拜若膳觶也則降更觶洗升實散大夫拜受賔拜送遂就席大夫辯受酬如受賔酬之禮不祭酒卒受者以虚觶降奠于篚復位長知丈反辯音遍下並同右公為賔舉旅主人洗觚升實㪚獻卿于西階上司宫兼卷重席設于賔左東上卿升拜受觚主人拜送觚卿辭重席司宫徹之乃薦脯醢卿升席庻子設折俎卷九轉反重並直龍反徹直列反注曰卿折俎未聞蓋用脊脅臑肺䟽曰若有諸公公用臑卿冝用膊也繼公謂卿有俎大射差重於燕也卿坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭不嚌肺興加于俎坐挩手取爵遂祭酒執爵興降席西階上北面坐卒爵興坐奠爵拜執爵興不嚌肺亦自貶於賔主人荅拜受爵卿降復位注曰復西面位辯獻卿主人以虚爵降奠于篚擯者升卿卿皆升就席若有諸公則先卿獻之如獻卿之禮席于阼階西北面東上無加席先悉見反右主人獻諸公卿小臣又請騰爵者二大夫騰爵如初請致者若命長致則騰爵者奠觶於篚一人待于洗南長致者阼階下再拜稽首公荅拜洗象觶升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公荅拜長並知丈反下同右下大夫再騰觶於公公又行一爵若賔若長唯公所賜燕禮言酬此言賜亦文異耳以旅于西階上如初大夫卒受者以虚觶降奠于篚右公為諸公卿舉旅主人洗觚升獻大夫于西階上大夫升拜受觚主人拜送觚大夫坐祭立卒爵不拜既爵主人受爵大夫降復位大夫者中下大夫也胥薦主人于洗北西面脯醢無脀胥宰胥也辯獻大夫遂薦之繼賔以西東上若有東面者則北上卒擯者升大夫大夫皆升就席右主人獻大夫乃席工于西階上少東小臣納工工六人四瑟注曰六人大師少師各一人上工四人繼公謂大射差重于燕又加瑟者二人然則諸侯之祭饗歌與瑟者各四人與以是推之天子之制其隆殺之數亦可知矣僕人正徒相大師僕人師相少師僕人士相上工相並息亮反下並同大音㤗少詩召反下大師少師同注曰徒空手也僕人正僕人之長師其佐也士其吏也天子視瞭相士諸侯兼官是以僕人掌之大師少師工之長也凡國之瞽矇正焉繼公謂上工即上瞽周官上瞽百人相者皆左何瑟後首内弦挎越右手相何户我反後户豆反挎口孤反注曰謂相上工者後者徒相注曰謂相大師少師者也入小樂正從之注曰從大師也繼公謂諸侯之小樂正下士也前三篇不言小以此見之也此樂盛於彼且用小樂正則彼可知矣大射乃亦不使大樂正者其辟祭饗之類與升自西階北面東上注曰工六人坐授瑟乃降注曰相者也繼公謂相者降位蓋亦在西方小樂正立于西階東上經云小樂正從之而此於工升之後乃云立則是亦後升也此禮重於燕而樂正乃後升然則後升者其正禮與乃歌鹿鳴三終三終謂歌鹿鳴之什三篇篇各一終如春秋傳所謂工歌鹿鳴之三是也鄉飲酒之禮歌鹿鳴四牡皇皇者華其義曰工歌三終則益可見矣主人洗升實爵獻工工不興左瑟注曰大師無瑟於是言左瑟者節也繼公謂爵即觚也不言觚者可知耳案注云大師無瑟於是言左瑟者節也者謂獻大師之時瑟者猶未受獻而其左瑟則以此時為節也一人拜受爵注曰謂大師也言一人者工賤同之也主人西階上拜送爵薦脯醢使人相祭卒爵不拜主人受虛爵衆工不拜受爵坐祭遂卒爵辯有脯醢不祭主人受爵降奠于篚復位相息亮反位洗北之位也大師及少師上工皆降立于鼓北羣工陪于後注曰於是時小樂正亦降立於其南北面工立僕人立于其側繼公謂鼓北鑮南也不云鑮南者嫌與尊旅食者之意同也不取節於鼙者鼓大鼙小也羣工即上工謂瑟者四人也陪於後者其以鼓鑮之間不足以為一列與前列二人後列四人皆當北上射事未至而降為管故也降不言相者可知也乃管新宫三終管謂吹簜以奏之此承上文而言是降者管之明矣春官大師少師職皆云登歌下管然簜一而已其大師管之與下而管者變於歌也新宫詩名三終者管新宫并及其下二篇也二篇之名未聞三詩蓋亦有依管而歌以明之者如笙之有和者然也書曰下管鞉鼔詩曰鞉鼔淵淵嘒嘒管聲既和且平依我磬聲則管時亦奏此西方之樂以應之矣此不笙不合鄉樂者為射故略於樂也不略小雅者小雅為諸侯之正樂故不略其正亦如鄉射之不略鄉樂矣諸侯之樂其下管者雖有笙亦不間卒管大師及少師上工皆東坫之東面西面北上坐疏曰不言去堂逺近當如鄉射遷工阼階之東南堂前三笴西面北上繼公謂坫東南當在東縣之東北射事未至工既管乃不復升而遂遷於此者堂上之樂畢故也於是小樂正北面立于其南相者退立子西方右工歌下管擯者自阼階下請立司正君再舉旅而即請立司正為射故也公許擯者遂為司正司正適洗洗角觶南面坐奠于中庭此中庭者亦阼階前南北之中與燕禮司正之位同以當辟射也升東楹之東受命于公西階上北面命賔諸公卿大夫公曰以我安賔諸公卿大夫皆對曰諾敢不安此羣臣皆為射而來是時猶未射固無嫌於不安而司正乃受命以安之者縁其意若不敢必君之終行射事然也受命亦北面與請徹俎同司正降自西階南面坐取觶升酌散降南面坐取觶興右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠于其所北面立還並音旋北面立亦在觶南右立司正安諸臣司射適次袒決遂執弓挾乘矢于弓外見鏃于弣右巨指鈎弦挾音接乗直證反下並同見賢遍反鏃子木反弣音府注曰司射射人也次若今時更衣處張幃席為之耦次在洗東南見鏃於弣順其射也右巨指右手大擘疏曰云耦次在洗東南者此無正文案鄉射記設楅南北當洗此下三耦拾取矢出次西行又北行鄉楅則次在洗東南也繼公謂司射射人亦大射正也燕禮曰大射正為司射是其徴矣諸侯之大射正蓋上士二人次所謂耦次也周官掌次職云射則張耦次執弓左手執弣也挾乗矢於弓外謂挾四矢而矢在弦弣之外也見鏃於弣明其方執而左鄉及指間前後之節也右巨指鈎弦所謂挾弓也自阼階前曰為政請射為政為射政者也言此者亦示已不敢擅其事也階前北面白於公遂告曰大夫與大夫士御于大夫注曰大夫與大夫為耦不足則士侍於大夫與為耦也繼公謂此以在堂上者為耦之法告公也此大夫亦兼諸公卿而言不言士與士者略賤也右請射自此以後其經文有與鄉射同者不重釋之遂適西階前東面右顧命有司納射器東面而右顧者為有司在南也此有司其旅食者與上經云士旅食者在士南北面東上命之之儀如是者以其賤也射噐皆入君之弓矢適東堂賔之弓矢與中籌豐皆止於西堂下衆弓矢不挾總衆弓矢楅皆適次而俟注曰衆弓矢三耦及卿大夫以下弓矢也司射矢亦止西堂下衆弓矢不挾則納公與賔弓矢挾之繼公謂總謂以物合而束之也衆弓衆矢異束之賔之弓與矢皆不在堂上逺下君也衆弓矢不挾亦以其多也中籌豐在堂西楅在次各近其所設處也俟者兼指射噐之在三處者言也此射於公宫則中乃皮樹中也鄉射記曰君國中射皮樹中案注云司射矢謂所挾一矢也工人士與梓人升自北階兩楹之間疏數容弓若丹若墨度尺而午射正蒞之數音朔度如字注曰工人士梓人皆司空之屬能正方圜者一從一横曰午謂畫物也疏曰若丹若墨科用其一也云度尺者即鄉射記從長如笴横長武是也繼公謂北階北堂之階也兩楹之間言當楣也公宫堂深故物當楣疏數猶廣狹也言二物從畫相去廣狹之度也度如度以尋之度度尺謂以尺為度也午如十字然也射事至乃畫物亦君禮異也射正升降蓋自西階此射正其小射正與大射正二人是時一為司正一為司射卒畫自北階下司宫埽所畫物自北階下畫並音獲下並戸嫁反注曰埽物重射事也右納射噐畫物大史俟于所設中之西東面以聽政鄉射禮曰設中南當楅西當西序又曰乃設楅於中庭南當洗是時中與楅皆未設大史蓋南當洗西直西序之西而立也政即司射所誓之事司射西面誓之曰公射大侯大夫射參士射干射者非其侯中之不獲卑者與尊者為耦不異侯大史許諾公射夫射士射並食亦反注曰誓猶告也疏曰賔與君為耦同射大侯士與大夫為耦同射參侯以其既與尊者為耦不可使之别侯别侯則非耦也繼公謂釋獲之事末至乃誓之者欲其豫識之也此雖陳射三侯者而其意則不主於公遂比三耦三耦俟于次北西面北上比毗志反三耦皆士也亦司射前戒之故先立於此以待比也俟於次北便其入也此乃未比時之位若既比則位於次中矣司射命上射曰某御于子命下射曰子與某子射是所謂比也此亦當有司馬命巾車量人繫左下綱及命獲者倚旌于侯之事文不具耳鄉射則於既比三耦為之卒遂命三耦取弓矢于次亦命之讓取弓矢拾經文省耳此下當有三耦袒決遂拾取弓矢之事亦文不具也三耦既取弓矢遂立於次中而西面北上右誓大史比三耦司射入于次搢三挾一个出于次西面揖當階北面揖及階揖升堂揖當物北面揖及物揖由下物少退誘射既搢挾則立於三耦之北而後出次出次乃西面是由次北出矣由下物少退以其亦射大侯故不敢履下物辟君也此射三侯故不言視侯中不在物故不言俯正足射三侯將乘矢始射干又射參大侯再發射並食亦反始射干誘射主於三耦也三耦士也故先射士侯乃次及其上大侯再發以其尊異之也卒射北面揖北面揖者為下射與君同物不可南面揖於楹間嫌也及階揖降如升射之儀遂適堂西改取一个挾之如升射之儀為堂上所不見之揖言也降而遂適堂西則不由其所立位之南矣此射者不在堂西射位又不在西方故其儀與鄉射異遂取扑搢之以立于所設中之西南東面云遂取扑則扑亦在堂西矣所設中之西南其南北亦南於洗而東西則直西霤與此禮三耦之位在東方故司射至是乃得定其位於此亦與鄉射異也右誘射司馬師命負侯者執旌以負侯注曰司馬師正之佐也負侯獲者也天子服不氏下士一人徒四人掌以旌居乏待獲繼公謂負侯獲者皆士旅食者與旌謂翿旌郷射記曰君國中射以翿旌獲負侯者皆適侯執旌負侯而俟皆皆三侯者也大侯參侯去地逺亦云負者但取北面於其北亦因干侯而言也先云適侯乃云執旌是旌先倚於侯也然則上經亦當有命倚旌之類明矣俟俟後命司射適次作上耦射東面作之後不見者以此求之司射反位既作之則反不俟其出上耦出次西面揖進上射在左並行注曰上射在左便射位也繼公謂發於次中則上射已在左而並行矣特於此見之也當階北面揖及階揖上射先升三等下射從之中等上射升堂少左下射升上射揖並行皆當其物北面揖及物揖皆左足履物還視侯中合足而俟中丁仲反還音旋侯中干侯之中也司馬正適次袒決遂執弓右挾之出升自西階適下物立于物間左執弣右執簫南掦弓命去侯司馬正與司馬師乃射時所立之官如司射之類也右挾之謂以右巨指鈎弦也適下物由上射後而少南行也此行而立於物間乃云適下物者下言司馬正出於下射之南還其後故於此惟據下物而言南掦弓鄉負侯者也鄉射禮曰西南面立于物間南掦弓負侯皆許諾以宫趨直西及乏南又諾以商至乏聲止注曰鄉射禮曰獲者執旌許諾繼公謂宫商皆謂諾聲也宫大商小趨直西至乏南乃折而北不自侯西北行者不敢由便也古人歩趨有法雖賤者猶謹之而不苟若此則其上者可知矣先宫後商乃止亦有漸也授獲者退立于西方獲者興共而俟共音拱授獲者以旌也或曰者下當有旌字蓋文脱耳授旌而退三侯者皆然則其負侯居乏者之相代亦冝同也退立於西方各當其乏之西與獲者既偃旌於地乃興司馬正出于下射之南還其後降自西階遂適次釋弓說決拾襲反位還戸患反說吐活反注曰鄉射禮曰司馬反位立于司射之南司射進與司馬正交于階前相左由堂下西階之東北面視上射命曰毋射獲毋獵獲上射揖司射退反位乃射上射既發挾矢而後下射射拾發以將乗矢獲者坐而獲毋射食亦反拾其刼反此指在干侯之乏者也大侯參侯者亦坐而不獲舉旌以宫偃旌以商獲而未釋獲卒射右挾之北面揖揖如升射上射降三等下射少右從之中等並行上射于左與升射者相左交於階前相揖適次釋弓說決拾襲反位中丁仲反說吐活反上下射並行而適次則曏者發於次中亦如之明矣位次中之位也亦西面北上下凡言三耦之位皆放此三耦卒射亦如之三亦當作二字之誤也司射去扑倚于階西適阼階下北面告于公曰三耦卒射反搢扑反位去扑者與尊者言不敢佩刑噐也右初射司馬正袒決遂執弓右挾之出與司射交于階前相左注曰出出於次也繼公謂不言司馬正適次者以下言出則適次可知亦以上有成禮故於此省文也凡下文類此者其意皆然升自西階自右物之後立于物間西南面揖弓命取矢負侯許諾如初去侯皆執旌以負其侯而俟注曰俟小臣取矢以旌指教之繼公謂此負侯即獲者也如初去侯謂許諾以宫商至乏聲止也惟去來異耳三耦所射干侯而已而三侯之負侯者皆執旌以徃者卑統于尊且矢亦或有逺近故也司馬正降自西階北面命設楅注曰出於下物之南還其後而降繼公謂北面於所設楅之南小臣師設楅司馬正東面以弓為畢注曰畢所以教助執事者鄉射記曰乃設楅於中庭南當洗東肆繼公謂司馬正東面立於所設楅之西也此楅亦南面坐設之畢所以指畫處置之器以木爲之其長三尺此以弓指畫設楅之處象畢之用故曰以弓為畢云凡以畢指教者皆立於所設噐之側既設楅司馬正適次釋弓說決拾襲反位小臣坐委矢于楅北括司馬師坐乗之卒若矢不備則司馬正又袒執弓升命取矢如初曰取矢不索乃復求矢加于楅卒司馬正進坐左右撫之興反位說吐活反索悉各反復扶又反注曰此坐皆北面繼公謂又袒執弓不言決遂右挾之者可知也司馬師既乗矢其􅇱若否皆以告于正若不備則正命取矢若備則正亦進撫之也左右撫者左手撫其左右手撫其右以審定其數耳右取矢司射適西階西倚扑升自西階東面請射于公公許請射乃升者以其後有告耦等事冝在上為之故也東面亦與他儀異下經云司正東楹之東北面告于公右再請射遂適西階上命賔御于公諸公卿則以耦告于上大夫則降即位而后告注曰告諸公卿於堂上尊之也繼公謂耦者謂公卿自為耦也以耦告亦如命三耦之辭大夫則降即位而後告見其貶於諸公卿也下文所云是其事已若卿與大夫為耦則其告亦當有上下之别諸公卿大夫為耦亦各以其次為之司射自西階上北面告于大夫曰請降司射先降搢扑反位大夫從之降適次立于三耦之南西面北上於此云北面則是命賔及告諸公卿皆鄉其位也適次亦謂進而至于次也三耦士也而在大夫之上者以其先射尊之三耦之南大夫之北冝有閒地以待諸公卿之降司射東面于大夫之西比耦大夫與大夫命上射曰某御于子命下射曰子與某子射比毗志反下同司射東面亦在次中不言適次者可知也與大夫亦謂與之為耦也卒遂比衆耦衆耦士耦也士與大夫為耦者亦存焉衆耦立于大夫之南西面北上若有士與大夫為耦則以大夫之耦為上注曰為上居羣士之上繼公謂立于大夫之南則在次可知故經亦不言適次若士與大夫為耦亦其長者也乃著其為上者意與鄉射同大夫之耦雖為上射猶立於大夫之後者射事未至明其不並立也及將射乃轉居右而並立云命大夫之耦曰子與某子射告于大夫曰某御于子注曰士雖為上射其辭猶尊大夫命衆耦如命三耦之辭三耦與衆耦皆士也故其辭同諸公卿皆未降諸公卿尊冝事至乃降也此時之降者為比耦也曏者既以耦告公卿于上則耦定矣故可以未降右比耦遂命三耦各與其耦拾取矢皆袒決遂執弓右挾之拾其刼反拾取矢謂取之于楅者也司射既於次中東面以次命之即反西方之位不言者亦以其可知也司射於取矢者惟命之而不復作之者以其取矢亦發於次中與鄉射異一耦出西面揖當楅北面揖及楅揖上射東面下射西面上射揖進坐横弓卻手自弓下取一个兼諸弣興順羽且左還毋周反面揖還音旋下並同注曰左還反其位毋周右還而反東面也繼公謂既順羽則鈎弦而左還也自西面而東面若皆左還則謂之周此先左還而後右還是毋周也下放此必毋周者以相變為容下射進坐横弓覆手自弓上取一个兼諸弣興順羽且左還毋周反面揖反面自東面而反西面既拾取矢梱之拾其劫反梱口本反注曰梱齊等之也兼挾乗矢皆内還南面揖注曰内還者上射左下射右繼公謂亦揖乃皆内還經文不具也上射左還下射右還皆鄉内故揔以内言之皆内還者由便也適楅南皆左還北面揖搢三挾一个適楅南者曏及楅之位也上射東行下射西行而在楅之南也揖以耦左還上射于左以如以賔升之以謂上射以其耦左還也此左還者上射先而下射後故言以於左當作於右必言上射於右者其意與鄉射同亦少南行至於曏當楅之位而揖不言者無可為節亦以其可知故也退者與進者相左相揖退釋弓矢于次説決拾襲反位二耦拾取矢亦如之後者遂取誘射之矢兼乗矢而取之以授有司于次中皆襲反位說吐活反拾取之拾其劫反注曰有司納射器因留主授受之繼公謂此云以授有司乃反位則是主射器之有司不離其位而授受亦可見矣右三耦取矢于楅司射作射如初如初亦適次作上耦也其異者三耦於既作乃袒決遂取弓矢也司射既作即反位不俟之一耦揖升如初司馬命去侯負侯許諾如初司馬降釋弓反位司馬司馬正也下放此不言説決拾與襲亦文省司射猶挾一个去扑與司馬交于階前適阼階下北面請釋獲于公公許反搢扑遂命釋獲者設中以弓為畢北面去起吕反注曰北面立於所設中之南當視之也鄉射禮曰設中南當楅西當西序繼公謂大史前立于所設中之西於是司射當之西面命之旣則少西南行而北面以弓為畢指畫以示其處大史釋獲言此者明上所謂釋獲者之為大史也小臣師執中先首坐設之東面退大史實八算于中横委其餘于中西興共而俟共音拱注曰先猶前也命大史而小臣師設之國君官多也小臣師退反東堂下位鄉射禮曰横委其餘于中西南末繼公謂此不言執算者又不言大史受算則是大史自執算矣實算則坐故於後言興是時大史位于中西小史之位亦冝近之司射西面命曰中離維綱揚觸梱復公則釋獲衆則不與中丁仲反與音預注曰離猶過也獵也侯有上下綱其邪制躬舌之角者為維或曰維當為絹絹綱耳揚觸者謂矢中他物揚而觸侯也梱復謂矢至侯不著而還復復反也公則釋獲優君也衆當中鵠而著繼公謂西面亦於中東離麗也中而麗於維綱言其去鵠逺也揚觸梱復言其非正中又且不必在鵠也二者甚不冝釋獲而於君則釋之優君也不與謂不在此釋獲之科也此特承上文而言耳其實衆之所射非正中其鵠者皆不釋也或曰維謂躬與舌也躬舌所以維持侯未知是否案注之絹字恐是縜字之誤梓人云縜寸焉惟公所中中三侯皆獲中皆丁仲反此愈優君也中亦兼離維綱與揚觸梱復者而言皆獲者中一侯則其侯之獲者主獲之也此命亦傳告於獲者故以獲言之上云釋獲下云獲互文也釋獲者命小史小史命獲者獲者三侯之獲者也司射所命之辭言衆則不與又言中三侯皆獲故須徧命之司射遂進由堂下北面視上射命曰不貫不釋上射揖司射退反位釋獲者坐取中之八算改實八算興執而俟乃射若中則釋獲者毎一个釋一算上射于右下射於左若有餘算則反委之又取中之八算改實八算于中興執而俟三耦卒射若中之中丁仲反鄉射禮曰若中則釋獲者坐而釋獲賔降取弓矢于堂西注曰不敢與君並俟告取之以升俟君事畢繼公謂此言降而不言升似有闕文賔降取弓矢以升者明其將侍君射諸公卿則適次繼三耦以南注曰言繼三耦明在大夫北繼公謂不言降者可知也公將射則司馬師命負侯皆執其旌以負其侯而俟注曰君尊若始焉司馬師反位位蓋司馬正之南隷僕人埽侯道注曰新之司射去扑適阼階下告射于公公許適西階東告于賔去起吕反注曰告當射也繼公謂告射輕於請射故不升堂遂搢扑反位小射正一人取公之決拾于東坫上一小射正授弓拂弓皆以俟于東堂注曰拂弓去塵繼公謂授當作受受弓者受于有司也受弓亦於東堂皆皆二小射正也云小射正一人又云一小射正則小射正亦多矣周官天文射人下大夫二人上士四人然則諸侯之大射正上士亦二人小射正中士亦四人與公將射則賔降適堂西袒決遂執弓搢三挾一个升自西階先待于物北北一笴東面立注曰東面立鄉君也䟽曰前文賔降適堂西取弓矢無賔升堂之文但文不具耳其實即升矣是以此文云賔降繼公謂北一笴物北空一笴地也必退於物北一笴者逺下君亦為司馬當由後物而適物閒也司馬升命去侯如初還右乃降釋弓反位還戸貫反還右謂圍右物也既命去侯則由右物之南適其右乃降來由物北去適物右是還之也不還左物者以君將為下射故也是時君未立於物而先辟之敬之至也公就物小射正奉決拾以笥大射正執弓皆以從于物笥息嗣反笥蓋竹器決拾在坫上時亦冝用笥至是始見之耳射時大射正為司正如故至是暫舍其職而為君執弓重其事也弓射器之主也小射正坐奠笥于物南遂拂以巾取決興賛設決朱極三注曰極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指無極放弦契於此指多則痛小指短不用繼公謂拂者拂決極與拾也賛設決與極者為君設之也下言賛者放此君極朱而用三若臣則用二其物色亦未聞士喪禮曰纊極二蓋死時變用纊而數則與生時同極之名義未詳小臣正賛袒公袒朱襦卒袒小臣正退俟于東堂此袒於設決之後亦異於臣小射正又坐取拾興賛設拾以笥退奠于坫上復位注曰設拾以鞲襦上繼公謂此言設拾而不言遂者以與設決之節不相屬乃更端為之非因事之意也小射正之位未詳大射正執弓以袂順左右隈上再下壹左執弣右執簫以授公公親揉之隈烏回反揉而九反注曰衣袖謂之袂順放之也隈弓淵也揉宛之觀其安危也今文順為循疏曰以􅃑鄉下於弓隈順放之考工記弓人云其弓安其弓危則此觀安危者謂試弓之强弱繼公謂隈者弓之曲處也考工記曰凡角之中恒當弓之畏畏也者必撓是也順之之意未詳或曰順之者所以審其厚薄而驗其强弱也詳上而略下以其上下之厚薄均小臣師以巾内拂矢而授矢于公稍屬屬之欲反注曰内拂恐塵及君也繼公謂授矢亦以巾也燕禮記曰小臣以巾授矢凡授弓矢皆當于公右大射正立于公後以矢行吿于公注曰若不中使君當知而改其度下曰留上曰揚左右曰方注曰留不至也揚過去也方出旁也繼公謂左右曰方者左則曰左方右則曰右方也公既發大射正受弓而俟拾發以將乗矢拾其劫反俟者將復授之也云拾發以將乘矢則是賔先公後亦如其他上下射之為也鄉射與此篇於上耦之初射其文正與此同皆據下射而言也足以見之矣公卒射小臣師以巾退反位大射正受弓注曰受弓以授有司於東堂小射正以笥受決拾退奠于坫上復位云以笥受決拾是公自說之也大射正退反司正之位云反司正之位是射時其位自若也然則此司正之位不當東西之中而與鄉飲酒者異明矣小臣正賛襲賛為之襲也公還而后賔降釋弓于堂西反位于階西東面還音旋注曰階西東面賔降位繼公謂公退云還是其進退亦不由物前也賔因降而不敢即升若以是時未有上事也不言説決拾襲亦文省公即席司正以命升賔賔升復筵而后卿大夫繼射諸公卿取弓矢于次中袒決遂執弓搢三挾一个出西面揖揖如三耦升射卒射降如三耦適次釋弓説決拾襲反位衆皆繼射釋獲皆如初説吐活反上言諸公卿適次此復言取弓矢於次中者明其又深入也反位亦在次於取弓矢之處為少北耳衆謂大夫而下此不分别士與大夫為耦之儀是如三耦也其以君在故耦不得盡其尊大夫之禮與釋獲皆如初亦指君以下言也衆皆繼射說見前篇卒射釋獲者遂以所執餘獲適阼階下北面告于公曰左右卒射反位坐委餘獲于中西興共而俟共音拱右再射司馬袒執弓升命取矢如初負侯許諾以旌負侯如初司馬降釋弓如初小臣委矢于楅如初小臣委矢於楅如初蓋蒙司馬正興反位以上之文而言也與鄉射所云者異矣賔諸公卿大夫之矢皆異束之以茅卒正坐左右撫之進束反位注曰異束之尊殊之也正司馬正也進前也又言束整結之示親也繼公謂此文主於束矢而言蓋見其不在如初之中者也束之以茅小臣蓋於委矢之時則為之司馬正既撫而進束則撫者撫其末與卒字衍賔之矢則以授矢人于西堂下注曰是言矢人則納射噐之有司各以其噐名官職不言君矢小臣以授矢人於東堂可知繼公謂授之亦小臣也此節恐在未乗之前司馬釋弓反位而後卿大夫升就席注曰此言其升前小臣委矢於楅繼公謂至是乃見之者為其不可以亂如初之文故終言上事而後及之耳右再取矢司射適階西釋弓去扑襲進由中東立于中南北面視算釋獲者東面于中西坐先數右獲二算為純一純以取實于左手十純則縮而委之毎委異之有餘純則横諸下一算為竒竒則又縮諸純下興自前適左東面坐去起吕反數色主反竒並居冝反下同此坐字衍文鄉射無之坐兼歛算實于左手一純以委十則異之其餘如右獲司射復位釋獲者遂進取賢獲執之由阼階下北面告于公若右勝則曰右賢于左若左勝則曰左賢于右以純數告若有竒者亦曰竒若左右鈞則左右各執一算以告曰左右鈞還復位坐兼歛算實八算于中委其餘於中西興共而俟共音拱右告獲司射命設豐亦適堂西命之也命設豐乃不搢扑者以尊者亦或飲此豐上之觶故也在不勝之黨而不用罰爵者唯君爾司宫士奉豐由西階升北面坐設于西楹西降復位司宫士司宫之屬也此時之位亦當在堂西勝者之弟子洗觶升酌㪚南面坐奠于豐上降反位司射遂袒執弓挾一个搢扑東面於三耦之西命三耦及衆射者勝者皆袒決遂執張弓注曰執張弓右手挾弦繼公謂司射袒亦決遂文省耳東面命之於次中不勝者皆襲說決拾卻左手右加弛弓于其上遂以執弣司射先反位三耦及衆射者皆升飲射爵于西階上說吐活反此目下事也小射正作升飲射爵者如作射司射所命者執弓之儀耳故小射正於此復作其升飲一耦出揖如升射及階勝者先升升堂少右不勝者進北面坐取豐上之觶興少退立卒觶進坐奠于豐下興揖不勝者先降與升飲者相左交于階前相揖適次釋弓襲反位惟言釋弓襲亦文省僕人師繼酌射爵取觶實之反奠于豐上退俟于序端注曰自此以下辯為之酌繼公謂僕人師不言命之者則是此乃其常職俟時而共之耳升飲者如初三耦卒飲若賔諸公卿大夫不勝則不降不執弓耦不升下經云賔諸公卿大夫受觶于席則此時不降不執弓可知乃言之者亦經文過于詳耳耦唯謂士與大夫為耦者也不升則立于射位也大夫既飲耦乃釋弓而反位僕人師洗升實觶以授賔諸公卿大夫受觶于席以降適西階上北面立飲卒觶授執爵者反就席洗者以承賤者後新之其次則不洗矣降降席也西階上臣飲罰爵之位也授執爵者冝反於其所受者也若飲公則侍射者降洗角觶升酌散降拜注曰侍射賔也公降一等小臣正辭賔升再拜稽首公荅再拜賔坐祭卒爵再拜稽首公荅再拜賔降洗象觶升酌膳以致下拜小臣正辭升再拜稽首公荅再拜下户嫁反此以上與騰觶之禮同者也以致者亦奠于薦南公卒觶賔進受觶降洗散觶升實散下拜小臣正辭升再拜稽首公荅再拜賔坐不祭卒觶降奠于篚階西東面立此與騰觶之禮異者也所以謂之射爵也擯者以命升賔賔升就席注曰擯者司正也若諸公卿大夫之耦不勝則亦執弛弓特升飲比耦之時大夫有與士為耦者諸公卿無與士為耦者此諸公卿衍文衆皆繼飲射爵如三耦射爵辯乃徹豐與觶右飲不勝者司宫尊侯于服不之東北兩獻酒東面南上皆加勺設洗于尊西北篚在南東肆實一散於篚獻如字散思但反下同注曰散爵名容五升繼公謂為三侯之獲者及隷僕人巾車設尊而言尊侯者以其功皆由侯也兩兩壺也或脫一壺字耳兩壺皆酒而云南上是先酌所上者與加勺東枋此在大侯之乏東北乃云服不者見此時服不在乏也不於初設之者因事而獻故其尊亦俟時而設所以别於正獻者也此所設尊洗之類即篇首之所言者也上言獲者之尊此云尊侯上言大侯之乏此云服不文互見耳又文亦有詳略則以設與未設而異也服不於天子為下士則此亦士旅食者與司馬正洗散遂實爵獻服不注曰洗酌皆西面繼公謂服不為大侯之獲者故先獻也司馬正獻亦異之獻時蓋亦西南面服不侯西北三歩北面拜受爵注曰近其所為獻疏曰服不得獻由侯所為故不近乏而近侯司馬正西面拜送爵反位注曰不俟卒爵略賤也繼公謂既拜送而反位亦為其不拜既也是後則司馬師代之行事於司馬正既反位獲者亦反東面宰夫有司薦庻子設折俎注曰宰夫有司宰夫之吏也鄉射記曰獲者之俎折脊脅肺繼公謂薦於服不之東俎在薦東卒錯獲者適右个薦俎從之个如字注曰薦俎已錯乃適右个明此獻歸功於侯也繼公謂此獲者即服不也變服不言獲者見服不亦在乏而獲也有司與庶子既錯薦俎於地獲者則以爵適右个而二人復執薦俎從之薦錯於獲者之南俎在薦南獲者左執爵右祭薦俎二手祭酒獲者南面坐乃左執爵也祭俎者興取刌肺以坐祭也二手祭酒為散大酒多一手注之難為節也適左个祭如右个中亦如之卒祭左个之西北三歩東面注曰此曏受獻之位也繼公謂東面變於受爵之時也卒爵與受爵不同面自是一禮耳下釋獲者亦然設薦俎立卒爵卒爵於薦西東面自若也是時司馬師蓋已北面於其東司馬師受虚爵洗獻隷僕人與巾車獲者皆如大侯之禮卒司馬師受虚爵奠于篚注曰鄉受獻之禮如服不也隷僕人巾車於服不之位受之功成於大侯也繼公謂承服不後而洗則是此毎獻皆洗矣隷僕人埽侯道巾車張三侯獲者謂大侯之與服不相代而獲者及參侯干侯之獲者各二人也隷僕人與巾車亦聽命於司馬故亦司馬并獻之皆如大侯之禮主於二侯之獲者言也不云服不而云大侯者明亦各就其侯而祭也若代服不而獲者與隷僕人巾車則固祭於大侯矣不言量人者或不與此獻也與獲者皆執其薦庻子執俎從之設于乏少南注曰少南為復射妨旌也繼公謂獲者謂三侯之相代而獲者凡六人也乏亦謂三侯之乏也獲者之薦俎設于乏者以其位在是也然則隷僕人巾車亦各設其位與服不復負侯而俟復扶又反服不負大侯則其徒代之居乏也是時參侯干侯亦有負侯者不言之者可知也右獻獲者之屬司射適階西去扑適堂西釋弓説決拾襲適洗洗觚升實之降獻釋獲者于其位少南去起吕反説吐活反注曰少南辟中繼公謂釋弓亦并釋矢也鄉射有矢字洗觚升實之與獲者異蓋釋獲者無事於俟且尊於獲者故獻之不酌獲者之尊而酌上尊也薦脯醢折俎皆有祭注曰俎與服不同唯祭一為異繼公謂折上亦似脱設字皆皆薦俎也祭亦脯與切肺也不言所設之人蓋亦有司與庻子與釋獲者薦右東面拜受爵司射北面拜送爵釋獲者就其薦坐左執爵右祭脯醢興取肺坐祭遂祭酒興司射之西北面立卒爵不拜既爵司射受虚爵奠于篚釋獲者少西辟薦反位司射適堂西袒決遂取弓挾一个適階西搢扑以反位辟音闢右獻釋獲者司射倚扑于階西適阼階下北面請射于公如初階下請射于公正禮也曏之升者有為為之耳此言如初未詳疑衍也右三請射反搢扑適次命三耦皆袒決遂執弓序出取矢執弓亦右挾之序謂毎耦以次而出也司射先反位云先反位明不俟之三耦拾取矢如初小射正作取矢如初拾其劫反小射正作取矢如初此一句似衍大射之禮司射惟命拾取矢而不復作與鄉射異以前後經文徴之可見又言此於拾取矢之後似非其次且上無作取矢之事亦不冝言如初其為衍也明矣三耦既拾取矢諸公卿大夫皆降如初位與耦入于次皆袒決遂執弓皆進當楅進坐説矢束上射東面下射西面拾取矢如三耦拾並其劫反說吐活反下並同如初位者適次繼三耦以南也云如初位又云入于次見其所進者又深也凡經云適次而巳者兼深淺而言也云入於次者言其深入也先言適乃言入若次中者則皆先淺而後深也執弓亦右挾之皆進謂出次而西面之時也上下射當楅而進坐說矢束是俱北面說之也然則鄉射之大夫說矢束亦北面明矣既說則上射少西而反東面下射少東而反西面乃拾取之若士與大夫為耦士東面大夫西面大夫進坐説矢束退反位耦揖進坐兼取乗矢興順羽且左還毋周反面揖大夫進坐亦兼取乗矢如其耦北面搢三挾一个揖進大夫與其耦皆適次釋弓說決拾襲反位諸公卿升就席後揖進之進當作退鄉射云揖退是也大夫既反位諸公卿乃與之序升公卿之下不言大夫者文脱耳又此上下文皆言卿大夫升就席不應此時獨否也然則此有脱文明矣衆射者繼拾取矢皆如三耦遂入於次釋弓矢說決拾襲反位拾取之拾其劫反此或言適次或言入于次互文以見其同也右耦皆取矢于楅司射猶挾一个以作射如初一耦揖升如初此司射作射亦在未取弓矢之時與初作射者微異云如初者謂所作唯上耦而既作則反位司馬升命去侯負侯許諾司馬降釋弓反位亦皆如初可知司射與司馬交于階前倚扑于階西適阼階下北面請以樂于公公許注曰請奏樂以為節也司射反搢扑東面命樂正曰命用樂樂正曰諾注曰言君有命用樂射也樂正在工南北面疏曰司射在西階下東面遥命之繼公謂至此惟言樂正者不嫌其異也樂正許諾自若北面司射遂適堂下北面視上射命曰不鼓不釋上射揖司射退反位樂正命大師曰奏貍首間若一大師不興許諾樂正反位奏貍首以射大並音泰貍並之力反注曰貍首逸詩繼公謂鄉射禮曰東面命大師三耦卒射賔待于物如初三耦卒射之後儀亦多矣此特見其一也公樂作而后就物稍屬不以樂志其他如初儀屬之欲反稍屬謂授矢于公稍屬也然此當蒙如初儀之中似不必獨見之且語句不全亦恐非出于作經者之意蓋衍文也又見燕禮記卒射如初初謂公卒射以至賔反位于階西之儀賔就席諸公卿大夫衆射者皆繼射釋獲如初卒射降反位三事皆如初也降反位指衆射之最後者而言以見釋獲者升告之節也釋獲者執餘獲進告左右卒射如初右三射司馬升命取矢負侯許諾司馬降釋弓反位小臣委矢司馬師乗之皆如初司射釋弓視算如初釋獲者以賢獲與鈞告如初復位右取矢告獲如初司射命設豐實觶如初遂命勝者執張弓不勝者執弛弓升飲如初卒退豐與觶如初實觶之上更有設豐二字如鄉射之文此文脫也右飲不勝者如初司射猶袒決遂左執弓右執一个兼諸弦面鏃適次命拾取矢如初司射反位三耦及諸公卿大夫衆射者皆袒決遂以拾取矢如初矢不挾兼諸弦面鏃退適次皆授有司弓矢襲反位拾並其劫反後弦字下蓋脱弣字卿大夫升就席不言諸公者可知也諸公卿大夫既就席則士亦當反西方之位矣右耦皆復取矢於楅司射適次釋弓說決拾去扑襲反位司馬正命退楅解綱小臣師退楅巾車量人解左下綱司馬師命獲者以旌與薦俎退退楅亦於次司馬正於此命解綱則曏亦命繫之明矣鄉射曰說侯之左下綱而釋之司射命釋獲者退中與算而俟注曰諸所退射噐皆俟備君復射釋獲者亦退其薦俎繼公謂亦小臣執中大史執算也退中與算亦於西堂下旣則大史與小史俱復位於門東右射事止公又舉奠觶唯公所賜若賔若長以旅于西階上如初大夫卒受者以虚觶降奠于篚反位長知丈反此一舉觶當在未立司正之前乃降於此者為射故也右公為大夫舉旅此以下經文與燕禮同者亦不重釋之司馬正升自西階東楹之東北面告于公請徹俎公許徹直列反下並同李寳之曰馬字疑衍遂釋西階上北面告于賔賔北面取俎以出諸公卿取俎如賔禮遂出授從者于門外從才用反如賔禮謂亦各鄉其席取之也諸公南面卿北面射賔而下皆自執俎以出者臣也亦以其從者不得入路門大夫降復位注曰門東北面位繼公謂大夫降者欲與賔同說屨而升也復位于門東者以諸公卿亦以俎出故也燕禮諸公卿無俎故與大夫降而同立于西階下庻子正徹公俎降自阼階以東正庶子之長者也燕禮膳宰設公俎亦膳宰徹之然則上之設公俎者亦庶子正矣右徹俎賔諸公卿皆入門東面北上入門入自闑東也入門而不左不右即東面而立變於常位也將與大夫同升冝近之司正升賔賔諸公卿大夫皆說屨升就席公以賔及卿大夫皆坐乃安說屨亦於階下也羞庶羞大夫祭薦司正升受命皆命公曰衆無不醉賔及諸公卿大夫皆興對曰諾敢不醉皆反位坐右說屨升坐主人洗酌獻士于西階上士長升拜受觶主人拜送士坐祭立飲不拜既爵其他不拜坐祭立飲乃薦司正與射人于觶南北面東上司正為上長知丈反射人即曏之為司射者亦大射正也惟此一人與司正同薦或以其為司射故特異之與燕禮不同者乎餘亦見燕禮辯獻士士既獻者立于東方西面北上乃薦士祝史小臣師亦就其位而薦之辯音遍下並同注曰祝史門東北面東上繼公謂此獻史蓋小史也大史釋獲曏已受獻主人就士旅食之尊而獻之旅食不拜受爵坐祭立飲主人執虚爵奠于篚復位右主人獻士賔降洗升騰觶于公酌散下拜公降一等小臣正辭賔升再拜稽首公荅再拜賔坐祭卒爵再拜稽首公荅再拜賔降洗象觚升酌膳坐奠于薦南降拜小臣正辭賔升成拜公荅拜賔反位下户嫁反下同注曰此觚當觶右賔騰觶于公公坐取賔所騰觚興唯公所賜受者如初受酬之禮降更爵洗升酌膳下再拜稽首小臣正辭升成拜公荅拜乃就席坐行之有執爵者唯受於公者拜司正命執爵者爵辯卒受者興以酬士大夫卒受者以爵興西階上酬士士升大夫奠爵拜士荅拜大夫立卒爵不拜實之士拜受大夫拜送士旅于西階上辯士旅酌右公為士舉旅若命曰復射則不獻庶子復扶又反命君命也不猶未也此雖非正射然亦當闕正禮中行之故其節在未獻庻子前也司射命射唯欲注曰司射命賔及諸公卿大夫射欲者則射不欲者則止可否之事從人心也繼公謂以其非正射也人之力强弱不齊或有至是而不欲射者故以唯欲命之然則正射之時自諸公以至於士無有不與射者矣卿大夫皆降再拜稽首公荅拜降拜拜君命也公不辭之而即荅拜者以賔不在其中也賔不與此拜者以與君為耦射否冝由君不敢從唯欲之命也凡非賔而公辭其拜正者惟受賜爵者爾壹發中三侯皆獲中丁仲反以其非正射故上下射惟拾發一矢而已以其壹發故雖中非其侯而亦獲是禮亦相因而然也中亦謂中其鵠耳唯公則離維綱揚觸梱復而皆獲上云退中與算而俟至是則亦設中執算而釋獲矣釋獲則有飲射爵之事也右復射主人洗升自西階獻庶子于阼階上如獻士之禮辯獻降洗遂獻左右正與内小臣皆于阼階上如獻庻子之禮右獻庶子左右正内小臣無算爵士也有執膳爵者有執散爵者執膳爵者酌以進公公不拜受執散爵者酌以之公命所賜所賜者興受爵降席下奠爵再拜稽首公荅再拜受賜爵者以爵就席坐公卒爵然後飲執膳爵者受公爵酌反奠之受賜者興授執散爵者執散爵者乃酌行之唯受于公者拜卒爵者興以酬士于西階上士升大夫不拜乃飲實爵士不拜受爵大夫就席士旅酌亦如之公有命徹幂則賔及諸公卿大夫皆降西階下北面東上再拜稽首受賜之下當有爵字卒爵之間當有受字皆如上篇公命小臣正辭公荅拜大夫皆辟升反位於是乃言公命見上文凡小臣正辭者皆公命之也此篇文又省士終旅于上如初無算樂宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為燭于門外燕禮曰閽人為大燭於門外右無算爵賔醉北面坐取其薦脯以降奏陔賔人奏肆夏出奏陔夏逺辟王朝之禮也大司樂職曰賔出入奏肆夏賔所執脯以賜鐘人于門内霤遂出篇首言士旅食之位在士南者為辟射也此見鐘人於門内霤豈既射若已獻則復正位於門西乎卿大夫皆出公不送公入驁驁音敖入謂降而入於内也驁夏亦九夏之一也以鐘鼓奏之今亡驁上似脫奏字燕禮不言公入此言公入者為奏驁而見之也公入而奏驁夏亦盛射禮也出時不奏亦逺辟天子之禮也大司樂職曰大射王出入令奏王夏右賔出公入儀禮集説卷七正誤騰觚於賔士長升拜受觚主人拜送觚騰及二觚字並從今文説見前篇
