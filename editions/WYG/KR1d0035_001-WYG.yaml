body:
  text: 儀禮集説卷一元敖繼公撰士冠禮第一鄭注曰童子年二十而冠主人𤣥冠朝服則是諸侯之士天子之士朝服皮弁素樍古者四民世事士之子恒為士冠於五禮屬嘉禮繼公謂此篇主言士冠其適子之禮然此士云者據其子而立文也下篇放此冠者加冠之稱凡經言士禮者皆謂諸侯之士其言大夫禮者亦然蓋此經乃天子為諸侯制之以為其國之典籍者也故不及王朝大夫士之禮士冠禮冠古亂反篇内不音者並同此目下文所言之禮也後篇皆放此筮于廟門注曰筮以蓍問吉凶於易也廟謂禰廟繼公謂此目筮日之事也凡經文類此者不悉見之筮日者重冠事也于廟門者為將有事於廟中故也必于門者明其求於外神也主人𤣥冠朝服緇帶素韠即位于門東西面冠如字朝音潮下同韠音畢注曰素韠白韋韠長三尺上廣一尺下廣二尺其頸五寸肩革帶博二寸天子與其臣𤣥冕以視朔皮弁以日視朝諸侯與其臣皮弁以視朔朝服以日視朝凢染黑五入為緅七入為緇𤣥則六入與繼公謂主人將冠者之父也𤣥冠黒繒委貎也朝服十五升之𤣥布衣而素裳也士朝服以筮敬其神也士服以𤣥端為正緇帶緇繒帶士帶以禪練為體其博四寸又以緇繒之博二寸者二合而辟其帶下之垂者故謂之緇帶帶下長三尺其屈垂者二尺素韠象裳色也士之韠率象裳色或近焉惟有為而變者乃大異也韠之義説者謂古者田狩而食其肉衣其皮先以兩皮如韠以蔽前後後世聖人易之以布帛猶存其蔽前示不忘古云有司如主人服即位于西方東面北上有司即筮者占者宰宗人之類筮與席所卦者具饌于西塾饌士戀反塾音孰注曰筮謂蓍也具俱也饌陳也西塾門外西堂也門側之堂謂之塾繼公謂蓍而云筮者以其所用名之席蒲筵也士用蒲席神人同所卦者所以畫地記爻及書卦之具也士喪筮日之禮云奠龜于西塾上南首有席燋在龜東然則此時具饌之位􅆱亦當南郷席在其後而所卦者則在􅆱右亦變於筮時也布席于門中闑西閾外西面闑魚列反閾音域注曰闑門橛閾閫也繼公謂闑西東西節也閾外南北節也此席西於闑乃云門中則二扉之間惟有一闑明矣筮人執筴抽上韇兼執之進受命於主人筴音筮韇音獨注曰韇蔵筮之噐今時蔵弓矢者謂之韇丸兼并也進前也自西方而前䟽曰言上韇者其制有上下下者從下郷上承之上者從上郷下韜之也少牢曰史左執筮右抽上韇兼與筮執之繼公謂筮人有司之共筮事者也少牢饋食禮言為大夫筮者史也此為士筮宜亦如之史而云筮人者因事名之也執筴當作執筮筮亦謂蓍也上云筮與席下云徹筮席以其上下文徵之則此筴字乃傳寫誤也又特牲少牢禮皆云執筮益可見矣宰自右少退賛命注曰自由也賛左也少儀曰賛幣自左詔辭自右繼公謂曏者宰亦在有司位至是乃來主人之右賛命為主人釋辭也其辭蓋曰某將以來日某加布於其子某之首敢筮筮人許諾右還即席坐西面卦者在左卒筮書卦還音旋下同注曰即就也東面受命右還北行就席卒已也繼公謂筮人即席抽下韇乃釋之而坐筮也凡卜筮于門者皆西面筮宅於兆南則北面蓋以西北隂方故郷之以求諸鬼神也筮用四十九􅆱分而為二掛揲而歸竒焉又以所餘􅆱如上法者再乃成爻六爻􅍯而成卦卦者主識爻書卦者也少牢饋食禮曰卦者在左坐卦以木卒筮書卦于木此不言坐則是立也其亦士禮異與立則卦時乃坐既則興執以示主人主人受眡反之眡音視執之不言筮人文省也反之反於筮人筮人還東面旅占卒進告吉注曰旅衆也繼公謂筮人東面而言還明其位亦在有司中也旅占與有司旅占之占者占所遇之卦若其爻之吉凶也必旅占者欲盡衆人之見也其人數未聞士之占卜者則三人告吉亦執卦若不吉則筮逺日如初儀逺日去初筮者蓋旬有一日也以其干同故謂之逺日少牢日用丁巳而以後丁後己為逺日則可見矣初儀筮人執筮以下者也凡經言不吉而改筮者皆不至於再重瀆神也此筮若又不吉則直用其後之逺日不復筮矣凡筮賔筮尸卜日之屬皆類此議見特牲篇張子説中徹筮席徹直列反下並同筮蓍也蓋既筮則釋于闑西今乃并與席徹去之宗人告事畢注曰宗人有司主禮者繼公謂宰宗人筮人之屬皆公家所使給事於私家者也告事畢東北面特牲禮宗人東北面告濯具右筮日主人戒賔賔禮辭許主人再拜賔荅拜注曰戒警也告也禮辭一辭而許繼公謂賔者主人同郷之士也戒者告之使知其事且欲勞之也此上更當有賔主為禮一節與宿賔者同文不具耳凢賔之與冠事者主人皆親戒之而以將為筮者為先餘人亦各以次為先後也是時主人皆親戒之者未筮則未有所别異也戒賓亦朝服凡既筮而有事如戒宿之類皆因筮服無變也賔許而主人再拜謝其許也後禮類此者其義皆然此雖親相見其辭則皆擯者傳之宿賔放此説見特牲篇主人退賔拜送此言戒賔之儀略者蓋以宿賔之儀見之也必拜送者所以謝之凡拜送客者皆於其既退乃拜之故不荅拜亦異於迎也吉禮拜送者必再拜經或不見之文省耳右戒賔前期三日筮賔如求日之儀注曰筮賔筮其可使冠子者冠義曰古者冠禮筮日筮賔所以敬冠事繼公謂前猶先也期即下文所謂為期者也此所空者但爲期之一日耳乃云前期三日未詳筮賔之辭蓋曰某以來日某加布於其子某之首將以某為賔敢筮言如求日之儀是亦不過再筮而已初筮者若不吉則改筮其次者為正賔若次者又不吉則不復筮而即以第三者為正賔亦以初筮者為次賔也主人於賓既次第其先後矣然猶筮之者蓋慮其異日或以他故而不及與則將廢冠事此乃非人之所能預知者故不可不問於神而用舍壹聽之雖或先後易位有不能盡如人意者亦不以為嫌也右筮賔乃宿賔賔如主人服出門左西面再拜主人東面荅拜注曰主人朝服左東也出以東為左入以東為右朱子曰此云宿賔言主人往而宿之以目下事如篇首言筮于廟門後亦多有此例也繼公謂既筮即宿賔故云乃宿之為言速也既戒之則宜速之使來也不曰速而曰宿者以其事在異日也賔尊故主人親宿之出門左出大門而左也西面再拜拜其辱也禮又謂之拜迎乃宿賔賔許主人再拜賔荅拜主人退賔拜送注曰乃宿賔者親相見致其辭宿賛冠者一人亦如之注曰賛冠者佐賔為冠事者繼公謂賛冠者一人賛者之長也尊次於正賔如郷飲酒之介然故主人亦親宿之也經之所言乃主人親宿者耳若衆賔則或使人宿其禮簡故經不著之郷飲酒禮惟言主人戒賔及介之儀而於衆賔則闕焉其例正與此相類宿賔及此賛冠者其禮與辭皆同惟以先後為别衆賔不親宿者宜别於尊者也右宿賔厥明夕為期于廟門之外主人立于門東兄弟在其南少退西面北上有司皆如宿服立于西方東面北上注曰宿服朝服兄弟主人親戚也䟽曰期加冠之期也繼公謂云有司皆如宿服則主人及兄弟可知矣擯者請期宰告曰質明行事擯必刃反注曰擯者有司佐禮者質正也旦日正明行冠事繼公謂請期東西少牢禮主人南面宗人北面請祭期告兄弟及有司注曰擯者告也䟽曰上文兄弟有司皆已在位此復告者禮取審愼之義也繼公謂此告兄弟蓋東北面告有司蓋西北面也特牲饋食禮曰宗人東北面告濯具告事畢擯者告期于賔之家别言擯者事更端也賔謂賔及衆賔也右為期夙興設洗直于東榮南北以堂深水在洗東直音值深式鴆反注曰夙早也興起也洗承盥洗者棄水噐也䟽曰堂深從堂廉北至房室之壁南北以堂深者洗去堂逺近取於堂上深淺假令堂深二丈洗亦去堂二丈以此為度繼公謂説文曰屋梠之兩頭起者為榮又曰梠楣也爾雅曰楣謂之梁然則榮者乃梁東西之兩端也直東榮謂遥當之周制卿大夫以下為夏屋故其設洗以東榮為節人君為殿屋故以東霤為節其處同也南北以堂深者謂設洗南北之節視堂深之度而為之深謂其修也水所以盥洗者也其噐則國君及大夫用罍士未聞洗在東方則沃洗者宜西面故水在洗東陳服于房中西墉下東領北上墉牆也東領統於主位也北上便其先取在南者也爵弁服纁裳純衣緇帶韎韐纁香云反純如字韎音妹韐音閤注曰爵弁其色赤而微黒如爵頭然纁淺絳凡染絳一入謂之縓再入謂之頳三入謂之纁朱則四入與韐合韋為之冠弁不與衣陳而言於上以冠名服耳繼公謂爵弁服士之上服也純衣絲衣而緇色者也周官云純帛論語云今也純儉此其徵矣言纁裳於衣上者以其與冕服之裳同尊之也韎者韋之蒨者也韐之制如韠不曰韠者尊之異其名耳其在冕服者尤尊則謂之韍皮弁服素積緇帶素韠注曰皮弁者以白鹿皮為冠也積猶辟也以素為裳辟蹙其要中繼公謂皮弁次於爵弁亦士之尊服也其衣蓋亦絲衣而色如其裳二弁之衣用絲者宜别於冠服也冠服之衣用布此裳之辟積亦幅三袧𤣥端𤣥裳黃裳雜裳可也緇帶爵韠注曰𤣥端即朝服之衣易其裳耳不以𤣥冠名服者是為緇布冠陳之繼公謂𤣥端士之正服也𤣥端𤣥裳謂𤣥端之服其裳以𤣥者為正也若無𤣥裳亦許其用黃裳若雜裳故曰黃裳雜裳可也雜裳者或前𤣥後黃或前黃後𤣥也黃裳雖眨於𤣥裳然其色純故言於雜裳之上𤣥裳黃裳雜裳而皆爵韠近裳色也緇布冠缺項青組纓屬于缺緇纚廣終幅長六尺皮弁笄爵弁笄緇組紘纁邉同篋冠如字下同缺如字屬音燭纚山買反廣古曠反長直亮反笄音雞紘音宏篋苦協反注曰屬猶著也纚今之幘梁也終充也纚一幅長六尺足以韜髪而結之矣笄今之簪纁邉組側赤也同篋謂此以上凡六物隋方曰篋䟽曰二弁之笄天子諸侯用玉大夫士用象繼公謂下經言賔受冠右手執項左手執前則是冠後亦謂之項也此缺項者蓋别以緇布一條圍冠而後不合故名之曰缺項謂其當冠項之處則缺也其兩端有􅕒别以物貫穿而連結之以固冠其兩相又皆以纓屬之而結於頥下以自固蓋太古始知為冠之時其制如此後世之冠縫著於武亦因缺項之法而為之也纚舊説謂繒為之纚長六尺則固足以韜其髪矣然廣惟一幅則圍髪際而不足或亦缺其後與古者布帛幅廣二尺經言纚於缺項二笄之間以見三加同一纚也紘弁之繫也以組一條為之冠用纓弁用紘各從其便也櫛實于簞蒲筵二在南櫛莊乙反簞音丹注曰筵席也䟽曰二者一冠一醴繼公謂簞笥類也南謂簞南側尊一甒醴在服北有篚實勺觶角柶脯醢南上甒音武觶之豉反柶音四醢音海注曰側猶特也服北者纁裳北也篚竹噐如笭者勺尊升所以㪺酒也爵三升曰觶柶狀如匕以角為之欲滑也繼公謂尊設尊也甒瓦甒醴尊設於房臣禮也國君則於東箱南上醢在北案注云柶狀如匕蓋如有司所謂挑匕者也爵弁皮弁緇布冠各一匴執以待于西坫南南面東上賔升則東面匴素管反坫丁念反注曰匴竹噐名今之冠箱也執之者有司也坫在堂角陳用之曰士之服止於爵弁而荀卿曰士韋弁孔安國曰雀韋弁也則爵弁即韋弁耳又曰古文弁象形則其制上鋭如合手然韋其質也爵其色也繼公謂爵弁皮弁其制同也周禮言王與諸侯及孤卿大夫之弁飾以玉琪各以其等為之又有象邸則士之弁無玉又無象邸也此三冠特别于西方而統於賔蓋以賔専掌冠事使若賔之物然執匴者皆主人之賛者也南面而東上及東面則北上矣不言者可知也坫在東西堂之南案陳氏以為爵弁即韋弁其説近是今攷經傳見物色之言爵者於爵弁之外惟曰爵韠爵韋耳若絲與布之類則皆絶不聞其或以爵名之者以是參之則爵弁其果以韋為之與然禮經言士之服則曰爵弁言大夫以上之服則曰韋弁是其物雖同而名則以尊卑而異蓋必有義存焉但禮文殘缺未能定也屨夏用葛𤣥端黒屨青絇繶純純博寸絇其子反繶音億純章允反下同注曰屨順裳色𤣥端黒屨以𤣥裳為正也絇狀如刀衣鼻在屨頭繶縫中紃也純縁也三者皆青博廣也䟽曰屨順裳色者禮之通例衣與冠同屨與裳同也縫中紃謂相接之處縫中有絛紃也縁謂繞口縁邉也絇純亦以絛為之博寸謂純之廣也繼公謂絇取屈中之義而名之綴於屨頭以為飾也素積白屨以魁柎之緇絇繶純純博寸魁柎皆未詳注云魁蜃蛤柎注之爵弁纁屨黒絇繶純純博寸黒屨青飾白屨緇飾則此纁屨當飾以白而白非所以為飾也故越之而用黒焉此見屨者或言衣或言裳或言冠錯綜以為文也先卑而後尊以三加之次言之也三屨陳之蓋在其裳之西冬皮屨可也䟽曰冬時寒許用皮故云可也繼公謂皮屨不見其色與飾同於上可知上言夏此言冬則是周之禮四時皆可冠矣又此及士喪禮篇其於屨惟云冬夏者蓋以純用皮葛之時言之若春秋則或先皮後葛或先葛後皮故不言與不屨繐屨繐音嵗不屨之屨著屨之稱也繐乃布之䟽者以之為屨則輕涼也言此者嫌夏時冠或得用之繐非吉布而冠則嘉禮之重者是以不宜屨此屨若燕居則或屨之可自屨夏用葛至此本在辭後朱子移之於此今從之右陳服噐主人𤣥端爵韠立于阼階下直東序西面直音值注曰堂東西牆謂之序繼公謂此言𤣥端亦不言冠者可知也主位謂之阼故東階謂之阼階下云禮于阼是也凡牆在堂上者謂之序堂下者謂之壁在房室者謂之墉在庭者謂之牆兄弟畢袗𤣥立于洗東西面北上袗之忍反畢猶盡也袗如袗絺綌之袗乃被服之别稱也𤣥𤣥端也畢袗𤣥者謂盡服𤣥端也洗東於主人為東南擯者𤣥端負東塾此見其少東於入門右之位也東塾西塾其北蓋與東西堂相對而廣亦如之立於塾北而云負則塾之崇其過於堂與士之堂崇三尺將冠者采衣紒在房中南面紒音計注曰采衣未冠者所服玉藻曰童子之節也緇布衣錦縁錦紳并紐錦束髪皆朱錦也紒結髪朱子曰房户宜當南壁東西之中而將冠者在房中當户而立也繼公謂童子之衣蓋亦深衣制也曲禮曰童子不衣裘裳不裳則連裳於衣矣紒露髪為紒也凶時謂之髽吉時謂之紒内則言男子未冠者亦用纚此乃紒者為將冠去之右即位賔如主人服賛者𤣥端從之立于外門之外注曰從猶隨也外門大門繼公謂賔言如主人服賛者言𤣥端亦互文也賛者賛冠者而下之衆賔也皆俟于賔之門賔出乃從之立于主人外門之外西方東面北上擯者告上言擯者負東塾則在廟也至是則賔之將命者入告擯者擯者東面以告主人也此賔乃主人戒宿而來故不出請事主人迎出門左西面再拜賔荅拜荅拜不言再可知也凡荅再拜而不言其數者皆放此主人揖賛者與賔揖先入注曰與賔揖先入道之賛者隨賔繼公謂揖賛者尊正賔也毎曲揖毎曲揖謂大門之内廟門之外賔主於凡所行曲折之處則相揖也周左宗廟尊卑同之主人迎賔入門右西面而立賔入門左東面乃折而北又折而東又折而南與主人相郷而前乃東行入閤門主人入門右賔入門左接西塾東面而立主人折而東又折而北又折而西與賔相郷而前乃北行入禰廟也凡主人以賔入而有毎曲揖者惟將入廟之禮然其餘則否至于廟門揖入三揖揖入主人揖而先入門右西面也賔入門左賛者皆入門左東面北上主人乃與賔三揖也三揖者於入門左右之位揖參分庭一在南揖參分庭一在北揖凡經言揖入三揖者放此至于階三讓讓據主人言也主人三讓而客三辭既則主人先升一等而賔從之凡讓升之法賔主敵則主人先讓而先升主人尊亦然客尊則客先讓而先升也惟天子之使則不讓主人升立于序端西面賔西序東面注曰序端東序頭繼公謂主人立于序端北當序也賔在西序負序也主人不立于東序者辟子之坐且不參冠禮也賔不言升省文右迎賔賛者盥于洗西升立于房中西面南上盥音管注曰立于房中近其事也朱子曰賛者西面則負東墉而在將冠者之東矣繼公謂盥者重冠禮故將執事而自潔清也盥于洗西者以洗西無篚故得辟正賔而盥於此也不然則否升升自西階也不言者可知也房中南上賔位也特牲饋食内賔東面于西墉下亦南上是也主人之賛者筵于東序少北西面注曰筵布席也東序主人位也適子冠於阼少北辟主人繼公謂主人之賛者私臣也此席南上將冠者出房南面注曰南面立于房外之西待賔命賛者奠纚笄櫛于筵南端注曰賛者賔之賛冠者也奠停也䟽曰不言餘物及篋簞者皆來可知也又凡言主人之賛者即加主人字今此不言故知是賔之賛冠者也繼公謂奠猶置也奠于筵南端以將冠者升降由下也賔揖將冠者將冠者即筵坐賛者坐櫛設纚䟽曰此二事皆勞役之事故賛者為之繼公謂揖者欲其即筵以揖見意也下文凡揖者多類此賛者坐櫛設纚宜於筵後為之不言者可知也賔降主人降主人降以賔為已事而降則不敢安於上而從之也後放此凡賔主從降之義皆然其異者則别見之主人降亦立于阼階東當東序西面賔辭主人對注曰辭對之辭未聞繼公謂辭者謂主人無事不必降也蓋於階前辭之主人少進既則復位賔盥卒壹揖壹讓升主人升復初位賔盥當於洗南北面也一揖揖賔進也一讓禮宜殺於初也升亦主人先而賔從之惟云主人復初位所以見賔之不然賔筵前坐正纚興降西階一等執冠者升一等東面授賔冠如字注曰正纚者將加冠宜親之冠緇布冠也繼公謂士階三等堂不與焉此降階一等蓋并堂為二等也東面授賔則賔西面受之也授冠時亦以匴既則以匴退矣賔右手執項左手執前進容乃祝坐如初乃冠興復位賛者卒祝之又反下同注曰進容者行翔而前鶬焉至則立祝坐如初坐筵前復位西序東面卒謂設缺項結纓也䟽曰項謂冠後翔謂行而張拱也鶬與蹌同繼公謂右手執項以冠時進右手便也容者示之以威儀冠者興賔揖之適房服𤣥端爵韠出房南面服𤣥端爵韠亦賛者為之出房南面亦待賔命也不言帶與屨可知也下皆放此賔揖之即筵坐櫛設笄賔盥正纚如初降二等受皮弁右執項左執前進祝加之如初復位賛者卒紘注曰如初為不見者言也卒紘謂繫屬之繼公謂笄皮弁笄也設笄于加弁之前則此笄之度其短與不言去冠去纓及設纚可知也卒紘謂終其設紘之事也其設之也先繫一端於笄之左端繞頥下而上復繫一端於笄之右端所以固弁也興賔揖之適房服素積素韠容出房南面上不見皮弁之衣故此亦不言之皆省文也容與進容之意同再加祝辭曰敬爾威儀此言容出房見其奉賔戒也賔降三等受爵弁加之服纁裳韎韐其他如加皮弁之儀注曰降三等下至地繼公謂受爵弁降三等者以其㝡尊故就而受之雜記言襚者受服之節云受爵弁服於門内霤皮弁服於中庭朝服於階𤣥端於堂亦尊者逺而卑者近其義似與此所受冠弁之差相類不言純衣亦文省他謂賔揖之即筵而下凡所不見者也云如皮弁之儀者以有設笄容出卒紘之事為與再加者同也徹皮弁冠櫛筵入于房冠如字注曰徹者主人之賛者為之繼公謂再加去冠三加去皮弁亦置于篋此所徹者篋與櫛之簞也不言缺纓笄紘與冠弁同處可知賔賛者徹篋簞主人賛者徹筵右冠三加筵于户西南面注曰筵主人之賛者户西室户西繼公謂户西即户牖間也後皆放此户西客位也筵於此者以其成人尊之不因冠位者逺辟主人也著代之義惟於冠時見之此席東上賛者洗于房中側酌醴加柶覆之面葉注曰面前也葉柶大端古文葉為䔾繼公謂洗洗觶也房中有洗在北堂士昬記詳之酌醴蓋西面也云側明無佐之酌者面葉葉郷外也覆之面葉為冠者祭時當覆手執枋也凡賛者酌醴皆側也特於此見之賔揖冠者就筵筵西南面賔受醴于户東加柶面枋筵前北面枋音柄注曰户東室户東今文枋為柄繼公謂賛者出房西面賔由西序往故受醴于室户東與主人受醴之處異矣言面枋見其訝受也非所與行禮者而訝受辟君禮也固加柶矣乃言之者見其更為之也筵前北面欲其受於席也冠者筵西拜受觶賔東面荅拜注曰筵西拜南面拜也賔還荅拜於西序之位繼公謂受觶于筵前乃復位醴用觶亦以其質也東面荅拜别於荅孤子孤子之冠行主人禮賔則北面荅拜于西階上薦脯醢注曰賛冠者也薦進也繼公謂不言於席前可知也薦脯醢脯在西冠者即筵坐左執觶右祭脯醢以柶祭醴三注曰祭於脯醢之豆間必祭者示有所先也䟽曰祭醴三者如昬禮始扱一祭又扱再祭也注云有所先即先世之造此食者也繼公謂祭脯醢以脯祭擩醢而祭之古人飲食於其重者則有祭禮既祭不言右執觶者可知也興筵末坐啐醴建柶興降筵坐奠觶拜執觶興賔荅拜冠者奠觶于薦東啐七内反注曰啐甞也其拜皆如初繼公謂筵末席之西端也亦以柶兼諸觶乃坐啐醴建猶立也云建者上葉下枋與扱時異又以明其已入于觶則不復執之也降筵坐於筵西也不卒爵故既啐則拜其意與拜既爵者同冠者升筵乃奠觶不卒爵而奠之者此禮不主於飲也于薦東者堂上自奠其觶者之節也籩豆而云薦者上經云薦脯醢故因其事而名之省文耳後皆放此右醴降筵北面坐取脯降自西階適東壁北面見于母見賢遍反取脯亦右取而左奉之必取脯者見其受賜也執脯見于母因有脯而為之且明其禮成也云適東壁而見之則是時母位在此與母拜受子拜送母又拜母於其子乃俠拜者重冠禮也子拜送亦再拜此拜非主於受送也亦因有脯而言之耳凡婦人與丈夫為禮其禮重者則俠拜右見于母賔降直西序東面主人降復初位直音值但云直西序則當南於階初位阼階東直東序之位冠者立于西階東南面賔字之冠者對注曰對辭未聞繼公謂賔當少進乃字之右字賔出主人送于廟門外賔出而賛者不從以其當與冠者為禮也請醴賔賔禮辭許賔就次注曰醴賔者謝其勤勞也次門外更衣處也以帷幕簟席為之繼公謂請者有白於人而恭孫之辭也醴亦謂以醴飲之也請醴之辭則士昬記有之此禮雖與彼異辭宜略同醴賔之禮壹獻有俎有幣似饗矣乃曰醴者亦因用醴而名之右賔出就次冠者見于兄弟兄弟再拜冠者荅拜見賛者西面拜亦如之見並賢遍反下入見見母見于見於並同注曰見賛者西面拜則見兄弟東面拜䟽曰亦如之者言賛者先拜而冠者荅之也繼公謂兄弟與賛者皆先拜之亦重冠禮也兄弟位在洗東賛者位在西方亦西當西序賛者為禮竟則亦出而就次此時兄弟之在廟者冠者皆見之乃不見父者以難為禮也蓋此時冠者於凡所見者皆不先拜而荅拜乃其禮當然爾父至尊也是禮有不可行故闕之且父為冠主雖不見之亦無嫌也不見賔者賔既醴之則交拜矣是亦見也若復行禮則幾於䙝入見姑姊如見母注曰入入寢門也如見母者亦北面姑與姊亦俠拜也繼公謂見姑姊于寢未詳其處不見妹者未成人則不與為禮也古者男女皆年二十乃冠笄其説見喪服右見兄弟賛者姑姊乃易服服𤣥冠𤣥端爵韠奠贄見于君遂以贄見於郷大夫郷先生冠如字贄音至注曰贄雉也䟽曰郷先生即郷飲酒所謂先生繼公謂此𤣥端更言𤣥冠者别於曏之緇布冠也奠贄見于君謂執贄至下奠贄再拜稽首也見於君亦𤣥端而不朝服者以其未仕也所見者亦𤣥端見之郷大夫郷之異爵者也或曰郷大夫即主治一郷者未知孰是先生徳齒俱尊者也士相見禮曰士見於大夫終辭其贄於其入也一拜其辱見於先生之禮亦宜如之右見君見郷大夫郷先生乃醴賔以壹獻之禮注曰此醴賔泲其醴内則曰飲重醴稻醴清糟黍醴清糟􅆝醴清糟凡醴事質者用糟文者用清繼公謂醴賔之時賛者皆與賛冠者為介與郷飲酒相類則是壹獻之禮賔介而下皆然也共獻及酢酬亦略如郷飲酒之儀與主人酬賔束帛儷皮儷音麗注曰飲賔客而從之以財貨曰酬所以申暢厚意也凡物十曰束束帛十端也儷兩也皮鹿皮繼公謂醴之而有俎又酬以皮帛重謝之也此酬賔之禮當行於賔受獻之後未卒爵之前猶食禮既受侑幣乃卒食也賛者皆與賛冠者為介與音預言此於酬賔之後者明酬幣惟用於正賔也賛者亦兼賛冠者而言介副也以副於正賔名之飲酒之禮有賔有介有衆賔此賛冠者為介其餘為衆賔也衆賔之位亦在堂郷飲酒禮賔席于户牖間介席于西序衆賔之席繼賔而西賔出主人送于外門外再拜歸賔俎注曰一獻之禮有薦有俎其牲未聞使人歸諸賔家也古者與人飲食必歸其盛者所以厚禮之右醴賔此禮用醴蓋因醴子用醴而為之若不醴子而醮則此禮亦因之而用酒與用酒則為饗也若不醴則醮用酒醮子召反此醮與醴大意略同惟用酒而儀物繁為異上既見醴禮矣此復言不醴則醮者蓋冠禮之始惟醴而已然少近於質故後世聖人又為此醮禮與之並行焉言若者文質在人用之惟所欲耳尊于房户之閒兩甒有禁𤣥酒在西加勺南枋注曰房户閒者房西室户東也禁承尊之噐也𤣥酒新水也雖今不用猶設之不忘古也在西上也繼公謂此醮而設酒甒與醴而設醴甒者其節同亦於陳服之後為之兩甒一酒一𤣥酒也𤣥酒在西尊西上也尊西上者以冠者之位在其西故順之他篇不見者其義皆放此加勺加於二尊之上而覆之也𤣥尊亦加勺者不以無用待之也南枋為酌者北面覆手執之便也少牢饋食禮曰主人北面酌酒洗有篚在西南順注曰洗庭洗篚陳於洗西南順北為上也順從也繼公謂醮而設洗之節亦與醴同惟有篚為異此見其異者耳篚以盛爵也不醴則服北無甒又無篚惟有三加之豆籩也下篚之爵三始加醮用脯醢賔降取爵于篚辭降如初卒洗升酌注曰一升曰爵辭降如初如將冠時降盥辭主人降也朱子曰始加二字乃疊見前始加緇布冠一章之禮醮用脯醢乃題下事其實賔荅拜後乃薦之也賔升時冠者猶在出房南面之位繼公謂賛者筵于户西賔乃降也用爵醮禮文也卒洗亦當壹揖壹讓乃升冠者拜受賔荅拜如初注曰賔升揖冠者就筵乃酌冠者南面拜受賔授爵東面荅拜如醴禮也於賔荅拜賛者則亦薦之凡薦出自東房繼公謂初醴時之儀也言如初所以見其先有醴後有醮冠者升筵坐左執爵右祭脯醢祭酒興筵末坐啐酒降筵拜賔荅拜冠者奠爵于薦東立于筵西注曰冠者立俟賔命賔揖之則就東序之筵徹薦爵筵尊不徹注曰徹薦與爵者辟後加也不徹筵尊三加可相因由便也繼公謂徹之亦賛冠者也毎醮禮畢必徹薦爵者所以新後醮之禮若不相因然徹薦爵蓋入于房加皮弁如初儀再醮攝酒其他皆如初注曰攝猶整也整酒謂撓之朱子曰此如初儀者如前再加一章之儀也下條放此再醮攝酒其他皆如初言唯攝酒異於始醮其他皆如之也繼公謂攝酒亦示新之之意加爵弁如初儀三醮有乾肉折俎嚌之其他如初乾音干折之設反嚌才計反注曰乾肉牲體之脯也如今涼州烏翅矣朱子曰初儀見上三醮唯攝酒及有乾肉折俎嚌之為異其他皆如始醮也繼公謂乾肉折俎猶言乾肉俎也俎盛牲體之折者故名曰折俎設之於脯醢之南士虞禮曰有乾肉折俎二尹縮祭半尹此乾肉亦縮俎而左朐右末其所嚌即祭半尹者也亦振祭乃嚌之唯言嚌省文耳物至齒謂之嚌知其味謂之甞北面取脯見于母著此者見其與醴同也下放此右醮禮若殺則特豚載合升離肺實于鼎設扃鼏扃古螢反鼏眉狄反注曰特一也合升合左右胖升於鼎也離割也離肺小而長午割之不提心扄鼎扛所以舉之者也鼏覆之繼公謂載衍文士喪禮曰特豚四鬄去蹄兩胉脊此其合升之體數也肺離之者使絶之而為祭也既祭則嚌之故又名嚌肺其與脊同舉者則謂之舉肺鼎設扄是亦舉之也孤子則舉鼎陳于門外此不陳惟俟時而入錯于阼階前也是篇始言醴次言醮後言殺聖人制禮愈變則愈盛此亦可見其尚文之意也鼏見公食大夫禮始醮如初朱子曰初謂前章之始醮也再醮兩豆葵菹蠃醢兩籩栗脯菹莊魚反蠃力禾反注曰蠃螔蝓今文蠃為蝸繼公謂此見其異於上者爾是禮愈文故於此即加其籩豆以起三醮之禮且示禮隆有漸也兩豆兩籩之位若以有俎之禮言之則醢在菹東栗在菹西脯在栗南也此薦雖不與三醮有俎者相因而位則亦放之與又籩豆有加則祭之之儀亦與祭脯醢者略異蠃未詳三醮攝酒如再醮加俎齊之皆如初嚌肺注曰攝酒如再醮則再醮亦攝之矣朱子曰初謂上章之始醮也嚌肺者釋上嚌之為肺也上章之俎無肺而此有肺故又特言之而不嫌於複出凡言之法多此類繼公謂攝酒如再醮此與不殺之禮互言也加俎者謂於籩豆之外又加豚俎也設之當菹醢之南三加後者彌尊故三醮而後者愈盛禮宜相稱也嚌之謂絶祭嚌之不言祭者亦文省肺之嚌者必祭祭者不必嚌也皆如初謂此再醮三醮之所不見者皆如不殺始醮之禮也云嚌肺者又明其所嚌之異於不殺者也不殺則祭用乾肉而嚌之卒醮取籩脯以降如初籩脯謂其在籩者也言此以别於所祭者耳三醮亦兩豆兩籩如再醮而又加俎焉一俎而兩豆兩籩變於常禮亦盛之右殺牲而醮若孤子則父兄戒宿父伯父叔父也兄親兄也無則䟽者亦可孤子雖尊於家然未冠則不可與成人為禮於外故戒宿賔客則諸父若兄為之惟言父兄戒宿則筮日筮賔為期之事皆將冠者自主之可知冠之日主人紒而迎賔拜揖讓立于序端皆如冠主禮於阼必云紒者嫌與父在者異也冠主將冠者親父也孤子未冠而於此乃行成人之禮者無父則得伸其尊也諸父若兄不主其事者家無二主也必主于序端者因冠主之位也禮謂賔與冠者行禮也蓋指三加與醴之類而言行禮皆於阼亦見其異於父在者以其為主人故也然則若醴若醮皆因冠席為之與凡拜北面于阼階上賔亦北面于西階上荅拜此賔主相拜之正位也凡拜謂主人於醴若醮時拜受之類也若殺則舉鼎陳于門外直東塾北面直音值注曰孤子尊得伸禮盛之父在有鼎不陳於門外繼公謂殺謂醮而殺牲也直束塾當其南也鼎陳於此亦俟時而入錯之凡鼎既升乃舉而别陳之者正禮也是禮為主人而設故得如禮大夫士陳鼎於門外皆北面惟喪奠乃西面耳國君陳鼎南面天子未聞右孤子冠若庶子則冠于房外南面遂醮焉注曰房外謂尊東也不於阼非代也不醮於客位成而不尊繼公謂言遂者見其因冠席也冠醮同處可以不必别布席經惟言冠而遂醮略無異文則是三加三醮皆與上文適子之禮同惟以冠醮在房外為異若不醮而醴其位亦如之經不言醴者蓋見其文者耳此言庶子指父在者也父在而冠宜别於適父沒則其禮同矣凡冠者於廟右庶子冠冠者母不在則使人受脯于西階下言於此者見以上冠者之禮同也母不在者或已沒或疾病或見出皆是也授人脯正禮也此正禮乃後言之者以母在者為主也授人脯之禮男子則於階下婦人則於門外云右母不在戒賔曰某有子某將加布於其首願吾子之教之也注曰吾子相親之辭子男子之美稱䟽曰上某主人名下某子之名布緇布冠也教之者以加冠行禮為教之也繼公謂冠禮三加乃惟云布者取其始加而質者言之謙也又以士昬禮例之此以下所載諸辭皆當為記文乃在經後記前亦未詳賔對曰某不敏恐不能共事以病吾子敢辭共音恭不能共事則冠禮不成故云病吾子病猶辱也主人曰某猶願吾子之終教之也賔對曰吾子重有命某敢不從重直用反重再也宿曰某將加布於某之首吾子將莅之敢宿賔對曰某敢不夙興止賔而下其宿之之辭皆同惟以主人之親宿與否别之耳莅臨也始加祝曰令月吉日始加元服注曰令吉皆善也元首也朱子曰諸辭皆當以古音讀之其韻乃叶弃爾㓜志順爾成徳夀考惟祺介爾景福注曰祺祥也介景皆大也因冠而戒且勸之女如是則有夀考之祥大女之大福也朱子曰順古與愼通用繼公謂棄爾㓜志戒之也愼爾成徳勉之也言先去㓜志而後能愼成徳也㓜志即傳所謂童心成徳成人之徳再加曰吉月令辰乃申爾服注曰辰子丑也申重也敬爾威儀淑愼爾徳眉夀萬年永受胡福注曰胡猶遐也逺也繼公謂有威而可畏謂之威有儀而可象謂之儀徳者得也行道而有得於心之謂徳者内也威儀者外也學者固當以徳為先威儀為後然不重其外亦未必能保其中之所有者也故此先言敬威儀乃後言愼徳淑善也眉夀豪眉也人年老者必有豪眉秀出者三加曰以嵗之正以月之令咸加爾服注曰咸皆也皆加女之三服謂緇布冠皮弁爵弁也繼公謂嵗之正謂當冠之年也古者男子二十而冠嵗言正而月言令言吉則周禮冠無常月又可見矣兄弟具在以成厥徳厥者指兄弟而言能成兄弟之徳則正身齊家之事也以此勉之其所以責成人之道也深矣黃耇無疆受天之慶耇音苟注曰黃黃髪也耇凍梨也皆夀徵也疆竟醴辭曰甘醴惟厚嘉薦令芳注曰嘉善也善薦謂脯醢芳香也繼公謂醴謂以醴飲冠者也言厚見其未泲拜受祭之以定爾祥承天之休夀考不忘注曰休美也不忘長有令名繼公謂言拜受祭之亦教之也然則賔釋此辭其在筵前北面冠者未拜之時與夀考不忘者謂至於夀考而人不能忘之也此蓋古人祝頌之常語詩亦多用之醮辭曰旨酒既清嘉薦亶時亶丁但反注曰旨美也亶誠也繼公謂進此醮辭當與醴辭之節同亶時謂誠得成熟之時也始加元服兄弟具來孝友時格永乃保之注曰善父母為孝善兄弟為友時是也格至也永長也保安也行此乃能保之繼公謂具俱也保守而有之也言女方加元服而兄弟皆來者蓋女孝友之徳有以感格之也然自今以後當常常保守此徳而勿失之美而復戒之也一加則一醮故毎醮之辭輙見加冠之序以明其各有所為而不嫌與祝辭同也經於醮禮始加無異文於再加三加皆云如初儀乃見醮禮則是醮者亦祝明矣醮禮文故以多儀為貴再醮曰旨酒既湑嘉薦伊脯湑思吕反注曰湑清也伊惟也繼公謂獨言脯者欲協音耳亦但舉其所上者言也凡一籩一豆則先脯後醢醮辭蓋主為不殺者而作故其言如此若殺則籩豆有加乃因用之而不改者以其亦有脯故也乃申爾服禮儀有序祭此嘉爵承天之祜祜音户序謂始加再加之次第祜福也三醮曰旨酒令芳籩豆有楚注曰楚陳列之貌咸加爾服肴升折俎承天之慶受福無疆肴謂乾肉若豚也詩曰爾殽伊脯字辭曰禮儀既􅍯令月吉日昭告爾字爰字孔嘉髦士攸宜宜之于假假音嘏注曰昭明也爰於也孔甚也髦俊也攸所也于猶為也繼公謂假通典作嘏今從之髦士才徳過人之稱言髦士乃與嘉字相宜若宜之則為嘏矣嘏福也永受保之曰伯某甫仲叔季唯其所當注曰伯仲叔季長㓜之稱甫是丈夫之美稱孔子為尼甫周大夫有嘉甫宋大夫有孔甫是其類甫字或作父李微之曰伯某甫仲叔季唯所當如伯休甫仲山甫之類繼公謂永受保之謂字也仲叔季唯其所當謂其第若當在仲則云仲某甫也叔季亦然記冠義始冠緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也始冠古亂反冠而同大音泰齊側皆反緌如誰反注曰大古唐虞以上緌纓飾未之聞大古質蓋亦無飾重古始冠冠其齊冠䟽曰凡言記者皆是記經不􅍯及經外逺古之言云冠義者記冠中之義繼公謂大古冠布謂始知作冠之時但以白布為之初無吉凶之異至齊則緇之以變於無事時也是大古惟有白布緇布二冠耳後世冠制既與大古異則古冠廢矣然有故則或亦用之如始冠緇布冠之類是也其緌也孔子曰吾未之聞者謂大古之時冠但有纓未聞其緌也緌者以纓之餘長為飾者也古者之纓足以固冠則己未知為飾後世若或用古冠亦宜存古意若緌之則失之矣玉藻曰緇布冠繢緌諸侯之冠也此其夫子之所非者與冠謂始加之後也敝猶毁壊也敝之猶可則不復用可知既不復用則亦何必以緌為飾乎適子冠於阼以著代也適丁厯反冠古亂反下並同著明也著代明其代父也醮於客位加有成也冠禮或醴或醮此記惟言醮亦見當時尚文之意加猶尚也尊也有成謂有成人之道也尊其有成故以客禮待之三加彌尊諭其志也凡人之志皆欲自卑而尊故三加之禮其最尊者在後蓋諭其志而然也諭謂深曉之彌益也冠而字之敬其名也注曰名者質所受於父母冠成人益文故敬之也委貌周道也章甫殷道也毋追夏后氏之道也毋追舊音牟堆注曰其制之異同未之聞繼公謂此言三代之冠各不同也道猶制也三冠之名義未聞周弁殷冔夏收冔況甫反注曰其制之異同亦未聞繼公謂弁爵弁也冔收與弁同稱是亦弁之類也其名義亦未聞三王共皮弁素積三王共之者以其制善不可得而變也記言此於爵弁之下者欲令異者以類相從然後言同者耳蓋文法宜然無大夫冠禮而有其昬禮古者五十而后爵何大夫冠禮之有注曰五十乃爵重官人也大夫或時改取有昬禮是也繼公謂無大夫冠禮而有其昬禮據禮經而言也其下二句所以釋無大夫冠禮之意也古者謂始有冠禮之時也五十而爵者以其年艾徳盛乃可服官政也後世雖未必五十而后爵然亦不至於未冠而為大夫故作記之時去古雖逺而猶不别立大夫冠禮也公侯之有冠禮也夏之末造也造作也下文云繼世以立諸侯象賢也則是公侯父死子繼其來乆矣或有㓜而嗣位者是雖未冠而其爵固已為諸侯矣則及其冠也不容不與士冠禮異此所以至夏末而始作公侯之冠禮也然夏初以前未有此禮者其義則未聞天子之元子猶士也天下無生而貴者也注曰元子世子也繼公謂元子長子也天子之元子其冠時猶士而用士禮以其未即位則無爵故也未有爵而自異於士是生而貴也舉天子之元子以見其餘繼世以立諸侯象賢也以官爵人徳之殺也死而諡今也古者生無爵死無諡殺色界反諡時志反朱子曰此於冠義無所當疑錯簡也蓋老子不尚賢貴因任之意言上古之時各推其賢者奉以為君沒則復奉其子以繼之其後遂以為諸侯然其子之立也但象似其賢而已非故擇賢而立之也至于中古乃在上者擇人任官而為之爵等此則徳之衰殺不及上古之時矣又至於周而有諡法則生而有爵者死又加諡此則又其殺也上古民自立君故生無爵中古未有諡法故雖有爵而無諡又以申言古今之變也繼公謂古惟謂上古也記之意蓋謂以官爵人已不如古死而有諡則愈不如古矣故曰古者生無爵死無諡儀禮集説卷一
