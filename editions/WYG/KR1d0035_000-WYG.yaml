body:
  text: 儀禮集説禮類二儀禮之屬提要臣等謹按儀禮集説十七卷元敖繼公撰繼公字君善長樂人家於呉興趙孟頫嘗從受業後以江浙平章髙彦敬薦授信州教授是書成於大徳辛丑前有自序稱鄭康成注疵多而醇少刪其不合于經者意義有未足則取疏記或先儒之説以補之又未足則附以一得之見又疑䘮服𫝊違悖經義非子夏作皆未免南宋末年務詆漢儒之餘習然鄭注之中録其所取而不攻駁所不取無吹毛索垢百計求勝之心葢繼公于禮所得頗深其不合于舊説者不過所見不同各自抒其心得初非矯激以争名故與目未睹注疏之面而隨聲佐鬭者有不同也且鄭注簡約又多古語賈公彦䟽尚未能一一申明繼公獨逐字研求務暢厥㫖實能有所發揮則亦不病其異同矣卷末各附正誤考辨字句頗詳知非徒騁虚詞者其喪服𫝊一篇以其兼釋記文知作於記後又疑鄭康成散附經記之下而不敢移其舊第又十三篇後之記朱子經𫝊通解皆割裂其語分屬經文各條之下繼公則謂諸篇之説有特為一條而發者有兼為兩條而發者有兼為數條而發者亦有於經意之外别見他禮者不敢移掇其文失記者之意自比于以魯南子之不學學栁下恵之可卷末特為後序記之則繼公所學猶有先儒謹嚴之意固異乎王柏呉澄諸人奮筆而改經者也乾隆四十四年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀儀禮集説原序儀禮何代之書也曰周之書也何人所作也曰先儒皆以為周公所作愚亦意其或然也何以言之周自武王始有天下然其時已老矣必未暇為此事也至周公相成王乃始制禮作樂以致太平故以其時攷之則當是周公之書又以其書攷之辭意簡嚴品節詳備非聖人莫能為益有以見其果為周公之書也然周公之書乃為侯國而作也而王朝之禮不與焉何以知其然也書中十七篇冠昬相見鄉飲鄉射士喪既夕士虞特牲饋食凡九篇皆言侯國之士禮少牢饋食上下二篇皆言侯國之大夫禮聘食燕大射四篇皆言諸侯之禮惟覲禮一篇則言諸侯朝天子之禮然主於諸侯而言也喪服篇中言諸侯及公子大夫士之服詳矣其間雖有諸侯與諸侯之大夫為天子之服然亦皆主於諸侯與其大夫而言也由是觀之則此書决為侯國之書無疑矣然則聖人必為侯國作此書者何也夫子有言曰夫禮必本於天殽於地列於鬼神達於喪祭冠昬射御朝聘聖人以禮示之故天下國家可得而正也以夫子此言證之則是書也聖人其以為正天下之具也歟故當是時天下五等之國莫不寳守是書而藏之有司以為典籍無事則其君臣相與講明之有事則皆據此以行禮又且班之於其國以教其人此有周盛時所以國無異禮家無殊俗兵寢刑措以躋太平者其以是乎其後王室衰㣲諸侯不道樂於放縱而憚於檢束也於是惡典籍之不便於已而皆去之則其曏之受於王朝者不復藏於有司矣曏之藏於有司者或私傳於民間矣此十七篇之所以不絶如綫而幸存以至今日也或曰此十七篇為侯國之書固也豈其本數但如是而已乎抑或有亡逸而不具者乎曰是不可知也但以經文與其禮之類攷之恐其篇數本不止此也是經之言士禮特詳其於大夫則但見其祭禮耳而其昬禮䘮禮則無聞焉此必其亡逸者也公食大夫禮云設法如饗謂如其公饗大夫之禮也而今之經乃無是禮焉則是逸之也明矣又諸侯之有覲禮但用於王朝耳若其邦交亦當有相朝相饗相食之禮又諸侯亦當有喪禮祭禮而今皆無聞焉是亦其亡逸者也然此但以經之所嘗言禮之所可推者而知之也而况其間又有不盡然者乎由此言之則是經之篇數本不止於十七亦可見矣但不知諸侯既去其籍之後即失之邪抑傳之民間久而後失之也是皆不可得而攷矣記有之曰經禮三百曲禮三千所謂經禮即十七篇之類也其數乃至於三百者豈其合王朝與侯國之禮而言之歟若所謂曲禮則又在經禮之外者如内則少儀所記之類是也先王之世人無貴賤事無大小皆有禮以行之盖以禮有所闕則事有所遺故其數不容不如是之多也去古既逺而其所存者乃不能什一也可勝歎哉夫其已廢壞而亡逸者固不可復見矣其幸存而未冺者吾曺安可不盡心而講明之乎固不宜以其無用於今為説而絶之也繼公半生㳺學晚讀此書沉􅅗既久忽若有得每一開卷則心目之間如親見古人於千載之上而與之揖讓周旋於其間焉盖有手之舞足之蹈而不自知者夫如是則其無用有用之説尚何足以蔕芥於胸中哉嗚呼予之所玩者僅十七篇耳而其意已若此設使盡得三百三千之條目而讀之又將何如耶此書舊有鄭康成注然其間疵多而醇少學者不察也予今輒刪其不合於經者而存其不謬者意義有未足則取疏記或先儒之説以補之又未足則附之以一得之見焉因名曰儀禮集説自知蕪陋固不敢以示知禮之君子然初學之士或有取焉亦未必無小補云爾大徳辛丑孟秋望日長樂敖繼公謹序
