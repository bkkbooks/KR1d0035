body:
  text: 儀禮集説卷八上元敖繼公撰聘禮第八注曰大問曰聘諸侯相於久無事則使卿相問小聘使大夫周禮凡諸侯之邦交嵗相問也殷相聘也世相朝也於五禮屬賔禮繼公謂此篇主言次國大聘之禮聘禮君與卿圖事注曰圖謀也謀事者必因朝其位君南面卿西面大夫北面士東面疏曰注其位君南面以下諸侯路門外正朝不見疑當與燕射二朝面位同故以燕禮大射儀約之也遂命使者使色吏反下使者並同注曰聘使卿使者再拜稽首辭注曰辭以不敏繼公謂使者少進而北面乃拜君親命之故拜而後辭變於傳命之儀也君不許乃退注曰退反位也繼公謂君不許其辭故不答拜使者亦當許而後退既圖事戒上介亦如之注曰戒猶命也繼公謂既圖事乃戒之者以其不在圖事之數也又使者言命上介言戒亦異尊卑也如如其禮辭也使者與上介必辭者不敢以専對之才自許謙敬也凡聘使有故則上介攝其事宰命司馬戒衆介衆介皆逆命不辭注曰衆介者士也士屬司馬周禮司馬之屬司士掌作士適四方使為介逆猶受也疏曰不辭者賤不敢辭繼公謂宰命司馬戒衆介以其卑賤也不辭者自别於使者及上介且任輕亦不必辭衆介受命亦當再拜稽首宰説見大射儀宰書幣注曰書聘所用幣多少也宰又掌制國之用繼公謂周官冢宰以九式均節財用六曰幣帛之式故此主書幣也命宰夫官具注曰命之使衆官具幣及所宜齎右命使介具聘物及期夕幣注曰夕幣先行之日夕陳而視之繼公謂此云及期則上亦當有請期告期之禮文略耳夕如夕月之夕以夕時陳幣而展之故曰夕幣云此題下事也下不見者以意求之使者朝服帥衆介夕朝直遙反下並同注曰視其事也繼公謂於此云朝服者嫌朝夕之服異也下言君朝服放此管人布幕于寢門外注曰布幕以承幣繼公謂管人其有司之掌勞辱之事者與寢門外正朝也官陳幣皮北首西上加其奉于左皮上馬則北面奠幣于其前注曰奉所奉以致命者謂束帛也馬言則者此享主用皮或時用馬馬入則在幕南皮馬皆乘繼公謂陳皮不言幕上可知也北首變於執也西上放設時之位也左皮尊故加幣於其上馬入則亦右牽之北面猶北首也前謂左馬之前幕之上也此皮若馬之位其享主君者在西享夫人者在東使者北面衆介立于其左東上注曰既受行同位也繼公謂北面蓋在雉門內之右宜鄉君也卿大夫在幕東西面北上注曰大夫西面辟使者疏曰此謂處者大夫當北面今與卿同西面是辟使者繼公謂幕東南北節也宰入告具于君注曰入入路門繼公謂是時君亦立於阼階東南南鄉宰北面告之具謂所陳者已具君朝服出門左南鄉鄉許亮反出門左出路門而少東辟天子之朝位也天子日視朝當寧而立史讀書展幣書謂書享幣之數於方者也展謂詳視之下云拭圭遂執展之足以明之矣史蓋幕西東面讀書有司北面展之宰執書告備具于君授使者使者受書授上介注曰展幣畢史以書授宰宰既告備以授使者其受授皆北面繼公案注云宰既告備則經文似本無具字蓋傳寫者誤衍之也公揖入注曰揖禮羣臣官載其幣舍于朝注曰待旦行也繼公謂載謂載之於車幣亦兼皮言也古者載幣之車以人推之春秋傳曰用幣必百兩百兩必千人上介視載者所受書以行注曰監其安處之畢乃出繼公謂所受書謂上介所受於使者者也别言以行見其不與幣同處右夕幣厥明賔朝服釋幣于禰注曰告為君使也天子諸侯將出告羣庿大夫告禰而已繼公謂或言賔或言使者互見也卿大夫之服以朝服為正故入庿亦用之釋舍置也將出而釋幣于禰象生時出必告也大夫三廟惟告禰者逺辟天子諸侯也有司筵几于室中祝先入主人從入主人在右再拜祝告又再拜注曰更云主人者庿中之稱也繼公謂筵几蓋亦蒲筵漆几也室中室中之奧也筵亦東面而右几祝升自右階先入主人升自阼階從之在右在祝右也祝在左者以親釋辭於鬼神宜變於他時詔辭之位也少儀曰詔辭自右主人拜不稽首變於祭祝不拜辟君禮釋幣制玄纁束奠于几下出注曰祝釋之也丈八尺曰制二制合之束十制五合玄纁之率玄居三纁居二朝貢禮云純四只制丈八尺疏曰純謂幅之廣狹制謂舒之長短繼公謂既告乃釋幣亦辟君禮奠於几下亦縮之出亦祝先而主人從案注云玄居三纁居二蓋據魯人之贈幣言也以此幣用於神者故意其亦然魯人之贈見雜記又案注引朝貢禮云純四只者不可曉姑闕之主人立于户東祝立于牖西注曰少頃之間示有俟於神繼公謂先言主人立以其位近於户也其立東西相鄉又入取幣降卷幣實于笲埋于西階東卷九轉反笲音煩注曰埋幣必盛以器若藏之然繼公謂又入者祝及主人也祝既取幣乃與主人俱出幣必埋之者神物不欲令人褻之笲説見昏禮又釋幣于行注曰喪禮有毁宗躐行出乎大門則行神之位在庿門外西方為軷壇厚二寸廣五尺輪四尺不言埋幣可知也今時春秋祭祀有行神古之遺禮乎繼公謂將有事於道路故釋幣于行以告之亦告為君使也此釋幣之儀與室中者異故不蒙如之也遂受命注曰賔須介來乃受命也繼公謂受命謂帥介以受命於朝也言於此者明與釋幣之事相接也上介釋幣亦如之注曰如其於禰與行右釋幣上介及衆介俟于使者之門外注曰俟於門外東面北上使者載旜旜之然反注曰旜旌旗屬也載之者所以表識其事也周禮曰通帛為旜又曰孤卿建旜繼公謂此載旜為將受君命以行也使事於是乎始故以其旗表之後或張旜亦皆為事故意與此類帥以受命于朝受命于朝亦目下事之言也朝蓋指受命之處而言謂路門外也君朝服南鄉卿大夫西面北上君使卿進使者鄉許亮反此在朝固朝服矣必著之者嫌命聘使或當皮辨服也南鄉亦在路門外之左也使卿進使者重其事也使者此時蓋俟命於雉門外凡人臣非朝夕之時而欲至公所者必俟命而後入使者入及衆介隨入北面東上君揖使者進之上介立于其左接聞命注曰進之者有命宜相近也接猶續也繼公謂入入雉門而右也接聞命釋所以立于其左之意其實此時君未發命也上介必接聞命者為使者或有故則上介攝使事宜與聞之賈人西面坐啓櫝取圭垂繅不起而授宰賈音稼下並同櫝大木反繅音早注曰賈人在官知物賈者雜采曰繅所以薦玉重愼也繼公謂櫝藏玉之器也西面坐啓之則是近於君而或在其東矣繅以帛為之表玄裏纁所以藉玉而又掩其上者也垂繅謂開之也開而不掩則其繅垂授玉不起賤者宜自别也宰於其右亦坐受之宰執圭屈繅自公左授使者注曰屈繅者斂之自公左贊幣之義繼公謂屈繅以繅掩玉之上也掩之則其繅屈宰執圭屈繅則公不視之也使者受圭同面垂繅以受命注曰同面者宰就使者北面並授之既授之而君出命矣繼公謂於使者受圭公乃命之明其執此以申信也既述命同面授上介注曰述申言之也述君之言重失誤繼公謂此授受皆同面别於聘時賔主之儀也其不見者以此求之上介受圭屈繅出授賈人衆介不從注曰賈人將行者在門外北面疏曰上介授賈人訖則復入繼公謂自賈人取圭至此凡三授受或垂繅或屈繅蓋相變以為儀然亦莫不有義存焉也上介出授賈人賈人以他櫝藏之受享束帛加璧受夫人之聘璋享玄纁束帛加琮皆如初琮才宗反凡以玉帛之屬為禮其於敵以上者皆曰享束帛加璧者束帛之上加以璧也加琮亦然此二束帛即嚮之所展而官載之者至是復取而合諸璧琮以見用之之法也享束帛不言玄纁文省耳夫人之聘璋享琮謂君復以二器聘享主國君之夫人也聘享主君而并及其夫人所以見敬愛主君之至也記曰君以社稷故在寡小君足以明之矣聘君用圭聘夫人用璋享君用璧享夫人用琮尊卑之差也聘用圭璋以為信也享用璧琮以為禮也圭璋特達以其尊而幣不足以稱之也璧琮有加以其降於圭璋可以用幣又以將其厚意也聘享夫人之禮惟聘則有之諸侯相朝無是禮也周官曰瑑圭璋璧琮以眺聘遂行舍于郊為將有事於此也記曰問大夫之幣俟于郊斂旜斂藏也斂旜者上事已也至是乃斂者行時未可以變因舍而後可為之右受命遂行若過邦至于竟使次介假道束帛將命于朝曰請帥奠幣竟音境下並同注曰至竟而假道諸侯以國為家不敢直徑也帥猶道也請道已道路所當由繼公謂次介士也假道禮輕故使次介將命猶致命也此朝謂大門外將命别有辭請帥乃其後語耳奠幣者賤不敢授也下大夫取以入告出許遂受幣君許乃可受之受幣蓋亦有辭文不具耳於其奠幣未即受者不必其君意也餼之以其禮上賔大牢積唯芻禾介皆有餼大音泰下大牢並同積子賜反注曰以其禮者尊卑有常差也上賔有禾十車芻二十車禾以秣馬李微之曰賔大牢則介不得用大牢積唯芻禾則無米可見矣繼公謂以牲之生者與人曰餼其禮者賔則大牢上介則小牢羣介則特牲也米禾薪芻皆謂之積積唯芻禾是無薪與米也上賔有積上介以下未必有之此餼積唯若是所以降於主國之禮賔也然以此而待過客亦不為不厚矣餼與積皆陳於門外其餼以大牢者牽牛以致之少牢者牽羊以致之特牲則束之也亦執其紲以致之與案注末恐有脫文士帥沒其竟注曰沒盡誓于其竟賔南面上介西面衆介北面東上史讀書司馬執策立于其後注曰賔南面専威信也史讀書以敕告士衆為其犯禮暴掠也禮君行師從卿行旅從司馬主軍法者執䇿示罰繼公謂春秋傳昭六年楚公子棄疾聘晉過鄭禁芻牧採樵不入田不樵樹不采蓻不抽屋不強丐誓曰有犯命者君子廢小人降此所誓者其類之乎書謂誓辭史讀書不言東面亦可知也此當在次介假道而復命之時言於此者終上事而後及之耳右假道未入竟一肄肄以二反注曰肄習也習聘之威儀重失誤繼公謂竟謂所聘之國竟也為壝壇畫階帷其北無宫壝維癸反壇音檀畫音獲築壇而卑曰壝壇為壝壇象堂也壇卑故畫地為階必畫階者習升降之儀也帷其北象房室以為堂深之節無宫謂不為外垣亦不以他物象之也天子之禮有車宫壇壝宫帷宫諸侯未聞朝服無主無執也必言朝服者嫌肄聘儀則當如聘服也下展玉言朝服意亦類此固無主矣乃言之者嫌習禮則或當以人象之也無執不執玉帛也無主則無授受之儀故不必執之且不敢褻也徒習其威儀而已凡道路常服卿大夫則朝服士以下則玄端與介皆與北面西上與音預注曰入門左之位也繼公謂言皆與者肄時介無事嫌不必與也習享士執庭實士乃有司之主執庭實者也庭實亦無授受之事乃執之者當别於玉帛也實如內實之實此庭實謂皮若馬也對堂上之幣而言故謂之庭實習夫人之聘享亦如之習公事不習私事注曰公事致命者也疏曰私事者謂私覿私面繼公謂公事聘享與問大夫者也右習儀及竟張旜誓注曰張旜明事在此國也張旜謂使人維之繼公謂張旜者將與主國接如下文所云者是也過邦假道不張旜者使事不在彼國也或云張或云載互文耳誓之儀亦如初乃謁關人注曰謁告也古者竟上為關以譏異服識異言關人問從者幾人從才用反下凡從者皆同幾居豈反欲知其人數者所以防姦人以介對注曰聘禮上公之使者七介侯伯之使者五介子男之使者三介繼公謂以介數對則人數亦在其中春秋傳曰卿行旅從若侯伯之國也介者五人則知使者之為卿而從者五百人矣右及竟君使士請事遂以入竟注曰遂以入因道之繼公謂使者既謁關人因止於竟未敢輒入關人以告于君於是君使士請事其辭蓋曰寡君使某請事賔既對遂帥之入竟也右請事入竟斂旜亦因舍而為之乃展玉幣各有主之者至是乃復展之周慎之至也斂旜乃展者見非公事不張旜布幕賔朝服立于幕東西面介皆北面東上賈人北面坐拭圭拭音式注曰拭清也側幕而坐乃開櫝繼公謂布幕亦管人也介之位蓋在賔西南賈人則少進亦在賔之西南而在幕之東南也故下云上介北面視之退拭圭者就櫝拭之故下乃云執遂執展之上介北面視之退復位注曰言退復位則視圭進違位退圭退之者其展事畢也退則藏之於櫝與陳皮北首西上又拭璧展之會諸其幣加于左皮上上介視之退會合也亦既拭璧乃執展之不言展幣者文略耳璧會諸幣上介乃視之貶於圭且欲并視幣也退退復位也馬則幕南北面奠幣于其前亦以璧會於幣乃奠之展夫人之聘享亦如之展璋如圭展琮如璧無以異也賈人告于上介上介告于賔告之以展聘享之玉幣已畢也既告乃退璧琮與皮幣有司展羣幣以告注曰羣幣私覿及大夫者有司載幣者自展自告繼公謂有司自展既則以告上介上介亦告于賔此皮幣蓋不陳於幕辟君禮也羣幣且展之則享幣可知矣案注云及者即記所謂幣之所及者也及郊又展如初注曰郊逺郊也周制天子畿內千里逺郊百里以此差之逺郊上公五十里侯伯三十里子男十里也近郊各半之繼公案注云周制天子畿內千里者以司馬職云方千里曰國畿也云逺郊百里者以司馬法云王國百里為郊也及館展幣於賈人之館如初館舍也幣亦兼玉而言展之於賈人之館者展事將終故禮殺而由便也自入竟至此凡三展者以聘事將至而愈愼且一與主國卿大夫為禮則不暇及之矣此所以屢展而不厭其煩右展賔至于近郊張旜亦為有下事也此後不見斂旜之節至館為之可知君使下大夫請行反君使卿朝服用束帛勞勞力報反下並同請行謂請之行蓋速之也勞亦謂勞其道路勞苦殷勤之意也使卿亦以其爵也主君於朝君則親郊勞故此禮放之而以同班蓋行禮欲其稱也下凡使卿者其義皆然士請事大夫請行亦皆朝服也特於此見之耳上介出請入告賔禮辭迎于舍門之外再拜勞者不答拜賔禮辭者以其用幣也上介以賔辭告勞者復傳言而入賔乃出迎若士請事大夫請行則上介出請入告而賔即出拜于門外不迎之以入以其不受幣也上不言出請入告而於此言之者禮簡者其文或略禮繁者其文必備經之例然爾賔揖先入受于舍門內舍音赦惟云舍門是舍但有一門耳此公館之異者也先入門而右北面勞者奉幣入東面致命入入門左致命致其君命也賔北面聽命還少退再拜稽首受幣勞者出還音旋注曰少退象降拜疏曰歸饔餼大夫東面致命賔降階西再拜稽首是此象之也又訝受法歸饔餼時堂上北面受幣此在庭亦當北面訝受幣勞者南面可知也繼公謂賔入門即北面至是乃言之者亦因事而見之耳受幣蓋在庭中西下言歸饔餼之禮賔升堂北面聽命受幣于堂中西此雖受幣於庭亦皆當放之授老幣出迎勞者勞者出俟於門外上介出請勞者告事畢上介入告賔乃出迎之而告以欲儐之之辭老説見士昏禮勞者禮辭賔揖先入勞者從之乘皮設乘繩證反下並同注曰設於門內也物四曰乘皮麋鹿皮也疏曰庭實當參分庭一在南設之今以儐勞者在庭故設於門內也繼公謂賔先入西面勞者從入東面乘皮設亦宜在門內之西其於勞者之南與賔用束錦儐勞者儐必刃反聘禮凡大夫士所用之幣皆以錦蓋不敢與尊者之幣同因事而用幣於賔謂之儐所以見殷勤也勞者再拜稽首受稽首者因賔嚮者受幣之禮以相尊敬也後多類此受幣蓋當門中南面賔北面授既受則東面俟此受郊勞儐使者皆於門內與周官異司儀職言諸公侯伯子男之臣相為國客其於大夫郊勞之禮云登聽命下拜登受又云儐使者如初之儀是皆於堂也賔再拜稽首送幣注曰受送拜皆北面象階上繼公案注云受送拜者謂受者送者之拜也象階上者謂放儐于堂之禮也勞者揖皮出乃退賔送再拜注曰揖皮出揖執皮者而出示親受繼公謂勞者已執幣不可以復執皮故揖執皮者欲其為已執之以出也公食大夫禮曰賔北面揖執庭實以出然則此亦北面揖之矣出則幣與皮各有受之者不言者可知也夫人使下大夫勞注曰使下大夫下君也繼公謂夫人使勞之者以其亦奉命而聘享已也以二竹簋方玄被纁裏有蓋簋音軌注曰竹簋以竹為之狀如簋而方如今寒具筥筥者圜此方耳繼公謂竹簋而方變於食器也古者盛黍稷之簋以瓦為之後或用竹制亦不方是其異於此者也其實棗蒸栗擇兼執之以進蒸孰之也擇治之謂去其皮也兼執之者左手執棗右手執栗與士虞禮曰主婦自取兩邊棗栗設于會南棗在西北面設兩邊而棗在西亦足以見其所執之左右矣賔受棗大夫二手授栗注曰授受不遊手愼之也疏曰遊手謂遊暇一手繼公謂賔受棗二手共受之既則以右手受栗此亦訝受賔之受如初禮注曰如卿勞之儀儐之如初君使以束帛夫人使以棗栗勞賔賔儐之皆以束錦乘皮者亦輕財重禮之意也右請行郊勞下大夫勞者遂以賔入注曰出以束錦授從者因東面釋辭請道之以入繼公謂入入國門也賔不拜送者辟諸侯於天子使者之禮也至于朝主人曰不腆先君之祧既拚以俟矣祧吐條反拚方問反注曰賔至外門下大夫入告出釋此辭主人者公也不言公而言主人主人接賔之辭繼公謂守祧掌守先王先公之廟祧其遺衣服藏焉又云其庿則有司修除之其祧則守祧黝堊之然則祧者庿堂以北之稱也拚灑掃也受聘於庿故其言若此蓋緣賔意欲速達其君命也賔曰俟間間音間間暇也言此者謂已雖欲速達君命亦不可不俟主人之暇乃為之是亦緣主人意而言也大禮而倉卒受之非人情右至朝大夫帥至于館卿致館賔言俟間然後致館亦尚辭讓也大夫即嚮者以賔入者也帥亦謂道賔賔至于館則入矣致如致爵之致致館謂以君命致此館於賔也賔迎再拜卿致命賔再拜稽首卿退賔送再拜致命者致其君致館之命也致命於門外者以無幣也致館不以幣而在門外亦與周官異司儀職言公侯伯子男之臣相為國客致館如郊勞之儀是亦於堂也右致館宰夫朝服設飧飧音孫宰夫士也以奉君命故亦朝服徒有食而無他饌謂之飧傳曰盤飧置璧是也徒食食亦曰飧玉藻曰不食肉而飧是也二者所指雖殊義則同耳此禮用大牢其上有簠簋豆鉶之屬乃云飧者主人之謙辭所以甚言其菲薄也故禮亦因以為名云飪一牢在西鼎九羞鼎三腥一牢在東鼎七注曰庭中之饌也飪孰也鼎西九東七凡其鼎實與其陳如陳饔餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪繼公謂牢大牢也大牢者牛羊豕各一也飪鼎九腥鼎七乃皆云牢者主於牛羊豕也飪在西腥在東以西為尊也腥減二鼎亦明其輕於飪也此飧牢二不視其饔餼之死牢者别於朝君之禮也堂上之饌八西夾六注曰八六者豆數也凡饌以豆為本堂上八豆八簋六鉶兩簠八壺西夾六豆六簋四鉶兩簠六壺其實與其陳亦如饔餼門外米禾皆二十車注曰禾稿實并刈者也米陳門西禾陳門東繼公謂皆二十車者大夫飧禮其米禾皆視其牢牢十車朝君之飧禮則米禾共視其牢也凡飧皆無生牢薪芻倍禾注曰各四十車凡此之陳亦如饔餼上介飪一牢在西鼎七羞鼎三堂上之饌六門外米禾皆十車薪芻倍禾注曰鼎七無鮮魚鮮臘衆介皆少牢少詩照反下少牢同注曰亦飪在西鼎五繼公謂少牢五鼎羊豕魚臘膚與饋食之鼎同也此少牢故無堂上之饌右設飧厥明訝賔于館訝五嫁反注曰此訝下大夫也以君命迎賔謂之訝訝迎也亦皮辨賔皮辨聘至于朝賔入于次注曰入于次者俟辦也次在大門外之西以帷為之繼公謂皮辨者放其君相朝之服也朝聘必用皮辨服者宜加於其朝服一等也侯國君臣日朝朝服視朔乃皮辨服乃陳幣注曰有司入于主國庿門外以布幕陳幣如展幣焉圭璋賈人執櫝而俟繼公謂惟幣陳之圭璋璧琮皆在櫝也事至乃出焉右賔至朝卿為上擯大夫為承擯士為紹擯承紹云者皆有為之先之辭周禮言天子之擯者其於上公則五人於侯伯則四人於子男則三人皆以朝者之爵為差也此但言上擯承擯紹擯而不言其人數則是諸侯之擯者三人而已不以已爵及朝聘者之尊卑而異所以别於天子也此擯者雖有三人惟上擯專相禮事乃必立承紹者所以别於諸臣之禮也擯者出請事擯者上擯也云請事則為上擯可知故不必質言之而但云擯者也下文放此請事云出則擯者常近於君所矣請事之辭蓋曰寡君使某請事是時賔即位于西方東面介立于其東南北面西上擯者東方西面請事賔對擯者乃入告于公矣諸侯相朝則上擯傳主君之命以請于上介上介以告于朝君又以朝君之命告于上擯所謂交擯也聘賔臣也故親對而不交擯云出請事而不云入告省文也後多類此公皮辨迎賔于大門內大夫納賔注曰公不出大門降於待其君也公迎賔卿大夫以下入庿門即位而俟之繼公謂於此乃迎賔于大門內則是擯者出請事之時公猶未出中門也大門內者其在門右西面與此大夫亦謂上擯也云納賔則為上擯可知故變言大夫與卿為上擯之文互見以明卿亦謂之大夫也此與上經言擯者之意略同皆錯綜其文以見義爾左氏傳於列國大夫或見其名或見其字與諡蓋得此法也納賔亦西面鄉之闕其辭曰寡君須矣吾子其入也既則道之以入於公之迎賔也諸擯皆從之上擯出納賔而承擯紹擯則皆立于門東北面賔入門左注曰衆介隨入北面西上少退繼公謂賔入門左而東面鄉公介亦立于其東南北面西上上擯亦入門而右玉藻曰賔入不中門不履閾又曰公事自闑西亦謂此時也公再拜賔辟不答拜辟音避賔入門左而公乃拜之是西面拜迎於入門右之處明矣公迎大夫乃再拜者尊國賔也相見禮主人於降等者不出迎一拜其辱公揖入每門每曲揖諸侯三門庫雉路則庫門為大門左宗庿右社稷入大門東行而至庿此每門指閣門與庿之中門而言也諸侯有五庿大祖之庿最東髙祖而下之庿以次而西庿各有大門有中門有庿門中門外西邊皆有南北隔牆牆中央通閣門故入諸侯之庿必有每門也每門揖者主人至每門則揖而先入也每曲揖者於曲處則揖而折行也天子之庿各有五門與其寢同是諸侯亦有三門也康王受顧命於庿出庿見諸侯乃云王出在應門之內則天子諸侯庿門之名數可見矣天子五門臯庫雉應路路門寢門也其於庿則曰庿門及庿門公揖入立于中庭庿未詳其為何庿以差言之則受天子之聘宜於太庿受諸侯之朝若聘其於髙祖而下者與公揖賔而入禮之也凡主人與賔揖而入門者有二義俱入則為道之自入則為禮之公先入俟賔於內也擯者隨公鴈行而入負東孰東上中庭東方南北之中入而俟賔於此尊也若敵者則俟於門內公立蓋西面賔立接西孰接西孰者在其南而東面也立於此俟時而執玉也介立于其西南東面北上右迎賔几筵既設擯者出請命注曰几筵司宫於依前設之席西上周禮諸侯祭祀席蒲筵繢純右雕几繼公謂賔至庿門乃設几筵者君禮也請命者請致其君命也案注似脫加莞席紛純五字賈人東面坐啓櫝取圭垂繅不起而授上介玉尊不與幣同陳故事至乃取之上介受圭於其左亦東面上介不襲執圭屈繅授賔襲而執圭者惟賔與主人行禮者二人耳故上介不襲而執之必言之者嫌聘時執玉者必襲也授賔東面於其右賔襲執圭襲謂襲上衣不見裼衣也聘以圭為尊吉服以襲為異玉藻曰服之襲也充美也又曰禮不盛服不充襲而執圭以行禮欲其稱也不言垂繅可知也擯者入告出辭玉注曰入告公以賔執圭繼公謂辭之者以其禮太崇也此辭亦禮辭耳賔對則擯者復以入告而出納賔也辭對之言則春秋傳有焉見文公十二年納賔賔入門左賔此時猶待納而後入以其臣也介皆入門左北面西上玉藻曰君入門介拂闑大夫中棖與闑之間士介拂棖言朝君之儀也此聘賔入自闑西則上介亦由棖闑之間士介亦拂棖矣司儀職曰及庿門惟君相入亦與此異三揖注曰君與賔也繼公謂於賔入門左而揖參分庭一在南而揖又皆行而至於參分庭一在北而揖是三揖也賔至西方之中庭公乃與之偕行至于階三讓公必讓升者賔之也公升二等賔升西楹西東面公升二等賔乃升臣也下云公左遷北鄉則此時公升堂西鄉可知西楹西言其東西節也當在楹西少北擯者退中庭注曰嚮公所立處繼公謂至是而退於中庭則是嚮者從公而立於階下矣凡公與賔為禮擯者皆贊之賔致命注曰致其君命公左還北鄉擯者進公當楣再拜還音旋鄉許亮反下同注曰進阼階西當釋辭於賔相公拜也繼公謂必退乃進者禮以變為敬公必待擯者進之然後拜尊者之禮尚多儀也下放此左還乃當楣則公嚮者亦當東楹少北矣以此見賔立之處必不正在楹西也此拜為將受玉賔三退負序與尊者授受於堂禮重故其儀如此公再拜之間賔凡三退見其頃刻不敢安也三退則負序而立矣此拜雖非為己然猶不敢自安若是敬之至也公側襲受玉于中堂與東楹之間注曰側猶獨也他日公有事必有贊為之者中堂南北之中也疏曰大射云公卒射小臣正贊襲是贊為之繼公謂側襲尊賔也襲不著其所是於拜處為之也此受玉之儀公西面賔東面授也東楹之間四分楹間一在東也凡堂上授受贄幣之禮敵者則在兩楹之間主人尊則於東賔尊則於西又皆以逺近為差此聘君於主君其尊同聘君之命宜降於主君一等故使者就主君於東楹之間而授玉也中堂者其凡授受贄幣者南北之節與擯者退負東孰而立注曰反其位無事繼公謂負東孰則其位在士之東矣賔降介逆出賔出注曰逆出由便公側授宰玉注曰授於序端繼公謂授玉於上公尊也下放此公受玉時亦垂繅宰既受之則屈繅矣裼降立裼先歷反注曰裼者免上衣見裼衣玉藻曰裘之裼也見美也又曰麛裘青犴褎絞衣以裼之論語曰素衣麛裘皮辨時或素衣其裘同可知也裘者為溫表之為其褻也寒暑之服冬則裘夏則葛降立亦於中庭疏曰凡服四時不同假令冬有裘襯身單衫又有襦襦上有裘裘上有裼衣裼衣上又有上服皮辨祭服之等若夏則有絺綌絺綌上有中衣中衣上復有上服也繼公謂裼者偏免上衣而見裼衣也此裼亦左為之與朝祭之衣以裼為常故當盛禮則襲以為敬而盛禮畢則裼而復其常也凡裼衣不必與上衣同色右聘擯者出請賔裼奉束帛加璧享擯者入告出許請即所謂請命也璧降於圭故裼而奉之以行禮即許之也既受其大則不必辭其細也賔出則裼矣言於此者亦因事見之許許其入也其辭蓋如納賔庭實皮則攝之毛在內內攝之入設也攝並之涉反下同注曰皮虎豹之皮內攝之者兩手相鄉也入設亦參分庭一在南言則者或以馬也凡君於臣臣於君麋鹿皮可也繼公謂入設亦設於西方而西上攝説見士昏禮賔入門左揖讓如初此時介亦入門左升致命張皮注曰張者釋外足見文也公再拜受幣其儀亦如初惟不襲耳幣亦兼玉而言下放此士受皮者自後右客注曰從東方來由客後西居其左受皮也繼公謂受者自後右客則客既授亦自後而出皆與受馬之儀相變也賔出當之坐攝之注曰象受于賔繼公謂賔降而當皮之西士乃坐攝之公側授宰幣皮如入右首而東右當作左字之誤也士昏禮皮左首此亦宜然入時不言左首故於此因見之東適東壁也亦逆退此庭實之儀當與昏禮參考右享聘于夫人用璋享用琮如初禮注曰如公立于中庭以下繼公謂聘享皆致聘君之命也夫人不可以親受君代受之其受之之禮則皆與已之所受者同以夫妻一體也不言束帛加琮省文耳右聘享于夫人若有言則以束帛如享禮注曰有言有所告請若有所問也記曰有故則束帛加書以將命是也無庭實繼公謂若有言因聘以達之故卒聘而後行此禮也此如秦伯使西乞術來聘且言將伐晉之類右因聘有言擯者出請事賔告事畢注曰公事畢繼公謂上云請命此云請事者以其將命之禮已畢故也賔奉束錦以請覿覿音狄覿卑見尊之稱也公事已畢欲伸其私敬也奉君命而使則其覿禮宜與他時見于國君者不同故不用其贄而用幣與庭實也擯者入告出辭辭欲其後之也賔既將公事主人宜先盡其待賔之禮賔乃可行其私事也不辭其覿者已受其君禮則不必辭其臣禮也請禮賔賔禮辭聽命擯者入告注曰告賔許也繼公謂請禮之禮當作醴字之誤也是禮主於醴故雖用幣猶以醴名之此請醴之辭蓋曰子以君命辱於敝邑寡君有不腆先君之禮請醴從者賔曰使臣既得將命矣敢辭曰寡君固曰不腆敢固以請曰某辭不得命敢不敬從宰夫徹几改筵徹直列反徹几筵入于房而改設賔席也賔席東上公食大夫記曰蒲筵常緇布純加莞席尋玄帛純皆卷自末宰夫筵出自東房公出迎賔以入揖讓如初注曰公出迎者已之禮更端也繼公謂出出庿門也公於門內之揖不盡與嚮者同處乃云如初者見其亦三揖耳公升側受几于序端公升亦如初也公與賔升皆北面當楣而立不拜至醴賔之禮當拜至此不者其辟朝君之儐禮歟周官司儀言諸侯相朝之禮云登再拜下云儐亦如之則其儐禮拜至可見矣宰夫內拂几三奉兩端以進注曰漆几也內拂几不欲塵坌尊者以進自東箱來授君繼公謂內拂几以袂內鄉而拂之也先言拂乃言奉是拂時几猶在地也未至公所而內拂几敬也奉兩端謂橫執之凡執几皆橫執之惟設時乃縮也宰夫橫執几而奉兩端别於賔主也賔主授受則各執一廉進進于序端南面以授公公東南鄉外拂几三卒振袂中攝之進西鄉攝如字鄉並許亮反注曰攝持也繼公謂宰夫既拂几公又親重拂之敬也卒謂既拂也振袂去塵也中攝之謂二手於几之中央攝之也授几而中攝之亦君禮異也進西鄉于筵前賔是時猶在西階上北面擯者告注曰告賔以公授几賔進訝受几于筵前東面俟俟公拜宜鄉之下放此公一拜送賔以几辟辟音避一拜者送几之常禮必著之者以賔答再拜稽首嫌此拜為再拜也公及賔拜或不言北面者可知也北面設几不降階上答再拜稽首公一拜而賔答再拜稽首者公尊也乃先拜而送几故賔當以此答之不降者辟盛禮也此醴賔之禮以用幣之時為盛宰夫實觶以醴加柶于觶面枋宰夫酌醴面枋而並授贊者授觶之正禮也説又見士冠禮公側受醴受醴不言序端者如受几可知公既受醴亦進筵前西北面賔不降一拜進筵前受醴復位公拜送醴一拜亦受醴之通禮必著之者嫌賔拜當再拜稽首也賔於公乃不降而一拜亦辟受幣之儀也授几授醴其禮均而賔之拜不同者彼答公拜此則先拜不無輕重也位西階上北面位宰夫薦邊豆脯醢賔升筵擯者退負東孰必言籩豆者經蓋見一脯一醢之器也擯者退負東孰者是時賔方有祭薦祭醢啐醴之儀其事稍久故於此俟之擯者至此方退則是送几授醴之類皆擯者告之矣經不盡見之也凡擯者之退近則中庭逺則負孰皆視後事之久速以為節賔祭脯醢以柶祭醴三庭實設注曰庭實乘馬繼公謂賔祭醴而庭實設以為節也下公用束帛及擯者進之節皆放此庭實亦設于西方西上降筵北面以柶兼諸觶尚擸坐啐醴擸音葉注曰降筵就階上繼公謂以柶兼諸觶以右手執柶并執觶也尚擸以擸鄉上也必以柶兼諸觶者欲便於啐醴也必尚擸者欲便於建也北面於階上乃兼之則是先時亦加柶於觶矣公用束帛注曰亦受之于序端繼公謂醴賔而用束帛庭實所以將厚意亦如儐禮也建柶北面奠于薦東上言兼柶尚擸則此建柶亦尚擸明矣故不言扱奠奠觶也擯者進相幣相息亮反注曰為君釋辭於賔繼公謂相幣贊其授受之禮賔降辭幣辭者謂既受賜矣不可以又辱盛禮公降一等辭辭者止其降且不許其辭栗階升聽命注曰升聽命釋許辭降拜拜為將受幣公辭公先已降一等故於此不降升再拜稽首受幣當東楹北面退東面俟當東楹當其北也其南北亦中堂受幣當東楹其視為君將幣者又過東矣俟俟送幣公一拜賔降也公再拜公一拜而賔即降不敢安受尊者之拜因辟之而遂降也賔已降而公猶再拜者送幣之禮當然宜終之也此皆所以相尊敬也賔執左馬以出注曰牽馬者并左右靮授之餘三馬主人牽者從出也繼公謂左馬者上也故賔親執之然則主人之庭實亦設於西方而西上也主人庭實之位乃如賔者因賔禮也左執幣乃北面右執馬右還而出凡賔受主人禮其於庭實可以執則執之與主人之受禮異也賔出而公降立上介受賔幣從者訝受馬從者蓋賔之私臣也受馬云訝則幣並受矣並受幣訝受馬皆變於賔主授受之禮也四馬皆訝受者賔既執左馬則餘馬已悉為賔物公之士代之牽出耳故從者與受之於賔同右醴賔賔覿奉束錦總乘馬二人贊入門右北面奠幣再拜稽首注曰覿用束錦辟享幣也贊者居馬間扣馬也疏曰二人贊者各居兩馬間各用左右手扣一匹也北面奠幣衆授時亦北面也繼公謂此亦擯者出請入告而出許不言者可知也總謂以物合乘馬之入轡而束之也二人自牽之乃云贊者言代賔為之所以見庭實後入之意也入門自闑東入也玉藻曰私事自闑東謂此爾下介禮同不以客禮見故庭實在後且奠幣於入門右之位而不敢授也賔再拜稽首而公不答拜者不受此禮也擯者辭辭其用卑者之禮賔出以覿事畢而不受其辭也擯者坐取幣出有司二人牽馬以從出門西面于東孰南注曰贊者有司受馬乃出凡取幣于庭北面繼公謂有司牽馬亦二人者不可多於賔之贊也西面于東孰南鄉賔也然則賔之外位常接西孰矣牽馬者蓋在擯者之南少退擯者請受受謂公欲親受其辭蓋曰寡君使某請受賔禮辭聽命注曰賔受其幣贊者受馬牽馬右之入設注曰庭實先設客禮也右之欲人居馬左任右手便也於是牽馬者四人事得伸也曲禮曰效馬效羊者右牽之繼公謂云右之明牽者四人也二人受於有司而後四人牽之用四人則左先隨入而設於西方賔奉幣入門左介皆入門左西上注曰以客禮入可從介繼公謂此以客禮入則當自闑西玉藻所云私事自闑東者但據始覿而言也上介禮放此公揖讓如初升公北面再拜公升即當楣北面賔升西楹西東面公乃再拜公升不西面者以賔不稱覿也不稱覿降等者之禮也亦以其嚮已奠幣拜於入門右之位故爾賔三退反還負序還音旋注曰反還者不敢與授圭同繼公謂反還者反西面而復東鄉也三退而反還愈不敢安矣聘時執玉故不敢反還振幣進授當東楹北面此已禮也故振幣去塵乃授君以示敬士授馬者自前還牽者後適其右受還音患注曰適牽者之右而受之也疏曰馬生物恐驚之故由前是變於受皮繼公謂自前而適其右受皆變於受皮且便其已授則自前而去也牽馬者自前西乃出自前西者稍進而前乃西行又南行而出也已授而出必自前者其放受者自前而來之儀乎賔降階東拜送君辭拜於西階東别於已君也凡臣於異國之君其拜下者皆不當階拜於階下者已臣也拜君命亦然拜也君降一等辭注曰君辭之而賔猶拜也繼公謂辭者止其又拜擯者曰寡君從于雖將拜起也君降一等辭而賔又將拜故擯者云然從謂從賔而降也公降一等耳乃曰從者君為臣降一等與敵者沒階之禮同也此禮擯辭多矣未有著之者是時賔主相接歡敬兩盡故特見之食禮亦然栗階升公西鄉賔階上再拜稽首鄉許亮反公西鄉即俟拜之位也賔升即拜又不言成拜則是嚮者賔亦以擯者辭之之故而不終其拜於下也公少退注曰為敬繼公謂君尊乃少退辟之者答其反還之意也賔降出公側授宰幣馬出馬出而皮之亦相變於賔之降也介亦逆出公降立右賔私覿擯者出請上介奉束錦士介四人皆奉玉錦束請覿注曰玉錦後言束辭之便也繼公謂玉錦錦之文纎縟而白者也士介之錦反文於賔與上介者以無庭實故也玉錦後言束亦玄纁束之類擯者入告出許上介奉幣儷皮二人贊儷音麗注曰上介用皮變於賔也繼公謂每人執一皮而云贊意與上同賔卿也私覿之庭實用乘馬上介大夫也用儷皮士介不用庭實此固禮之差等然亦因其祿之厚薄而為之品節焉禮意人情並行無間於此見之矣皆入門右東上奠幣皆再拜稽首注曰皆者皆衆介也繼公謂皆者皆上介及衆介也其行之序則上介先贊皮者並而從之衆介又次之其立之序則上介在東衆介次而西贊皮者北面立于上介之後此位雖東上而皮則亦左首也於介之奠幣也贊皮者奠皮而先出上介士介尊卑異乃同覿者尊君不敢自分别且辟賔禮也上介若特入則正與賔初覿之禮同擯者辭介逆出其意皆與賔禮同擯者執上幣士執衆幣有司二人舉皮從其幣出請受其幣上介之幣也二人舉皮亦並行而出出請受者言其出為請受也委皮南面注曰委皮當門繼公謂執皮者從上擯出門不俟上擯之釋辭即委皮而退執衆幣者於是由皮東而進委皮不於東孰南辟執衆幣者且變於馬也執幣者西面北上擯者請受注曰請于上介也繼公謂不言東孰南可知也介禮辭聽命皆進訝受其幣聽請受之命者上介也而士介亦皆訝受其幣者此時統於尊者而不敢異之也介既受幣贊者乃南面取皮上介奉幣皮先入門左奠皮注曰皮先者介隨執皮者而入也入門左介至揖位而立繼公謂皮先執皮者先上介而入也是時儷皮隨入而左先也奠皮而不敢授示逺下於賔介奉幣而皮入介入門左而奠皮節也奠皮之處亦參分庭一在南公再拜注曰拜於中庭也繼公謂公拜蓋西面也下放此介振幣自皮西進北面授幣退復位再拜稽首送幣進者北行將至中庭與公稍相當乃東行及公左而北面公還南面受幣也此發於入門左之位而云自皮西進則是凡庭實皆設于西方參分庭一在南明矣介退公復西鄉介拜亦北面不受於堂者公尊則介禮宜逺别於賔也介出宰自公左受幣公不離位宰就而受之殺於賔禮也云自公左則受之於公可知文主於受者故不言側有司二人坐舉皮以東有司至是乃舉皮亦異於受皮之節也擯者又納士介納之之辭亦與納賔同士介入門右奠幣再拜稽首注曰終不敢以客禮見繼公謂終不敢以客禮見者以嚮者惟上介聽命故也此與初禮同乃復為之者以既受幣復入則禮更端也擯者辭介逆出擯者執上幣以出禮請受賔固辭注曰禮請受者一請受而聽之也繼公謂公於士介亦辭之者以其非已臣也奠幣者四人擯者惟執其上幣以出又但禮請受而已皆殺於上介也請者西面請於士介固辭者決不從命之稱也以其決不從命故士介賤則不敢辭而賔為辭之一辭而得遂亦可謂之固記放此公答再拜擯者出立于門中以相拜相息亮反注曰擯者以賔辭入告還立門中閾外公乃遙答拜也相者贊告之繼公謂公嚮欲親受幣故不受其奠幣之拜士介終不敢授公乃答之公是時拜於東方之中庭而介位在門外之西則擯者相拜宜西北面也司儀云凡行人之儀不朝不夕不正其主面亦不背客謂此類也士介皆辟注曰辟於其東面位繼公謂必著此者嫌旅拜之於內則在外者不必辟也辟者所以為敬且明其拜之主於已也士三人東上坐取幣立注曰俟擯者執上幣來也擯者進注曰就公所也繼公謂進至中庭以上幣示公宰夫受幣于中庭以東受幣受上幣於擯者執幣者序從之士三人從宰夫也右介私覿擯者出請賔告事畢賔既告事畢衆介亦逆出而賔從之也擯者入告公出送賔公出三擯亦序從之及大門內公問君賔對公再拜公問大夫賔對注曰賔至始入門之位衆介亦在其右少退西上時承擯紹擯亦於門東北面東上上擯往來傳君命問君曰君不恙乎對曰使臣之來寡君命臣于庭拜拜其無恙公拜賔亦辟問大夫曰二三子不恙乎對曰寡君命使臣于庭二三子皆在繼公謂嚮者行禮之時各有其節不可亂之故問勞之事至是乃為之也及大門內則賔東面公西面而問之周禮云客再拜對與此微異是時上擯往來傳命承擯紹擯亦負東孰公勞賔賔再拜稽首公答拜公勞介介皆再拜稽首公答拜勞力報反下並同注曰勞賔曰道路悠逺客甚勞勞介則曰二三子甚勞賔出公再拜送賔不顧不顧公之拜而去亦辟之義凡主人拜送賔賔皆不顧經不盡見之也於此見之者明於尊者之禮如此則其餘可知賔請有事于大夫公禮辭許注曰請問卿也上擯送賔出賔東面而請之擯者反命告之繼公謂有事謂問之也此蓋據賔所請之辭而言故不曰問也大夫者卿也下大夫嘗使至者亦存焉將問大夫乃先請之於其君者明其以君故而問之也不於內遂請之者尊者之禮未終不宜以卑者之事亂之也賔請公辭許皆擯者傳之右賔出公送儀禮集説卷八上欽定四庫全書儀禮集説卷八下元敖繼公撰聘禮第八賔即館注曰即就也卿大夫勞賔賔不見見賢遍反注曰以己公事未行上介以賔辭辭之繼公謂其勞以爵之高下為先後不同時不見猶不出也下放此案注云公事請問卿大夫之禮也公事未行故不敢當其勞已之禮而不見也大夫奠鴈再拜上介受大夫兼卿言也又考此篇凡於卿所為之事但發端言卿以見其爵而已其後則惟言大夫不復言卿也是其例然爾故此大夫亦得兼卿言也大夫即於館之外門外東面奠之上介受之亦東面卿勞賔用鴈者變於相見也大夫用鴈亦非以其贄之義因卿禮耳勞上介亦如之勞之於其館上介亦不見士介為受鴈也此卿亦執鴈以勞上介亦非尊者降用卑者之贄之義但因賔禮耳右卿大夫勞賔介君使卿韋辨歸饔餼五牢饔音雍韋辨即爵辨也其服純衣纁裳韎韐纁屨韋辨加於皮辨而歸饔餼用之者變於聘服且敬也上介請事賔朝服禮辭注曰朝服示不受也受之當以尊服有司入陳賔禮辭而許乃入陳也饔注曰謂飪與腥繼公謂殺牲而割亨焉曰饔周官內外饔皆掌割亨之事斯可見矣是禮有飪有腥乃曰饔者主於飪而言也飪一牢鼎九設于西階前陪鼎當內廉東面北上上當碑南陳牛羊豕魚臘腸胃同鼎膚鮮魚鮮臘設扄冪膷臐膮蓋陪牛羊豕鮮並音仙下同膷音香臐許云反膮許堯反注曰膷臐膮陪鼎三也牛曰膷羊曰臐豕曰膮皆香美之名今時臛也陪之庶羞加也膚豕肉宫必有碑所以識日景别陰陽也繼公謂先言飪上之也設饔先於西方統於客也客謂大夫奉君命者凡饔餼之牢雖有多寡而飪惟一牢則同耳是以少者為貴也然鼎九且有陪鼎則又以其貴故加而異之也內廉西階之東廉也陪鼎當內廉而不正設於階前者明其加也上當碑謂牛鼎膷鼎南北之節也飪鼎以牛為上陪鼎以膷為上古者宫庭有碑蓋居其庭東西南北之中所以識深淺也蓋發語辭云陪牛羊豕明其鼎相當也腥二牢鼎二七無鮮魚鮮臘設于阼階前西面南陳如飪鼎二列鼎二七降於子男也周官掌客言子男饔餼云腥十有八無鮮魚鮮臘加者可殺也如飪亦如其北上上當碑也設鼎于階前皆辟堂塗其在西階前者宜少東此則宜少西也堂上八豆設于户西西陳皆二以並東上韭菹其南醓醢屈醓他感反注曰户室户也東上變于親食賔也並併也醓肉汁也醓醢醢有醓繼公謂二以並者八豆皆兩兩而設也東上者每列以東者為尊也韭菹其南醓醢見其為二以並之位也八豆惟言韭菹醓醢則為朝事之豆可知文省耳云屈者言設餘豆之法也醓醢西昌本昌北麋臡臡西菁菹菹南鹿臡臡西茆菹菹北麋臡曲折而下所謂屈也設豆不綪而屈亦歸禮之異者八簋繼之黍其南稷錯七各反八簋黍稷各四也簋繼豆上簋黍在北稷在南次西次北餘皆如豆之屈乃變言錯者取其二物相間之意六鉶繼之牛以西羊豕豕南牛以東羊豕注曰鉶羹器疏曰此䋫也兩簠繼之粱在北簠不次簋者粱稻加也凡加饌必别於正饌粱在北上也凡米與食則粱尊於稻醴與酒則稻尊於粱以西夾饌位例之則自簋以下亦皆西陳也八壺設于西序北上二以並南陳八壺之酒稻也黍也粱也稻黍各二壺稻在北黍次之粱四壺又次之蓋如設筥米之例云北上南陳統於豆也堂上之饌皆屬飪牢西夾六豆設于西墉下北上韭菹其東醓醢屈六簋繼之黍其東稷錯四鉶繼之牛以南羊羊東豕豕以北牛兩簠繼之粱在西皆二以並南陳六壺西上二以並東陳此饌屬腥牢也西夾西夾室也東西室皆云夾者以與正室夾房而立名也六壺者稻酒黍酒粱酒各二壺也壺不著其所蓋亦近於簠而設之與在堂上者之位相似下放此饌于東方亦如之西北上壺東上西陳注曰東方東夾室西北上亦韭菹其東醓醢屈繼公謂東方東夾東墉下也西北上言韭菹亦在饌之西北也此東夾之饌亦屬腥牢也腥鼎皆西面北上故東西夾室之饌皆西北上飪鼎東面北上故堂上之饌東北上各順之也屬飪者於堂上屬腥者於夾室亦異尊卑也夾室之饌先西後東是腥牢亦以西者為尊矣凡鼎俎恆竒豆簋之屬恆偶而鼎自三以上則豆簋之數率降於鼎者一鈃之數率降於豆簋者兩故此飪鼎九則堂上之饌八而鈃六腥鼎七則東西夾之饌六而鈃四也一牢則兩簠故堂上兩夾之數同醯醢百甕夾碑十以為列醯在東甕烏弄反百甕醯醢各半也云夾碑是居於鼎之中央而上者少北於鼎矣此居於鼎之中央是總為腥飪設之也醯在東醢為尊也設甕之位飪在西腥在東足以見所尚矣餼二牢陳于門西北面東上牛以西羊豕豕西牛羊豕注曰牛羊右手牽之豕束之寢右亦居其左繼公謂餼陳于內者以堂上庭中皆有所陳宜與之相近且門外有米禾薪芻之車在焉亦不足以容此餼禮故也二牢為一列變於腥亦以惟有牢故也東上門西之位然也亦變於饔案注云寢右言其東上而西足也米百筥筥半斛設于中庭十以為列北上黍粱稻皆二行稷四行筥居吕反行並户郎反注曰東西為列列當醯醢南亦相變也繼公謂此米從餼者也餼陳於內故米宜從之饔有醯醢餼有筥米盛大禮也中庭乃東西之中繼餼而言故指其所以明之其南北之節宜於庭少南黍稻粱皆二行而稷獨四行者以其下也故多之以足百筥之數掌客職言待侯伯之禮醯醢百甕米百筥此侯伯之卿其米與醯醢之數乃與其君同然則公與子男之卿亦可知矣凡米以黍為上稷為下於此見之矣食則以黍為上稻為下酒則稻為上粱為下而不用稷蓋稷不可以為酒故也門外米三十車車秉有五籔設于門東為三列東陳禾三十車車三秅設于門西西陳籔所主反秅都故反注曰秉籔秅數名也籔讀若不數之數繼公謂大夫饔餼之禮其米禾皆視死牢故禾三十車焉若朝君則取數於生牢死牢雜也經凡言某陳者皆謂其下鄉之也此云東陳是西轅也西陳者反是云為三列每列皆南北為之前列在西後二列以次而東也禾不云三列可知也其列則先東而後西薪芻倍禾注曰倍禾者以其用多也薪從米芻從禾凡此所以厚重禮也聘義曰古之用財不能均如此然而用財如此其厚者言盡之於禮也盡之於禮則內君臣不相陵而外不相侵故天子制之而諸侯務焉爾疏曰薪可以炊爨故從米陳之芻可以食馬故從禾陳之繼公謂倍禾謂車數也獨言倍禾者以其相類而相等故也此唯言倍禾而已不見其設之之法則是二者之車亦各為三列而其陳亦皆如米禾之車與賔皮辨迎大夫于外門外再拜大夫不答拜注曰大夫使者卿也繼公謂賔不韋辨而皮辨者嫌其加於已致君命時之服也揖入注曰賔與使者揖而入及庿門賔揖入及庿門大夫立接西孰賔揖而先入俟之于入門右之位既則上介出請命矣記曰卿館於大夫經云及庿門是賔館於大夫之庿也明矣庿者其禰庿乎是篇言入庿之儀詳矣獨於此入庿不云每曲揖是不自主人之寢外門入也蓋古者之庿亦自有外門與寢之外門同無事則閉之今賔館於此乃開之以便賔之出入故自是而入庿無每曲揖也凡主人與客東行入庿其於禰庿則每曲揖於祖庿以上則每門每曲揖若諸侯則雖於其禰庿亦有每門每曲揖也賔揖入義見前大夫奉束帛注曰執其所以將命者入三揖皆行揖而皆行明賔俟之於門內也至于階三讓大夫先升一等此三讓者大夫也大夫三讓而賔三辭大夫先讓者以其奉君命尊也客尊則主人不敢先讓升於覲禮見之賔從升堂北面聽命升堂不西面而即北面者辟國君之禮也國君於天子之命西面聽之乃降拜大夫東面致命注曰致其君命賔降階西再拜稽首拜餼亦如之再拜稽首為將受幣也乃云拜餼亦如之然則此幣其主於饔禮乎下之餼禮雖以太牢亦無幣斯可見矣大夫辭亦稱君命辭之賔既卒拜於下大夫乃辭之者别於君也凡君與異國之臣為禮於其降拜即辭之不待其卒升成拜亦饔餼異拜也每拜皆再拜稽首受幣堂中西北面大夫降出賔降授老幣堂中西四分楹間一在西也賔受幣而少過於西者尊君命也降授老幣亦變於君禮出迎大夫大夫禮辭許入揖讓如初賔升一等大夫從升堂初謂三揖三讓賔於是三讓而大夫三辭受儐私事也故復其常禮既升皆北面庭實設馬乘乘四也亦設于西方賔降堂受老束錦大夫止降堂受錦亦辟君禮云大夫止者嫌賔為已受幣則當從之也不從者以降堂禮輕也少牢下篇曰主人降受宰几尸侑降降謂沒階也以此徵之則大夫止之義見矣賔奉幣西面大夫東面賔致幣致幣稱其致幣之辭也大夫對北面當楣再拜稽首授幣于楹間南面退東面俟賔再拜稽首送幣賔不南面授辟尊者之禮也凡授幣于堂而南面者惟君及奉君命於臣者耳大夫降執左馬以出賔之士於是執三馬隨之出庿門側從者並受幣而皆訝受馬也賔送于外門外再拜明日賔拜于朝拜饔與餼皆再拜稽首注曰拜於大門外此拜亦皮辨服繼公謂此所謂拜賜也右歸賔饔餼上介饔餼三牢三牢亦降以兩也飪一牢在西鼎七羞鼎三注曰飪鼎七無鮮魚鮮臘也腥一牢在東鼎七堂上之饌六注曰六者賔西夾之數西夾亦如之其饌亦六也不設於東夾以腥牢惟有一爾腥牢自二以上乃兼有東西夾之饌筥及甕如上賔上介之牢與其鼎饌者皆殺於賔而筥及甕獨否亦盛大禮也又此二者初不視牢數以為隆殺故得略之而與賔同筥米從餼乃與甕並言於此者因文而遂及之耳餼一牢門外米禾視死牢牢十車薪芻倍禾死牢飪與腥也牢十車則二十車也凡其實與陳如上賔注曰凡凡飪以下下大夫韋辨用束帛致之上介韋辨以受如賔禮下大夫致之者亦使人各以其爵也上介韋辨以受主人如賔服正禮也嚮者皮辨以聘者上賔也故上介於此不必皮辨以無加服之嫌故爾儐之兩馬束錦其禮如賔可知右歸上介饔餼士介四人皆餼大牢米百筥設于門外注曰米設當門亦十為列北上繼公謂大牢各一降於上介者兩也此惟有餼與筥米則筥為從餼而甕為從饔又可見矣門亦所館之外門也牢米陳于外餼之正禮也牢在米南東上宰夫朝服牽牛以致之注曰執紖牽之繼公謂使宰夫亦以其爵也宰夫致之故朝服士之朝服與卿大夫之辨服其差相似也致之謂致其禮也亦以君命下文皆以是推之士介朝服北面再拜稽首受注曰適宰夫右受由前東面授從者繼公謂士介出門左西面拜迎北面聽命宰夫東面致命士介還少退再拜稽首適宰夫右受也不言宰夫退士介拜送者略之也無擯注曰明日衆介亦各如其受之服從賔拜於朝李寶之曰擯當作儐下無擯同繼公謂無儐者賤也大夫以上乃有儐禮必著之者嫌受國君之賜皆當儐也右餼衆介賔朝服問卿注曰卿每國三人卿受于祖庿注曰祖王父也繼公謂于祖庿亦尊國君之禮也下大夫擯下大夫擯公使為之也必使下大夫者欲與上介之爵相當也此公事也故重之擯者出請事大夫朝服迎于外門外再拜賔不答拜揖大夫先入每門每曲揖大夫三庿曾祖庿在最東祖庿次而西禰庿又次之此受于祖庿故亦有每門每曲揖此每門謂二閣門也大夫之庿惟自曾祖而下雖别子之後亦無大祖庿王制云一昭一穆與大祖之庿而三記者誤也及庿門大夫揖入此説見賔受饔餼條擯者請命注曰亦從入而出請繼公謂請命亦請將其君命也不几筵者君使尊不敢設神位以臨之不几筵之義有二禮太重者不設此類是也禮差輕者亦不設小聘之禮是也庭實設四皮賔奉束帛入三揖皆行至于階三讓此三讓者賔也賔升一等大夫從升堂北面聽命賔東面致命大夫降階西再拜稽首賔辭升成拜受幣堂中西北面賔降出大夫降授老幣自三讓至此其禮意與歸饔餼同大夫於是進立于中庭西面無擯無儐逺辟君也臣之儐雖殺於主君之醴而束帛庭實則同故不用之聘賔有儐禮若不在國無嫌右問卿擯者出請事賔面如覿幣注曰面亦見也繼公謂聘使私見于主君曰覿大夫曰靣蓋異其稱以别尊卑也然周禮以私覿為私面則又通而言之與此異覿幣束錦也後放此賔奉幣庭實從注曰庭實四馬繼公謂擯者入告出許賔乃入介禮皆放此入門右注曰見私事也雖敵賔猶謙入門右為若降等然繼公謂亦中門而入乃右也下放此入門右者欲於此北面奠幣也賔與大夫爵敵乃若降等然者不敢自同於奉命之禮也大夫不出迎以面與問禮相因也凡自敵以下客禮之相因而行者惟於內俟之大夫辭於中庭南面辭之賔遂左大夫不俟其奠幣而親辭賔亦不果奠幣而遂左此則異於降等者也於是賔少立于入門左之位以俟之庭實設揖讓如初大夫升一等賔從之庭實既設於西方大夫乃至入門右之位揖賔而皆行如初謂三揖三讓也賔亦三辭大夫西面賔稱面注曰稱舉也舉相見之辭以相接繼公謂稱面不言東鄉可知也稱面者敵者之禮也亦以嚮者以大夫辭之不得為禮於下故爾大夫對北面當楣再拜受幣于楹間南面退西面立不稽首别於聘君之命賔亦當少退賔不振幣異於授主君也不言受馬之儀如覿可知賔當楣再拜送幣降出大夫降授老幣右賔私面擯者出請事上介特面幣如覿介奉幣注曰特面者異於主君君尊衆介始覿不自别也繼公謂特面獨請面也上介與大夫尊不相逺故别於士介面不與之同面又初面之儀亦與賔異故無嫌皮二人贊注曰亦儷皮也入門右奠幣再拜注曰降等也繼公謂介奠幣贊者亦奠皮出大夫辭注曰於辭上介則出繼公謂於其既拜乃辭之降於賔也擯者反幣注曰出還于上介也繼公謂此與請受之言互見也反幣者取之出請受而上介受之也不禮辭者亦别於君主人之士亦取皮從其幣以出委之於門外上介既受幣則贊者亦取之庭實入設介奉幣入大夫揖讓如初介入門左少立大夫亦進至於入門右之位揖而皆行也大夫先升當楣北面介升大夫再拜受注曰亦於楹間南面而受繼公謂云介升大夫再拜明其不稱面也介於卿雖降一等然同為大夫故受於堂上亦得在楹間也介降拜大夫降辭介升再拜送幣注曰介既送幣降出也大夫亦降授老幣繼公謂降拜者亦貶於卿大夫既辭則揖而先升西面介升拜於西階上北面也右上介私面擯者出請衆介面如覿幣入門右奠幣皆再拜大夫辭介逆出於士介亦親辭辟君也擯者執上幣出禮請受賔辭注曰賔亦為士介辭繼公謂惟執上幣是亦不必其受之也大夫答再拜擯者執上幣立于門中以相拜士介皆辟老受擯者幣于中庭士三人坐取羣幣以從之相息亮反辟音避此士介私面之儀大約與其覿禮同惟以一入而大夫親辭為異老受擯者幣于中庭者以大夫降立於此故也右衆介私面擯者出請事賔出大夫送于外門外再拜賔不顧賔亦告事畢乃出也此言賔不顧見敵者之禮也必言之者嫌其或異於尊者也禮於尊者拜或辟去而不敢當擯者退大夫拜辱注曰拜送也繼公謂擯者從大夫出門而遂退拜辱謝其屈辱而相已也此拜亦兼二義經蓋以其所主者立文也右賔退下大夫嘗使至者幣及之使所吏反注曰嘗使至己國則以幣問之也君子不忘舊繼公謂使至者謂小聘之使或為上介者也言及之明非正禮上介朝服三介問下大夫下大夫如卿受幣之禮注曰上介三介下大夫使之禮也疏曰據此篇大聘使卿五介小聘使大夫三介若大國之卿七介小聘使大夫五介小國之卿三介小聘使大夫一介也問下大夫使上介是各以其爵也繼公謂此異於上卿者上士擯耳其面如賔面于卿之禮如其禮耳庭實則用儷皮也士介不面亦殺於正禮右問下大夫嘗使者大夫若不見賢遍反注曰有故也君使大夫各以其爵為之受如主人受幣禮不拜為于偽反注曰各以其爵主人卿也則使卿大夫也則使大夫不拜代受之耳不當主人禮也繼公謂必使人代受者不可虛聘君之命也各以其爵者亦欲與使者之尊相當也聘君問卿使卿問大夫使大夫此受者非主人則亦無揖讓之禮也惟言不拜見其重者耳右代受問夕夫人使下大夫韋辨歸禮注曰夕問卿之夕也繼公謂次日之夕夫人乃歸禮不惟不敢與君同曰又且不敢同其時皆下之也使下大夫者亦下君或亦辟其於朝君之禮也亦韋辨者君與夫人之聘享其器幣略同其日又同則使者之同服亦宜也堂上籩豆六設于户東西上二以並東陳注曰籩豆六者下君禮也設于户東又辟饌位也繼公謂籩豆六與子男之禮同重聘使也凡設籩豆自二以上皆先豆而後籩乃言籩豆者文順耳此六豆六籩皆宜用朝事者而各去其末之二其設之之序則豆皆在西籩繼之而東韭菹其南醓醢屈以終麷其南蕡亦屈以終饔餼之禮其饌各有所屬户西之饌為飪也西夾東夾之饌為腥也此無牢故惟有堂上之饌而設于户東示其異也不用簋簋鈃者亦以無牢故也此禮主於飲主君之禮主於食壺設于東序北上二以並南陳醙黍清皆兩壺醙所九反注曰醙白酒也凡酒稻為上黍次之粱次之皆有清白以黍間清白者互相備明三酒六壺也先言醙白酒尊先設之繼公謂設于東序北上亦統於豆醙未詳案注云凡酒稻為上黍次之粱次之蓋據內則三醴之次言之也大夫以束帛致之以束帛致其禮亦盛之也飧不致此殺於飧乃致者蓋主君以設飧為差輕而夫人以歸禮為特重所以異也賔如受饔之禮儐之乘馬束錦此亦不盡與受饔之禮同云如者亦大略言之上介四豆四籩四壺受之如賔禮四豆者去菁菹鹿臡四籩者去形鹽膴四壺者去粱酒不言其位如賔可知也言受之明亦用束帛致之也如賔禮者亦如其受饔之禮也不言所使者下大夫可知於上介亦使下大夫者禮窮則同也儐之兩馬束錦夫人歸禮不及士介者以其禮薄不可得而復殺且君於士介已無堂上之饌故也明日賔拜禮於朝注曰於是乃言賔拜明介從拜也右夫人歸禮於賔介大夫餼賔大牢米八筐注曰其陳於門外黍粱各二筐稷四筐二次並南陳無稻牲陳於後東上繼公謂君餼賔米百筥筥半斛此米八筐筐五斛以量言之則八筐者殺於君米二筐也所以下之此亦陳於其館之外門外賔迎再拜老牽牛以致之賔再拜稽首受老退賔再拜送賔出門左西面拜迎聽命老東面致命賔還北面拜乃適老右受此使老致之者大夫之臣老為尊也賔於老乃拜迎之亦重其為使也再拜稽首受者蓋以大夫嚮者稽首受其君命故賔於此因其禮與使者受儐而稽首之意同大夫不親餼者以其禮輕不欲煩賔且辟君禮也君歸饔餼於朝君則親致於賔亦使卿上介亦如之然則此牢米亦如賔矣蓋以其具不可得而殺故也衆介皆少牢米六筐皆士牽羊以致之注曰士亦大夫之貴臣繼公謂米六筐蓋黍粱稷各二筐也於賔上介使老於衆介使士所使者雖賤亦不可以無所别也不言受之之禮如賔可知右大夫餼賔介公於賔一食再饗食音嗣下並同注曰此饗謂亨大牢以飲賔也公食大夫禮曰設洗如饗則饗與食互相先後也繼公案注云互相先後謂食居二饗之間也燕與羞俶獻無常數俶尺六反注曰羞謂禽羞鴈鶩之屬成熟煎和也俶始也始獻四時新物聘義所謂時賜無常數由恩意也繼公謂羞謂禽羞周官亦謂之禽獻庖人職曰凡用禽獸春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鮮羽膳膏羶即此羞也燕亦無常數異於朝君也賔介皆明日拜于朝上惟見賔禮乃言介拜似非其次蓋此文宜在下句之下也賔與介之拜賜各主於其所受者也饗賔燕賔之時介雖與焉然禮不為已故不必拜賔於禽羞亦拜之者謝主君之意也上介一食一饗注曰饗賔介為介從饗獻矣復特饗之客之也繼公謂云一食一饗見先食而後饗也下文放此右饗食燕羞獻若不親食使大夫各以其爵朝服致之以侑幣如致饔無儐侑音又注曰君不親食謂有疾及他故也必致之不廢其禮也致禮於卿使卿致禮於大夫使大夫非必命數也無儐以已本宜往疏曰他故者死喪之事繼公謂若不親食之文雖主於君然賔有故而不及往者其禮亦存焉致之各以其爵者賔介之爵不同則所使者亦宜異也古人於所使者或尊或卑亦莫不有義存焉致饗以酬幣亦如之注曰酬幣所用未聞也禮幣束帛乘馬亦不是過也繼公謂酬幣説見士昏禮大夫於賔一饗一食上介若食若饗此大夫與餼賔介者皆謂卿也下大夫嘗使者亦存焉云若食若饗是主於食也蓋饗賔之時介已為介故也若不親饗則公作大夫致之以酬幣致食以侑幣注曰作使也大夫有故君必使其同爵者為之致之列國之賔來榮辱之事君臣同之繼公謂酬幣侑幣皆用束錦亦有庭實若不親饗食則使人告于公公乃作其同爵者為致之同爵者非己之所能使故須告公也必使大夫者其禮重也此致之以大夫不嫌與君同者公作之故也右大夫饗食君使卿皮辨還玉于館皮辨者象還於其君故如聘服也玉圭璋也還玉即還贄之義使卿者亦欲與賔相當也賔皮辨襲迎于外門外不拜帥大夫以入不事至乃襲辟君也不言出請入告文省也禮不主於己故不拜云帥以入則是不揖之也大夫亦襲至庿門乃執玉大夫升自西階鉤楹鉤楹由楹內也必云鉤楹者見其入堂深而東行也下文云賔自左南面受圭則是大夫南面立於中堂少西而致命也南面致命而不東面者宜别於親受者且尊者之禮異也賔自碑內聽命聽命於下以君命不主於己也言自碑內見於庭少北也入門而賔在東大夫在西分庭皆行大夫直行而升賔則當碑東少北乃西行負碑北面立於此鄉致命者也不於阼階西辟主位也凡大夫於君命之主於己者聽命於上乃降拜之升自西階自左南面受圭退負右房而立注曰自左南面右大夫並受也繼公謂升自西階非受玉之正主也亦鉤楹由大夫之後乃自左受之玉當訝受乃南面並受者代受之示異也二人俱代君行禮故皆不北面賔退負右房而立俟降階之節也必俟於此者辟主位且便於降記曰卿館於大夫而此云負右房則大夫之家亦有左右房明矣大夫降中庭賔降自碑內東面授上介于阼階東注曰大夫降出言中庭者為賔降節也繼公謂中庭西方南北之中也大夫降而至于中庭賔乃發於負右房之位而降蓋以之為節也自碑內者反其嚮者所由之塗也既授上介則復立于中庭司儀職曰還圭如將幣之儀謂君親還之也則其禮皆與此異矣上介出請賔迎大夫還璋如初入請謂請命也不言入告亦文省下不見者放此如初入者自帥入以至授介皆如之也還璋為夫人還之賔裼迎大夫賄用束紡賄呼罪反紡方往反注曰賄豫人財之言也紡紡絲為之今之縳也所以遺聘君相厚之至繼公謂裼者已受聘玉則復其常也大夫於賔裼亦裼亦上介出請入告乃迎之賄禮主於答其聘故略於聘禮而不用庭實吕氏春秋曰以襌緇當紡緇紡與襌對言則紡非單絲矣禮玉束帛乘皮注曰禮禮聘君也所以報享也亦言玉璧可知也繼公謂不言迎大夫文又省乘皮先設束帛加玉如享禮其執皮亦有攝張之節皆如還玉禮皆者皆賄與禮玉也禮玉之庭實不在如中是亦大槩言之耳大夫出賔送不拜亦上介出請大夫告事畢乃出送之不拜送與不拜迎之意同右還玉及賄禮公館賔館者就其館之稱也公館賔將致四者之拜也此禮在還玉之明日是時公蓋朝服而立於賔館之外門東向亦接西孰賔辟音避不敢辭不敢見若隱辟然故經以之為稱此主君於聘享夫人之聘享問大夫其拜皆為拜君命之辱賔出受之可也乃辟者其為有拜送之禮與此辟字義與上文所云者異上介聽命注曰擯者每贊君辭上介則曰敢不承命告于寡君之老繼公謂上介聽命蓋西面於外門外之東孰少南不敢當君也聘享夫人之聘享問大夫送賔公皆再拜注曰拜此四事公東面拜擯者北面繼公謂拜聘享與問謝聘君也所謂拜貺也拜送賔以賔將去也公退賔從請命于朝請命欲親受公命也嚮者賔辟但不敢當君館已之禮耳上介既入告乃知主君有拜聘問等事故於此從而請命焉受命于朝臣禮也此言請命周官言拜辱亦其異者也公辭賔退辭者謂嚮已拜今無事矣右公館賔賔三拜乘禽于朝訝聽之發去乃拜乘禽以乘禽之賜終於此也而總拜之乘禽雖輕受賜多矣故為之三拜三拜則不稽首此禮在公館賔之明日右賔拜賜遂行舍于郊注曰郊近郊繼公謂舍于郊者為當與主國為禮於此也公使卿贈如覿幣注曰言如覿幣見為反報也繼公謂出郊而後贈亦異於答聘君之節也如覿幣帛用束也其庭實亦存焉親受覿而使人贈君臣之禮也贈説見士昏禮受于舍門外如受勞禮無儐勞力報反下並同注曰如受勞禮以贈勞同節繼公謂舍門外受之變於來時也無儐以其答己之覿故也使下大夫贈上介亦如之使士贈衆介如其覿幣於上介用束帛於衆介各用束帛上介之庭實如賔大夫親贈如其面幣無儐贈上介亦如之使人贈衆介如其面幣親贈為報其面故不嫌與君禮同此所贈者皆用錦也賔與上介之庭實亦同大夫親贈無儐可知承上文無儐之後故重言以明之大夫親贈賔上介而使人贈衆介以其降等也亦為嚮者不親受士送至于竟音境下並同此至于竟謂沒其竟也若過邦則亦假道如初司儀職言公侯伯子男之臣相為國客真入也則三積皆三辭拜受其出也如入之積聘義亦云主國待客出入三積是篇前後皆不見之未詳右贈使者歸及郊請反命注曰郊近郊也繼公謂不敢徑入恭也請反命其亦使次介與朝服載旜云朝服者反命則執玉嫌當如聘服也載旜為反命也君既許乃可為之反命使事之終是以重之也及郊即載之者出時受命至此而斂歸時反命至此而載亦其節也至己之門外乃斂之禳乃入禳如羊反禳祭名所以除不祥者也入入國也禳乃入者其意以為使者久出在外不能必其無不祥之事故也又以是禮推之則天子諸侯之出而反者其亦有此祭與乃入陳幣于朝西上上賔之公幣私幣皆陳上介公幣陳他介皆否注曰皆否者公幣私幣皆不陳此幣使者及介所得於彼國君卿大夫之贈賜也其或陳或不陳詳尊而略卑也其陳之及卿大夫處者待之如夕幣其禮於君者不陳上賔使者公幣君之賜也私幣卿大夫之幣也他介士介也疏曰賔之公幣則主君郊勞幣也醴賔幣也致饔餼幣也夫人歸禮幣也食侑幣也饗酬幣也再饗酬幣也郊贈幣也賔之私幣則主國三卿皆一食有侑幣饗有酬幣又皆有郊贈幣也其上介公幣則致饔餼幣也夫人致禮幣也食侑幣也饗酬幣也郊贈幣也其私幣則主國三卿或饗或食要有其一則各有幣焉又三卿皆有郊幣如其面幣也禮於君者謂賄用束紡禮用束帛乘皮之類繼公謂此乃入謂入公門也西上則賔之公幣在西私幣次而東上介之公幣又次之其三者之幣又各以所得禮之先後為序而西上也束帛各加其庭實皮左上經云陳皮北首此皮左皮上左也故云加然則此於庭實之皮其各重纍陳之乎是禮蓋主於有皮者言也若無皮者則束帛奠之於地與不布幕别於君物也或曰皮左猶言左皮公南鄉許亮反注曰亦宰告于君君乃朝服出門左南鄉卿進使者使者執圭垂繅北面上介執璋屈繅立于其左君使卿進使者使者執圭上介執璋而入士介皆隨入門右北面東上君揖使者進之上介立于其左與受命時同也此經文省爾使者執玉常垂繅上介執玉常屈繅以是推之則經所不見者可知矣反命曰以君命聘于某君某君受幣于某宫某君再拜以享某君某君再拜注曰某君某國君也某宫若言桓宫僖宫也某君再拜謂再拜受也必言此者明彼君敬君繼公謂聘而云受幣者古者於玉亦以幣言之司儀云將幣皆指朝聘之玉也享屬於聘故執圭而并言之某宫則是不在太庿矣宰自公左受玉注曰亦於使者之東同面並受也繼公謂君南鄉則宰已立于其左少退至是乃進而受之既受玉則屈繅矣受上介璋致命亦如之注曰致命曰以君命聘於某君夫人某君再拜以享某君夫人某君再拜繼公謂致命即反命之辭致與反互文也反者復其所自出致者傳其所自來其實一耳執賄幣以告曰某君使某子賄授宰注曰某子若言髙子國子凡使者所當執以告君者上介取以授之禮玉亦如之注曰亦執束帛加璧也告曰某君使某子禮繼公謂使者既告而以玉束帛授宰則士訝受皮也陳幣之時賄幣禮玉束帛乘皮亦以入特不陳之耳於上介取玉束帛有司亦執皮執禮幣以盡言賜禮盡子忍反注曰禮幣主國君初禮賔之幣也以盡言賜禮謂自此至於贈疏曰禮幣郊勞幣也公曰然而不善乎注曰而猶女也繼公謂言汝豈不善於禮乎以其賜禮之多故美之也授上介幣再拜稽首公答再拜不奠幣拜辟奠贄之禮也公既拜則上介復奠幣於故處焉私幣不告注曰亦略卑也君勞之再拜稽首君答再拜注曰勞之以道路勤苦若有獻則曰某君之賜也注曰言此物某君之所賜豫為惠者也大夫出反必獻忠孝也繼公謂獻亦奠之於地云某君之賜則此所獻者其賄禮中之物與傳云厚賄之是賄禮之厚薄不常也厚薄不常故有獻有否時賜之物似不足以為獻而他禮則又在公賜中而不必獻也君其以賜乎注曰不必其當君也繼公謂賜謂賜臣下也此乃尊賜卑之物故獻君之辭如是不拜者嫌其異於公幣也上介徒以公賜告如上賔之禮注曰徒謂空手不執其幣繼公謂徒以告下賔也如如其盡言賜禮君勞之再拜稽首君答拜勞士介亦如之於士介四人旅答再拜尊者之禮也私覿私面主君及大夫答士介之拜亦然勞賔介辭前注有焉君使宰賜使者幣使者再拜稽首注曰以所陳幣賜之也禮臣子人賜之而必獻之君父不敢自私之也君父因以與之則拜受之如更受賜也繼公謂所聘之國君與夫人及大夫已以此幣賜己今君復使宰賜之者蓋使者之意以為因君命乃有此賜故以之入公門欲歸之君也君於是復以賜之使者拜而君不答者以其拜受於宰也凡臣拜受君命於擯贊者則君不答之其例見於此及燕射命賔之儀是或一禮與案注之服字恐誤賜介介皆再拜稽首注曰士介之幣皆載以造朝不陳之耳與上介同受賜命俱拜繼公謂不特命上介降於使者也士介之幣雖不陳不告然既以入公門是亦欲歸之公也故併賜之乃退退亦謂使介也惟於使介言退則君後入可知是時君先使者而出故亦後之而入其節與受命之時同介皆送至于使者之門注曰將行俟于門反又送于門與尊長出入之禮也乃退揖注曰揖别也繼公謂凡退者不揖此乃揖者是禮主於送使者也使者拜其辱注曰謝之也再拜上介三拜士介繼公謂此與上文所云大夫拜辱之意同拜之亦於門外之左右歸反命釋幣于門注曰門大門也布席于闑西閾外東面繼公謂出于行入于門者行為道路之始出則禮之門為內外之限入則禮之也然則二禮皆未詳乃至于禰筵几于室薦脯醢注曰告反也疏曰亦司宫設席于奧東面右几繼公謂既筵几則祝先入主人後入主人在右贊者乃盥薦脯醢觴酒陳注曰主人酌進奠一獻也繼公謂下云三獻則此觴乃用爵也陳者主人與酌奠于薦南也以觴與籩豆並列故謂之陳既奠反位及祝再拜祝釋詞主人又再拜其後二獻則惟獻者於既奠反位再拜而已出釋幣而入釋奠禮相變且欲行飲至之禮也席于阼設酢席于阼變於祭且為將與從者為禮於堂也主人既獻則酌而自酢與祭而有尸者之儀異薦脯醢酢而有薦亦異於祭三獻注曰室老亞獻士三獻也每獻奠輒取爵酌自酢也繼公謂亞獻三獻皆不薦也每獻奠爵相次而南主人初獻而酢于阼則亞獻三獻者皆酢于西階上矣一人舉爵注曰三獻禮成更起酒也主人奠之未舉也繼公謂舉爵舉觶也亦如鄉飲舉觶之為獻從者從才用反注曰從者家臣從行者也主人獻之勞之也皆升飲酒于西階上繼公謂此獻蓋自室老始行酬亦如之獻亦以爵行酬乃出注曰主人舉奠酬從者下辨繼公謂行酬者行酬酒也出謂主人以下亦既徹闔牖户而後出也獻從者而行酬所謂飲至也楚令尹子重伐吳歸而飲至用此禮耳國君則既飲至又或有䇿勳之事傳曰凡公行告宗庿反行飲至舍爵䇿勳焉禮也上介至亦如之如其釋幣告至也右釋幣于門釋奠于禰聘遭喪入竟則遂也注曰遭喪主國君薨也繼公謂入竟則遂為其已承主國君之命也君使士請事乃以入竟不郊勞聘不主於嗣君使人郊勞則嫌也不郊勞則夫人亦不使下大夫勞矣然則大夫請行者其以賔入與不筵几此亦受於庿不筵几者變於君親受之禮也不禮賔禮當作醴君喪則使大夫受故不醴賔以其非正主也主人畢歸禮注曰賔所飲食不可廢也禮謂饔餼饗食繼公謂畢歸禮者不可以已之喪而廢待賔之禮也禮謂食饔餼饗食賔唯饔餼之受唯受饔餼者以主人雖不遭喪亦歸之饔餼故於此受之而不辭不受饗食者則以主人有喪不宜饗食己故雖致之亦不受也受饔餼則飧亦受可知飧饔餼之細也不賄不禮玉不贈賄與禮玉主君以報聘君者也今主君薨難乎其為辭故闕之贈者所以答私覿遭喪則不覿故主國亦不宜贈遭夫人世子之喪君不受使大夫受于廟其他如遭君喪注曰夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降疏曰服問云君所主夫人妻大子適婦繼公謂此大夫庿受之禮即記所云者是也遭君喪之禮凡所降者各有其義此亦遭喪也故因其禮而用之耳其義則或合或否而不能盡同遭喪將命于大夫主人長衣練冠以受注曰長衣素純布衣也去衰易冠不以純凶接純吉也吉時在裏為中衣中衣長衣繼皆掩尺表之曰深衣純袂寸半耳繼公謂此遭喪亦謂遭主君喪也主人即大夫文互見耳亦嗣君使大夫受之不言者可知也長衣練冠凶服變也主君喪而受之之服如此則夫人世子之喪其亦皮辨服以受與右遭喪聘君若薨于後入竟則遂後謂使者既行之後也云入竟則遂是未入竟則反而奔喪矣君薨則其國使人告使者而不反之以其行或有逺近故也入竟則遂意與上同赴者未至則哭于巷衰于館衰七回反下同注曰赴走告也此謂赴告主國君也哭于巷者哭于巷門也繼公謂赴告喪者之稱也哭于巷其變於赴者至之禮與其哭也亦為位奔喪曰諸臣在他國為位而哭亦謂此時也衰于館有事而出則吉服也受禮注曰受饔餼也不受饗食所以不受之者蓋以為主君若饗食已已有君之喪自不宜往故雖歸之猶辭而不受是亦原其禮之所由來也赴者至則衰而出但云衰而出則其出也非為聘事矣以此見赴者之至例在聘日之後也唯稍受之稍所教反稍謂漿飲乘禽之屬以其稍稍給之故謂之稍漿人職云共賔客之稍禮記云旬而稍宰夫始歸乘禽亦可見矣云唯稍受之對不受饗食而言也歸執圭復命于殯升自西階不升堂注曰復命于殯者臣子之於君父存亡同繼公謂亦衰而執圭也升自西階而不升堂告殯之禮然也是時上介亦執璋立于其左案注云臣子之於君父存亡同者謂此倣君存時致命之禮故云存亡同子即位不哭注曰將有事宜清淨也不言世子者君薨也諸臣待之亦皆如朝夕哭位疏曰奔喪云奔父之喪在家者待之皆如朝夕哭位繼公謂子者諸侯在喪之稱子位在阼階上不哭者子臣同辨復命如聘子臣皆哭辨音遍注曰如聘者自陳幣至于上介以公賜告與介入北鄉哭鄉許亮反注曰北鄉哭新至别於朝夕繼公謂云入者既復命則出至是乃更入蓋復命奔喪宜異其節也此云與介入則復命之時士介不入歟奔喪云奔喪者非主人入門左中庭北面哭然則使介此時之哭亦在西方之中庭而西上與出袒括髮袒括髮於外臣也入門右即位踊注曰從臣位自哭而踊如奔喪禮右聘君薨若有私喪則哭于館衰而居不饗食注曰私喪謂其父母也衰而居不敢以私服干君之吉使春秋傳曰大夫以君命出聞喪徐行而不反疏曰傳春秋宣八年公羊傳繼公謂云哭于館者嫌其不敢發哀於主人之庿也昔曾子與客立于門側其徒趨而出曾子曰爾將何之曰吾父死將出哭于巷曾子曰反哭於爾次曾子北面而弔焉正此意也不饗食謂主君饗食己則不往也其致之則斯受之是亦異於其君之喪歸使衆介先衰而從之注曰其在道路使介居前歸請反命君納之乃朝服既反命出公門釋服哭而歸其他如奔喪之禮繼公謂此别於有君喪者也經但見其未及郊之禮耳若君既許其反命則朝服而帥衆介以行也右私喪賔入竟而死遂也遂謂遂其聘事者也若未入竟則使告于君止而俟命主人為之具而殯注曰具謂始死至殯所當用繼公謂具謂衣物之屬殯即其館而殯之也尸未得歸故權殯於此云殯則不以造朝矣介攝其事為致聘享及問大夫之禮也初時必使上介接聞命者其意蓋慮此也與君弔介為主人注曰雖有臣子親姻猶不為主人以介與賔並命於君尊也繼公謂君弔之已不視斂異內外臣也凡諸侯弔於異國之臣君為之主此時其君不在故介為主人受主君之弔以此時惟介為尊故也君弔蓋皮辨服禮諸侯弔於異國之臣皮辨錫衰主人未喪服則君亦不錫衰不錫衰則惟皮辨服矣此賔死於外雖已殯主人蓋未喪服也介為主則袒免喪服記曰朋友皆在他邦袒免謂此類也凡諸侯弔主人必免主人歸禮幣必以用注曰當中奠贈諸喪具之用不必如賔禮介受賔禮無辭也注曰介受主君賔已之禮無所辭也有賔喪嫌其辭之不饗食與私喪同亦致則受之歸介復命柩止于門外注曰門外大門外也必以柩造朝達其忠心介卒復命出奉柩送之君弔卒殯注曰卒殯成節乃去疏曰卒復命謂復命訖送之謂送至賔之家殯喪之大節卒殯而後君與介乃去也繼公謂卒殯謂既奠乃去也大夫之喪自外歸載柩以輲車舉柩由阼階升即適所殯若大夫介卒亦如之注曰不言上介者小聘上介士也士介死為之棺斂之斂力艷反下同斂斂于棺也上云具此云棺文互見也其異者殯與斂耳君不弔焉注曰主國君使人弔不親往繼公謂此降於賔與上介且異內外臣也若賔死未將命則既斂于棺造于朝介將命造七到反下同注曰未將命謂俟間之後也以柩造朝以己至朝志在達君命繼公謂此朝謂大門外也介將命于庿如賔禮既則歸而殯之於館若介死歸復命唯上介造于朝於賔言止於門外於上介造於朝文互見也若介死雖士介賔既復命往卒殯乃歸注曰往謂送柩繼公謂賔送上介已見於大夫介卒亦如之之中故惟主士介而言也不言君弔其在既殯之後乎是亦降於賔與上介也右賔介卒小聘曰問不享有獻不及夫人主人不筵几不禮面不升不郊勞注曰記貶於聘所以為小也獻私獻也面猶覿也疏曰面不升者謂私覿庭中受之不升堂繼公謂受於庿而不筵几禮差輕也禮亦當作醴凡受禮而設筵几乃醴賔此不筵几故不醴賔亦相因而然也面不升以其為下大夫也其禮如大聘之上介特初覿不與士介同入為異耳郊勞乃使臣之禮故言於君禮之後云獻繼不享而言謂聘君之獻也經記於大聘皆不言聘君有獻於主君及夫人而此於小聘乃以有獻不及夫人為異亦未詳其禮如為介三介注曰如為介如為大聘上介繼公謂禮者饔餼饗食之屬也右小聘記久無事則聘焉注曰事謂盟會之屬若有故則卒聘束帛加書將命百名以上書于䇿不及百名書于方注曰將猶致也名書文也今謂之字䇿簡也方板也疏曰簡是一片䇿是衆簡相連繼公謂故猶事也有故謂有事可言者也此與經之所謂有言者互見爾卒已也聘者兼享而言或亦通小聘也小聘則不享束帛加書以書加於帛上也將命之時但稱言以達其君之書而已未必言及其故主人使人與客讀諸門外注曰主人主國君也人內史也書必璽之繼公謂公既受書客降出公以書授宰降立乃使人與客讀書於庿門外必與客讀之者欲其審也不於內讀之者客降則出矣無其節也客將歸使大夫以其束帛反命于館注曰為書報也繼公謂大夫即還玉之卿也束帛言其是即嚮者加書者也以其束帛反命亦如還玉之義蓋以之為信也此一節當繼禮玉之後不見於經者以其或有或無不可必明日君館之此反命蓋與還玉同日而明日君館之則無此禮者其館之之節亦可見矣既受行出遂見宰問幾月之資幾居豈反注曰資行用也問行用當知多少而已古文資作齎繼公謂見宰見之於其官府也幾月之資公費也問之者欲以為私費之節度也宰制國用故問之使者既受行日朝同位注曰謂前夕幣之間同位者使者北面介立于左少退别於其處臣也繼公謂日朝每日常朝也經惟見夕幣與受命之位故記明之案注云前者蓋如前期之前出祖釋軷祭酒脯乃飲酒于其側軷蒲末反注曰祖始也既受聘享之禮行出國門止陳車馬釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神繼公謂道祭謂之軷者為既祭而以車軷之因以為名也釋軷者釋其所軷之物謂酒脯也既釋則人為神祭之如士虞禮佐食為神祭黍稷膚祝祭酒之為既祭乃與同行者飲酒於其側禮畢乘車軷之而過也所以朝天子圭與繅皆九寸剡上寸半厚半寸博三寸繅三采六等朱白倉剡以冉反厚胡豆反注曰圭所執以為瑞節也九寸上公之圭也雜記孔疏曰聘禮記云朝天子圭與繅皆九寸繅三采六等朱白倉朱白倉既重云朱白倉是一采為二等相間而為六等也朱子曰案上記只有朱白倉而雜記疏所引乃重有之不知何時傳寫之誤而失此三字也繼公謂圭謂桓圭也圭與繅皆九寸但言其長同耳若其廣則玉三寸而繅蓋一尺許也剡上寸半厚半寸博三寸惟據玉而言剡上寸半謂剡其左右各寸半也其義則未詳三采六等者三就也每一匝為一就三采而三就以上下或左右數之則六等矣問諸侯朱緑繅八寸注曰於天子曰朝於諸侯曰問記之於聘文互相備疏曰上公朝天子圭與繅皆九寸則自相朝亦九寸上公遣臣相問圭與繅皆八寸則遣臣問天子亦八寸是記於聘文互相備也繼公謂此言上公聘玉之繅也朱緑者繅之采也典瑞職曰瑑圭璋璧琮繅皆二采一就以眺聘則此朱緑蓋合而為一就也一就則二等矣二采當去朱而用白倉乃不然者為其少飾故存朱而加以緑焉亦尚文之意也上言朝玉與其繅九寸故於此但言繅而不及玉蓋省文耳玉人職云瑑圭璋八寸璧琮八寸以眺聘是公之聘玉亦與繅之長同也然則侯伯聘玉與繅當六寸子男則當四寸與皆玄纁此言所用以為繅者也朝聘之繅皆以玄纁之帛為之蓋表玄而裏纁也其表裏則皆絢以采繫長尺絢組繫如字長直亮反絢呼縣反注曰采成文曰絢繫無事則以繫玉因以為飾繼公謂繫者繅之繫也以絢組為之其絢亦如繅之采與繅言采繫言絢文互見也絢者蓋以采絲飾物之稱舊説以絢為畫非是語曰素以為絢兮又曰繪事後素而考工記並言畫繢之事則絢非畫也明矣問大夫之幣俟于郊為肆又齎皮馬注曰肆猶陳列也齎猶付也使者既受命有司載問大夫之禮待于郊陳之為行列至則以付之也使者初行舍于近郊幣云肆馬云齎因其宜亦互文也不於朝付之者辟君禮也必陳列之者不夕也繼公謂經於問大夫之庭實惟言皮此兼云馬是其所用亦不定也辭無常孫而説孫音遜説音恱注曰孫順也大夫使受命不受辭辭必順且説繼公謂聘為結好故辭貴於孫而説辭多則史少則不達辭苟足以達義之至也史言其文勝也論語曰文勝質則史辭以達意而已若辭當少而反多則文勝而傷於煩當多而反少則失於略而不足以達意辭苟足以達則不煩不略為得其宜故曰義之至也辭曰非禮也敢對曰非禮也敢注曰辭不受也對答問也二者皆卒曰敢言不敢繼公謂此辭對之辭未詳其所用之節姑闕之卿館于大夫大夫館于士士館于工商注曰館者必於廟繼公謂古者使介入國但有私館而無公館於此可見管人為客三日具沐五日具浴注曰客謂使者下及士介也繼公謂三日五日古人平常沐浴之節也內則言子事父母之禮云五日則燂湯請浴三日具沐又云少事長賤事貴共帥時則亦足以見之矣沐潘也飧不致不致者宰夫設之而已不以君命致之也必不致者逺辟朝君之禮也賔不拜注曰以不致也沐浴而食之食如字注曰自潔清尊主國君賜也記此重者沐浴可知卿大夫訝大夫士訝士皆有訝訝五嫁反注曰卿使者大夫上介也士衆介也訝主國君所使迎待賔者如今使者護客繼公謂掌訝職云凡訝者賔客至而往詔相其事而掌其治令其職如是則以降等者為之宜也云士皆有訝者嫌其賤不必訝若上士則使中士訝之中士則使下士訝之也賔即館訝將公命注曰使己迎待之命繼公謂此節宜在卿致館之後將公命蓋於外門內也下禮同又見之以其贄注曰復以私禮見者訝將舍於賔館之外宜相親也也大夫訝者執鴈士訝者執雉繼公謂言又者見其與上禮相接也訝者既將公命出奉贄以請見賔亦於門外俟之賔未將公事乃不辭其私見者以其因將公命而為之也賔既將公事復見之以其贄注曰公事聘享問大夫繼公謂其贄即訝之贄也復見之以其贄所謂還贄也卿則還鴈大夫士則皆還雉於其訝士相見禮云士見於大夫終辭其贄蓋以無復見之禮故也此亦有士見於大夫而不終辭之者以其受公而為訝與同國之降等者異故略如敵者之禮不辭其贄而復見之也凡四器者惟其所寶以聘可也四器者聘享及夫人之聘享共用四玉器也公侯伯之所寶者圭璋璧琮子男之所寶者璧琮琥璜言惟得用其所寶者以聘見不可用其不當用者也公侯伯聘用圭璋享用璧琮子男聘用璧琮享用琥璜宗人授次次以帷少退于君之次注曰主國之門外諸侯及卿大夫之所使者次位皆有常處繼公謂授次授賔次也設次者掌次也宗人則主授之耳君謂朝君也云少退之則似謂在其南而少西也司儀云及將幣車進拜辱賔車進答拜云車進是朝君未嘗入于次也此乃著君之次亦以微異上介執圭如重授賔注曰愼之也曲禮曰凡執主器執輕如不克繼公謂上介凡執玉皆如是不惟將聘授賔之時為然記者特於此發之耳其餘執玉者亦如之不盡見也賔入門皇升堂讓將授志趨注曰皇自莊盛也志趨卷豚而行也繼公謂讓謂必後主君也經云公升二等賔升是也春秋傳衛孫林父聘於魯公登亦登是不讓也將授謂發於負序之位將授玉也行而張足曰趨曲禮曰堂上不趨執玉不趨特志於趨耳言其急於授君而行速也注云志趨卷豚是已授如爭承下如送君還而后退還音旋授如爭謂尚疾而不敢留君也承下如送謂既授則以手承公手之下而未即退防玉之失隊也如送者如送客然言其未即退之意也君還東面而後賔退下階發氣怡焉再三舉足又趨下户稼反注曰發氣舍息也再三舉足自安定乃復趨也繼公謂下階謂降而沒階之時也怡和説也於此言發氣怡焉言又趨則鄉者之屏氣戰色足如有循可知矣趨言又者明復其常也及門正焉注曰容色復故此皆心變見於威儀執圭入門鞠躬焉如恐失之注曰記異説也繼公謂鞠躬者敬也如恐失之者愼也及享發氣焉盈容注曰孔子之於享禮有容色繼公謂聘時屏氣享時發氣又且盈容禮有重輕故敬亦有隆殺衆介北面蹌焉蹌七將反注曰容貌舒揚繼公謂於享乃云蹌焉以見聘時之不然也然則衆介容貌之變其節亦略與賔同矣私覿愈愈焉注曰容貌和敬疏曰享時盈容舒於聘時之戰色私覿愈愈又舒於盈容出如舒鴈疏曰又舒於愈愈也繼公謂如舒鴈謂儀容舒遲如鴈鵝皇且行入門主敬升堂主愼注曰復記執玉異説繼公謂主敬鞠躬也主愼如恐失之也先言皇且行乃云入門主敬則與上記入門皇者異也云升堂主愼則又與入門而如恐失之者異也是為異説凡庭實隨入左先皮馬相間可也間間側之間注曰隨入不並行也疏曰皮馬以西頭者為上故左先入陳也繼公謂凡庭實謂凡入而即設於叄分庭一在南者也左先謂其設於左者先行也皮馬相間謂庭實若相繼而兩設用皮則宜俱用皮用馬則宜俱用馬或不能然則一節用皮一節用馬相間而設亦自無害於禮故云可也可者許其得用之辭賔之幣唯馬出其餘皆東賔之幣謂將聘君之幣及私覿者也馬亦言幣則幣字之所包者廣矣多貨則傷于德貨指聘物而言聘物有常數若多用之則有重貨之意而傷害於其德矣言此者見貨之所以不可多也幣美則沒禮注曰幣謂束帛也美之則是主於幣而禮之本意不見也繼公謂美謂竒巧也聘幣有常制若美為之則過於禮而禮為之沒矣言此者見幣之所以不必美也上言貨則幣在其中矣以其出於人力之所為故復以美戒之然則其他聘物固不厭其美也賄在聘于賄于注讀作為注曰賄財也于讀曰為言主國禮賔當視賔之聘禮而為之財也賔客者主人所欲豐也若苟豐之是又傷財也周禮曰凡諸侯之交各稱其邦而為之幣以其幣為之禮凡執玉無藉者襲藉才夜反藉謂束帛以藉玉也以此篇考之則聘以圭璋而不用束帛以為藉所謂無藉者也其賔主授受之時皆襲以執之過此則皆裼矣蓋聘玉尊當特達而無藉執聘玉則當加敬而襲其襲與無藉之義初不相通記人特因二者之異於常故合而為言耳執玉之無藉者襲則於其有藉者裼可知乃不言之者裼乃常禮不特於執享玉之時為然故也醴不拜至醴賔而不拜至其辟朝君之禮乎諸侯相朝有儐禮與醴相類醴尊于東箱瓦大一有豐大音泰士冠禮醴尊于房中勺觶角柶脯醢在其北南上此尊于東箱則勺觶籩豆之類亦宜近之薦脯五膱祭半膱橫之祭醴再扱始扱一祭卒再祭膱音職扱初洽反注曰卒謂後扱主人之庭實則主人遂以出賔之士訝受之注曰此謂餘三馬也左馬賔執以出矣繼公謂主人之庭實謂用於醴賔之時者也遂以出者主人之士也賔之士其從者也此文似以庭實主於皮馬而言是醴賔之庭實或皮或馬亦不定也經惟言馬者特見其一耳既覿賔若私獻奉獻將命注曰時有珍異之物或賔奉之所以自序尊敬也猶以君命致之疏曰臣統於君雖是私獻己物亦以君命致之故曰將命繼公謂玉藻曰親在行禮於人稱父此臣有獻於他國之君而稱其君命以將之亦其義也擯者入告出禮辭注曰辭其獻也賔東面坐奠獻再拜稽首注曰獻不入者禮輕繼公謂以君命將之而奠獻於外再拜稽首見其為己物也擯者東面坐取獻舉以入告出禮請受亦東面取者舉奠物之儀然也請受説見本篇賔固辭公答再拜云答則拜非為受也凡尊者與卑者之禮而不得親受者其儀皆然公拜亦於中庭擯者立于閾外以相拜賔辟擯者授宰夫于中庭相息亮反辟音避注曰既乃介覿若兄弟之國則問夫人注曰兄弟謂同姓若昏姻甥舅有親者問猶遺也謂獻也不言獻者變於君也繼公謂此記似謂賔於兄弟之國必有問夫人之禮也經不言賔之私獻上記言私獻而云若則是賔於兄弟之國其主君之獻或有或無不可必也乃謂必有問夫人之禮何與是亦與上記微不相通或曰問猶聘也即經所謂夫人之聘享者也未知是否若君不見見賢遍反注曰君有疾若他故不見使者使大夫受注曰受聘享也大夫上卿也繼公謂大夫亦皮辨襲迎賔于大門外不拜帥賔以入也自下聽命自西階升受負右房而立賔降亦降注曰此儀如還圭然而賔大夫易處耳不醴使大夫代受則醴賔之禮自不可行乃必言之者嫌受其聘享則當醴之也幣之所及皆勞不釋服勞力報反經云卿大夫勞賔而此云幣之所及皆勞則謂大夫時或有勞之者時或有皆不勞之者矣似異於經且以幣不及己之故而不勞賔亦恐非禮意蓋聘君之問卿卿大夫之勞賔皆禮之當然二者初不相關記乃合而言之似失之矣服謂皮辨服不釋服之意亦未詳賜饔唯羮飪筮一尸若昭若穆昭如字注曰羮飪謂飪一牢也肉謂之羹唯是祭其先大禮之盛者也腥餼不祭則士介不祭也繼公謂唯羹飪之文意不具或脫一祭字也云筮一尸者嫌并祭祖禰當異尸也并祭祖禰而唯一尸故若昭若穆者皆可尸云筮則子弟之從行者衆矣僕為祝僕御者也僕為祝者祝不從行故僕攝之傳載祝鮀之言曰嘉好之事君行師從卿行旅從臣無事焉然則君與大夫以嘉好之事出竟祝皆不從亦可見矣祝曰孝孫某孝子某薦嘉禮于皇祖某甫皇考某子祝之又反孝孫孝子稱於祖禰之辭也禮指饔而言即所謂大禮也字祖而諡考亦假設之辭爾凡稱鬼神大夫則舉其諡士則舉其字并祭祖禰盛之也一牢而并祭并祭而一尸皆所以異於常禮如饋食之禮食音嗣饋食者少牢饋食也不云少牢者可知也士虞記云其他如饋食亦不云特牲也是其徵矣此如少牢饋食之禮但如其不賔尸者耳賔於聘日受饔且在他國則此時祭物雖多而禮儀亦不得不略又此用大牢亦與彼禮異者也然則所謂如者蓋大約言之耳假器于大夫必假於大夫者其禮其器與之同也朌肉及廋車朌音班廋所求反注曰朌猶賦也廋廋人也車巾車也二人掌視車馬之官也疏曰此謂祭訖歸胙所及廋人巾車見周禮繼公謂言此明亦有不及者矣朌猶攽也聘日致饔自此至旬而稍記主國行禮於賔之節也明日問大夫所以下於其君亦以聘日未有暇及之也夕夫人歸禮既致饔旬而稍宰夫始歸乘禽日如其饔餼之數稍所敖反注曰乘禽乘行之禽也謂鴈鶩之屬其歸之以雙為數其賔與上介也繼公謂旬日乃稍者以饔餼之物多也上賔饔餼五牢則日五雙上介三牢則日三雙士介一牢則一雙亦降殺以兩與士中日則二雙注曰中猶間也不一日一雙太寡不敬也凡獻執一雙委其餘于面注曰執一雙以將命也面前也其受之也上介受之以入告士舉其餘從之賔不辭拜受于庭上介執之以相拜于門中乃入授人上介受亦如之士介拜受于門外疏曰自上介受之授人約私獻文云上介受亦如之以其受饔餼之時已如賔禮故知此亦如賔也云士介拜受於門外者以其受餼在門外此在門外可知禽羞俶獻比注曰放比也其致之禮如乘禽歸大禮之日既受饔餼請觀訝帥之自下門入歸大禮之日即聘日也是日所行之禮自聘以至於介之私覿凡十餘節以大槩言之亦必至於日幾中而后畢既而又有受饔之事已受饔又以祭其祖禰如饋食之禮由是觀之則日暮人倦可知矣乃復請觀何哉且問卿之公事未舉而私為道觀亦非禮也此記必誤矣各以其爵朝服注曰此句似非其次宜在凡致禮下絶爛在此士無饔無饔者無擯注曰謂歸餼也李寶之曰擯當作儐繼公謂君不致饔於士士不儐君之使皆禮之當然無儐不為無饔也大夫不敢辭君初為之辭矣為于偽反此上蓋有闕文凡致禮皆用其饗之加籩豆注曰凡致禮謂君不親饗賔及上介以酬幣致其禮也其其賔與上介也饗禮今亡繼公謂春秋傳晉侯享季武子有加籩武子辭韓宣子曰寡君以為歡也是籩豆之加與否已定於未饗之先若不親饗而歸之嫌加者不致故云然或曰禮上當有饗字無饔者無饗禮注曰士介無饗禮繼公謂此與所謂無饔者無儐之意同凡餼大夫黍粱稷筐五斛凡凡賔上介及士介也經云大夫餼賔上介米八筐士介米六筐而此云黍粱稷則是皆不用稻矣八筐者二黍二粱四稷也六筐者二黍二粱二稷也其器既異於君器又多寡相懸且不敢與君同用四種皆所以逺下之凡降殺之例自下者始此八筐者乃不去稷而去稻者以當多者不宜去而當少者不宜多也是或一義耳若六筐者則因賔介之禮而但減其多者之數以别之無他義也君器多而小大夫器寡而大亦隆殺之宜既將公事賔請歸注曰謂已問大夫事畢即請歸也主國留之饗食燕獻無日數盡殷勤也繼公謂不欲久溷主國也凡賔拜于朝訝聽之注曰拜拜賜也繼公謂訝聽之異於己臣也燕則上介為賔賔為苟敬饗食之禮君親為主故以賔為賔尊賔也君與臣燕則宰夫為獻主故不以賔為賔而以為苟敬亦尊賔也此苟敬之位在阼階西北面餘並見燕禮記云宰夫獻注曰為主人代公獻繼公謂燕禮輕故君與臣燕則不親為主而使宰夫獻所以明君臣之義也此與他國之臣燕亦用此禮者所以别於其君也無行則重賄反幣注曰無行謂獨來復無所之也繼公謂於反幣之外又重賄之答其特來之厚意也即贈幣也贈幣為報其私覿故云反必言反幣者嫌重賄則不必贈也春秋傳吳公子札聘于諸國是為有行曰子以君命在寡君寡君拜君命之辱注曰此贊君拜聘享辭也在存也君以社稷故在寡小君拜注曰其卒亦曰寡君拜命之辱又拜送注曰拜送賔也其辭蓋云子將有行寡君敢拜送君貺寡君延及二三老拜注曰闕賔于館堂楹間釋四皮束帛賔不致主人不拜注曰賔將遂去是館留禮以禮主人所以謝之也繼公謂必釋於此者明為館故也皮亦在堂禮之變也不致不拜者賔主各有當為主人之嫌難乎其為授受也不用錦而帛不授受無嫌於君禮大夫來使無罪饗之使所吏反無罪謂無失誤也饗之親饗之也聘義曰使者聘而誤主君弗親饗食所以愧厲之也主國君於賔有饗食燕之禮但言饗者舉其盛者言之也云來使者與下文所謂過者相對立文也過則餼之謂假道而過者則餼之也過即經所謂過邦餼即經所謂餼之以其禮復記於此者蒙無罪之文也若有不假道與不禁侵掠之類是其罪矣其介為介此上當言饗賔之禮乃及此耳其亦有闕文與饗賔君為主人故以賔為賔而上介為介若饗上介則上介為賔而無介小聘使下大夫其饗禮亦如之蓋士介賤不可以與主君為禮故也有大客後至則先客不饗食致之食音嗣主人待客隆殺之宜也大客謂朝君唯大聘有几筵經於小聘云不几筵其文已明十斗曰斛十六斗曰籔十籔曰秉注曰今江淮之間量各有為籔者今文籔為逾繼公謂籔與庾同量今文籔作逾疑庾逾通二百四十斗注曰謂一車之米秉有五籔四秉曰筥注曰此秉謂刈禾盈手之秉也筥穧名也若今萊易之間刈稻聚把有名為筥者詩云彼有遺秉又云此有不斂穧十筥曰棕十棕曰秅四百秉為一秅棕音揔儀禮集説卷八下正誤至于階三讓大夫先升一等鄭本去三字注曰古文曰三讓繼公謂宜從古文至于階三讓賔升一等鄭本亦去三字注曰古文曰三讓繼公謂宜從古文庭實入設鄭本無入字注曰古文曰入設繼公謂此庭實云入設方見庭實既出而復入之意若無入字則文不明白矣宜從古文醴不拜至鄭本作禮注曰今文禮為醴繼公謂宜從今文不醴鄭本作禮注曰今文禮作醴繼公謂宜從今文對曰非禮也敢舊本敢下有辭字案注云二者皆卒曰敢是無此辭字明矣本有者蓋傳寫者因注上之辭字而設衍之也今以注為據刪之儀禮集説卷八下
