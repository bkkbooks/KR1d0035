body:
  text: 儀禮集説卷六元敖繼公撰燕禮第六注曰諸侯與羣臣燕飲之禮也於五禮屬嘉禮燕禮小臣戒與者與音預小臣於天子太僕之屬也與者羣臣之與此燕者也君所主與之燕者亦存焉其戒之節於朝於家則未聞膳宰具官饌于寢東注曰膳宰天子曰膳夫掌君飲食膳羞者也寢路寢繼公謂具官饌謂具諸官所當饌之物也寢東蓋其東壁之東也此時所具者其薦羞乎及既設賓席官乃改饌之大射云官饌是也樂人縣縣音玄此縣蓋在階間磬在阼階西南面鐘鑮次而西建鼓在西階東南鼓鼙在其東國君燕禮輕於大射故不備樂且於其日乃縣之而與常時同鄉飲酒記曰磬階間縮霤北面鼓之設洗篚于阼階東南當東霤罍水在東篚在洗西南肆設膳篚在其北西面罍音雷注曰當東霤者人君為殿屋也亦南北以堂深君物曰膳膳之言善也或言南肆或言西面異其文也疏曰漢時殿屋四鄉流水故舉漢以况周繼公謂洗與罍蓋瓦為之下云君尊瓦大則此可知矣先設洗西之篚以為節故膳篚後設也設四器亦司宫也見大射與少牢禮此經省文耳膳篚者實君之象觚象觶者也君物而曰膳者以其善於諸臣所用者而言也下文類此者皆以是推之司宫尊于東楹之西兩方壺左玄酒南上公尊瓦大兩有豐幂用綌若錫在尊南南上尊士旅食于門西兩圜壺大音泰幂眉狄反注曰豐以承尊也説者以為若井鹿盧其為字從豆􅞱聲近似豆大而卑矣幂用綌若錫冬夏異也在尊南在方壺之南也尊士旅食者用圜壺變於方也旅衆也士衆食謂未得正祿所謂庶人在官者也賤無玄酒疏曰庶人在官者謂府史胥徒朱子曰在尊南者謂瓦大在方壺之南耳繼公謂先尊方壺於楹西以為節乃設公尊與上文後設膳篚之意同臣尊用壺又以方者且無幂為與君尊相屬冝逺别之也左玄酒據設尊者而言也蓋凡設尊者皆面其鼻玉藻曰惟君面尊是尊鼻東向也此設尊者西面故玄酒在南而為左若以尊言之則為右矣瓦大瓦甒也用瓦甒者多矣惟君尊則或謂之大豈制或異與尊皆南上者統於君位也君位亦南上故順之此尊乃不統於賓者君臣之禮異也大射儀放此錫者麻十五升去其半而加灰之布也幂或以綌亦見其貶於大射耳大射之幂用錫若絺此尊士旅食之尊亦當北面與大射同惟設之深淺異耳方圜壺亦皆瓦為之旅食未詳且從注疏司宫筵賔于戶西東上無加席也注曰賔席用蒲筵緇布純繼公謂大夫為賔乃無加席者以燕禮輕也設賔席當後於公席乃先言之者終言司宫之事耳案注知此賔席蒲筵緇布純者以公食大夫及鄉飲射記定之也右具設器饌射人告具注曰告事具於君疏曰大射告具之上有羮定此不言者文不具也繼公謂是時公蓋在阼階東南南鄉射人北面告之小臣設公席于阼階上西鄉設加席公升即位于席西鄉鄉並許亮反下同注曰周禮諸侯酢席莞筵紛純加繅席畫純疏曰周禮司几筵之文也彼諸侯祭祀受酢之席此燕飲之席與彼同繼公謂加席别言設見其更取而設之也亦可見設加席之法矣羣臣未入公先升即位尊者之禮也小臣納卿大夫卿大夫皆入門右北面東上士立于西方東面北上祝史立于門東北面東上小臣師一人在東堂下南面士旅食者立于門西東上注曰小臣師小臣正之佐也疏曰此卿大夫之位皆是擬君揖位故下經君爾之始就庭位也繼公謂納卿大夫之辭蓋曰君須矣二三子其入也卿大夫入門右之位蓋近庭南而當階士西方之位亦冝於庭少南而東西則當西序門東之位近於門也門西亦如之此北面者東上東面西面者北上皆統於君凡已之臣子入門而左右皆由闑東公降立于阼階之東南南鄉爾卿卿西面北上爾大夫大夫皆少進注曰爾近也揖而近之也大夫猶北面少前繼公謂古文爾邇通爾揖之使進而近於已也公俟其入乃降而揖之明降尊之義也大夫不西面自别於卿也君於卿與大夫各旅揖之大射儀小臣師詔揖諸公卿大夫右即位射人請賔注曰射人為擯者繼公謂請於君謂使誰為賔也公曰命某為賔注曰某大夫名也射人命賔賔少進禮辭注曰禮辭辭不敏也繼公謂命賔者南面鄉之其辭蓋曰君命子為賔少進者宜違其位案注云辭不敏者以士冠之賔辭曰某也不敏故意此賔亦然反命注曰射人以賔之辭告於君又命之賔再拜稽首許諾公不許其辭故射人復命之賔再拜稽首為受君命也射人反命注曰告賔許賔出立于門外東面注曰當更以賔禮入繼公謂大射儀云北面此東字蓋誤也公揖卿大夫乃升就席揖之乃升禮之也亦異揖之小臣自阼階下北面請執幂者與羞膳者注曰執幂者執瓦大之幂也方圜壺無幂羞膳羞於公繼公謂士之掌此二事者有常職乃請之者蓋白之於君然後敢命之也膳亦謂君物此雖指羞而言然薦亦存焉乃命執幂者執幂者升自西階立于尊南北面東上注曰以公命於西階前命之也東上玄酒之幂為上也羞膳者升自北階房中西面南上不言之者不升堂略之也疏曰下記云羞膳者與執幂者皆士也士位在西方東面故知西階前命之也云不升堂者但不從南方升也升自北階是亦升堂也繼公謂立於尊南上者當尊與膳宰請羞于諸公卿者注曰膳宰請者異於君也右命賔及執事者射人納賔賔入及庭公降一等揖之公升就席納賔之辭蓋曰君須矣吾子其入也及庭既入門而左沒霤時也一等者階也并堂為二等矣揖之使之升也大射儀云賔辟右賔入賔升自西階主人亦升自西階賔右北面至再拜賔答再拜注曰主人宰夫也宰夫太宰之屬天子膳夫為獻主疏曰知主人是宰夫者燕義云使宰夫為獻主是也繼公謂諸侯之宰夫蓋以士為之其位亦在西方故賔進則主人因從而升也君與臣燕乃使宰夫為主人者固所以明君臣之義然亦以當獻者衆尊者不能親其勞也至再拜者於賔始至而拜之所謂拜至也其義見士昏禮右拜至主人降洗洗南西北面注曰賔將從降鄉之不於北辟正主賔降階西東面主人辭降賔對階西東面東西亦當序此賔降而主人於洗南辭之則其降之節亦可見矣賔對亦少進既則復位主人北面盥坐取觚洗賔少進辭洗主人坐奠觚于篚興對賔反位觚音孤注曰獻不以爵辟正主也疏曰正主鄉飲鄉射之主人也繼公謂獻公用象觚則此觚乃角觚也下放此賔少進者少南行而東面也主人興對亦西北面主人卒洗賔揖乃升賔每先升者以宰夫是士且非正主也主人升賔拜洗主人賔右奠觚答拜降盥賔降主人辭賔對降辭之位皆如初可知卒盥賔揖升主人升坐取觚執幂者舉幂主人酌膳執幂者反幂賔者君之所命者也故主人代君飲之則酌君尊蓋達君之意也酌膳東面餘皆放此舉幂以下之儀詳見後篇主人筵前獻賔賔西階上拜筵前受爵反位主人賔右拜送爵膳宰薦脯醢賔升筵膳宰設折俎獻賔蓋亦西北面與鄉飲酒同故不著之賔坐左執爵右祭脯醢奠爵于薦右興取肺坐絶祭嚌之興加于俎坐挩手執爵遂祭酒興席末坐啐酒降席坐奠爵拜告旨執爵興主人答拜挩舒鋭反此賔乃大夫也亦絶肺以祭而下文又云公祭如賔禮則是自上至下此禮同也舊説謂大夫以上繚祭惟士絶祭其不考諸此乎於此乃言爵者上文已明不嫌其異故隨文便耳下文放此凡觚觶角散亦通稱爵酒非主人之物賔乃告旨者以其為獻主也賔西階上北面坐卒爵興坐奠爵遂拜主人答拜執爵興主人乃答拜凡答拜皆於所答者興乃為之經或不言其興文省爾右主人獻賔賔以虛爵降主人降賔洗南坐奠觚少進辭降主人東面對注曰大射禮曰主人西階西東面少進對繼公謂奠觚亦奠于地也坐奠觚興少進皆西北面主人降立于階西固東面矣乃言東面對者嫌進而對或易鄉也賔坐取觚奠于篚下盥洗此言奠于篚下則嚮者少南奠之矣主人辭洗辭亦宜少進如賔也於賔既對則反位賔坐奠觚于篚興對卒洗及階揖升主人升拜洗如賔禮及階乃揖以已當先升也賔揖主人乃離其位然則賔於主人卒洗之時固不待其及階而揖升矣如賔禮謂迭拜賔降盥主人降賔辭降卒盥揖升酌膳執幂如初酌膳者主人酌此獻賔故賔酢亦如之亦以其代君飲已尊之也執幂執幂者舉反之節也以酢主人于西階上主人北面拜受爵賔主人之左拜送爵賔酢主人蓋亦西南面授之乃之左賔親酢者伸其尊亦以君不親酢故無所辟也主人坐祭不啐酒注曰辟正主也不拜酒不告旨拜酒謂拜謝其以旨酒飲已也酒非賔物則無是二禮可知乃著之者嫌亦當如賔於主人之儀也遂卒爵興坐奠爵拜執爵興賔答拜主人不崇酒以虛爵降奠于篚不崇酒者無崇酒之拜也酒非已物故是禮亦不可得而行賔降立于西階西已之獻酢禮畢而主人又將與君為禮故不敢居堂射人升賔賔升立于序內東面注曰大射禮曰擯者以命升賔繼公謂升賔者優之也序內東面鄉君也然則君位亦在東序內明矣右賔酢主人主人盥洗象觚升實之注曰象觚觚有象骨飾也取象觚者東面繼公謂亦酌膳執幂如初不言者可知也案注云象骨恐當作象齒東北面獻于公酒乃君物主人進之於君而曰獻者以主人為獻主故也公在席而東北面獻之亦因獻賔之儀而為之也經言獻酳在席者多矣獨此與大射見獻公之儀若是則其他之獻酳者皆正鄉其席與公拜受爵疏曰凡此篇內舉旅行酬公應先拜者皆受酬者先拜公乃答拜尊公故也此公先拜受爵者獻禮重故也主人降自西階阼階下北面拜送爵拜於下者臣也此惟一拜而已蓋答公拜也一拜則不稽首答公拜而不稽首亦獻禮然也其他則否凡臣先拜其君皆再拜稽首士薦脯醢膳宰設折俎升自西階注曰大射禮曰宰胥薦脯醢由左房繼公謂升自西階者俎也著之者嫌設公俎冝由阼也此公俎似當用肩賔俎用臂與鄉飲酒賔主之俎異膳宰既設俎則少退東面而俟既贊授肺乃降公祭如賔禮祭謂祭薦祭肺祭酒也其異者於下見之膳宰贊授肺不拜酒立卒爵坐奠爵拜執爵興贊授肺者以授肺而贊之也君尊不興取肺未祭則授之既祭則受之惟言授但見其一耳不拜酒者以其為已物也不拜酒則亦不啐酒凡男子之坐卒爵者奠爵乃拜婦人之尊者立卒爵而執爵拜此立卒爵而奠爵拜其君禮與公於其臣乃先拜既者亦獻禮重也主人答拜升受爵以降奠于膳篚云奠于膳篚見嚮者取之亦在此也右主人獻公更爵洗升酌膳酒以降酢于阼階下北面坐奠爵再拜稽首公答再拜注曰更易也楊志仁曰君尊不酢其臣主人自酢成公意也雖更爵亦酌君之膳酒者明酢之之意出於君也繼公謂更爵者改取南篚之觚蓋不敢用君器也上下文酌膳皆無酒字此有者衍也主人坐祭遂卒爵再拜稽首公答再拜主人奠爵于篚亦興坐奠爵乃再拜稽首執爵興右主人自酢主人盥洗升騰觚于賔酌散思但反下並同注曰散者方壺酒也於膳為散繼公謂洗洗角觶也自飲而盥洗象賔之飲已也下文類此者其義皆然主人因在下遂盥洗故賔不降亦異於正主者也騰猶揚也觚當作觶此酬賔也乃云騰觶者以主人於賔為降等故爾云騰觶于賔者題其事耳騰者亦取其自下而上之意酌散者以其將自飲凡卑者之酌酬酒其於臣禮則曰舉觶於君禮則曰騰觶云西階上坐奠爵拜賔降筵北面答拜疏曰賔立于序內以來未有升筵之事或言降筵者蓋誤繼公謂大射儀曰賔西階上北面答拜主人坐祭遂飲賔辭卒爵拜賔答拜賔見主人將飲故辭之蓋欲即受此觶不敢復煩主人之更酌已且逺辟騰爵于公之禮也騰爵于公者亦皆先自飲乃更酌之云卒爵拜省文也大射禮曰卒爵興坐奠爵拜執爵興主人降洗賔降主人辭降賔辭洗卒洗揖升此皆如獻禮也不拜洗主人酌膳賔西階上拜拜為將受之是時主人已在筵前北面受爵于筵前反位主人拜送爵主人酬賔不奠乃授之者亦與士禮異者也主人拜亦於賔右少牢下萹酬尸酬賔亦皆親授觶賔升席坐祭酒遂奠于薦東賔升席祭酒尊君物也遂奠之由便主人降復位位西方東面也此時未有洗北西面位至既獻大夫而薦乃有之賔降筵西東南面立李微之曰東南面立鄉君也繼公謂降降筵也曩者賔降于階下而君命升之故此時惟降筵而已恐褻禮而重煩君命也不立于序內者升降異處以相變為敬右主人酬賔小臣自阼階下請騰爵者公命長長知丈反此騰爵以為旅酬始也長謂下大夫之長也此但云命長不言下大夫者其以下大夫騰觶有常職故與小臣作下大夫二人騰爵注曰作使也卿為上大夫不使之者為其尊繼公謂以公命作之也二人所謂長也大夫在入門左之位北面則小臣作之者其亦南面與騰爵者阼階下皆北面再拜稽首公答再拜注曰再拜稽首拜君命也繼公謂北面亦東上騰爵者立于洗南西面北上序進盥洗角觶升自西階序進酌散交于楹北降阼階下皆奠觶再拜稽首執觶興公答再拜注曰序次第也先者既酌而反與後酌者交於西楹北俟於西階上乃降繼公謂序進之節先者既洗後者乃進也先者既洗即升立于西階上以俟後洗者也酌散更言序進明其復發於西階上也交于楹北交相右也凡經文惟言交者皆謂相右也階上之位退者在東進者在西以相右為便降時亦先者降三等後者乃降蓋同階而同時俱降之法然爾騰爵者皆坐祭遂卒觶興坐奠觶再拜稽首執觶興公答再拜騰爵者執觶待于洗南注曰待君命也繼公謂洗南西面嚮者之位小臣請致者注曰請使一人與二人與繼公謂嚮者公但命長不定言二人故小臣至是復請致者之數致如致爵之致酒君物也以進於君故謂之致若君命皆致則序進奠觶于篚阼階下皆再拜稽首公答再拜皆皆二人也言若者不定之辭下文云若命長致與此互見也亦小臣命之乃序進騰爵者洗象觶升實之序進坐奠于薦南北上降阼階下皆再拜稽首送觶公答再拜注曰序進往來由尊北大射儀曰騰爵者皆退反位繼公謂實之乃云序進見其既酌而並立于尊所乃行也奠于薦南其辟公酬時奠觶之處與云序進而不言其所交之處是東至楹北而無以為節故也此進退皆不相待于西階上蓋急於為君酌與拜送也右下大夫騰觶于公公坐取大夫所騰觶興以酬賔賔降西階下再拜稽首公命小臣辭賔升成拜注曰升成拜復再拜稽首也先時君辭之於禮若未成然繼公謂嚮者君與賔各受主人之獻其情意猶未接至是公乃酬賔而與之為禮也興以酬賔謂興立于席舉觶鄉賔而酬之也酬賔亦不下席君尊也西階下再拜稽首雖為賔不敢不盡臣禮也辭者不受其拜下之禮賔之也賔升成拜順君賔已之意也公坐奠觶答再拜執觶興立卒觶賔下拜小臣辭賔升再拜稽首下戶嫁反奠觶蓋奠于薦右也下拜者降而拜也其或一拜或再拜稽首不定也言降拜者亦然小臣辭亦公命之經不盡見之也賔未卒拜而小臣辭之亦異於初也此不言成拜者未卒拜於下無所成也下文放此賔受公酬而每先拜蓋君臣飲燕之禮然禮旅酬不拜既公坐奠觶答再拜執觶興賔進受虛爵降奠于篚易觶洗賔受虛爵於君席之前故云進必就而受之者臣事君之禮也受時蓋東面於薦北篚謂膳篚易觶謂更取角觶也或言更或言易互文耳公有命則不易不洗命謂使之仍用象觶也賔則不易之不敢違君意也不洗者嫌也承尊者後而復洗之則嫌若不以為潔然反升酌膳觶觶字衍文大射儀無之酌膳者以為公所酬亦達其意也雖易觶猶酌膳下拜小臣辭賔升再拜稽首公答再拜下戶嫁反注曰於是賔請旅侍臣疏曰云於是賔請旅侍臣者見下記與大射禮繼公謂亦奠爵乃再拜稽首執爵興不言者文省也後放此賔以旅酬于西階上疏曰此自旅酬之事下云射人作大夫長以下乃言其法射人作大夫長升受旅長知丈反長如若長之長大夫長謂上卿若諸公也此惟據受賔酬者而言若有諸公則先酬之賔大夫之右坐奠觶拜執觶興大夫答拜惟云大夫者諸公與卿亦大夫耳大夫未獻乃先受旅者此酬禮不主於已故無嫌賔坐祭立飲卒觶不拜賔獨祭酬酒者以此酒為公所酬異之也若膳觶也則降更觶洗升實散大夫拜受賔拜送公優所酬者或使得用象觶而不可以及乎其他是以更用角觶旅酬而洗者亦為更觶以新之也餘則不洗賔既拜送則就席大夫辨受酬如受賔酬之禮辨音遍下並同如射人作升受旅以下之儀也不祭疏曰不祭者酬禮殺繼公謂此見其異者也酬酒不祭乃其正禮賔之祭者有為為之耳卒受者以虛觶降奠于篚注曰卒猶後也大射禮曰奠于篚復位繼公謂卒受者下大夫之末者也無所酬獨飲于西階上不言復位文省下放此右公為賔舉旅主人洗升實散獻卿于西階上實散降於賔也凡獻于西階上皆西南面司宫兼卷重席設于賔左東上注曰席蒲筵緇布純也席卿東上統於君也席自房來繼公謂兼卷謂以兩席相重而并卷之也其卷亦自末執時兼卷是設時亦兼布之矣此固異於設加席之法亦以其二席之長短同故得由便為之爾東上者席也其位亦如之每獻一人則設席卿升拜受觚主人拜送觚拜送不言卿右可知也下放此卿辭重席司宫徹之徹直列反注曰重席雖非加猶為其重纍去之辟君也繼公謂徹去上席也卿以重席為辭故去其上席為卿設重席正禮也必辭之者去君差近冝辟之乃薦脯醢卿升席坐左執爵右祭脯醢遂祭酒不啐酒降席西階上北面坐卒爵興坐奠爵拜執爵興主人答拜受爵卿降復位不啐酒則不拜酒不告旨可知此亦降於賔者也無俎者燕禮輕於大射故卿逺下賔也卿升降席皆自西方辨獻卿主人以虛爵降奠于篚辨獻卿如實散以下之儀惟不洗耳主人既奠爵復位于西方射人乃升卿卿皆升就席卿既獻乃升就席亦見其降於賔也若有諸公則先卿獻之如獻卿之禮先悉薦反此禮通五等侯國言之故於諸公云若有蓋上公之國乃有四命之孤侯伯以下則無之也先卿獻之謂先獻公乃獻卿亦既獻則升就席不與卿序升也席于阼階西北面東上無加席席之於此以其尊於卿而不與之序也阼階之西於君席為西南直其左也諸公在君之左卿在君之右蓋以左為尊也東上者亦統於君也無加席者以太近於君故設時即不敢與之同而不待其辭也上為卿設重席而已而於公乃云無加席者明其尊於卿若或於君所而用兩席焉則當有加席而非重也禮加席尊於重席右主人獻諸公卿小臣又請騰爵者二大夫騰爵如初上經云皆致是猶有一奠觶未舉也小臣又請之者此騰觶之節耳蓋嚮者公命皆致今猶有一奠觶若惟命長致則奠觶無矣故於是時不以奠觶之有無皆當騰爵蓋以為節也初執觶待于洗南以上之儀請致者若命長致則騰爵者奠觶于篚長知丈反下並同注曰命長致者使長者一人致也繼公謂長二人中之尊者命長致云若則或有命皆致者矣蓋説屨升坐以前君凡三行酬則大夫所致者當有三爵然大夫致爵之節惟止於再故公之命致爵者或前多則後寡或前竒則後偶皆互為進退以取足於三觶之數使之無過與不及耳此經之所明言者乃前多後寡者也其所不見者則皆言若以包之若然則此時之當致者蓋有定數而小臣猶請之者當由君命而不敢自専也一人待于洗南注曰不致者長致致者阼階下再拜稽首公答再拜洗象觶升實之坐奠于薦南降與立于洗南者二人皆再拜稽首送觶公答再拜注曰奠于薦南者於公所用酬賔觶之處繼公謂不致者亦拜以始者並受君命冝終之也亦拜于阼階下右下大夫再騰觶于公公又行一爵若賔若長唯公所酬以旅于西階上如初疏曰初為賓舉旅之禮繼公謂先若二人致則此一爵乃先致者之下觶先若一人致則此乃後致者之上觶也長公若卿之尊者也至是云若長者公卿已在堂故君得酬之君酬之是亦賔之也故其為禮與正賔同此酬主於公若卿乃或又酬賔者容遂尊者之所欲耳公卿既受獻君乃為之舉酬禮之序也下於大夫之禮亦然旅者賔則以酬長長則以酬賔在堂者酬訖大夫乃升受旅以辨大夫卒受者以虛觶降奠于篚言大夫卒受以見士不與也右公為諸公卿舉旅主人洗升獻大夫于西階上不言酌散者可知也後皆放此大夫中下大夫也中大夫即小卿大夫升拜受觚主人拜送觚拜位亦如獻賔大夫坐祭立卒爵不拜既爵主人受爵大夫降復位獻而不拜既爵亦差卑也胥薦主人于洗北西面脯醢無脀脀之丞反注曰脀俎實繼公謂宰夫士也先大夫薦之者以其為主人異之也不於賔酢而薦之者以其爵本賤也宰夫之位本在西方亦以其為主人故至是而薦之于洗北因使之易位焉其意與卿大夫士既獻而易位者同洗北於正主阼階東之位為近主人居之亦宜也薦西面主人在其東也無脀者賤也自卿已下已無脀矣乃於主人見之者嫌其與賓行禮或當有之胥亦宰胥也辨獻大夫遂薦之繼賔以西東上辨獻乃布席布席然後薦是皆變於卿者也繼賔以西東上言其薦之次也其席亦如之主人辨獻大夫則降奠爵于篚而立於洗北之位下禮放此卒射人乃升大夫大夫皆升就席卒謂薦畢也言此者為下節也後類此而不見者以意求之右主人獻大夫席工于西階上少東樂正先升北面立于其西小臣納工工四人二瑟小臣左何瑟面鼓執越內弦右手相入升自西階北面東上坐小臣坐授瑟乃降何户我反相息亮反樂正先升亦變於射禮也北面立于其西亦與大射儀樂正立于西階東之文互見也君與臣燕其禮輕故工但用四人而已面鼓亦變於射也乃降謂相者四人俱降也此諸侯之小臣乃多於周官所言天子小臣之數亦其異者也序官云小臣上士四人工歌鹿鳴四牡皇皇者華華音花春秋傳曰文王大明綿兩君相見之樂是諸侯之樂自大雅而下皆得用之此君與臣燕其禮輕故但自小雅而下而先歌此三篇也其意與鄉飲酒息司正而用鄉樂之意同卒歌主人洗升獻工此不辨工之為大師與否皆為之洗以其取觚于洗西之篚宜因而洗之也下洗獻笙其義亦然鄉飲酒鄉射非獻大師則不洗者以其取爵于上篚故不特為賤者降也工不興左瑟一人拜受爵主人西階上拜送爵薦脯醢使人相祭卒爵不拜主人受爵衆工不拜受爵坐祭遂卒爵辨有脯醢不祭主人受爵降奠于篚工之長云不興此云坐祭遂卒爵文互見也右工歌公又舉奠觶唯公所賜以旅于西階上如初賜與酬其禮同特經之立文異耳言唯公所賜則是觶或及于大夫矣以此節為大夫舉旅故也卒卒旅畢也右公為大夫舉旅笙入立于縣中奏南陔白華華黍縣音玄白華音花注曰縣中縣中央也鄉飲酒禮曰磬南北面繼公謂此云縣中蓋與鄉飲酒磬南北面之文互見也磬南而云縣中者縣主於磬也主人洗升獻笙于西階上一人拜盡階不升堂受爵降主人拜送爵階前坐祭立卒爵不拜既爵升授主人末句之下當有爵字如鄉飲酒鄉射禮之所云此文脫耳衆笙不拜受爵降坐祭立卒爵辨有脯醢不祭乃間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀遂歌鄉樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋間古莧反麗力馳反卷九轉反召上照反此云歌故曰鄉樂文順也大師告于樂正曰正歌備樂正由楹內東楹之東告于公乃降復位由楹內堂上東行者之節也必著之者以其立于堂廉嫌或由便而自楹外過也告于公亦北面不告賔者臣統於君與鄉禮異也云復位則是反其初位矣初位未詳其處鄉飲酒注云樂正降立西階東北面右笙間合射人自阼階下請立司正公許射人遂為司正射人以君三舉觶正禮已備慮在堂者或有不安之心故請立司正以安之公許而射人即自為司正不待君命之者以其有常職故也司正洗角觶南面坐奠于中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安中庭亦南北之中蓋阼階前也司正不位於階間者以燕亦有時而射宜辟之也洗角觶為將酌也奠之乃升受命者君命尊不敢執觶由便以受之也受命亦北面以我安云者若曰以我為司正所以安汝也蓋逹君之意而自為之辭大射儀曰命賔諸公卿大夫此不言賔諸公者文省耳下文放此敢不者奉命之辭司正降自西階南面坐取觶升酌散降南面坐奠觶右還北面少立坐取觶興坐不祭卒觶奠之興再拜稽首左還南面坐取觶洗南面反奠于其所還並音旋注曰坐奠觶於中庭故處繼公謂南面坐奠觶以嚮者南面取之故也或其節當然與卒觶北面奠意亦如此將於觶南北面則右還於觶北南面則左還皆欲從觶東往來也必從觶東者變於在堂者升席降席之儀而由上也司正之位東上少立者定其位也再拜稽首謝君惠也酒君物也右立司正安諸臣升自西階東楹之東請徹俎降公許徹直列反下同此降乃衍文大射儀無之嚮者司正受命安賔諸公卿大夫賔奉命而不敢辭以俎今司正請徹之所以達其意告于賔賔北面取俎以出膳宰徹公俎降自阼階以東告于賔亦西階上北面告之既則降燕賔乃執俎而出者臣也出授從者膳宰徹公俎降自阼階者為其已為君物也卿大夫皆降東面北上疏曰東面北上西階下位也右徹俎賔反入及卿大夫皆説屨升就席公以賔及卿大夫皆坐乃安説吐活反疏曰少儀云排闔説屨於戶內者一人而已彼據尊者坐在室則説屨於戶內今此燕在堂上則君尊説屨於堂上席側可知繼公謂賔入少立於卿之北司正升賔賔乃及卿大夫説屨而升也云公以賔及卿大夫皆坐則是自此以前雖公於無事時亦立也乃安謂賔及卿大夫之心至是乃安也自此以後有升降而行禮者皆跣也至醉而退乃屨羞庶羞注曰羞進也庶衆也庶羞衆珍味可進者也所進衆羞謂狗胾醢疏曰此及大射其牲皆用狗故知有此狗胾也繼公謂亦先賔乃及公而後及其餘未獻士而羞此則是不及於在下者矣大夫祭薦獻時不得祭薦故至是乃為之必祭之者宜終此禮然後可以食庶羞也司正升受命皆命君曰無不醉賔及卿大夫皆興對曰諾敢不醉皆反坐注曰皆命者命賔命卿大夫也起對必降席繼公謂惟云受命皆命又不著其所如上文可知既對則司正降而復位右説屨升坐主人洗升獻士于西階上士長升拜受觚主人拜送觚士坐祭立飲不拜既爵其他不拜坐祭立飲長知丈反注曰他謂衆士也亦升受爵不拜繼公謂不言主人受爵及士降又其他不拜之下不言受爵皆以其可知也乃薦司正與射人一人司士一人執幂二人立于觶南東上注曰天子射人司士皆下大夫二人諸侯則上士其人數亦如之司正為上疏曰此等皆士而先薦者皆有事故也司士掌羣士爵祿廢置之事為士中之尊故也云司正為上者以其為庭長故也繼公謂此皆士也獻與士序每獻則薦之薦不與士序者亦異之也司士之位正當觶南射人而下以次而西執幂者既薦則復立于尊南辨獻士士既獻者立于東方西面北上乃薦士注曰每已獻而即位于東方蓋尊之畢獻薦于其位繼公謂士既獻立于東方與大夫辨獻而位于上者意微相類東方稍近於君故既獻而立於此所以尊之此易位當亦有命之者非必士之自往祝史小臣師亦就其位而薦之注曰亦者亦士也次士獻之辨獻乃薦也不變位位自在東方疏曰上設位時祝史在門東小臣在東堂下繼公謂此見其既獻而不變位耳其獻則當與士序主人就旅食之尊而獻之旅食不拜受爵坐祭立飲注曰亦畢獻乃薦之主人執虛爵奠于篚復位繼公謂此尊北面則南鄉酌之也獻之於尊南亦西南面既授則西面不洗者因獻士之爵而遂用之不復别取於篚也凡取爵於下篚雖所為酌者賤亦必為之洗旅食者與士異尊矣乃繼士獻之而遂因士爵且不殊其長皆略賤也右主人獻士若射則大射正為司射如鄉射之禮注曰大射正射人之長者也如者如其告弓矢既具至退中與算也納射器而張侯其告請先於君乃以命賓及卿大夫其為司正者亦為司馬君與賔為耦鄉射記自君射至龍旜亦其異者也薦旅食乃射者是燕射主於飲酒繼公謂此大射正即上經所謂射人一人者也此記及鄉射記言君燕射之儀與大射儀略同乃云如鄉射之禮者以其惟一侯侯道五十弓而射器皆在堂西也如是則自君射之外凡他禮皆與鄉射大同小異而於大射則或有不可以相通者此所以惟蒙鄉射禮也先徹階間之縣遷于東方乃張麋侯納射器其再射即用樂行之亦其異者案注云納射器而張侯其為司正者亦為司馬君與賔為耦言其與鄉射同者也云其告請先於君乃以命賔及卿大夫言其與鄉射異者也又云鄉射記自君射至龍旜亦其異者也詳其意蓋謂國中若郊若竟君皆得而燕射如鄉射之禮惟旌與中則異於鄉射者也此意與彼記之注不同疑此為得之但其前以鄉射禮為據謂此亦納射器乃張侯似未為當鄉射於納射器之後云命張侯者謂繫左下綱耳非謂始張侯也恐不必以之為據此禮則當先徹階前之縣遷於東方乃始張麋侯赤質并繫左下綱其侯道亦惟五十弓而已既張侯乃納射器其節蓋與鄉射不得不異鄭氏於此蓋偶考之不詳耳右燕射賔降洗升騰觚于公觚當之豉反注曰賔受公賜多矣禮將終宜勸公也酬之禮皆用觶此言觚者字之誤也古者觶字或作角旁氏由此誤爾繼公謂騰觶于公乃下大夫之事而賔於是時為之者不敢以賔自處恭敬之至也酌散下拜下戶嫁反執觶以下如下大夫騰觶者之為但拜于西階下異耳公降一等小臣辭賔升再拜稽首公答再拜公觶一等禮之也至是乃降一等者重其騰觶之禮也賔從命則公升矣賔坐祭卒爵再拜稽首公答再拜此拜不下者拜受拜既本同一節不敢再煩君命也賔降洗象觶升酌膳坐奠于薦南賔降奠角觶于篚乃洗象觶降拜小臣辭賔升成拜公答再拜賔反位注曰反位反席也繼公謂此降拜已再拜稽首故下云成拜右賔騰觶于公公坐取賔所騰觶興唯公所賜此酬主於士而所賜則不及之以其賤而在下也受者如初受酬之禮初受酬者賔也降更爵洗嚮者三舉觶其末皆云如初此乃别云更爵洗蓋先時公或命之勿易觶此則全不命之亦以禮殺也升酌膳下拜小臣辭升成拜公答拜下戶嫁反此經文略蓋以上已有成禮也乃就席坐行之注曰坐行之若今坐相勸酒繼公謂賔公卿大夫立而旅酬者屢矣故於是可以略而坐行之亦以此酬主於士故也有執爵者注曰士有盥升主酌授之者繼公謂坐而行酒故須有執爵者代酌授之唯受于公者拜注曰公所賜者也其餘則否繼公謂此儀已見於上至是復言之者明其餘無拜者也司正命執爵者爵辨卒受者興以酬士辨音遍爵辨卒受者興以酬士謂行爵已辨於堂上則告大夫卒受者使之興以酬士司正以是命執爵者也必命執爵者告之者備有未知者也是後則司正不命而執爵者亦不復告之大夫卒受者以爵興西階上酬士於是執爵者降以已亦當與旅也士升大夫奠爵拜士答拜大夫立卒爵不拜實之士拜受大夫拜送此旅酬之正禮也士始受旅故從其正禮至無算爵則旅不拜矣士旅于西階上辨注曰祝史小臣旅食皆及焉繼公謂其旅皆如大夫酬士之儀卒受者亦以觶降奠于篚士旅酌卒注曰士以次序自酌相酬無執爵者右公為士舉旅主人洗升自西階獻庶子于阼階上如獻士之禮辨降洗遂獻左右正與內小臣皆於阼階上如獻庶子之禮注曰凡獻皆薦也繼公謂庶猶衆也庶子謂卿大夫士之子周官亦多以庶子繼士而言正指此者也燕義以此為諸子之官似失之獻之於阼階上變於其父所飲之處也庶子未必皆有爵乃先左右正獻之者明不與之序也左右正未詳其官然與內小臣同獻則意其亦為內臣也降洗乃獻以其尊於庶子故更新之與獻於阼階上則以别內外也此與獻庶子於阼階之義不同右獻庶子左右正內小臣無算爵士也有執膳爵者有執散爵者亦各序進盥洗其觶以升執膳爵者酌以進公公不拜受云進公是授之此授受皆坐執散爵者酌之以公命所賜酌亦酌膳也已酌而少立于尊西俟公命所賜者興受爵降席下奠爵再拜稽首公答再拜降降席也此不降階而惟拜於席下者冝别於公所親酬者也受賜爵者以爵就席坐公卒爵然後飲異觶並行而代舉君臣之禮也受賜爵者不先卒爵而俟者膳酒之酌久矣不必先飲之也士相見禮言卒爵而俟者始飲酒若為君嘗之然執膳爵者受公爵酌反奠之未當公飲之節故奠之此不言所奠之處則亦在薦南與士既終旅則君自舉之受賜爵者興授執散爵執散爵者乃酌行之必興授者以嚮者亦興受也非賜爵者受授則皆坐酌者酌散也行之謂每授之於席也受賜爵者若賔也則此觶先以之諸公若卿受賜爵者若諸公若卿若大夫也則此觶先以之賔餘皆以次行之惟已飲賜爵者則不復授之大射云授執散爵者此脫一者字惟受爵於公者拜卒受爵者興以酬士于西階上士升大夫不拜乃飲實爵注曰乃猶而也疏曰此執爵者皆酌行之以遍唯卒受爵者興以酬士自酌與之繼公謂大夫自實爵旅酬之禮也於是執爵者降以酬者自酌且已亦與旅也士不拜受爵大夫就席士旅酌亦如之如其不拜而飲不拜而受及自酌也公有命徹幂則卿大夫皆降西階下北面東上再拜稽首公命小臣辭公答再拜大夫皆辟音避幂兩甒之幂也命徹幂者命執幂者遂徹之也徹之者示與臣下同此酒不自異也在堂者皆降拜謝君意也士不拜賤不敢與君為禮也云有命又云則見其然否不定也徹幂之節其在大夫就席之時乎辭者辭之使升拜辭之而不敢從命小臣以復于公公乃答拜卒拜於下而不升成拜臣之正禮也必辭之者以賔在其中也賔與羣臣皆卒拜於下禮宜然也於此云辟者嫌旅拜則不必辟也不言賔及諸公文省凡小臣辭皆公命之經特於始末兩著之以見其餘也遂升反坐士終旅于上如初云士終旅於上則是徹幂之時士蓋先大夫而降至是乃升旅於上也必言於上者嫌既降則宜遂旅於下也初即旅酌亦如之之儀無算樂宵則庶子執燭于阼階上司宫執燭于西階上甸人執大燭于庭閽人為大燭于門外注曰宵夜也甸人掌供薪蒸者庭大燭為位廣也閽人門人也為大燭以俟賔客出右無算爵賔醉北面坐取其薦脯以降賔未醉不敢起既醉不敢留餘人之出者皆以賔為節也賔至是取其薦脯以賜鐘人則古之以禮飲燕者其於所薦之豆籩亦惟祭之而不食斯可見矣取脯説見士冠禮奏陔賔所執脯以賜鐘人于門內霤遂出卿大夫皆出賜之者賜其為已奏樂也此非擊鐘以奏陔之鍾人乃其黨之在旅食之位者先立於此因過而賜之以其同事也周禮鐘師掌以鐘鼓奏九夏公不送公與其臣燕而不送者以其不為獻主也若於異國之臣雖不為正賔君雖不為獻主猶送之右賔出公與客燕注曰謂四方之使者曰寡君有不腆之酒以請吾子之與寡君須臾焉使某也以請注曰君使人戒客辭也禮使人各以其爵寡鮮也猶言少德謙也上介出請入告繼公謂須臾者言其不敢久對曰寡君君之私也君無所辱賜于使臣臣敢辭使所吏反下使臣並同注曰上介出答主國使者辭也無所辱賜謙不敢當也李微之曰私之言屬也謙辭也春秋傳載叔孫穆子之言曰邾滕人之私也我列國也何故視之茅夷鴻告吳人之言曰魯賦八百乘君之二也邾賦六百乘君之私也此可見矣繼公謂客自謙不敢以敵國之使自處故云然寡君固曰不腆使某固以請注曰重傳命寡君君之私也君無所辱賜于使臣臣敢固辭朱子曰客對辭寡君固曰不腆使某固以請某固辭不得命敢不從注曰許之也於是出見主國使者朱子曰某固辭以下是客對辭繼公謂賔於是出拜辱大夫不答拜致命云云致命曰寡君使某有不腆之酒以請吾子之與寡君須臾焉注曰親相見致君命辭也君貺寡君多矣又辱賜于使臣臣敢拜賜命朱子曰客對辭繼公謂賔既對遂再拜稽首所謂拜賜命也於是大夫還賓遂從之右公與客燕記燕朝服于寢朝直遙反朝服兼君臣而言也玄冠玄端素裳緇帶素鞞白屨士之朝服也大夫冠衣之屬皆與士同惟雜帶以玄黃為異若人君則又朱緑帶也其餘亦與士同玉藻曰大帶四寸雜帶君朱緑大夫玄黃士緇辟二寸再繚四寸是其異也燕於路寢禮差輕其牲狗也狗於牲為賤而君之燕禮差輕故用之大射禮放此亨于門外東方亨音烹門外東方㸑所在也故於焉亨之古者寢廟之門外皆有㸑吉則在東凶則在西若與四方之賔燕則公迎之于大門內揖讓升注曰四方之賔謂來聘者也自戒至於拜至皆如公食介門西北面西上羣臣即位如燕也賔為苟敬席于阼階之西北面有脀不嚌肺不啐酒其介為賔苟誠也實也苟敬者國君於外臣所燕者之稱號也其類亦猶鄉飲酒之介遵矣此燕主為賔而設賔於是時雖不為正賔而實為主君之所敬故以賔為苟敬也此席當有加席與食禮者同而東上公與賔既揖讓升公拜至賔答拜公乃揖賔各就其席公降擯者以命命上介為賔上介禮辭許再拜稽首公答拜上介出公乃升就席擯者納賔皆如羣臣為賔之禮必以上介為賔者禮君與臣燕其為賔者不以公卿而以大夫雖燕異國之臣宜亦如之賓卿也上介大夫也此其不以賔為賔而以上介為賔也與阼階之西諸公之位也席苟敬於是且有脀皆尊異之不嚌啐者辟正賔又下記言與卿燕則大夫為賔與大夫燕亦大夫為賔此以介為賓固足以明其卿為聘使之禮若大夫為聘使則燕賓其以主國之大夫為之與無膳尊無膳爵膳尊瓦大也膳爵象觚象觶也所燕者非已臣子故不宜自異然則尊篚之數皆減矣與卿燕則大夫為賔與大夫燕亦大夫為賔注曰不以所與燕者為賔者燕為序歡心賔主敬也公父文伯飲南宫敬叔酒以路堵父為客此之謂也繼公謂云與卿燕則大夫為賔者嫌為賔或當以所燕者也云與大夫燕亦大夫為賔者嫌為賔者或當降於所燕者一等如上例也必以大夫為賓者賓位於堂且與君為禮冝用稍尊者也不以公卿為之者以其太尊於主人故也羞膳者與執幂者皆士也經但云請執幂者與羞膳者耳而不見其爵故記明之下放此羞卿者小膳宰也注曰膳宰之佐也若以樂納賔則賔及庭奏肆夏賔拜酒主人答拜而樂闋苦穴反注曰肆夏樂章今亡闋止也周禮曰賔出入奏肆夏繼公謂君與臣燕不以樂納賔常禮也其或於此用樂者在君所欲耳及庭而奏肆夏尊賔也未卒爵而樂闋辟君也必於此而樂闋者亦以其為獻禮一節之終也肆夏亦金奏樂名公拜受爵而奏肆夏公卒爵主人升受爵以下而樂闋公受爵而奏以其獻禮始於此也卒爵乃闋獻禮之終也此蓋以樂與其禮相為終始亦足以見尊君之義矣升歌鹿鳴歌鹿鳴之三也大射云三終是也凡升歌皆歌三篇不止一篇而已下管亦然下管新宫下戶嫁反注曰新宫小雅逸篇也繼公謂歌者降而以管奏新宫亦三終大射儀曰太師及少師上工皆降立于鼓北羣工陪于後乃管新宫三終足以明之矣舊説謂管如笛而小併兩而吹之此樂奏肆夏且下管如大射之禮則其縣亦宜如之蓋燕有時而射故當闕中縣也笙入三成三成謂奏南陔白華華黍也於歌與管但言篇名於笙言三成文互見也遂合鄉樂注曰鄉樂周南召南六篇言遂者不間也繼公謂不間者或以樂已盛於上故於此殺之與獻時不奏肆夏則不下管乃有間若舞則勺舊音酌勺者舞名但不詳其為何代之樂耳唯公與賔有俎經文已明記復言之者嫌所與燕者或當有俎如異國之賔然也獻公曰臣敢奏爵以聽命注曰授公釋此辭不敢必受之疏曰謂主人也繼公謂奏進也命謂君受與否之命凡公所辭皆栗階注曰栗越也越等也繼公謂辭之而升其禮則然越等而上曰栗階下曰躇階栗與歷聲相近凡栗階不過二等注曰其始升猶聚足連步越二等左右足各一發而升堂繼公謂凡凡公所辭者也不過二等明雖急趨君命猶有節也二等階之立二等也以諸侯七等之階言之則至五等左右足乃各一發盡階則復聚足然後升堂凡公所酬既拜請旅侍臣注曰必請者不専惠也繼公謂凡凡四舉旅之禮請請于擯者侍臣侍飲之臣也其禮見大射儀凡薦與羞者小膳宰也謂於大夫以下者也上言羞卿去小膳宰者釋經文也此無所釋故并薦言之文法冝然也然則經言羞膳羞卿之類亦并薦言之明矣有內羞注曰謂羞豆之實酏食糝食羞籩之實糗餌粉餈繼公謂內羞即房中之羞也祭禮尊者之庶羞內羞同時進之案注以周官醢人籩人職所言羞豆羞籩之實為此內羞禮恐或然但未必其皆用之也君與射則為下射袒朱襦樂作而后就物與音預言與射則君於燕射或時不與矣説又見鄉射記小臣以巾授矢稍屬音燭稍屬者稍與發矢時相連屬也每於將發之節則授之又見鄉射記不以樂志注曰辟不敏也繼公謂古文志識通不以樂志者言其每發不以樂之節為識而必欲應之也此亦優君也記言此於授矢發矢之間則是君之燕射於其再射即用樂行之益可見矣燕射亦三至再射而君始射既發則小臣受弓以授弓人注曰不使大射正燕射輕繼公謂受弓以授弓人蓋卒射之事也記於既發言之未詳其或有脫文與上射退于物一笴既發則答君而俟若飲君燕則夾爵君在大夫射則肉袒説皆見鄉射記此但云燕則夾爵尤不可曉若與四方之賓燕騰爵曰臣受賜矣臣請贊執爵者注曰受賜謂公嚮者酬之也繼公謂賔謂介為賔者也執爵似指嚮之騰觶者而言贊猶佐也相者對曰吾子無辱焉相息亮反注曰辭之也繼公謂此下當更有賔再請而相者許之辭記不備見之也有房中之樂奏之於房故云房中之樂蓋别於堂上堂下之樂也儀禮集説卷六正誤設洗于阼階東南諸本皆云設洗篚繼公謂諸篇於此但言設洗無連言篚者而此有之衍文耳又下别云篚在洗西則於此言篚文意重復似非經文之體且篚在洗西亦不可以東霤為節其衍明矣今以諸篇為據刪之騰觚于賔鄭本作媵觚注云今文媵皆作騰繼公案騰字似優於媵觚宜悉從今文士長升拜受觚主人拜送觚鄭本觚作觶注云今文觶作觚繼公謂凡獻無用觶者當從今文
