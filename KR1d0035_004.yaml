body:
  text: 儀禮集說卷四元敖繼公撰鄉飲酒禮第四注曰此於五禮屬嘉禮繼公謂鄉飲酒者士與其同鄉之士大夫㑹聚于鄉學而飲酒之禮也鄉飲酒之禮主人就先生而謀賔介將與其鄉人飲酒乃於衆賔之中擇其最賢者為賔其次者為介謀謂商度其孰優也必就先生謀之者不敢擅自可否去取且示有所尊也右謀賔介主人戒賔賔拜辱主人答拜乃請賔賔禮辭許主人再拜賔答拜注曰拜辱拜其自屈辱至已門也繼公謂主人戒賔言主人為戒賔而來也此拜辱即拜迎也請謂致戒辭於賔也其辭卒曰請子為賔主人退賔拜辱此即拜送也拜迎拜送皆言拜辱者蓋一儀而兼二義也迎送者據已言也辱者據彼言也此經言戒賔之儀略者亦以士冠禮宿賔之儀見之也下速賔放此後篇同介亦如之注曰如戒賔也右戒賔介乃席賔主人介席賔主人介者為賔主人介設席也席賔於户牖間主人於東序介於西序少牢下篇席主人於東序西面席侑於西序東面侑介之位同也衆賔之席皆不屬焉屬音燭注曰席衆賔於賔席之西疏曰鄉射云席賔南面東上衆賔之席繼而西繼公謂衆賔衆賔長三人也屬連接也必不屬者為其升降皆由下也以是觀之則賔位在户西牖東而當兩楹之間明矣此席亦東上凡席皆有司設之尊兩壺于房户間斯禁有𤣥酒在西設篚于禁南東肆加二勺于兩壺疏曰東肆以頭首為記從西鄉東上頭在西也繼公謂斯者禁之名也其制未聞設篚于禁南其間當容人蓋酌者北面也東肆放尊之西上也記云尊綌幂賔至徹之則此二勺皆加于幂上矣亦與祭禮微異設洗于阼階東南南北以堂深東西當東榮水在洗東篚在洗西南肆深式鴆反右設席器羹定注曰肉謂之羹定猶孰也著之者下以為節疏曰孰云定者孰即定止故也繼公謂此時肉與湆同在鑊故謂之羹案注云下以為節者謂下事以此為節也諸篇凡言羹定者皆然主人速賔賔拜辱主人答拜還賔拜辱注曰速召也還猶退繼公謂召之而云速者欲其來之速也速賔之儀與戒賔同此經文又略也賔不遂從之者為主人復當速介介亦如之注曰如速賔也疏曰是日必當遣人戒速衆賔但略而不言故下云賔及衆賔皆從之繼公謂衆賔亦戒速而經惟言賔介者亦以主人親為之其禮重故特著之爾賔及衆賔皆從之注曰言及衆賔介亦在其中矣繼公謂主人既速介即先歸介及衆賔皆至于賔之門外俟賔同往也右速賔介主人一相迎于門外再拜賔賔答拜拜介介答拜相息亮反注曰相擯贊傳命者繼公謂亦相者入告主人乃出迎之拜介亦再拜文省耳一相蓋學中之有司給事於飲射之禮者變擯言相見其不獨為擯者之事而已也古者與鄉人飲射必於學宫者以其深廣且有司及器用皆備具故也揖衆賔注曰差卑也拜介揖衆賔皆西南面主人揖先入注曰揖揖賔也繼公謂不言入門右可知也亦以賔入門左見之賔厭介入門左介厭衆賔入衆賔皆入門左北上厭一涉反注曰賔之屬相厭變於主人也推手曰揖引手曰厭繼公謂厭之使入禮之也下放此鄉射禮曰東面北上主人與賔三揖至于階三讓主人升賔升三揖三讓說皆見士冠禮鄉射禮曰主人升一等賔升右迎賔主人阼階上當楣北面再拜賔西階上當楣北面答拜楣音眉注曰楣前梁也繼公謂此拜至也說見士昏禮右拜至主人坐取爵于篚降洗取爵蓋北面也為洗而降故云降洗下文類此者不悉見之賔降注曰從主人也繼公謂賔降之位見下文主人坐奠爵于階前辭注曰重以巳事煩賔也繼公謂賔從降而主人辭亦尚辭讓也下放此奠爵乃辭者事異則不宜相雜且為敬也西面坐奠爵興辭賔對注曰賔主之辭未聞繼公謂對時亦少進位下文云賔對復位是也主人坐取爵興適洗南面坐奠爵于篚下盥洗注曰篚下篚南繼公謂南面坐于洗北乃奠爵于篚南不敢由便也盥洗既盥復坐取爵而將洗之也凡洗者必盥經不悉見之也盥洗皆立賔進東北面辭洗進者少南行也南於洗西乃止而東北面鄉主人辭洗之意與辭降同凡言洗於辭洗之前皆將洗而未洗者也若既洗則何以辭為主人坐奠爵于篚興對賔復位當西序東面注曰言復位者明始降時位在此疏曰上直云賔降不言處所於此見之是舉下以明上之義繼公謂此奠爵于篚為將洗而致敬也當西序東西節也下文云賔降立于階西當序主人坐取爵沃洗者西北面沃烏毒反沃洗謂以枓㪺水而沃洗爵者也西北面宜鄉洗者也既則西面于水東主人南面洗而西北面沃此則北面洗者其西南面沃之與沃洗者先亦沃盥卒洗主人一揖一讓升升亦主人先而賔從之賔拜洗主人坐奠爵遂拜降盥拜洗者謝其為已洗也必盥者為將酌也既拜而盥為拜時以右掌據地不無坌汗也內則曰凡男拜尚左手賔降主人辭賔對復位當西序對時違其位故云復下主人對放此卒盥揖讓升賔西階上疑立疑舊魚乞反下並同疏曰不言一揖一讓從上可知主人坐取爵實之賔之席前西北面獻賔注曰獻進也進酒於賔繼公謂實者實以酒謂酌也西北面者亦以將授賔而不宜背之也其下禮之類此者則因而放之耳賔西階上拜主人少退注曰少退少辟繼公謂主人西北面於賔席前賔拜於西階上而主人乃少退則是凡拜皆有相之者矣賔進受爵以復位主人阼階上拜送爵賔少退注曰位西階上位疏曰鄉射云賔進受爵于席前薦脯醢賔升席自西方乃設折俎折之設反賔席亦東上西方下也主人阼階東疑立賔坐左執爵祭脯醢立於阼階上之東者事未至宜辟拜處也奠爵于薦西興右手取肺郤左手執本坐弗繚右絶末以祭尚左手嚌之興加于俎繚音了注曰繚猶紾也離肺上為本下為末繼公謂執本郤左手則絶末覆右手矣絶末以祭者絶其末不沒之處所以為祭也此與振祭之意相類尚左手嚌之謂舉其左手而右手在下以末授口嚌之也將嚌乃尚左手則祭時不然矣加于俎以右手坐挩手遂祭酒挩舒鋭反注曰挩拭也拭以巾挩手為絶肺染汙也疏曰內則事佩之中有􅍤則賔客自有􅍤巾以拭也興席末坐啐酒席末席西端也無後事而啐酒者欲知其旨而告之也降席坐奠爵拜告旨執爵興主人阼階上答拜注曰降席席西也旨美也繼公謂拜乃告旨謝其以旨酒飲已也降席即拜者欲近於啐酒之處且以别於拜既也既拜則坐以告旨賔西階上北面坐卒爵興坐奠爵遂拜執爵興主人阼階上答拜卒盡也必西階上卒爵者以嚮者於此拜受故也右獻賔賔降洗主人降注曰亦從賔也降立阼階東西面賔坐奠爵興辭注曰西階前也主人對賔坐取爵適洗南北面洗南北面别於主人也於賔之取爵也主人復位主人阼階東南面辭洗賔坐奠爵于篚興對主人復阼階東西面南面辭洗猶不離阼階東示違其位而巳此主人辭洗在賔盥之先與他禮微異未詳賔東北面盥坐取爵卒洗揖讓如初升凡盥洗於洗南者皆北面此云東北未詳疑東衍文也初一揖一讓也主人拜洗賔答拜興降盥如主人禮如主人禮謂如上文降盥以至坐取爵之儀但面位異耳賔實爵主人之席前東南面酢主人主人阼階上拜賔少退主人進受爵復位賔西階上拜送爵薦脯醢主人升席自北方設折俎祭如賔禮注曰酢報也祭者祭薦俎及酒亦嚌啐繼公謂北方席下也主人介席皆南上不告旨疏曰云不告旨明亦啐也繼公謂酒主人之物也其不告旨不言可知乃必言之者宜别於如賔禮也主人不告旨乃亦啐酒者若欲知其美惡以拜崇酒然自席前適阼階上北面坐卒爵興坐奠爵遂拜執爵興賔西階上答拜自席前者啐酒席末故從北方降也從北方降正也主人坐奠爵于序端阼階上北面再拜崇酒賔西階上答拜奠爵于序端拜崇酒之禮然也奠於其所而拜則嫌若拜既爵奠于篚而後拜則嫌若禮畢而更端故以奠於此為節云崇重也謂賔崇重已酒不嫌其薄而飲之既也故拜謝之卒爵乃拜者若曰已飲之乃審知其薄然右賔酢主人主人坐取觶于篚降洗賔降主人辭降賔不辭洗立當西序東面注曰不辭洗者以其將自飲繼公謂主人辭不言奠觶又不言賔對者如上禮可知自飲乃洗者亦象賔之飲已也卒洗揖讓升賔西階上疑立主人實觶酬賔阼階上北面坐奠觶遂拜執觶興賔西階上答拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賔西階上答拜注曰酬勸酒也繼公謂此象賔之飲已故其拜亦皆與受之於人者同主人降洗賔降辭如獻禮升不拜洗注曰不拜洗殺於獻繼公謂如獻禮如其降後升前之儀賔西階上立主人實觶賔之席前北面賔西階上拜主人少退卒拜進坐奠觶于薦西席前北面變於獻以其不授也奠觶于薦西者主人以此觶不舉不敢親授之重勞賔也凡酬酒有卒不舉者有未即舉者主人皆奠之而不授其意則同燕與大射及少牢下篇主人酬尸與賔皆授觶與士禮異賔辭坐取觶復位辭辭其奠觶也奠觶酬之正禮也然奠而不授亦不能無降等之嫌故辭之辭之而不獲命乃坐取觶示受也辭及取觶皆當東面復位待主人拜主人阼階上拜送賔北面坐奠觶于薦東復位北面奠觶由便凡賔於主人所奠之物必取而遷之以示其不敢當之意且為禮也堂上則左之堂下則右之亦各從其便也右主人酬賔主人揖降賔降立于階西當序東面主人將降而揖所以禮賔賔降者以主人將與介與衆賔為禮故不敢居堂上也賔降之位其南北之節皆於階西至此始見之也主人降西面于門東主人以介揖讓升拜如賔禮介入門左止於其位至是乃進主人坐取爵于東序端降洗介降主人辭降介辭洗如賔禮爵即嚮之所奠者也介統於賔而其禮又與之相接故乃用其爵焉賔禮者賔降至一揖一讓升之儀也此時介降之位在賔南升不拜洗介不拜洗下賔介西階上立注曰不言疑者省文主人實爵介之席前西南面獻介介西階上北面拜主人少退介進北面受爵復位主人西南面獻介而介乃北面正方受爵以是推之則賔酢主人主人亦北面受主人獻賔賔其東面受與主人介右北面拜送爵介少退主人獻介乃拜於其右者以其尊降於賔也凡堂上之獻酢皆分階而拜者賔主二人而已其餘則否主人立于西階東此稍違其拜處與既獻賔而立于阼階東之意同西階上非其正位故即辟之薦脯醢下云介升席自北方是介席南上也席南上則此薦當脯在北方與少牢下篇設侑之豆同矣介升席自北方設折俎祭如賔禮不嚌肺不啐酒不告㫖凡所不者下賔不啐酒則必不告旨矣乃著之者詳言之也凡經文有詳言者有略言者其例不一自南方降席北面坐卒爵興坐奠爵遂拜執爵興主人介右答拜降席適西階上也自南方降者介尊於禮輕者或得由便也主人亦然主人介右答拜復西就之有司曰侑降席自北方以其卑於介也右獻介介降洗主人復阼階降辭如初注曰如賔酢之時繼公謂洗為主人將自酢也復反也初謂賔酢之時主人降以下至坐取爵卒洗之禮也卒洗主人盥注曰盥者當為介酌繼公謂主人自飲而盥者逹介意也介揖讓升授主人爵于兩楹之間以後篇大夫禮例之介字宜在授字上於主人之盥也介立於洗南以俟之主人既盥乃揖而行也介授主人爵者不敢酢也主人受之者亦逹介意也凡受獻而親酢者一人而已其餘則或所獻者自酢焉此介雖尊視賔為殺故其酢禮如此然其初乃得為主人洗爵亦其異者也介西階上立主人實爵酢于西階上介右坐奠爵遂拜執爵興介答拜主人坐祭遂飲卒爵興坐奠爵遂拜執爵興介答拜主人坐奠爵于西楹南介右再拜崇酒介答拜主人拜於西階而奠爵于西楹南以其近也其意則與嚮之奠于序端者同拜介崇酒亦至是乃為之者因賔禮也右主人自酢主人復阼階揖降介降立于賔南主人西南面三拜衆賔衆賔皆答一拜注曰三拜示遍也繼公謂是時衆賔皆在門內之西主人少南行近於門東乃西南面鄉之而拜拜衆賔為將獻之與賔升而拜至之意相類三拜者旅拜之法也衆賔皆答一拜亦答旅拜之法也此禮大夫士同之主人揖升坐取爵于西楹下降洗升實爵于西階上獻衆賔衆賔之長升拜受者三人長知丈反西階上獻衆賔揔言之也此獻之儀主人蓋執爵西南面于西階上衆賔則以次升受之不獻于席前辟尊者禮也其拜者亦北面長其年之差尊者後于字衍主人拜送注曰於衆賔右坐祭立飲不拜既爵授主人爵降復位既卒也不拜既爵卒爵不拜也獻而不拜既爵差卑也自别於尊者且重勞主人之答已也不拜既爵故但立飲記曰立卒爵者不拜既爵位堂下之位介之南也於此云復則主人揖升之時衆賔其皆進與衆賔獻則不拜受爵坐祭立飲自第四以下又不拜受爵愈自别於尊者也每一人獻則薦諸其席注曰謂三人也疏曰席謂席前繼公謂此薦之節當在坐祭立飲之後與特牲饋食之衆賔同無俎矣又既飲乃薦逺下賔介也不言不祭者可知也衆賔辨有脯醢辨音遍注曰每獻薦於其位位在下今文辨皆作遍繼公謂衆賔三人之外者也衆賔長以下其堂下之位繼賔介之位而南主人以爵降奠于篚揖讓升賔厭介升介厭衆賔升衆賔序升即席厭一涉反揖讓升者謂主人獨與賔一揖一讓而先升也賔厭介升者賔既厭介乃升也介厭衆賔升亦然三賔長則不相厭但以次序而升耳即席立于席上右獻衆賔一人洗升舉觶于賔亦相者使之也獻禮既備即舉觶為旅酬始示留賔之意也一人主人之贊者既洗乃升則用下篚之觶也此舉觶者代主人行禮耳中庸曰旅酬下為上所以逮賤也舉觶猶揚觶實觶西階上坐奠觶遂拜執觶興賔席末答拜坐祭遂飲卒觶興坐奠觶遂拜執觶興賔答拜舉觶者自飲洗且拜其意與主人酬賔之禮同賔席末拜示違其位也不降席答之者以其賤也下二人舉觶放此舉觶者拜亦當楣降洗升實觶立于西階上賔拜注曰賔拜將受觶繼公謂立者俟賔拜進坐奠觶于薦西賔辭坐受以興奠觶者亦以賔未即飲故也賔辭奠觶之意亦略與上同此實取之而經云受者原賔意也然經於此類亦或言取則又指其事耳云坐受是賔已拜即興矣凡此時之在席者皆無事則興經文略也舉觶者西階上拜送賔坐奠觶于其所下經云賔坐取俎西之觶即此觶也其於薦西為少南乃云其所者明其近於故處也必奠於其所者降於主人且别於不舉者也主人酬賔奠觶于薦西賔取而奠于薦東其觶卒不復舉舉觶者降右一人舉觶于賔設席于堂廉東上注曰側邊曰廉繼公謂此云設席于堂廉言其南北節也鄉射云席工于西階上少東言其東西節也文互見耳席東上而下者當西階上少東工四人二瑟瑟先相者二人皆左何瑟後首挎越內弦右手相相並息亮反何胡我反挎口孤反注曰二瑟二人鼓瑟則二人歌也相扶工也衆賔之少者為之每工一人鄉射禮曰弟子相工如初入天子相工使視瞭者工瞽矇也故有扶之者後首者變於君也挎持也相瑟者則為之持瑟其相歌者徒相也越瑟下孔所以發越其聲也內弦側擔之疏曰相歌者亦二人以空手無事故不言也注云變於君者鄉飲酒與燕禮相對燕禮面鼓此後首是相變繼公謂瑟先歌後行時以後為尊亦工禮之異者也在肩曰何左何瑟為相當以右手也後首瑟之首在後也挎以指鈎之也後越去瑟廉差近故以巨擘承下廉而三指挎越也內弦弦鄉身也右手相者便也士之飲酒乃有工有笙者蓋亦公家之樂官給學中飲射之事者與樂正先升立于西階東注曰正長也樂正於天子樂師也凡樂掌其序事樂成則告備繼公謂樂正當從工乃先升者變於尊者之重禮也此先升而立于西階東亦明其不與工序也鄉射禮云樂正先升立于工席之西亦與此文互見也案注云樂正於天子樂師也天子樂師以下大夫上士下士為之諸侯之樂師惟當用上士下士然則此使之給事者其下士與工入升自西階北面坐相者東面坐遂授瑟乃降相息亮反注曰降立于西方疏曰鄉射云樂正適西方命弟子贊工遷樂故知立于西方繼公謂相者東面坐於其席前之西也授瑟以瑟首鄉東授之工歌鹿鳴四牡皇皇者華華音花三者小雅之首篇也春秋傳曰文王大明綿兩君相見之樂也兩君相見得歌大雅則士大夫相飲得歌小雅差之宜也此凡所歌者皆不取其詩之義但以其所得用者樂賔耳不言瑟者瑟依歌其同可知書曰戞擊鳴球搏拊琴瑟以詠禮又有頌磬頌鐘頌猶歌也然則工歌之時亦奏堂下之樂以應之矣不言者主於歌也下放此卒歌主人獻工工左瑟一人拜不興受爵主人阼階上拜送爵注曰左瑟便其右且辟主人授爵也一人工之長也賤故不為之洗繼公謂左瑟置其瑟於左為受爵變也瑟宜前首故左之一人工之長乃歌者也不興受爵瞽者不能如禮也主人亦坐授之主人先獻歌者其瑟者事未至乃為之變者節也主人獨拜于阼階上者以工拜受於其位故不得拜於其右也凡主人與工為禮蓋亦有贊告之者薦脯醢工雖賤以其受爵于席故每獻輒薦之亦與成人之禮異也使人相祭相息亮反注曰使扶工者相其祭薦祭酒繼公謂此亦祭薦者殊其長也工飲不拜既爵授主人爵注曰坐授之衆工則不拜受爵祭飲注曰祭飲獻酒重無不祭也繼公謂不拜而受差賤也其意與不拜既爵同祭飲祭酒乃飲也辨有脯醢不祭辨音遍注曰賤者禮簡大師則為之洗賔介降主人辭降工不辭洗大音泰為于僞反注曰為之洗尊之也賔介降從主人也工大師也繼公謂大師工之長也周官以下大夫為之諸侯則宜用上士也為之洗以其有爵異之賔介從降者同大師於已黨也主人辭賔亦對衆賔不降别於賔介也工不辭洗亦不降主人既洗亦與賔介揖而俱升笙入堂下磬南北面立樂南陔白華華黍白華音花注曰笙吹笙者也以笙吹此詩以為樂也南陔白華華黍小雅篇也今亡其義未聞昔周之興也周公制禮作樂采時世之詩以為樂歌所以通情相風切也其有此篇明矣後世衰微幽厲尤甚禮樂之書稍稍廢棄孔子曰吾自衛反魯然後樂正雅頌各得其所謂當時在者而復重雜亂者也惡能存其亡者乎且正考父校商之名頌十二篇于周太師歸以祀其先王至孔子二百年之閒五篇而已此其信也繼公謂磬南阼階西南也北面立蓋亦東上如工立于磬南近其所應之樂也詩曰笙磬同音而禮有笙磬笙鐘則吹笙之時亦奏鐘磬之屬以應之矣不言者主於笙也下放此凡樂自判縣而上其鐘磬乃分别頌者笙者若特縣則一之主人獻之于西階上一人拜盡階不升堂受爵主人拜送爵階前坐祭立飲不拜既爵升授主人爵盡子忍反注曰一人笙之長者笙三人和一人凡四人鄉射禮曰笙一人拜于下繼公謂主人獻時亦西南面也盡階不升堂賤也既受爵階上少立俟主人已拜然後降主人拜亦北面升授主人爵亦盡階不升堂衆笙則不拜受爵坐祭立飲辨有脯醢不祭辨音遍注曰薦之皆於其位磬南繼公謂鄉射禮曰主人以爵降奠于篚反升就席乃間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀間古莧反麗力馳反注曰間代也謂一歌則一吹六者皆小雅篇也由庚崇丘由儀今亡其義未聞乃合樂周南關雎葛覃卷耳召南鵲巢采蘩采蘋雎七余反覃大南反卷九轉反召音邵朱子曰二南之分唯程子以為周公主內治故以畿內之詩言文王大姒之化者屬之周南召公掌諸侯故以畿外之詩言列國諸侯大夫之室家被文王大姒之化而成德者屬之召南此為得之謂之南者言其化自岐雍之間被于江漢之域自北而南也詩曰以雅以南即謂此也繼公謂樂即此六篇詩也合樂謂合周南召南而歌之與嚮之惟歌小雅者不同也燕禮曰遂歌鄉樂與此文互見耳二風乃合而歌之者鄉樂於小雅為輕也雅先而鄉樂後先重後輕也鄉飲酒士禮之盛者也故歌小雅與鄉樂若其禮輕者則惟鄉樂而已下文息司正是也春秋傳謂文王之三為兩君相見之樂指其始歌者也始歌大雅則合小雅矣諸侯相見其歌如此及與臣燕則但自小雅而下以是數者觀之可以見君臣樂歌輕重之差矣然則天子之燕享諸侯亦當如國君相見之樂而頌則惟宜於祭用之與大夫樂歌蓋如士工告于樂正曰正歌備樂正告于賔乃降注曰備亦成也樂正降者以正歌備無事也降立西階東北面繼公謂工其長也正歌謂所歌者皆風雅之正也凡歌以既合樂為備故告備於合樂之後焉惟告正歌備者蓋以已之所有事者而言故不及乎其他必告于賔者飲酒主於賔歌亦為樂賔故也案注云備亦成也者蓋據樂師職凡樂成則告備之文也注又云降立西階東北面雖無所據以意度之當在是也右樂賔主人降席自南方注曰不自北方由便繼公謂此降席自南方其義與介同側降注曰賔介不從繼公謂此側降而賔不從則主人降之意皆可得而見矣作相為司正司正禮辭許諾主人拜司正答拜主人升復席相息亮反注曰作使也禮樂之正既成將留賔為有解惰立司正以監之察儀法也疏曰相即上經云一相者也繼公謂主人自作之者辟君禮也司正之職亦主於相爾乃更其名者禮異於上宜新之也自是以後禮節凡五司正皆有事焉於此立之亦示留賔之意也謂之司正者以其正此飲酒之禮而名之與司正洗觶升自西階阼階上北面受命于主人主人曰請安于賔司正告于賔賔禮辭許注曰告賔於西階上繼公謂司正緣主人意必欲安賔故受命于主人以安之安賔而賔辭則是賔於此時果有不安之心矣辭者蓋以主人有旨酒嘉肴已巳受賜為辭也執觶受命贊辭變於君司正告于主人主人阼階上再拜賔西階上答拜司正立于楹間以相拜皆揖復席相息亮反注曰司正既以賔許告主人遂立楹間以相拜相謂贊主人及賔相拜之辭賔主人既拜相揖就席繼公謂楹間東西節也宜於楹為少南凡相拜皆有相之者經不悉見之司正實觶降自西階階間北面坐奠觶退共少立共音拱注曰奠觶表其位也共拱手也繼公謂階間東西節亦所謂中庭也奠觶不拜者獨行禮則不象受觶之儀也不南面奠觶亦變於君禮退而少立以其位在是也燕與大射則其位少進亦異者也坐取觶不祭遂飲卒觶興坐奠觶遂拜執觶興洗北面坐奠觶于其所退立于觶南坐取觶亦進坐取觶而反坐也不祭者變於獻酬也卒觶拜者宜謝主人也酒主人之物也主人不答拜者不與為禮則不敢當也主人請立司正而司正乃實觶自飲者所以為識又欲因以虛觶識其位也洗觶奠之不敢苟也右立司正賔北面坐取俎西之觶阼階上北面酬主人主人降席立于賔東注曰初起旅酬也旅酬同階禮殺繼公謂俎西於薦西為少南上經惟云奠觶于其所故此明之賔於一人所舉之觶亦取而遷之者以其代主人行禮故也賔坐奠觶遂拜執觶興主人答拜不祭立飲不拜卒觶不洗實觶東南面授主人注曰此所不者酬而禮殺也賔更酌以鄉主人將授繼公謂不拜卒觶猶言不拜既爵也東南面於阼階上鄉射禮無授主人三字或曰授亦當作酬主人阼階上拜賔少退主人受觶賔拜送于主人之西賔揖復席揖而復席禮之也主人西階上酬介介降席自南方立于主人之西如賔酬主人之禮主人揖復席惟既實觶則西南面酬介異於賔禮也司正升相旅曰某子受酬受酬者降席相息亮反注曰旅序也於是介酬衆賔衆賔又以次序相酬某者衆賔姓也同姓則以伯仲别之又同則以其字别之繼公謂相旅謂相旅酬之禮曰某子受酬即其事也或言旅或言酬互見耳他皆放此於賔酬主人主人酬介司正不升則惟相之於下耳尊之也若有遵者則先衆賔酬之既則司正乃升也司正退立于序端東面注曰辟受酬者又便其贊上贊下也始升相西階西北面後篇注又云退立俟受酬者繼公謂序端東面惟退而俟事之時則然自是以後於凡作受酬者則皆少違此位堂上者北面作之堂下者南面作之既則皆復此位也受酬者自介右注曰由介東也繼公謂受介酬者獨居其右與他受酬者不同明介尊不與衆賔序也若尊者受介酬亦然自介右則介當東南面酬之衆受酬者受自左注曰後將受酬者皆由西也疏曰衆受酬者謂堂上衆賔自第二以下并堂下衆賔也繼公謂受自左賔黨受酬者之正位也拜興飲皆如賔酬主人之禮注曰嫌以下異也繼公謂亦惟受酬者立于酬者之西及酬者既實觶進西南面為異耳辨卒受者以觶降坐奠于篚辨音遍注曰鄉射禮曰辨遂酬在下者皆升受酬于西階上繼公謂辨辨衆賔之在下者其後當言酬在下者之禮然後及於卒受者如鄉射禮所云是也經蓋有脫文耳卒受者無所旅自飲于上乃降司正降復位右旅酬使二人舉觶于賔介洗升實觶于西階上皆坐奠觶遂拜執觶興賔介席末答拜皆坐祭遂飲卒觶興坐奠觶遂拜執觶興賔介席末答拜注曰二人主人之贊者燕禮曰騰爵者立于洗南西面北上序進盥洗疏曰舉觶為無算爵始也答拜賔南面介東面繼公謂亦代主人行事也至是乃併舉觶于介者異之也正言賔介者明雖有大夫猶及介後于字亦衍逆降洗升實觶皆立于西階上賔介皆拜注曰於席末拜繼公謂鄉射禮曰立于西階上北面東上皆進薦西奠之賔辭坐取觶以興介則薦南奠之介坐受以興退皆拜送降賔介奠于其所賔云取介云受經文錯綜以見其同也介亦辭文不具耳鄉射禮曰賔與大夫辭介宜與彼大夫同也既奠于其所則興不言者亦文不具耳鄉射禮曰賔大夫坐反奠于其所興未奠而降變於上禮也此奠于其所者賔則少南而當俎西介則少東而當俎南如於一人舉觶者之為也右二人舉觶于賔介此條有與一人舉觶之儀相類者其說已見於上司正升自西階受命于主人主人曰請坐于賔賔辭以俎注曰至此盛禮俱成賔主百拜强有力者猶倦焉張而不㢮㢮而不張非文武之道請坐者將以賔燕也疏曰鄉射司正升自西階阼階上受命于主人適西階上北面請坐于賔也又曰自此以上皆立行禮人皆勞倦故請坐于賔繼公謂坐謂燕坐而飲也辭以俎者以俎辭其請坐之命謂俎在此不敢坐也俎肴之貴者燕坐則禮殺矣當俎而燕坐是䙝之也司正於是又反命於主人案注云賔主百拜用樂記文也亦甚言其拜之多耳非謂真有百拜也主人請徹俎賔許徹直列反下同注曰亦司正傳請告之繼公謂賔嚮者辭以俎今主人請徹俎而賔許之是許其坐矣司正降階前命弟子俟徹俎注曰西階前也弟子賔之少者繼公謂俟徹俎者俟尊者徹俎乃受之也司正升立于序端注曰待事賔降席北面北面于俎南以當先取俎主人降席阼階上北面介降席西階上北面遵者降席席東南面主人介遵皆近其席而立俟取俎之節也遵者乃此鄉之人仕至公卿大夫主人請之來與此㑹者也謂之遵者以其遵承主人之命而來與或曰遵之為言尊也大夫尊於士故以是名之未知孰是遵者席西上降席而立于席東便也賔取俎還授司正司正以降賔從之還音旋下同北面取俎還南面授司正必言還者明就而受之司正受賔俎者賔尊宜異之賔降立于西階西主人取俎還授弟子弟子以降自西階主人降自阼階介取俎還授弟子弟子以降介從之若有諸公大夫則使人受俎如賔禮衆賔皆降此取俎與升受俎者皆以先者既降為節取俎不言所鄉如賔可知主人之俎乃以降自西階者辟君禮也人亦謂弟子鄉射禮曰大夫取俎還授弟子是也主人降立于阼階東介在賔南大夫在介南衆賔又在大夫南少退右徹俎說屨揖讓如初升坐說吐活反注曰說屨主人先左賔先右說屨者為燕當坐也繼公謂說屨者各於其階側北面坐於堂而說屨於上者惟尊長則然此賔主人其尊相敵故皆說於下賔黨之屨亦北上也揖讓謂主人與賔一揖一讓也賔則厭介介厭大夫大夫厭衆賔亦以次而升案注云主人先左賔先右謂賔在主人之左故主人先說左屨主人在賔之右故賔先說右屨是亦鄭氏以意言之耳右說屨升坐乃羞注曰設啖具以案酒也羞進也所進者狗胾醢也繼公謂羞者羞庶羞於凡有薦者也此時衆賔亦當祭薦文不具耳案注云所進者狗胾醢也少牢特牲饋食之庶羞皆以其牲肉為胾又有醢故知此禮當放之也無算爵注曰算數也爵行無數醉而止繼公謂無算爵者行其奠觶終而復始無定數也鄉射禮曰使二人舉觶于賔與大夫又曰執觶者洗升實觶反奠于賔與大夫此異於彼者舉觶及反奠者不於大夫而於介耳其賔觶亦以之主人介觶則以之大夫其餘皆可以類推之也無算樂爵行則奏樂爵止則樂闋故爵無算而樂亦無算也歌與間合所用未聞右無算爵賔出奏陔陔古才反注曰陔陔夏也周禮鐘師以鐘鼓奏九夏是奏陔夏則有鐘鼓矣鄉射禮曰賔興樂正命奏陔賔降及階陔作賔出衆賔皆出繼公謂陔夏有聲無辭之樂金奏之一者也其名義未詳主人送于門外再拜注曰門東西面拜也繼公謂再拜送賔也不拜送介殺於初賔主人以下亦當屨而後出經文又略也右賔出賔若有遵者諸公大夫則既一人舉觶乃入注曰大國有孤四命謂之公繼公謂此謂遵先俟于門外以一人既舉觶為入之節大國有孤其官或與天子之三公同名故亦謂之公晉有大師大傅亦可見矣諸者不定之辭大夫兼卿言也息司正之禮云以告于先生君子然則主人於遵者其亦使人告之與公大夫若皆來則同時入其入之節在一人舉觶之後衆工未入之前乃於是言之者以其或有或無或來或否不定故也席于賔東公三重大夫再重重並直龍反疏曰賔在户牖之間酒尊又在户東席此二者又在酒尊之東但繼賔而言耳繼公謂席此於賔東尊之不與正賔齒亦不加尊於其正賔也貴貴尊賢尚齒三者之義並行而不相悖於斯見之矣禮再命則不齒于鄉里若爵為大夫雖非再命猶不齒也三重再重皆蒲席緇布純者也上下之席同物故不必言加此重席亦兼卷而設之公三重大夫再重者以大夫宜異於士而公宜異於大夫也公如大夫入主人降賔介降衆賔皆降復初位主人迎揖讓升公升如賔禮注曰主人迎之於門內繼公謂公如大夫入猶言若公若大夫入也入謂入門左也主人迎遵者賔以下皆降其意與上同初位階西以南之位也迎不拜者别於賔介亦以其在門內也迎於門內而拜降等者之禮也公於主人為踰等乃後升者非正賔也升階正法客尊則先升如賔禮如其獻禮也辭一席主人去之去起吕反下同辭一席不敢當也諸侯之加席與其下席而二此席雖非加而數則過於二焉故辭之而主人亦許而徹之也遵者辭席之節見鄉射禮大夫則如介禮有諸公則辭加席委于席端主人不徹無諸公則大夫辭加席主人對不去加席注曰加席上席也大夫席再重繼公謂如介禮亦如其獻禮耳若其酢則主人於公大夫一也鄉射言大夫之酢其儀與此介同諸公雖尊禮宜如之所以辟正賔也委卷而置之也席端席北端也不徹不使人徹之也主人對不許其辭也不去亦謂不使人去之也大夫辭加席謙也有諸公則自委于席端者公惟再重已宜辟之主人不徹明其有為而為之非正禮無諸公則主人不聽其辭而去之者士亦一重異爵者不可以無所别也無諸公則大夫之席在尊東南面有諸公則席在主人之北西面云辭加席委于席端則是凡辭席者皆近席為之也此重席乃云加席者但取其在上故爾非謂此席即加席也凡加席與其下席異物而長半之重席則否右遵者之禮明日賔鄉服以拜賜鄉服鄉飲酒之服即朝服也變朝言鄉見其與昨日同也鄉飲酒士禮也乃朝服者放君之燕禮故如其服也拜賜拜謝其飲已之賜也介不拜賜者禮主於賔也凡拜賜者例不見主人如賔服以拜辱注曰鄉射禮曰賔朝服以拜賜于門外主人不見如賔服遂從之拜辱于門外乃退繼公謂辱拜賜之辱也主人往拜賔辱者敵也凡尊卑不敵則不答拜賜之禮右拜賜拜辱主人釋服注曰釋朝服更服𤣥端也古文釋作舍乃息司正注曰息勞也勞賜昨日贊執事者獨云司正司正庭長也繼公謂息字未詳疑即燕之異名考工記曰張獸侯則王以息燕是也此禮亦於學宫行之必息司正者以昨日勞之而待之之禮又殺於賔黨故也釋服乃息之者此無所放故服其正服也是禮雖主於司正未必以司正為賔公父文伯飲南宫敬叔酒以路堵父為客是其徵矣無介不殺皆貶於飲酒薦脯醢薦同也羞唯所有注曰在有何物徵唯所欲注曰徵召也以告于先生君子可也先生說見首篇君子國中有德有爵者也亦使人告之云可者嫌其禮輕不必告也惟言告是不請矣不請則不速可知皆異於賔也其來若否則但語告者以復命於主人與先生君子若與其位蓋如遵賔介不與與音預不敢以輕禮凂昨日之尊客古文與為豫鄉樂唯欲鄉樂者凡國風皆是也唯欲者唯其所欲則使工歌之不如昨日之有節次也是亦純用鄉樂之異者耳國風為大夫士之樂小雅為諸侯之樂大雅頌為天子之樂禮盛者可以進取故鄉飲酒升歌小雅也息司正禮輕故唯用其正樂耳鄉射禮云一人舉觶遂無算爵然則工入之節其在無算爵之時乎右息司正記鄉朝服而謀賔介朝直遙反鄉鄉飲酒也不言飲酒省文耳孔子曰吾觀於鄉王制曰冠昏喪祭鄉相見皆其徵也於此云鄉者如燕禮記先言燕特牲饋食記先言特牲饋食之類也謀賔介為飲酒之始故即服其服經不見其服故記明之皆使能不宿戒皆皆賔介也其下者亦存焉能謂善於禮者也宿戒者前期日而戒之也此於當日乃戒之故曰不宿戒知其能乃使之故如此然則他禮有宿戒者皆慮其或有所未能也與蒲筵緇布純純章允反純緣也公食大夫記云蒲筵常緇布純此不言常則其度或短與尊綌幂賔至徹之徹直列反賔至徹幂臣禮之節也士昏禮夫婦入于室贊者徹尊幂特牲禮尸即位而徹幂皆與此類其牲狗也用狗者用燕禮之牲也鄉飲與燕類也而燕於君禮為差輕鄉飲於臣禮為差重故牲亦不嫌其同亨于堂東北亨音烹亨煮也堂東北爨所在也就而亨焉凡學宫惟一門故牲爨不於門外而於堂東北堂東北即東夾之東北也學宫有左右房則亦當有夾室獻用爵其他用觶其他謂酬及舉觶之屬也然記之文意似失於不備夫酢亦用爵也何獨獻哉此上篚之爵三觶一下篚之觶三薦脯五挺橫祭于其上出自左房挺大頂反注曰曲禮曰以脯修置者左朐右末疏曰此橫祭于其上者於脯為橫於人為縮案注引曲禮者欲見此脯與曲禮脯修其設之皆橫於人前繼公謂脯之祭者半挺使人以為祭也云橫祭是五挺者縮籩也然則籩亦有首尾與左房東房也有左房則有右房可知俎由東壁自西階升上云亨于堂東北而不别言陳俎之處則是俎亦未離於其所也故其設時由東壁而來必言由東壁者嫌俎當自門入也云自西階升者明賔主同賔俎脊脅肩肺主人俎脊脅臂肺介俎脊脅胳肺肺皆離皆右體進腠胳音格腠七奏反注曰凡牲前脛骨三肩臂臑也後脛骨二膊胳也尊者俎尊骨卑者俎卑骨祭統曰凡為俎者以骨為上骨有貴賤凡前貴後賤右體周所上也腠理也進理謂前其本也今文胳為骼繼公謂肺言皆離明無切肺祭以離肺飲酒正禮也皆皆肩臂胳也凡脊脅不謂之體右體者吉禮所尚故於三俎用之介俎用胳者欲以臑為諸公俎肫為大夫俎也遵者若多則自三以下皆用左體是亦示其相下之意也若無遵者介俎猶用胳不為之變也此俎先脊脅而後正體豈堂上尊者狗牲之俎其載之法宜與他牲異乎肺在後者便其取之也凡俎橫設其後皆於所為設者為右案注謂凡牲後脛骨二肫胳也此語不備後脛骨亦三髀肫胳也髀雖或不升然不可以為非脛骨以爵拜者不徒作注曰徒猶空也作起也繼公謂以爵拜蓋指賔主介遵既卒爵而奠爵拜者也既拜而興則與飲已者為禮故曰不徒作然此拜乃前禮之節其意未必與後禮相通記乃合之以生義似失之又經言奠爵此乃言以爵則其意亦可見矣坐卒爵者拜既爵立卒爵者不拜既爵注曰唯工不從此禮繼公謂此蓋於卒爵之時見其拜不拜之意坐近於拜故當拜則坐飲而不當拜則立飲也是二儀者經已具之記蓋言其例耳又此與下條惟以鄉飲鄉射之禮言之則可若推於他禮則有不盡然者矣凡奠者于左注曰不飲者不欲其妨繼公謂此禮其奠者一而已矣言凡未詳將舉於右注曰便其舉也衆賔之長一人辭洗如賔禮長知丈反主人獻衆賔惟於始者一為之洗經云主人取爵于西楹下降洗是也一人辭之者禮主於已也立者東面北上若有北面者則東上東上之東當讀作西此謂在門內位之時也賔入門左位近庭南介以下又居其南衆賔若多則容有北面者北面者與東面者相繼當西上云東者字誤也門西北面而東上自為列者耳樂正與立者皆薦以齒注曰謂其飲之次也不言飲而言薦以薦明飲也既飲皆薦於其位樂正位西階東北面繼公謂此樂正乃公有司非衆賔也又不立於西方嫌其禮異故明之凡舉爵三作而不徒爵注曰謂獻賔獻大夫獻工皆有薦繼公謂言此者明獻禮重無有不薦者也案注云獻賔謂賔介及衆賔也云獻工兼笙者也樂作大夫不入此謂大夫之來也後不及一人舉觶之節者也樂作之時不可亂之故不入若樂既作則獻工與笙矣大夫之獻又不宜後於工也獻工與笙取爵于上篚既獻奠于下篚注曰如是則獻大夫亦然上篚三爵繼公謂既獻工則奠于上篚既獻笙乃奠于下篚也不仍用獻大夫之爵者節異則不相因也既獻大夫而酢則奠爵于西楹南案注云獻大夫亦然者惟謂亦取爵于上篚耳其笙則獻諸西階上此記乃與經同者特因上文而言之耳磬階間縮霤北面鼓之縮所六反霤力又反注曰霤以東西為從鼓猶擊也射則磬在東繼公謂縮如縮俎之縮縮霤者縮於霤也前霤兩端東西鄉設磬當其下亦如之故於霤為縮此禮特縣則有磬鐘鑮及鼓鼙惟言磬者以其為縣之主而居首且可以取節於霤故也北面鼓之明磬南面設磬蓋在阼階西鼓在西階東主人介凡升席自北方降自南方此儀各一見於經記云凡者似為不見者言也二席南上升降皆當由下其降由上者由便耳若例指為正禮則似失之且經於主人之酢云自席前適阼階上是其降亦未必皆自南方也乃言凡何與司正既舉觶而薦諸其位注曰無獻因其舉觶而薦之薦於觶南繼公謂不獻者異於衆賔有薦者别於其黨凡旅不洗注曰敬殺也繼公謂凡凡尊卑也不洗者不祭此承上文惟為旅者言也若獻酒雖有不洗者亦祭之既旅士不入此士亦主人請之為衆賔或有故而不及與賔介同來者也經不言士入之節而記見此則是未旅以前皆可以入也士賤於大夫可以不獻然不與旅則與主人之贊同故不與旅則不入矣云既者終言之也士亦謂當在堂下者也其入則以齒立于西方主人不迎徹俎賔介遵者之俎受者以降遂出授從者從才用反授從者云出則是飲酒之禮他人無事者皆不入門主人之俎以東東適東壁也樂正命奏陔賔出至于階陔作陔古才反此見命之之人與奏之之節也鄉射禮曰賔降及階陔作若有諸公則大夫於主人之北西面注曰其西面者北上統於公疏曰若無諸公則南面西上繼公謂有諸公則大夫位於此尊諸公也主人之贊者西面北上不與與音預下同注曰贊者佐助主人禮事徹幂沃盥設薦俎者也繼公謂此贊者蓋以學中之有司及私臣為之西面之位其在洗東南與與謂與其禮也下言無算爵然後與則此所謂不與者獻及旅酬也是句似有脫文位西面且不與獻酬亦飲酒于學之禮異者也特牲饋食記曰公有司門西北面東上獻次衆賔私臣門東北面西上獻次兄弟案注釋贊者亦未備無算爵然後與此逺下於賔黨也鄉射禮云無算爵執觶者皆與旅執觶亦主人之贊者也鄉飲酒義曰賔酬主人主人酬介介酬衆賔少長以齒終於沃洗者焉是謂沃洗者得與旅酬與此異矣參考經文似當以此為正儀禮集說卷四正誤介俎脊脅胳肺今印本與石經胳上有肫字繼公案疏云介用胳又云或有肫胳兩言者云云又釋文此處無肫音至下乃音之今據釋文與疏之前說則胳上固無肫字又考疏之後說則是作疏之時或本已有兩言肫胳二字者矣是蓋後人妄增之而當時無有是正之者故二本並行其後石經與印本但以或本為據所以皆誤今從通解删之
