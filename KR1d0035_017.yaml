body:
  text: 儀禮集說卷十七元敖繼公撰有司徹第十七注曰少牢之下篇也繼公謂此别為一篇及其名篇之意皆與既夕同有司徹徹直列反下並同徹室中之饋及𧃊者之豆爵與祝之薦俎也祝不自執其俎以出是未歸也其二佐食乃衆賔為之室中事畢亦反於賔位然則祝與佐食皆當與賔尸之禮矣此時有司徹祝俎或設於堂下與主人於𧃊者之退亦反入於室及有司既徹則出立於阼階東也掃堂注曰為賔尸新之司宫攝酒乃燅尸俎注曰燅溫也溫尸俎於爨肵亦溫焉古文燅皆作尋記或作燖春秋傳曰若可燖也亦可寒也繼公謂皆示新之俎俎實謂尸前之羊魚豕及所加於肵俎者也雍爨之所燅者固不止此是特為其已在俎者言之耳祝佐食亦與賔尸之禮其俎實不燅者以無上位略之但因其故俎而已卒燅乃升羊豕魚三鼎無臘與膚乃設扄冪陳鼎于門外如初燅音尋又徐鹽反注曰如初者如廟門之外東方北面北上繼公謂少牢當五鼎此乃無臘與膚鼎者賔尸之禮膚不專俎而附於豕俎故是時亦不可以專鼎而惟附於豕鼎也然鼎數冝竒是以併去臘鼎而為三焉臘全不用者此禮貶於祭而臘又賤故略之右新儐禮乃議侑于賔以異姓議侑於賔謂與賔長謀議可以為侑者也此與鄉飲酒就先生而謀賔介之意相類以異姓謂於衆賔之中擇之也必異姓者以尸既同姓故侑須用異姓侑之言佑也所以輔助尸者也賔尸而立侑亦示敬尸之意且貴多儀也宗人戒侑注曰戒猶告也南靣告於其位戒曰請子為侑侑出俟于廟門之外注曰俟於次當與尸更入右立侑司宫筵于户西南面注曰為尸席也又筵于西序東靣注曰為侑席也尸與侑北面于廟門之外西上尸北面者尊大夫若不敢為賔客然也其位當在門外之西祭事已尸出門則不敢以尊自居西上賔位尚左也主人出迎尸宗人擯迎之而使宗人擯待賔之禮也賔客尸而迎之亦為祭事已主人拜尸答拜主人又拜侑侑答拜主人拜蓋西面也答拜者其皆東面與此拜皆再拜下文拜至亦然主人揖先入門右尸入門左侑從亦左揖乃讓亦三揖至於階乃三讓也惟云揖乃讓經文省亦以其可知故也凡主人與客揖而先入皆入門右也經獨於此見之主人先升自阼階尸侑升自西階西楹西北面東上尸侑升自西階尸升三等侑從之中等如上下射升階之儀也其降也亦然東上尸冝與主人相當也主人東楹東北面拜至尸答拜主人又拜侑侑答拜拜至說見士昏禮右迎尸侑乃舉注曰舉鼎也舉者不盥殺也司馬舉羊鼎司士舉豕鼎舉魚鼎以入陳鼎如初司馬二人司士四人也魚鼎重言舉明其與豕鼎異人也如初如其東方當序西面北上雍正執一七以從雍府執二七以從司士合執二俎以從司士贊者亦合執二俎以從七皆加于鼎東枋二俎設于羊鼎西西縮二俎皆設于二鼎西亦西縮注曰凡三七鼎一七四俎為尸侑主人主婦其二俎設於豕鼎魚鼎之西陳之冝具也繼公謂一七羊七也二七豕魚七也四俎乃尸侑主人主婦之羊俎也設之亦北上如鼎之序然其載之亦先北而後南也此皆羊俎其二乃在豕鼎魚鼎西者但欲使鼎前皆有俎耳不嫌其所載者異也羊鼎西特有二俎尊之也此執匕以少者為貴設俎以多者為尊亦冝也雍人合執二俎陳于羊俎西並皆西縮覆二疏七于其上皆縮俎西枋覆芳服反下並同注曰疏七七柄有刻飾者繼公謂羊俎指在羊鼎西者也此二俎陳於其西亦北上其北俎次賔以羞羊七湇豕匕湇其南俎司馬以羞羊肉湇司士以羞豕脀湇魚疏匕二者羊豕之湇冝異器也覆者為塵也二七覆於二俎之上羊七在北豕七在南南非匕湇之俎亦覆匕於其上者事未至權加之耳此俎將載則更以豕匕加於其北俎既則反之縮俎西枋為縮執俎者在西也右陳設鼎俎於內主人降受宰几尸侑降主人辭尸對為尸受几故尸從降侑亦降者從尸也凡尸為禮之類此者侑則從之此所以謂之侑也與宰授几主人受二手橫執几揖尸几自東壁來其授受於阼階東與獨揖尸尸尊也聘禮公受几於序端主人升尸侑升復位注曰位阼階賔階上位主人西面左手執几縮之以右袂推拂几三二手橫執几進授尸于筵前推拂謂外拂之推者推手也尸進二手受于手間案聘禮曰賔進訝受几於筵前此亦訝受也乃云手間者但言其疏數之節耳此授受者皆橫執几而二手之間有廣狹則凡賔主之橫執几者二手共執其一亷明矣主人退尸還几縮之右手執外亷北面奠于筵上左之南縮不坐還音旋主人退復位也還几還而易執之也縮執几亦用二手此惟云右手執外亷特見其一耳右亷而謂之外者以其差遠於人故也几稍高故設之不坐少儀曰取俎設俎不坐其意類此主人東楹東北面拜注曰拜送几也尸復位尸與侑皆北面答拜注曰侑拜者從於尸繼公謂至此尸乃復位則是主人拜時尸在筵前東面也聘禮曰賔進訝受几於筵前東面俟公一拜送此異於彼者先奠几與飲酒而授几其禮重故侑亦拜答拜之文主於尸也右授几主人降洗尸侑降尸辭洗主人對卒洗揖主人升尸侑升辭對之儀見鄉飲酒故此略之揖亦主人揖尸也文省耳下放此尸西楹西北面拜洗主人東楹東北面奠爵答拜降盥尸侑降主人辭尸對卒盥主人揖升尸侑升主人坐取爵酌獻尸尸北面拜受爵主人東楹東北面拜送爵獻受之儀亦當如鄉飲酒禮右主人獻尸主婦自東房薦韭菹醢坐奠于筵前菹在西方婦贊者執昌菹醢以授主婦主婦不興受陪設于南昌在東方興取籩于房麷蕡坐設于豆西當外列麷在東方婦贊者執白黑以授主婦主婦不興受設于初籩之南白在西方興退麷芳中反注曰昌昌本也韭菹醓醢昌本麋臡麷熬麥也蕡熬枲實也白熬稻黑熬黍主婦取籩興者以饌異親之當外列辟鉶也退退入房也繼公謂四豆四籩放室中之數也賔尸以飲酒為主其禮變於饋食不可復因其薦故於其始亦變而用朝事之豆籩焉不辟君禮者變而用之無嫌也當外列麷在麋臡西也右主婦薦尸豆籩乃升注曰升牲體於俎也司馬朼羊亦司馬載載右體肩臂肫胳臑正脊一脡脊一橫脊一短脅一正脅一代脅一腸一胃一祭肺一載於一俎注曰一俎謂司士所設羊鼎西第一俎繼公謂二司馬即舉羊鼎者也以下凡升羊者皆司馬為之特於此見之耳上言燅尸俎而此肩臂臑肫胳具有明其神俎肵俎並用也復序俎實者其數及載與進俎之法皆有異於上故爾是言載時先後之序也其在俎則與正祭者略同惟臑後於胳為異耳臑後於胳者以其折也折之則不為全體而在全體之下矣臑必折者見其貶於神俎且欲以所折者為肉湆俎也其脊脅皆一骨及腸胃各一者義亦如之賔尸主於飲酒此俎乃有祭肺者盛之一俎謂司士所設羊鼎西之北俎也司馬亦南靣執之以載與他俎異也既載則侑主人主婦之羊俎三亦繼此而序載之每俎既載則遷之於阼階西亦北上西縮俟時乃設耳所以然者為當進羊匕湇羊肉湇於尸也朼當作匕下同羊肉湇臑折正脊一正脅一腸一胃一嚌肺一載于南俎注曰肉湇肉在汁中者也必云臑折明為上所折分者嚌肺離肺也南俎雍人所設在南者繼公謂云臑折者明其為臑之下也此臑蓋與後足之觳同以無異名故但云臑折而已羊俎之外又分其體以為此俎貴多儀也尊尸不敢用左體故分右臑為之用嚌肺亦别於其正羊肉湇與羊俎之實同鼎而名不同以其於鼎有湇上湇中之異也羊俎西之二俎亦北上肉湇載於南俎則其北俎為羞匕湇明矣凡羊肉湇與豕脀湇魚皆俟時而載因升正俎之節而遂見之欲其文相比也司士朼豕亦司士載亦右體肩臂肫胳臑正脊一脡脊一橫脊一短脅一正脅一代脅一膚五嚌肺一載于一俎此謂豕脀也二司士即舉豕鼎者也此下凡升豕者皆此司士為之豕無正俎故此尸俎之體骨皆放於羊俎此俎與羊肉湆俎同臑在胳下是亦折矣侑俎羊左肩左肫正脊一脅一腸一胃一切肺一載於一俎侑俎豕左肩折正脊一脅一膚三切肺一載于一俎注曰切肺亦祭肺互言之耳繼公謂侑無羊肉湇故羊俎得用二體前體以肩後體以肫尊之也右體皆在尸俎故此皆用左焉有肩有肫則肫在下端矣羊俎亦用祭肺者與尸俎同在堂上因其禮也阼俎亦然飲酒正禮祭以離肺其有以切肺者或盛之或有為加之或相因用之非常禮也豕左肩折不用全體為羊俎已用二故於此殺之豕脀體數殺於羊俎又無羊肉湇皆下尸也豕脀之肺冝如羊肉湇而用嚌此乃放羊俎而用切者亦以無羊肉湇故也侑之羊俎司士所設在羊鼎西之南者侑之豕俎與尸之豕脀同用南俎阼俎羊肺一祭肺一載于一俎羊肉湇臂一脊一脅一腸一胃一嚌肺一載于一俎豕脀臂一脊一脅一膚三嚌肺一載于一俎注曰臂左臂也阼俎司士所設豕鼎西俎也繼公謂尸之牲俎三主人亦如之故其正俎無體遠下尸也無骨之屬但用肺而已臂不言左者可知也正俎太貶故加俎冝用尊體其脊脅之屬亦不嫌於與尸同也侑正俎用肩主人之加俎乃用臂蓋示其不相統之意豕脀猶言豕俎也不言肉湇者一俎而已無所别異也豕脀體數乃放羊肉湇者亦羊俎太簡故爾此羊肉湇豕脀皆用雍人所設之南俎與尸同主婦俎羊左臑脊一脅一腸一胃一膚一嚌羊肺一載于一俎注曰言嚌羊肺者文承膚下嫌也其俎司士所設在魚鼎西者繼公謂主婦有正俎而無豕脀下侑也必用膚者明其可用豕脀而不用也亦與阼俎惟用羊肺之意相近用嚌肺者此俎設於房中故不因堂上之禮膚在嚌羊肺上未詳司士朼魚亦司士載尸俎五魚橫載之侑主人皆一魚亦橫載之皆加膴祭于其上膴火吳反鄭又音哻注曰橫載之者異於牲膴讀如殷哻之哻刳魚時割其腹以為大臠可用祭也繼公謂二司士舉魚鼎者也橫載之亦縮俎其於載者則為橫此益送魚肉之俎載時皆橫執之與羞之之時異於斯見之矣凡經言載俎之例惟云橫載者據俎而言也加以之字者據載者而言也此三羞湆魚亦皆迭用南俎朼亦當作匕右通言載俎之法卒升謂已升四羊俎也賔長設羊俎于豆南賔降尸升筵自西方坐左執爵右取韭菹㨎于三豆祭于豆間尸取麷蕡宰夫贊者取白魚以授尸尸受兼祭于豆祭長之丈反注曰賔長上賔繼公謂賔長設俎尊尸之正俎也阼俎亦然云賔降見尸升之節也既祭則右執爵於尸升筵主人亦疑立於阼階東雍人授次賔疏七與俎受于鼎西左手執俎左亷縮之郤右手執七枋縮于俎上以東面受于羊鼎之西司馬在羊鼎之東二手執挑七枋以挹湇注于疏匕若是者三挑湯堯反鄭音由挹一入反注曰挑謂之㰱讀如或舂或抌之抌此二匕者皆有淺升狀如飯撡挑長枋可以抒物於器中者注猶寫也今文挑作抌繼公謂疏匕與俎在羊俎西之北者也匕湇尊於肉湇故用上俎羞之陳俎時俎西縮疏匕縮俎西枋而此左手執左亷郤右手執匕枋以受湇是身當俎下端也然則凡縮執俎者皆當其下端矣左手執俎左亷乃縮之是授受時皆橫執俎也縮執俎以受於鼎西者惟此與豕匕湇耳二手執挑匕枋敬其事不游手也挹湇且若是則匕牲體者可知尸興左執爵右取肺坐祭之祭酒興左執爵注曰肺羊祭肺繼公謂言興左執爵明其右執爵以興也下文皆然次賔縮執匕俎以升若是以授尸尸郤手受匕枋坐祭嚌之興覆手以授賔賔亦覆手以受縮匕于俎上以降若是者謂執匕俎之儀無變也郤手受匕枋則匕內鄉而便於用覆手以授賔明其變於有事之時次賔亦覆手以受統於尊者也縮俎則不復執之而二手執俎矣祭湇如祭酒然亦注於地他時湇不祭此祭者重其在俎也湇與肉湇相將之物故以此先肉湇而進之尸席末坐啐酒興坐奠爵拜告㫖執爵以興主人北面于東楹東答拜拜告㫖不降筵以有後事也云主人北面于東楹東明其復位下放此司馬羞羊肉湇縮執俎尸坐奠爵興取肺坐絶祭嚌之興反加于俎司馬縮奠俎于羊湇俎南乃載于羊俎卒載俎縮執俎以降縮執俎者既載則錯而改執之也載時橫執之尸奠爵亦於左冝辟羞俎者後湆字衍司馬北面縮奠俎既則西面於俎東載之尸坐執爵以興次賔羞羊燔縮執俎縮一燔于俎上鹽在右尸左執爵受燔㨎於鹽坐振祭嚌之興加于羊俎賔縮執俎以降室中之事無燔俎故此與亞獻皆用之受燔取於俎也尸降筵北面于西楹西坐卒爵執爵以興坐奠爵拜執爵以興主人北面于東楹東答拜主人受爵尸升筵立于筵末右主人獻尸禮卒主人酌獻侑侑西楹西北面拜受爵主人在其右北面答拜獻侑亦於席前西南面也侑既拜則進受之以復位主人既拜則立於西階東及侑降筵北面則復就其右主婦薦韭菹醢坐奠于筵前醢在南方婦贊者執二籩麷蕡以授主婦主婦不興受之奠麷于醢南蕡在麷東主婦入于房醢在南方是豆北上也豆北上者以席南上也主人席豆相變之法於斯見之矣下云侑升筵降筵自北方是席南上也主婦薦豆而贊者即贊籩者兩豆兩籩同時設故不必親取籩侑升筵自北方司馬橫執羊俎以升設于豆東凡正俎皆橫執此乃明言之者以司馬進之嫌亦縮執也侑坐左執爵右取菹㨎于醢祭于豆間又取麷蕡同祭于豆祭興左執爵右取肺坐祭之祭酒興左執爵次賔羞羊燔如尸禮不啐酒者凡堂上每獻啐酒之節皆當放於尸上禮尸嚌湇乃啐酒此無湇則不冝啐酒以異其節侑無羊匕湇者以無肉湇故也侑降筵自北方北面于西楹西坐卒爵執爵以興坐奠爵拜主人答拜注曰答拜拜於侑之右右主人獻侑尸受侑爵降洗侑降立于西階西東面主人降自阼階辭洗尸坐奠爵于篚興對尸適洗南北面主人阼階東南面辭洗尸對主人復阼階東西面卒洗主人升尸升自西階主人拜洗尸北面于西楹西坐奠爵答拜降盥主人降尸辭主人對卒盥主人升尸升坐取爵酌主人亦揖乃升與前後之儀同不言者可知也侑不升辟酢禮也與尸同升則嫌若同酢主人然司宫設席于東序西面主人東楹東北面拜受爵尸西楹西北面答拜事至乃設席略倣室中致爵之節亦所以尊尸侑也既設席尸乃於席前東南面酢主人主人拜受爵復位主婦薦韭菹醢坐奠於筵前菹在北方婦贊者執二籩麷蕡主婦不興受設麷於菹西北蕡在麷西主人升筵自北方主婦入於房注曰設籩於菹西北亦辟鉶繼公謂主人之席亦南上而菹在北方豆席相變之法愈可見矣升筵之節侑速於尸主人速於侑皆所以示其異長賔設羊俎于豆西主人坐左執爵祭豆籩如侑之祭興左執爵右取肺坐祭之祭酒興次賔羞匕湇如尸禮席未坐啐酒執爵以興司馬羞羊肉湇縮執俎主人坐奠爵於左興受肺坐絶祭嚌之興反加于湇俎司馬縮奠湇俎于羊俎西乃載之卒載縮執虗俎以降祭酒興亦左執爵乃受匕湇奠爵於左辟肉湇俎也受肺亦取於俎言受者執俎以進亦授也故取之云受言虛俎者見其盡載於羊俎而無所釋也此經言羞湇俎一節其文有加尸者所以足其義非異也主人坐取爵以興次賔羞燔主人受如尸禮燔不言羊可知也主人降筵自北方北面于阼階上坐卒爵執爵以興坐奠爵拜執爵以興尸西楹西答拜主人坐奠爵于東序南侑升尸侑皆北面于西楹西主人北面于東楹東再拜崇酒尸侑皆答再拜主人及尸侑皆升就筵此尸酢主人主人拜崇酒而侑亦答拜者緣主人意亦欲并謝已也云主人及尸侑先後之辭也後文放此升就二字冝衍其一右尸酢主人司宫取爵于篚以授婦贊者于房東以授主婦注曰房東房户外之東繼公謂以授主婦婦贊者以授主婦於房中也上篇亞獻畢主婦以爵入於房今司宫乃取爵於下篚以授者其有司徹之後此爵又反於下篚與主婦洗于房中出實爵尊南西面拜獻尸尸拜于筵上受注曰尊南西面拜由便也繼公謂尸拜於筵上受以其殺於主人且因室中之禮也後三獻放此主婦西面于主人之席北拜送爵入于房取一羊鉶坐奠于韭菹西主婦贊者執豕鉶以從主婦不興受設于羊鉶之西興入于房取糗與腵修執以出坐設之糗在蕡西修在白西興立于主人席北西面主人席北此時主婦堂上之正位也飲酒而有鉶尸尊亦盛之設二籩而主婦親取之以其與鉶異類不可相因也糗與修雜用饋食之籩也去棗用修以示其變糗修北上明不與初儀序下儀類此尸坐右執爵祭糗修同祭于豆祭於此乃云尸坐是受爵時立也祭糗修之祭當如下文作取蓋字誤也以羊鉶之柶扱羊鉶遂以扱豕鉶祭于豆祭祭酒祭鉶乃祭酒者是禮初獻祭酒之節居其祭之四三獻居其祭之二故於此特居其祭之三以序之且示禮殺有漸也次賔羞豕匕湇如羊匕湇之禮如者如其左手執俎左亷以下之儀其異者次賔自縮執匕俎以受雍人不復授之也羞豕匕湇亦用羊匕湇之俎其匕則殊乃嚮之覆於羊俎西之南俎之上者也將羞此湇則以羊匕與之易處焉既則各反之尸坐啐酒左執爵嘗上鉶執爵以興坐奠爵拜主婦答拜執爵以興此嘗鉶拜也不告㫖異於主人也特牲饋食禮曰尸祭鉶嘗之告㫖主人拜尸答拜司士羞豕脀尸坐奠爵興受如羊肉湇之禮坐取爵興奠爵亦於左次賔羞豕燔尸左執爵受燔如羊燔之禮坐卒爵拜主婦答拜受爵受爵亦於其席也下文放此右主婦獻尸酌獻侑侑拜受爵主婦主人之北西面答拜亦拜於筵上受蓋不敢異於尸不言者可知也北亦席北主婦羞糗修坐奠糗于䵄南修在蕡南侑坐左執爵取糗修兼祭于豆祭無鉶亦殺也不祭酒者上禮尸祭鉶乃祭酒此無鉶則不祭酒其義與上不啐酒同司士縮執豕脀以升侑興取肺坐祭之司士縮奠豕脀于羊俎之東載于羊俎卒乃縮執俎以降侑興取肺亦右取之肺謂切肺豕脀無湇者初獻無羊湆故此雖有豕脀亦不用湆也次賔羞豕燔侑受如尸禮坐卒爵拜主婦答拜受爵如尸禮亦如受羊燔之禮也右主婦獻侑酌以致于主人主人筵上拜受爵主婦北面于阼階上答拜筵上受因尸禮也北面答拜放室中之儀也與主人行禮故亦得獨拜於阼階上主婦設二鉶與糗修如尸禮主人其祭糗修祭鉶祭酒受豕匕湇啐酒皆如尸禮嘗鉶不拜有鉶者阼俎如尸故鉶亦因之設二鉶羊在菹北豕在羊北設糗修糗在䵄北修在蕡北此啐酒為將嘗鉶也嘗鉶不拜鉶已物也言此以别於尸禮其受豕脀受豕燔亦如尸禮坐卒爵拜主婦北面答拜受爵右主婦致爵於主人尸降筵受主婦爵以降主婦受爵尸即降筵主婦以尸將受已爵也其西面於主人之北以待之與主人降侑降主婦入于房侑主人降從尸也主婦入於房尸降為已冝辟之也凡婦人於丈夫之為已而降洗者例無徒降之禮蓋於此篇及士昏禮見之矣主人立于洗東北西面侑東面于西階西南設洗當東榮而主人降位在阼階東直東序則冝西於洗北又上文侑降立於西階西此亦從降也而主人云洗東北侑云西階西南未詳疑文有誤衍也尸易爵于篚盥洗爵易爵酢主婦因室中之禮也主人揖尸侑亦異揖之於此乃并揖侑者以嚮者尸酢主人之時侑不升故也必揖之使升者尸酢之意己見於前今無嫌也主人升尸升自西階侑從主人北面立于東楹東侑西楹西北面立以尸方行禮冝俟之尸酌主婦出于房西面拜受爵尸北面于侑東答拜主婦入于房西面亦於主人席北蓋尸亦就此位而酢之司宫設席于房中南面主婦南面立于席西既受爵乃設席降於主人也席南面變於不賔尸之禮也立於席西者亦西為下未設豆而立席西亦異於上婦贊者薦韭菹醢坐奠于筵前菹在西方婦人贊者執麷蕡以授婦贊者婦贊者不興受設麷于菹西蕡在麷南注曰婦人贊者宗婦之少者主婦升筵司馬設羊俎于豆南主婦坐左執爵右取菹㨎于醢祭于豆間又取麷蕡兼祭于豆祭主婦奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒啐酒注曰挩手者於􅍤􅍤佩巾內則曰婦人亦左佩紛􅍤繼公謂凡祭離肺者必挩手經不盡見之也次賔羞羊燔主婦興受燔如主人之禮主婦執爵以出于房西面于主人席北立卒爵執爵拜尸西楹西北面答拜主婦入立于房尸主人及侑皆就筵出房卒爵冝成禮於所酢者之前也立卒爵婦人常禮也立卒爵而拜既惟人君及主婦耳其異者奠爵與執爵也燕禮曰公立卒爵坐奠爵拜云立於房見其不就席右尸酢主婦上賔洗爵以升酌獻尸尸拜受爵賔西楹西北面拜送爵尸奠爵于薦左賔降注曰上賔賔長也或謂之長賔奠爵爵止也繼公謂拜受爵亦於筵上也尸於三獻而奠爵亦欲助祭者皆受獻也薦左醢東也不奠於右為妨往來及行禮也右上賔獻尸爵止主人降洗觶尸侑降主人奠爵于篚辭尸對卒洗揖尸升侑不升侑不升者酬禮不及已升嫌也主人實觶酬尸東楹東北面坐奠爵拜尸西楹西北面答拜坐祭遂飲卒爵拜尸答拜降洗尸降辭主人奠爵于篚對卒洗主人升尸升主人實觶尸拜受爵主人反位答拜尸北面坐奠爵于薦左尸侑主人皆升筵卒洗亦揖乃升主人實觶亦北面於尸之席前尸階上拜乃進受之而反位主人既答拜尸乃進北面奠爵薦左其昌本之東與酬而授觶者大夫之禮異於士也主人於尸爵止之後即舉觶以酬尸者冝終尸禮乃可以獻助祭者也侑升堂之節其在尸奠爵之時乎右主人酬尸尸奠酬乃羞宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之注曰房中之羞其籩則糗餌粉餈其豆則酏食糝食繼公謂房中之羞饌於房者也言房中以别於庶羞明庶羞不自房來也饋食之禮庶羞亦設於薦豆之左則庶羞在左乃其常處庶羞左則內羞右亦冝矣庶羞之物恐亦不過胾醢而已案注以羞籩羞豆之實為此房中之羞亦恐或然但未必其俱用之也右羞於尸侑主人主婦主人降南面拜衆賔于門東三拜衆賔門東北面皆答一拜注曰拜於門東明少南就之也繼公謂助祭之賔主黨也故主人降拜之而尸侑不從與鄉飲鄉射之禮異也未獻之前衆賔位在門東亦大夫之禮異於士者主人三拜旅衆賔衆賔答一拜大夫士之禮同主人洗爵長賔辭主人奠爵于篚興對卒洗升酌獻賔于西階上長賔升拜受爵主人在其右北面答拜長賔辭亦北面蓋於門東少進也主人已酌長賔乃升遠下尸也獻賔當西南面宰夫自東房薦脯醢醢在西醢在西者為降設於其位則脯當在南也賔位於庭北上而脯醢南上亦席豆相變之意也由是言之則他禮之類此者皆可得而推矣司士設俎于豆北羊胳一腸一胃一切肺一膚一注曰羊胳羊左胳薦與設俎者既則俟於西序端繼公謂上賔一體又無脊脅遠别於堂上者也用切肺者賔俎設於堂故亦因尸禮肺繼胃言之羊肺可知賔坐左執爵右取脯㨎於醢祭之執爵興取肺坐祭之祭酒遂飲卒爵執爵以興坐奠爵拜執爵以興主人答拜受爵賔坐取祭以降西面坐委於西階西南注曰成祭於上尊賔也取祭以降反下位也反下位而在西階西南已獻尊之祭脯肺繼公謂賔取祭以降以已所有事者也冝親執之西階西南賔之正位也既獻乃立於此尊者之禮節文彌多以相變為貴執以興似脫一爵字宰夫執薦以從設于祭東司士執俎以從設于薦東此設薦於祭東則是凡祭於豆間乃當其間之前耳此獻長賔而宰夫司士薦則自此以下皆私人為之明矣宰夫司士大夫之私人也衆賔長升拜受爵主人答拜坐祭立飲卒爵不拜既爵宰夫贊主人酌若是以辨辨受爵宰夫贊酌大夫尊也贊酌者主人以虗爵授宰夫宰夫為酌之於此乃言之者見獻賔一人乃贊酌也若是以辨謂皆如衆賔長升拜受爵以下之儀言辨受爵嫌或有不與者也其薦脯醢與脀設于其位其位繼上賔而南皆東面其脀體儀也注曰亦宰夫薦司士脀用儀者尊體盡儀度餘骨可用而用之今文儀作􅬞繼公謂特牲饋食禮曰衆賔升拜受爵坐祭立飲薦俎設於其位辨此下經言兄弟之儀云升受爵其薦脀設於其位然則此薦脀亦於每獻設之也體儀謂或體或儀也尊者用體折卑者但用儀且儀者其脊若脅之屬與又下云長兄弟之脀折脅一膚一則此非折而儀者惟有膚而已右主人獻賔乃升長賔主人酌酢于長賔西階上北面賔在左注曰言升長賔則有贊者為之繼公謂乃升長賔者其宗人與後長賔二字似衍蓋此乃主人自酢非酢於長賔也鄉飲酒曰主人實爵以酢於西階上此文冝類之遍獻乃酢變於士禮賔辟尸不敢親酢主人故主人自酢以逹其意主人坐奠爵拜執爵以興賔答拜坐祭遂飲卒爵執爵以興坐奠爵拜賔答拜賔降注曰降反位繼公謂賔降反位則主人亦就席矣右主人自酢宰夫洗觶以升主人受酌降酬長賔于西階南北面賔在左主人坐奠爵拜賔答拜坐祭遂飲卒爵拜賔答拜注曰宰夫授主人觶則受其虗爵奠於篚繼公謂宰夫授觶於上便其酌也此亦異于士主人洗賔辭主人坐奠爵於篚對卒洗升酌降復位賔拜受爵主人拜送爵賔西面坐奠爵于薦左位西階南之位也以特牲禮例之此時當西面乃云復位未詳主人拜亦北面也賔西面奠爵於薦左由便說見特牲禮薦左薦北右主人酬賔主人洗升酌獻兄弟于阼階上兄弟之長升拜受爵主人在其右答拜坐祭立飲不拜既爵皆若是以辨辨受爵獻兄弟不殊其長與衆賔同亦大夫禮異也不言宰夫贊主人酌略其文耳兄弟卑於衆賔主人於其次者不親酌可知下獻內賔放此此獻亦西南面其位在洗東西面北上升受爵其薦脀設于其位又著兄弟長以下既獻之位及其設薦脀之節也至此乃言其位者因文而見之也升受爵謂每人升受爵之時也於其受獻則為之設薦脀於位明不俟其降也鄉飲酒禮衆賔每一人獻則薦諸其席是禮似之矣此不言宰夫贊酌獻衆賔不言升受爵而設薦脀其禮同故互文以相足也其先生之脀折脅一膚一其衆儀也注曰先生長兄弟繼公謂脀猶俎也其折與脅若羊若豕則不可考先生脀折其衆則儀亦以此别長幼也無離肺者因上賔俎也俎不設於堂故無切肺右主人獻兄弟主人洗獻內賔于房中南面拜受爵主人南面于其右答拜坐祭立飲不拜既爵若是以辨亦有薦脀注曰內賔姑姊妹及宗婦獻於主婦之席東南面於其右主人之位恆左人亦設薦脀於其位特牲饋食禮記曰內賔立於房中西墉下東面南上宗婦北堂東面北上繼公謂洗不言降是洗於房也獻之蓋東北面受送之拜皆南面猶堂上之皆北面也是或一禮與若是以辨亦謂長幼拜受以下之儀同也不言辨受爵已於衆賔兄弟見之此可知也不著其位者嫌未獻既獻之位異也右主人獻內賔主人降洗升獻私人于阼階上拜于下升受主人答其長拜乃降坐祭立飲不拜既爵若是以辨宰夫贊主人酌主人于其羣私人不答拜其位繼兄弟之南亦北上亦有薦脀注曰初亦北面在衆賔之後爾凡獻位定繼公謂私人猶私臣也經記異人故其文亦異獻私人而降洗重獻禮也拜於下而降飲賤也獻亦西南面於東楹東而拜於其右私人賤故但答其長拜以殊之自獻衆賔至此其獻凡四節惟前後兩言宰夫贊主人酌所以見其間二獻之不言此者為省文耳此言於若是以辨之後見獻私人之長即贊之也以是例之則獻內賔以上主人所親酌者惟於其長益可見矣此位亦北上者賤於兄弟故其位繼其後而不更端也特牲記言衆賔及衆兄弟內賔宗婦公有司私臣其俎同然則此禮內賔以及私人其俎亦皆儀而有膚矣大夫無獻公有司之禮豈其私臣多足以任其事不用公有司與或公有司在衆賔之中不必别見之與右主人獻私人主人就筵尸作三獻之爵注曰上賔所獻爵繼公謂主人畢獻而就筵三獻於是升立於西階上尸乃舉爵也此與不賔尸之禮皆尸自作止爵不待獻者作之亦異於士司士羞湇魚縮執俎以升尸取膴祭祭之祭酒卒爵注曰不羞魚匕湇略小味也羊有正俎羞匕湇肉湇豕無正俎魚無匕湇隆殺之殺繼公謂不言左執爵與興坐者如上禮可知司士縮奠俎于羊俎南橫載于羊俎卒乃縮執俎以降尸奠爵拜三獻北面答拜受爵橫載者於俎為橫與牲體同也不縮載者正俎之實已多又加以益送之俎故載魚於此不得象其在魚俎也尸既卒爵乃執虛爵以待執俎者降而後奠爵拜行禮之序於此可見右尸作止爵酌獻侑侑拜受三獻北面答拜司馬羞湇魚一如尸禮卒爵拜三獻答拜受爵司馬當作司士字之誤也上下皆司士為之此不冝使司馬且司馬惟主羊俎耳羞湇魚非其事也卒爵與拜其節冝與尸同此略言之耳下文主人亦然酌致主人主人拜受爵三獻東楹東北面答拜司士羞一湇魚如尸禮卒爵拜三獻答拜受爵致下蓋脫於字也賔拜東楹東者以與主人為禮則不敢獨拜西階上辟尸也此與侑如尸禮皆兼祭酒而言不致爵於主婦變於不賔尸之禮右上賔獻侑致於主人尸降筵受三獻爵酌以酢之注曰既致於主人尸乃酢之遂賔意繼公謂賔尸則尸與侑主人為序故俟其畢獻乃酢之酢而不洗亦因室中之禮也賔尸而不因室中之禮者惟主人耳三獻西楹西北面拜受爵尸在其右以授之尸升筵南面答拜坐祭遂飲卒爵拜尸答拜執爵以降實于篚尸在其右並授也並授而不同面拜遠辟主人獻賔之禮也云執爵以降則是既卒爵亦奠之而拜矣右尸酢上賔二人洗觶升實爵西楹西北面東上坐奠爵拜執爵以興尸侑答拜坐祭遂飲卒爵執爵以興坐奠爵拜尸侑答拜皆降二人舉觶為旅酬始也中庸曰旅酬下為上所以逮賤也其是之謂與洗升酌反位尸侑皆拜受爵舉觶者皆拜送侑奠觶于右反位於西楹西俟拜也受爵亦於其席拜送亦於其位舉觶者不奠觶於席前不變於主人之儀也侑奠觶不言坐文省也於右亦由便耳右糗南右二人舉觶於尸侑尸遂執觶以興北面于阼階上酬主人主人在右言遂執觶以興是嚮者亦執觶以坐而俟也尸雖不奠觶猶坐以其當然也坐奠爵拜主人答拜不祭立飲卒爵不拜既爵酌就于阼階上酬主人亦執觶興主人乃答拜也此酬主人謂東面授之如特牲賔兄弟旅酬之儀主人拜受爵尸拜送尸就筵主人以酬侑于西楹西侑在左坐奠爵拜執爵興侑答拜不祭立飲卒爵不拜既爵酌復位侑拜受主人拜送主人復筵復位而西面授之下放此乃升長賔侑酬之如主人之禮注曰遂旅也至于衆賔遂及兄弟亦如之皆飲于上注曰上西階上遂及私人拜受者升受下飲私人拜而升受兄弟之爵俟兄弟答拜乃下也下飲謂就其位而飲之以酬其次者也惟云拜受云下飲是兄弟及私人飲時皆不拜矣兄弟飲不拜者以所酬者在下難為禮也私人飲不拜者因酬已者之儀且賤者禮簡也卒爵升酌以之其位相酬辨注曰其位兄弟南位亦拜受拜送升酌由西階繼公謂以之其位飲所酬者也亦於此相酬則私人之長其下飲之時亦在此明矣卒飲者實爵于篚注曰末受酬者雖無所旅猶飲右旅酬乃羞庶羞于賔兄弟內賔及私人無房中之羞别於主婦以上也此節亦當祭薦脀文不具耳此羞同時羞則兄弟酌以相酬之時房中亦旅右羞於堂下及房中兄弟之後生者舉觶于其長注曰後生年少也洗升酌降北面立于阼階南長在左坐奠爵拜執爵以興長答拜此後生者舉觶與主人酬賔之儀略同似有為主人酬長兄弟之意故位如主人而長在左坐祭遂飲卒爵執爵以興坐奠爵拜執爵以興長答拜長既拜則復於東面位也洗升酌降長拜受于其位舉爵者東面答拜爵止此拜受於其位者别於主人之親酬是亦變於士也酬而受爵因賔禮也東面答拜冝鄉之爵止奠之於薦左也以其未即舉故言止亦省文右兄弟之後生者舉觶於其長賔長獻于尸如初無湇爵不止注曰如初如其獻侑酌致於主人受尸酢也無湇爵不止别不如初者繼公謂賔長衆賔長即次賔也但言賔長者亦獻於尸不嫌與三獻者同也此獻當用觚不言者文省耳特牲饋食禮長兄弟於三獻之後洗觚為加爵此節與之同器亦冝同也上篇實觚於篚其為此用與不使兄弟不稱加爵大夫禮異也湆謂湆魚右次賔獻致如初賔一人舉爵于尸如初亦遂之于下注曰遂之於下者遂及賔兄弟下至於私人繼公謂賔一人次賔之次者也舉爵即舉觶也如初如二人舉觶於尸侑之儀其異者不及侑耳亦上文尸酬主人以下之禮右賔一人舉觶於尸遂旅酬賔及兄弟交錯其酬皆遂及私人爵無算言皆遂及私人則是賔及兄弟之奠爵先後迭舉而不並行也其禮則賔長取觶酬兄弟長交錯以辨不拜私人之卒飲者洗酌反之長兄弟乃取觶酬賔長亦交錯以辨卒飲者亦洗酌反之賔與兄弟又皆迭舉如初禮爵行無數至醉而止賔尸至於飲酒而堂上不行無算爵者此雖變於祭禮然尸猶有餘尊不冝無所别無算爵之儀太簡不崇敬右堂下相酬爵無算尸出侑從主人送于廟門之外拜尸不顧送尸於廟門外以其賔之也此云不顧見士於大夫之禮也拜侑與長賔亦如之衆賔從從從長賔也司士歸尸侑之俎尸侑尊司士徹俎而歸之賔長而下則自徹而授其人以歸主人退注曰反於寢也有司徹徹徹阼俎與堂上下之薦羞之屬也婦人不徹則其所徹者不以入於房與右尸出禮畢若不賔尸此下之禮視賔尸者為少質則是制禮之序此先彼後如冠禮之醴與醮者然也而上下篇以賔尸者為主至是乃更端言不賔尸者焉周禮尚文抑又可見是雖與冠禮言醴醮之序者不同意則相類也然既有新儀又存舊禮使夫人自擇而行之是又聖人至公無我之心固不專主於所尚而已則祝侑亦如之注曰謂尸七飯時尸食注曰八飯乃盛俎臑臂肫脡脊橫脊短脅代脅皆牢盛音成下同注曰盛者盛於肵俎也繼公謂先正體而後脊脅亦以尊卑也前體先臑後臂者肩未舉若自下而上然此所取者三體四骨與所舉正脊幹骼則羊豕各四體六骨矣肩既舉而俎但有六骨以為所釋者也魚七注曰盛半也魚十有五而俎其一已舉繼公謂魚盛七并前所舉者一僅八而已牢之骨體匕多此可以略特牲少故魚盛十有二臘辨無髀注曰亦盛半也言無髀者云一純而俎嫌有之繼公謂前升臘於鼎俎時不云髀不升故此明之臘用一純故得取其半云辨者明右體及其脅與脊皆盛也腸胃膚不盛者以其於骨體為賤既取骨體則賤者略之可也卒盛乃舉牢肩尸受振祭嚌之佐食受加于肵先盛衆骨體乃舉肩變於士禮亦為舉肩之後又實他俎不冝與肵俎之事並行也佐食取一俎于堂下以入奠于羊俎東羊當作魚字之誤也乃托于魚臘俎俎釋三個其餘皆取之實于一俎以出托之石反托猶取也其餘謂三個之外者也魚托四個臘托八個其所釋者臘則短脅正脅代脅各一骨魚三個而已魚臘俎釋三個而牢俎六個者肵俎於三脊三脅惟當各取一骨而已故牢俎之所釋不容不有六骨祝主人之魚臘取于是注曰祝主人主婦俎之魚臘取於此者三者各取一魚其臘主人臂主婦臑不言主婦未聞繼公謂此亦大夫之禮異者也取於是者主人主婦之魚臘及祝之魚也祝俎之臘用髀儐與不儐同耳尸不飯告飽主人拜侑不言尸又三飯飯並符晚反惟云主人拜侑省文侑食受牢舉如儐注曰舉肺脊繼公謂此儐者賔之之謂蓋指賔尸之禮也惟言賔則意有所不僃故以儐言之經先見儐禮已有成文故此以如蒙之省文耳不言如初者見是禮元不在儐禮後也右不賔尸尸食之禮主人洗酌酳尸賔羞肝皆如儐禮卒爵主人拜祝受尸爵尸答拜自卒爵以下不蒙如儐禮者欲與後禮相屬也凡與儐禮同而重見之者其意皆然右主人酳尸祝酌授尸尸以醋主人亦如儐此與上文所謂儐者皆前篇室中之事初非儐禮乃以儐旗文者以其已入儐之節內故爾下文放此其㨎祭其嘏亦如儐㨎亦當作授㨎去授字又差近也右尸酢主人其獻祝與佐食其位其薦脀皆如儐祝之薦脀如儐則牢與臘皆髀明矣祝與儐亦有肝從不言者與佐食連文故略之耳惟言位與薦脀不及其儀者可知也下文類此者皆然右主人獻祝及佐食主婦其洗獻于尸亦如儐此如儐謂拜送爵以上之禮主婦反取籩于房中執棗糗坐設之棗在稷南糗在棗南婦贊者執栗脯主婦不興受設之栗在糗東脯在棗東主婦興反位注曰反位反主人之北拜送爵位繼公謂籩位自左而右綪之變於敦位也此饋食之禮則四籩者其饋食之籩與周官籩人職饋食之籩五有棗栗而糗脯蓋棗下脫糗栗下脫脯也天子諸矦饋食之籩亦八當與其豆數同此從獻之禮儐則闕之者詳於堂上故略於室中隆殺之冝也尸左執爵取棗糗祝取栗脯以授尸尸兼祭于豆祭祭酒啐酒次賔羞牢燔用俎鹽在右尸兼取燔㨎于鹽振祭嚌之祝受加于肵注曰自主婦反取籩至此異於儐卒爵主婦拜祝受尸爵尸答拜右主婦獻尸祝易爵洗酌授尸尸以醋主婦主婦主人之北拜受爵尸答拜主婦反位又拜上佐食綏祭如儐卒爵拜尸答拜此夾爵拜內子正禮也儐則略之綏亦當作授右尸酢主婦主婦獻祝其酌如儐拜坐受爵主婦主人之北答拜如儐其酌以前之禮宰夫薦棗糗坐設棗于菹西糗在棗南祝左執爵取棗糗祭于豆祭祭酒啐酒次賔羞燔如尸禮注曰自宰夫薦至此亦異於儐繼公謂內子不薦而使官為之者遠下尸亦大夫禮異也士禮主婦薦豆籩於祝卒爵主婦受爵酌獻二佐食亦如儐主婦受爵以入于房祝卒爵而主婦受是亦不拜既如儐也此以上如儐者皆在前篇右主婦獻祝及佐食賔長洗爵獻于尸尸拜受賔户西北面答拜爵止此三獻爵止之義與特牲饋食禮同受爵而即止亦大夫禮異也右賔長獻尸爵止主婦洗于房中酌致于主人主人拜受主婦户西北面拜送爵司宫設席設席亦於主人立處之南也主婦薦韭菹醢坐設于席前菹在北方婦贊者執棗糗以從主婦不興受設棗于菹北糗在棗西佐食設俎臂脊脅肺皆牢膚三魚一臘臂臂左臂也臘臂亦如之肺離肺也脊脅各一骨脊脅之數皆少者以俎實多故爾亦遠下尸也魚一亦橫之與牲臘異既設俎主人乃升筵坐與主婦升筵之節同主人左執爵右取菹㨎于醢祭于豆間遂祭籩奠爵興取牢肺坐絶祭嚌之興加于俎坐挩手祭酒執爵以興坐卒爵拜此籩祭不贊且無從與士禮異者其辟尊者之禮與此牢肺則絶祭嚌之者各一也亦卒爵於席者室中之禮已在席則冝卒爵於席不必於拜受之處成禮也主婦答拜受爵酌以醋户內北面拜主人答拜卒爵拜主人答拜主婦以爵入於房李寶之曰主人不致爵於主婦異於士繼公謂主婦亦坐祭立飲而卒爵此文略也右主婦致爵於主人尸作止爵注曰自爵止至此亦異於儐祭酒卒爵賔拜祝受爵尸答拜尸嚮受爵而即止故於是祭之於三獻而無從與士禮異者其亦辟尊者之禮與祝酌授尸賔拜受爵尸拜送坐祭遂飲卒爵拜尸答拜此賔受酢不夾爵拜而卒爵之儀又略以其間有爵止之事既變於上故此儀亦不得同於主人是與儐少異者也右尸作止爵酢賔獻祝及二佐食賔獻祝亦北面拜獻佐食亦西面拜與上篇此節獻祝不卒爵又不言獻佐食之禮此經文略也其或以主婦獻禮通之與特牲禮曰獻祝及佐食皆如初右賔長獻祝佐食洗致爵于主人主人席上拜受爵賔北面答拜坐祭遂飲卒爵拜賔答拜受爵主人雖拜於席亦立受爵與祝異酌致爵于主婦主婦北堂司宫設席東面注曰賔致爵於主婦異於儐北堂謂立於北堂即所設席之北也特牲記曰宗婦北堂東面北上主婦之席北堂東面則在宗婦之北也亦異於儐此設席亦北上也賔尸之禮席主婦於房中南面主婦立於席西是東上而上左也此禮設席雖變而東面亦冝上左也上左則北上也主婦席北東面拜受爵賔西面答拜席北上主婦乃拜於席北者以其先立於此故由便也不拜於席南者其以切近於宗婦長之位故與婦贊者薦韭菹醢菹在南方以篇首設豆之例言之菹在南方則席北上明矣婦人贊者執棗糗授婦贊者婦贊者不興受設棗於菹南糗在棗東佐食設俎于豆東羊臑豕折羊脊脅祭肺一膚一魚一臘臑豕折不言其所用之體未詳此肺嚌羊肺也曰祭者誤衍爾豕折而臘臑者臘與牲並用則冝放其尊者主婦升筵坐左執爵右取菹㨎于醢祭之祭籩奠爵興取肺坐絶祭嚌之興加于俎坐挩手祭酒執爵興筵北東面立卒爵拜賔答拜賔受爵易爵于篚洗酌醋于主人户西北面拜主人答拜卒爵拜主人答拜賔以爵降奠于篚易爵於篚亦下篚也自及佐食至此亦儐之所殺者其義與上同自是而後以至於末獻室中之事無復如儐者以內外之禮異故耳右賔長致於主人主婦乃羞宰夫羞房中之羞司士羞庶羞于尸祝主人主婦內羞在右庶羞在左注曰不賔尸則祝猶侑耳右羞於尸祝主人主婦主人降拜衆賔洗獻衆賔其薦脀其位其酬醋皆如儐禮主人洗獻兄弟與內賔與私人皆如儐禮其位其薦脀皆如儐禮注曰此與儐同者在此篇繼公謂此禮長賔之俎其異於儐者無切肺耳右主人獻賔以至於私人卒乃羞于賔兄弟內賔及私人辨卒謂皆獻畢也獻畢即羞之亦其節之異於儐者羞者羞庶羞右羞於堂下及房中賔長獻于尸尸醋獻祝致醋賔以爵降實于篚注曰致謂致爵於主人主婦疏曰此次賔長為加爵也繼公謂此亦洗觚以獻與特牲兄弟長加爵之器同經見此禮之殺於上者惟爵不止與不及佐食耳餘則略之以其可知故也此亦衆賔長也惟言賔長說見於前右次賔獻致賔兄弟交錯其酬無算爵李寶之曰此兄弟舉觶於其長亦當如儐禮在羞於私人之後賔長加獻之前文不具耳繼公謂此亦儐不儐同不言如儐未詳特牲禮衆賔長以觶為加爵於尸爵止堂下乃舉觶而旅酬既作止爵復旅酬遂行無算爵大夫賔尸之禮賔一人舉觶於尸尸乃行酬遍及於下然後在庭者爵無算以是二者觀之則庭中之行觶皆以尸用觶之時為節也此於衆賔長以觚加獻之後而賔兄弟乃舉觶以相酬而為無算爵似非其節蓋此上之文不具者多矣固不止如李氏所云也右賔兄弟相酬爵無算利洗爵獻于尸尸醋獻祝祝受祭酒啐酒奠之奠之亦北面奠於其筵前也祭事將畢其禮漸殺衆賔長獻不及佐食故祝於此亦不終其獻以見已禮亦冝殺之意是亦異於士右上利獻尸祝主人出立于阼階上西面祝出立于西階上東面祝告於主人曰利成祝入主人降立于阼階東西面尸謖祝前尸從遂出于廟門祝反復位于室中祝命佐食徹尸俎祝反復位於室中主人亦入於室復位經有脫文也佐食乃出尸俎于廟門外有司受歸之徹阼薦俎徹阼薦俎亦佐食為之既徹阼俎則堂下俎畢出與特牲禮同也右尸出祭禮畢乃𧃊如儐注曰謂上篇自司宫設對席至上餕興出也右𧃊卒𧃊有司官徹饋饌于室中西北隅南面如饋之設右几厞用席納一尊于室中厞扶味反注曰官徹饋者司馬司士舉俎宰夫取敦及豆佐食不舉羊豕俎親餕尊也古文厞作茀繼公謂南面亦大夫禮異司宫掃祭注曰掃豆間之祭舊說云埋之西階東繼公案舊說謂埋祭於西階東者據聘禮埋幣之處而言也右改設主人出立于阼階上西面祝執其俎以出立于西階上東面司宫闔牖户祝告利成乃執俎以出于廟門外有司受歸之衆賔出主人拜送于廟門外乃反注曰拜送賔者亦拜送其長婦人乃徹言婦人乃為徹事也其事在下徹室中之饌室中之饌即改設者也婦人徹此饌者為其當以入於房與凡徹饌而以入於房者婦人乃得為之不然則否室中之饋改饌而闔牖户自闔牖户至此須臾之頃耳然則改饌之不為厭神益可見矣右禮畢儀禮集說卷十七正誤以羊鉶之柶扱羊鉶遂以扱豕鉶鄭本扱作挹繼公案上經云以挹湆注曰今文挹皆作扱皆此經文也案士昏禮聘禮賔以柶祭醴二記皆云始扱一祭又公食大夫禮曰扱上鉶以柶辨擩之上鉶之間祭蓋以柶取物而祭則必扱之此亦以柶祭鉶也宜云扱與彼同不冝云挹當從今文南面立於席西鄭本無南面字注曰今文曰南面立於席西繼公謂冝從今文入南面字其㨎祭鄭本㨎作綏注曰綏古文為㨎繼公謂此當云授祭綏㨎二字皆誤也但㨎於授字為尤近故冝取其近者啐酒皆如尸禮本云拜啐酒疏曰或此經啐酒之上無拜文繼公謂啐酒之上不當有拜今從疏之所謂或本者去拜字禮古經十七篇其十三篇之後皆有記四篇則無之四篇者士相見大射少牢上下也然以意度之此四篇者未必無一記之可言或者有之而亡逸焉爾夫記者乃後人述其所聞以足經意者也舊各置之於其本篇之後者所以尊經而不敢與之雜也漢藝文志言禮經與記各自為篇數是班固之時經記猶不相合也今乃各在其本篇後者其鄭氏置之與朱子作儀禮通解乃始以記文分屬於經文每條之下謂以從簡便豫作集說而於此則不能從也豫非求異於朱子也顧其勢有所不可耳何以言之儀禮諸篇之記有特為一條而發者如士冠記云始冠之緇布冠之類是也有兼為兩條而發者如聘記云大夫來使無罪饗之過則餼之是也亦有兼為數條而發者如冠記云適子冠於阼以著代也醮於客位加有成也云云之類是也亦有於經意之外别見他禮者如鄉射記言君射之禮士冠記言無大夫冠禮而有其昏禮士昏記言壻見妻父之類是也若其但為一條而發者固可用通解之例矣非是則未見其可也何則通解之書規模大而篇數繁其記文有不可附於本篇每條之下者則或於其篇末見之否則於他篇附之故雖未必盡如其所謂以從簡便之說而其於記文亦皆包括而無所遺也然以記者之意考之則亦不為無少異矣豫之所撰者但十七篇之集說耳若亦用此法則其所遺者不既多乎故不若仍舊貫之為愈而不敢效朱子通解之為也魯人所謂以吾之不可學柳下惠之可者吾有取焉爾夫豈敢有求異之心哉且夫易之為書也更四聖而后成伏羲畫卦爻文王周公作卦爻之辭孔子作文言彖象之辭其始也四聖之書或前或後各居一處不相雜也後世學者乃各分而合之以從簡便及至朱子復釐正之以復古經之舊夫文言與彖象之辭可以附於每卦每爻之下者也朱子猶且正之蓋不欲其相雜也而况此記之文有不可盡入於本篇每條之下者乎由是言之則豫之不敢用通解之法也亦冝矣又何足怪焉大德辛丑仲秋望日長樂敖繼公書
